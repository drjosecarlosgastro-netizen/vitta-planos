<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --navy:#1F2033;--navy-light:#19807f;
  --bg:#f4f7f8;--white:#fff;--text:#1F2033;--text-muted:#5A7381;
  --border:#e4eaed;--accent:#19807f;
  --success:#19807f;--warning:#C9B382;--danger:#ef4444;--purple:#154C56;
  --font:'DM Sans',sans-serif;--font-display:'Cormorant Garamond',serif;--radius:14px;--radius-sm:10px;
  --shadow:0 2px 12px rgba(31,32,51,.10);
  --deep-ocean:#154C56;--tidal:#19807f;--ivory:#FFFAE5;--gold:#C9B382;--sky:#9CB7C7;--midnight:#1F2033;--ash:#5A7381;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);font-size:15px}
.topbar{background:#13141f;border-bottom:2px solid var(--tidal);padding:16px 18px 12px;position:sticky;top:0;z-index:100;
  padding-top:calc(16px + env(safe-area-inset-top))}
.topbar-title{color:var(--ivory);font-size:19px;font-weight:600;font-family:var(--font-display)}
.topbar-sub{color:var(--sky);font-size:12px;margin-top:2px}
.topbar-time{color:var(--sky);font-size:12px;text-align:right}
.tabs{display:flex;overflow-x:auto;background:#13141f;padding:0 18px 0;scrollbar-width:none;border-top:1px solid rgba(255,255,255,.06)}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:rgba(200,220,230,.6);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#fff;border-bottom-color:var(--tidal)}
.content{padding:16px;padding-bottom:32px;min-height:100vh}
.card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.metric-card{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center}
.metric-num{font-size:30px;font-weight:700;color:var(--deep-ocean);line-height:1.1}
.metric-label{font-size:11px;color:var(--text-muted);margin-top:3px;font-weight:500}
.metric-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.pat-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.pat-row:last-child{border-bottom:none}
.avatar{width:38px;height:38px;border-radius:10px;background:var(--deep-ocean);color:var(--ivory);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;font-family:var(--font-display)}
.pat-info{flex:1;min-width:0}
.pat-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pat-meta{font-size:11px;color:var(--text-muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.phase-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
.phase-1{background:#dbeafe;color:#1d4ed8}
.phase-2{background:#dcfce7;color:#166534}
.phase-3{background:#fef9c3;color:#854d0e}
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.pill-blue{background:#fef3c7;color:#92400e}
.pill-purple{background:#e0f4f3;color:#19807f}
.pill-green{background:#dcfce7;color:#166534}
.etiqueta{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;color:#fff}
.appt-item{padding:11px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.appt-item:last-child{border-bottom:none}
.appt-time{font-weight:700;font-size:13px;color:var(--navy);min-width:44px;flex-shrink:0}
.appt-info{flex:1}
.appt-name{font-weight:600;font-size:14px}
.appt-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.appt-status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;flex-shrink:0}
.status-agendado{background:#dbeafe;color:#1e40af}
.status-compareceu{background:#dcfce7;color:#166534}
.status-faltou{background:#fee2e2;color:#991b1b}
.status-cancelou{background:#fef3c7;color:#92400e}
.overdue{background:#fff5f5;border-radius:10px;padding:8px 10px;margin-bottom:6px;border-left:3px solid var(--danger)}
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:8px;font-size:13px}
.alert-danger{background:#fff5f5;border:1px solid #fca5a5;color:#991b1b}
.alert-warning{background:#fffbeb;border:1px solid #fcd34d;color:#92400e}
.alert-info{background:#eff6ff;border:1px solid #93c5fd;color:#1e40af}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.fin-row:last-child{border-bottom:none}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--tidal);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:30px;color:var(--text-muted);font-size:13px}
.section-label{font-size:11px;font-weight:600;color:var(--ash);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
.refresh-btn{position:fixed;bottom:24px;right:18px;width:48px;height:48px;border-radius:50%;background:var(--deep-ocean);color:var(--ivory);border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(21,76,86,.3);display:flex;align-items:center;justify-content:center;z-index:50;transition:transform .2s}
.refresh-btn:active{transform:scale(.92)}
.summary-bar{background:#13141f;padding:10px 18px;display:flex;gap:16px;overflow-x:auto;scrollbar-width:none}
.summary-bar::-webkit-scrollbar{display:none}
.summary-item{text-align:center;flex-shrink:0}
.summary-num{font-size:22px;font-weight:700;color:#fff;line-height:1;font-family:var(--font-display)}
.summary-label{font-size:10px;color:var(--sky);margin-top:2px}
.last-update{text-align:center;font-size:11px;color:var(--text-muted);padding:8px;margin-top:4px}
/* Soro badge */
.soro-tipo{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;background:#e0f2fe;color:#0369a1}
/* Enc badge */
.enc-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
.enc-fim{background:#dbeafe;color:#1d4ed8}
.enc-des{background:#fff7ed;color:#c2410c}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal-sheet{background:var(--bg);width:100%;max-height:88vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom))}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 12px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:2px}
.modal-sub{font-size:12px;color:var(--text-muted);margin-bottom:14px}
.modal-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:var(--border);border:none;font-size:16px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer}
/* Collapsible */
.coll-header{display:flex;align-items:center;gap:10px;cursor:pointer}
.coll-arrow{margin-left:auto;color:var(--text-muted);font-size:18px;transition:transform .2s;flex-shrink:0}
.coll-arrow.open{transform:rotate(90deg)}
.coll-body{display:none;padding-top:10px;margin-top:10px;border-top:1px solid var(--border)}
.coll-body.open{display:block}
.clickable{cursor:pointer}
.pend-item{background:var(--bg);border-radius:10px;padding:10px 12px;margin-top:8px;border:1px solid var(--border);display:flex;gap:8px;align-items:flex-start}
.pend-item.done{background:#f0faf9;border-color:var(--success)}
.pend-chk{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--text-muted);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.pend-chk.done{background:var(--success);border-color:var(--success)}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div class="topbar-title">&#127973; Cl&#237;nica Vitta</div>
      <div class="topbar-sub">Dr. Jos&#233; Carlos &middot; Vis&#227;o Geral</div>
    </div>
    <div class="topbar-time" id="clock"></div>
  </div>
</div>

<div class="summary-bar" id="summary-bar">
  <div class="summary-item"><div class="summary-num">&#8212;</div><div class="summary-label">Ativos</div></div>
  <div class="summary-item"><div class="summary-num">&#8212;</div><div class="summary-label">Hoje</div></div>
  <div class="summary-item"><div class="summary-num">&#8212;</div><div class="summary-label">Alertas</div></div>
  <div class="summary-item"><div class="summary-num">&#8212;</div><div class="summary-label">Sess&#245;es/m&#234;s</div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('inicio')">In&#237;cio</button>
  <button class="tab" onclick="showTab('agenda')">Agenda</button>
  <button class="tab" onclick="showTab('pacientes')">Pacientes</button>
  <button class="tab" onclick="showTab('soro')">Soroterapia</button>
  <button class="tab" onclick="showTab('alertas')">Alertas</button>
  <button class="tab" onclick="showTab('pendencias')">Pend\u00eancias</button>
  <button class="tab" onclick="showTab('leads')">CRM</button>
  <button class="tab" onclick="showTab('relacionamento')">Relacionamento</button>
  <button class="tab" onclick="showTab('financeiro')">Financeiro</button>
</div>

<div class="content" id="main-content">
  <div class="loading"><div class="spinner"></div>Carregando...</div>
</div>

<button class="refresh-btn" onclick="loadAll()" title="Atualizar">&#8635;</button>

<div class="modal-overlay hidden" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://tzsamyaobtzswpklxpzx.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6c2FteWFvYnR6c3dwa2x4cHp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzkxNjEsImV4cCI6MjA5NDg1NTE2MX0.okDoh3yP2HHPQKIUFf64X0UzBp0aWK_5WirprPsL8vM';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let allData={};
let currentTab='inicio';

const fmtDate=d=>{if(!d)return'';if(d.includes('/'))return d;const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;};
const isoToDisplay=iso=>{if(!iso)return'';const p=iso.split('T')[0].split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;};
const parseDateInt=d=>{if(!d)return 0;const p=d.split('/');if(p.length!==3)return 0;return parseInt(p[2]+p[1]+p[0]);};
const todayStr=()=>{const n=new Date();return String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+n.getFullYear();};
const monthsSince=dateStr=>{if(!dateStr)return 0;const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return 0;const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const n=new Date();return Math.max(0,(n.getFullYear()-d.getFullYear())*12+(n.getMonth()-d.getMonth()));};
const calcPhase=(inicio,dur)=>{const m=monthsSince(inicio);const t=Math.ceil(dur/3);if(m<t)return 1;if(m<t*2)return 2;return 3;};
const addMonths=(dateStr,months)=>{if(!dateStr)return'';const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return'';const d=new Date(parseInt(p[2]),parseInt(p[1])-1+months,parseInt(p[0]));return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();};
const daysAgo=dateStr=>{if(!dateStr)return null;const p=dateStr.split('/');if(p.length!==3)return null;const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const now=new Date();now.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((now-d)/86400000);};
const currMonthStart=()=>{const n=new Date();return new Date(n.getFullYear(),n.getMonth(),1);};
const currMonthEnd=()=>{const n=new Date();return new Date(n.getFullYear(),n.getMonth()+1,0);};
const dateInCurrMonth=s=>{if(!s)return false;const p=s.split('/');if(p.length!==3)return false;const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));return d>=currMonthStart()&&d<=currMonthEnd();};
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDatetime(iso){if(!iso)return'';try{const d=new Date(iso);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');document.getElementById('modal-content').innerHTML='';}
function toggleColl(id){const body=document.getElementById('body-'+id);const arrow=document.getElementById('arrow-'+id);if(!body)return;const open=body.classList.contains('open');body.classList.toggle('open',!open);if(arrow)arrow.classList.toggle('open',!open);}

function updateClock(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','S\u00e1b'];
  document.getElementById('clock').innerHTML=days[n.getDay()]+', '+h+':'+m;
}
setInterval(updateClock,1000);updateClock();

async function loadAll(){
  document.getElementById('main-content').innerHTML='<div class="loading"><div class="spinner"></div>Atualizando...</div>';
  const[{data:patients},{data:appts},{data:sessoes},{data:envios},{data:fin},{data:impl},{data:pends},{data:pendItens},{data:hist}]=await Promise.all([
    sb.from('planos_patients').select('*').order('name'),
    sb.from('planos_appointments').select('*').order('created_at'),
    sb.from('planos_soro_sessoes').select('*').order('created_at'),
    sb.from('planos_soro_envios').select('*').order('created_at'),
    sb.from('planos_financeiro').select('*').order('created_at'),
    sb.from('planos_implantes').select('*').order('created_at'),
    sb.from('planos_pendencias').select('*'),
    sb.from('planos_pendencias_itens').select('*'),
    sb.from('planos_historico_edicoes').select('*').order('editado_em',{ascending:false}).limit(300)
  ]);
  allData={
    patients:patients||[],appts:appts||[],sessoes:sessoes||[],
    envios:envios||[],fin:fin||[],impl:impl||[],
    pends:pends||[],pendItens:pendItens||[],hist:hist||[]
  };
  updateSummaryBar();
  showTab(currentTab);
}

function updateSummaryBar(){
  const{patients,appts,sessoes,envios}=allData;
  const active=patients.filter(p=>p.active).length;
  const todayAppts=appts.filter(a=>a.date_str===todayStr()&&!a.origem_tabela).length;
  let alerts=0;
  patients.filter(p=>p.active&&p.modality==='Online').forEach(p=>{
    const lastEnvio=envios.filter(e=>e.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_envio)-parseDateInt(a.data_envio))[0];
    if(lastEnvio){
      const total=(lastEnvio.sessoes_ev||0)+(lastEnvio.sessoes_im||0);
      const feitas=sessoes.filter(s=>s.patient_id===p.id&&s.envio_id===lastEnvio.id).length;
      if(total-feitas<=2)alerts++;
    }
  });
  const sessoesMes=sessoes.filter(s=>dateInCurrMonth(s.data_sessao)).length;
  document.getElementById('summary-bar').innerHTML=
    '<div class="summary-item"><div class="summary-num">'+active+'</div><div class="summary-label">Ativos</div></div>'
    +'<div class="summary-item"><div class="summary-num">'+todayAppts+'</div><div class="summary-label">Hoje</div></div>'
    +'<div class="summary-item"><div class="summary-num" style="color:'+(alerts>0?'#f87171':'#fff')+'">'+alerts+'</div><div class="summary-label">Alertas</div></div>'
    +'<div class="summary-item"><div class="summary-num">'+sessoesMes+'</div><div class="summary-label">Sess\u00f5es/m\u00eas</div></div>';
}

function showTab(tab){
  currentTab=tab;
  const tabNames=['inicio','agenda','pacientes','soro','alertas','pendencias','leads','relacionamento','financeiro'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tabNames[i]===tab));
  if(tab==='inicio')renderInicio();
  else if(tab==='agenda')renderAgenda();
  else if(tab==='pacientes')renderPacientes();
  else if(tab==='soro')renderSoro();
  else if(tab==='alertas')renderAlertas();
  else if(tab==='pendencias')renderPendenciasMobile();
  else if(tab==='leads')renderLeadsMobile();
  else if(tab==='relacionamento')renderRelacionamentoMobile();
  else if(tab==='financeiro')renderFinanceiro();
}

// ── INÍCIO ─────────────────────────────────────────────────────
function renderInicio(){
  const{patients,appts,sessoes,envios,fin,impl}=allData;
  const active=patients.filter(p=>p.active);
  const today=todayStr();
  const todayInt=parseDateInt(today);

  // Consultas de hoje (sem origem_tabela = não são soro/implante automáticos)
  const todayAppts=appts.filter(a=>a.date_str===today&&!a.origem_tabela).sort((a,b)=>(a.time_str||'').localeCompare(b.time_str||''));
  // Soro/implante de hoje (com origem_tabela)
  const todayProcedimentos=appts.filter(a=>a.date_str===today&&a.origem_tabela).sort((a,b)=>(a.time_str||'').localeCompare(b.time_str||''));
  const patMap={};patients.forEach(p=>patMap[p.id]=p.name);

  const finMes=fin.filter(f=>dateInCurrMonth(f.data_pagamento));
  const totalMes=finMes.reduce((s,f)=>s+(parseFloat(f.valor)||0),0);

  // Consultas pendentes (passadas sem status, sem origem_tabela)
  const overdueCount=appts.filter(a=>parseDateInt(a.date_str)<todayInt&&(!a.status||a.status==='Agendado')&&!a.origem_tabela).length;

  // Alertas de envio
  let alertItems=[];
  active.filter(p=>p.modality==='Online').forEach(p=>{
    const lastEnvio=envios.filter(e=>e.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_envio)-parseDateInt(a.data_envio))[0];
    if(lastEnvio){
      const total=(lastEnvio.sessoes_ev||0)+(lastEnvio.sessoes_im||0);
      const feitas=sessoes.filter(s=>s.patient_id===p.id&&s.envio_id===lastEnvio.id).length;
      const rest=total-feitas;
      if(rest<=1)alertItems.push({id:p.id,name:p.name,msg:'\ud83d\udea9 Enviar protocolo agora!',type:'danger'});
      else if(rest<=2)alertItems.push({id:p.id,name:p.name,msg:'\u26a0\ufe0f Preparar pr\u00f3ximo envio',type:'warning'});
    }
  });

  const ending=active.filter(p=>p.inicio_programa&&calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3)===3);

  const c=document.getElementById('main-content');
  let html='';

  // Métricas
  html+='<div class="metric-grid">'
    +'<div class="metric-card clickable" onclick="showTab(\'pacientes\')" title="Ver pacientes"><div class="metric-num">'+active.length+'</div><div class="metric-label">Pacientes Ativos</div></div>'
    +'<div class="metric-card clickable" onclick="showTab(\'financeiro\')" title="Ver financeiro"><div class="metric-num" style="color:var(--success)">R$'+(totalMes/1000).toFixed(1)+'k</div><div class="metric-label">Faturamento M\u00eas</div><div class="metric-sub">'+finMes.length+' pagamento(s)</div></div>'
    +'<div class="metric-card clickable" onclick="showTab(\'soro\')" title="Ver soroterapia"><div class="metric-num">'+sessoes.filter(s=>dateInCurrMonth(s.data_sessao)).length+'</div><div class="metric-label">Sess\u00f5es no M\u00eas</div></div>'
    +'<div class="metric-card clickable" onclick="showTab(\'agenda\')" title="Ver agenda"><div class="metric-num" style="color:'+(overdueCount>0?'var(--danger)':'var(--text)')+'">'+overdueCount+'</div><div class="metric-label">Consultas Pendentes</div><div class="metric-sub">sem status</div></div>'
    +'</div>';

  // Alertas
  if(alertItems.length){
    html+='<div class="section-label">\ud83d\udd14 Alertas</div>';
    alertItems.forEach(a=>{html+='<div class="alert alert-'+a.type+' clickable" onclick="openPatientDetail('+a.id+')"><div><strong>'+a.name+'</strong><br/>'+a.msg+'</div></div>';});
  }

  // Agenda de hoje (consultas)
  html+='<div class="section-label">\ud83d\udcc5 Consultas Hoje \u2014 '+today+'</div>';
  if(todayAppts.length){
    html+='<div class="card">';
    todayAppts.forEach(a=>{
      const statusCls='status-'+(a.status||'agendado').toLowerCase().replace(/\s/g,'-');
      html+='<div class="appt-item clickable" onclick="openPatientDetail('+a.patient_id+')">'
        +'<div class="appt-time">'+(a.time_str||'--:--')+'</div>'
        +'<div class="appt-info">'
        +'<div class="appt-name">'+(patMap[a.patient_id]||'\u2014')+'</div>'
        +'<div class="appt-sub">'+(a.procedimento||'')+' \u00b7 '+(a.tipo||'')+'</div>'
        +'</div>'
        +'<span class="appt-status '+statusCls+'">'+(a.status||'Agendado')+'</span>'
        +'</div>';
    });
    html+='</div>';
  }else{html+='<div class="empty">Sem consultas hoje</div>';}

  // Procedimentos de hoje (soro/implante vinculados)
  if(todayProcedimentos.length){
    html+='<div class="section-label">\ud83d\udc89 Procedimentos Hoje (Soro/Implante)</div><div class="card">';
    todayProcedimentos.forEach(a=>{
      html+='<div class="appt-item clickable" onclick="openPatientDetail('+a.patient_id+')">'
        +'<div class="appt-time">'+(a.time_str||'--:--')+'</div>'
        +'<div class="appt-info">'
        +'<div class="appt-name">'+(patMap[a.patient_id]||'\u2014')+'</div>'
        +'<div class="appt-sub">'+(a.procedimento||'')+' \u2014 '+(a.observacao||'')+'</div>'
        +'<div style="font-size:10px;color:var(--success);margin-top:2px">\ud83d\udd17 '+(a.origem_tabela==='soro_sessoes'?'Soroterapia':'Implante')+'</div>'
        +'</div>'
        +'<span class="appt-status status-compareceu">Compareceu</span>'
        +'</div>';
    });
    html+='</div>';
  }

  // Encerrando em breve
  if(ending.length){
    html+='<div class="section-label">\u23f3 Encerrando em Breve (Fase 3)</div><div class="card">';
    ending.forEach(p=>{
      html+='<div class="pat-row clickable" onclick="openPatientDetail('+p.id+')">'
        +'<div class="avatar">'+p.name.charAt(0)+'</div>'
        +'<div class="pat-info">'
        +'<div class="pat-name">'+p.name+'</div>'
        +'<div class="pat-meta"><span class="phase-badge phase-3">Fase 3</span><span style="font-size:10px">Fim: '+addMonths(fmtDate(p.inicio_programa||''),p.duracao_programa||3)+'</span></div>'
        +'</div></div>';
    });
    html+='</div>';
  }

  html+='<div class="last-update">Atualizado \u00e0s '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</div>';
  c.innerHTML=html;
}

// ── AGENDA ─────────────────────────────────────────────────────
function renderAgenda(fromDate,toDate){
  const{appts,patients}=allData;
  const patMap={};patients.forEach(p=>patMap[p.id]=p.name);
  const todayInt=parseDateInt(todayStr());
  const fromInt=fromDate?parseInt(fromDate.replace(/-/g,'')):null;
  const toInt=toDate?parseInt(toDate.replace(/-/g,'')):null;
  const filtered=!!(fromDate||toDate);
  const inRange=d=>{const di=parseDateInt(d);if(fromInt&&di<fromInt)return false;if(toInt&&di>toInt)return false;return true;};

  // Consultas diretas (não vinculadas a soro/implante)
  const upcoming=appts.filter(a=>parseDateInt(a.date_str)>=todayInt&&!a.origem_tabela)
    .sort((a,b)=>{const di=parseDateInt(a.date_str)-parseDateInt(b.date_str);return di!==0?di:(a.time_str||'').localeCompare(b.time_str||'');});
  const overdue=filtered?[]:appts.filter(a=>parseDateInt(a.date_str)<todayInt&&(!a.status||a.status==='Agendado')&&!a.origem_tabela)
    .sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));

  // Procedimentos vinculados (soro/implante)
  const procedimentos=appts.filter(a=>a.origem_tabela&&(filtered?inRange(a.date_str):parseDateInt(a.date_str)>=todayInt))
    .sort((a,b)=>parseDateInt(a.date_str)-parseDateInt(b.date_str));

  const byDate={};
  upcoming.forEach(a=>{if(!byDate[a.date_str])byDate[a.date_str]=[];byDate[a.date_str].push(a);});
  const byDateProc={};
  procedimentos.forEach(a=>{if(!byDateProc[a.date_str])byDateProc[a.date_str]=[];byDateProc[a.date_str].push(a);});

  let html='';
  html+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">'
    +'<input type="date" id="ag-from" value="'+(fromDate||'')+'" style="flex:1;min-width:120px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:var(--font);background:var(--white);color:var(--text)">'
    +'<span style="font-size:12px;color:var(--text-muted)">at\u00e9</span>'
    +'<input type="date" id="ag-to" value="'+(toDate||'')+'" style="flex:1;min-width:120px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:var(--font);background:var(--white);color:var(--text)">'
    +'<button onclick="renderAgenda(document.getElementById(\'ag-from\').value,document.getElementById(\'ag-to\').value)" style="padding:8px 14px;background:var(--deep-ocean);color:var(--ivory);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Filtrar</button>'
    +(filtered?'<button onclick="renderAgenda()" style="padding:8px 10px;background:none;border:1.5px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-muted);cursor:pointer">Limpar</button>':'')
    +'</div>';

  if(overdue.length){
    html+='<div class="section-label" style="color:var(--danger)">\u26a0\ufe0f Consultas sem Status ('+overdue.length+')</div>';
    overdue.forEach(a=>{
      html+='<div class="overdue clickable" onclick="openPatientDetail('+a.patient_id+')">'
        +'<div style="font-weight:700;font-size:13px">'+(patMap[a.patient_id]||'\u2014')+'</div>'
        +'<div style="font-size:12px;color:var(--text-muted)">'+fmtDate(a.date_str)+' \u00b7 '+(a.procedimento||'')+' \u00b7 <strong style="color:var(--danger)">'+daysAgo(a.date_str)+'d atr\u00e1s</strong></div>'
        +'</div>';
    });
  }

  const allDates=[...new Set([...Object.keys(byDate),...Object.keys(byDateProc)])].sort((a,b)=>parseDateInt(a)-parseDateInt(b));
  allDates.forEach(date=>{
    const isToday=date===todayStr();
    html+='<div class="section-label">'+fmtDate(date)+(isToday?' \u2014 Hoje':'')+'</div><div class="card">';
    // Consultas diretas
    (byDate[date]||[]).forEach(a=>{
      const statusCls='status-'+(a.status||'agendado').toLowerCase().replace(/\s/g,'-');
      html+='<div class="appt-item clickable" onclick="openPatientDetail('+a.patient_id+')">'
        +'<div class="appt-time">'+(a.time_str||'--')+'</div>'
        +'<div class="appt-info">'
        +'<div class="appt-name">'+(patMap[a.patient_id]||'\u2014')+'</div>'
        +'<div class="appt-sub">'+(a.procedimento||'')+' \u00b7 '+(a.tipo||'')+(a.observacao?' \u00b7 '+a.observacao:'')+'</div>'
        +'</div>'
        +'<span class="appt-status '+statusCls+'">'+(a.status||'Agendado')+'</span>'
        +'</div>';
    });
    // Procedimentos vinculados
    (byDateProc[date]||[]).forEach(a=>{
      html+='<div class="appt-item clickable" style="border-left:3px solid var(--success);padding-left:8px" onclick="openPatientDetail('+a.patient_id+')">'
        +'<div class="appt-time">'+(a.time_str||'--')+'</div>'
        +'<div class="appt-info">'
        +'<div class="appt-name">'+(patMap[a.patient_id]||'\u2014')+'</div>'
        +'<div class="appt-sub">'+(a.procedimento||'')+(a.observacao?' \u00b7 '+a.observacao:'')+'</div>'
        +'<div style="font-size:10px;color:var(--success)">\ud83d\udd17 '+(a.origem_tabela==='soro_sessoes'?'Soroterapia':'Implante')+'</div>'
        +'</div>'
        +'<span class="appt-status status-compareceu">Compareceu</span>'
        +'</div>';
    });
    html+='</div>';
  });

  if(!overdue.length&&!allDates.length)html+='<div class="empty">Sem consultas no per\u00edodo</div>';
  document.getElementById('main-content').innerHTML=html;
}

// ── PACIENTES ──────────────────────────────────────────────────
function renderPacientes(){
  const{patients,appts,sessoes,impl}=allData;
  const active=patients.filter(p=>p.active).sort((a,b)=>a.name.localeCompare(b.name));
  const phaseColors=['','phase-1','phase-2','phase-3'];
  let html='<div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">'+active.length+' pacientes ativos</div>';
  active.forEach(p=>{
    const phase=p.inicio_programa?calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3):1;
    const months=p.inicio_programa?monthsSince(fmtDate(p.inicio_programa)):0;
    const endDate=p.inicio_programa?addMonths(fmtDate(p.inicio_programa),p.duracao_programa||3):'\u2014';
    const tags=(p.etiquetas||[]);
    // Consultas reais (sem origem_tabela)
    const patConsultas=appts.filter(a=>a.patient_id===p.id&&a.status==='Compareceu'&&!a.origem_tabela).sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
    const lastConsult=patConsultas[0];
    const patSoro=sessoes.filter(s=>s.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_sessao)-parseDateInt(a.data_sessao));
    const lastSoro=patSoro[0];
    const patImpl=impl.filter(i=>i.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_implante)-parseDateInt(a.data_implante));
    const lastImpl=patImpl[0];
    const encBadge=p.motivo_encerramento?'<span class="enc-badge '+(p.motivo_encerramento==='fim'?'enc-fim':'enc-des')+'">'+(p.motivo_encerramento==='fim'?'Fim':'Desist\u00eancia')+'</span>':'';
    html+='<div class="card clickable" style="margin-bottom:10px" onclick="openPatientDetail('+p.id+')">'
      +'<div class="pat-row" style="padding-bottom:10px">'
      +'<div class="avatar">'+p.name.charAt(0)+'</div>'
      +'<div class="pat-info">'
      +'<div class="pat-name">'+p.name+encBadge+'</div>'
      +'<div class="pat-meta"><span class="phase-badge '+phaseColors[phase]+'">Fase '+phase+'</span><span class="pill pill-'+(p.modality==='Presencial'?'blue':'purple')+'">'+(p.modality||'\u2014')+'</span><span style="font-size:10px;color:var(--text-muted)">'+(p.plan_type||'')+' \u00b7 M\u00eas '+(months+1)+'</span></div>'
      +'<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:3px">'+tags.map(t=>'<span class="etiqueta" style="background:'+(t.color||'#6b7280')+'">'+t.name+'</span>').join('')+'</div>'
      +'</div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding-top:8px;border-top:1px solid var(--border)">'
      +'<div style="text-align:center"><div style="font-size:10px;color:var(--text-muted);margin-bottom:2px">Fim Estimado</div><div style="font-size:11px;font-weight:600">'+endDate+'</div></div>'
      +'<div style="text-align:center"><div style="font-size:10px;color:var(--text-muted);margin-bottom:2px">\u00daltima Consulta</div><div style="font-size:11px;font-weight:600">'+(lastConsult?fmtDate(lastConsult.date_str):'\u2014')+'</div></div>'
      +'<div style="text-align:center"><div style="font-size:10px;color:var(--text-muted);margin-bottom:2px">\u00daltimo Soro</div><div style="font-size:11px;font-weight:600">'+(lastSoro?fmtDate(lastSoro.data_sessao):'\u2014')+(lastSoro&&lastSoro.tipo_sessao?'<div class="soro-tipo">'+lastSoro.tipo_sessao+'</div>':'')+'</div></div>'
      +'</div>'
      +(lastImpl?'<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted)">\ud83e\uddec \u00daltimo implante: <strong>'+fmtDate(lastImpl.data_implante)+'</strong>'+(lastImpl.observacao?' \u00b7 '+lastImpl.observacao.slice(0,40):'')+'</div>':'')
      +'</div>';
  });
  if(!active.length)html='<div class="empty">Nenhum paciente ativo</div>';
  document.getElementById('main-content').innerHTML=html;
}

// ── SOROTERAPIA ────────────────────────────────────────────────
function renderSoro(){
  const{patients,sessoes,envios}=allData;
  const active=patients.filter(p=>p.active);
  let html='';

  // Sessions this month
  const sessoesMes=sessoes.filter(s=>dateInCurrMonth(s.data_sessao));
  const sessoesTotais=sessoes.length;

  // Count by tipo
  const tipoCount={};
  sessoes.forEach(s=>{const t=s.tipo_sessao||'N\u00e3o especificado';tipoCount[t]=(tipoCount[t]||0)+1;});

  // Summary metrics
  html+='<div class="metric-grid">'
    +'<div class="metric-card"><div class="metric-num">'+sessoesTotais+'</div><div class="metric-label">Total de Sess\u00f5es</div></div>'
    +'<div class="metric-card"><div class="metric-num" style="color:var(--accent)">'+sessoesMes.length+'</div><div class="metric-label">Sess\u00f5es no M\u00eas</div></div>'
    +'</div>';

  // Tipos de sessão breakdown
  if(Object.keys(tipoCount).length){
    html+='<div class="card"><div class="card-title">Por Tipo de Sess\u00e3o</div>';
    Object.entries(tipoCount).sort((a,b)=>b[1]-a[1]).forEach(([tipo,count])=>{
      const pct=Math.round((count/sessoesTotais)*100);
      html+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);">'
        +'<div style="flex:1;font-size:13px;font-weight:500">'+tipo+'</div>'
        +'<div style="font-size:12px;color:var(--text-muted)">'+count+'x</div>'
        +'<div style="width:50px;height:6px;background:var(--border);border-radius:99px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:var(--accent);border-radius:99px"></div></div>'
        +'</div>';
    });
    html+='</div>';
  }

  // Alertas de envio (online patients)
  const envioAlerts=[];
  active.filter(p=>p.modality==='Online').forEach(p=>{
    const lastEnvio=envios.filter(e=>e.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_envio)-parseDateInt(a.data_envio))[0];
    if(lastEnvio){
      const total=(lastEnvio.sessoes_ev||0)+(lastEnvio.sessoes_im||0);
      const feitas=sessoes.filter(s=>s.patient_id===p.id&&s.envio_id===lastEnvio.id).length;
      const rest=total-feitas;
      if(rest<=2)envioAlerts.push({p,rest,lastEnvio});
    }
  });
  if(envioAlerts.length){
    html+='<div class="section-label">\ud83d\udce6 Alertas de Envio</div>';
    envioAlerts.sort((a,b)=>a.rest-b.rest).forEach(({p,rest,lastEnvio})=>{
      html+='<div class="alert alert-'+(rest<=1?'danger':'warning')+' clickable" onclick="openPatientDetail('+p.id+')">'
        +'<div style="flex:1"><strong>'+p.name+'</strong>'
        +'<div style="font-size:12px;margin-top:3px">'+(rest<=1?'\ud83d\udea9 Enviar protocolo AGORA!':'\u26a0\ufe0f Preparar pr\u00f3ximo envio')+'</div>'
        +'<div style="font-size:11px;margin-top:3px;opacity:.8">\u00daltimo envio: '+fmtDate(lastEnvio.data_envio)+' \u00b7 '+rest+' sess\u00e3o(oes) restante(s)</div>'
        +'</div></div>';
    });
  }

  // Recent sessions per patient
  html+='<div class="section-label">\ud83d\udc89 \u00daltimas Sess\u00f5es por Paciente</div>';
  const patMap={};patients.forEach(p=>patMap[p.id]=p.name);
  // Group latest session per patient
  const latestPerPat={};
  sessoes.forEach(s=>{
    const existing=latestPerPat[s.patient_id];
    if(!existing||parseDateInt(s.data_sessao)>parseDateInt(existing.data_sessao)){latestPerPat[s.patient_id]=s;}
  });
  const sorted=Object.values(latestPerPat).sort((a,b)=>parseDateInt(b.data_sessao)-parseDateInt(a.data_sessao));
  if(sorted.length){
    html+='<div class="card">';
    sorted.slice(0,10).forEach(s=>{
      html+='<div class="pat-row clickable" onclick="openPatientDetail('+s.patient_id+')">'
        +'<div class="avatar">'+(patMap[s.patient_id]||'?').charAt(0)+'</div>'
        +'<div class="pat-info">'
        +'<div class="pat-name">'+(patMap[s.patient_id]||'Paciente #'+s.patient_id)+'</div>'
        +'<div class="pat-meta">\ud83d\udcc5 '+fmtDate(s.data_sessao)+(s.tipo_sessao?' \u00b7 <span class="soro-tipo">'+s.tipo_sessao+'</span>':'')+'</div>'
        +(s.substancias?'<div style="font-size:10px;color:var(--text-muted);margin-top:2px">'+s.substancias.slice(0,50)+(s.substancias.length>50?'\u2026':'')+'</div>':'')
        +'</div></div>';
    });
    html+='</div>';
  }else{html+='<div class="empty">Nenhuma sess\u00e3o registrada</div>';}

  document.getElementById('main-content').innerHTML=html;
}

// ── ALERTAS ────────────────────────────────────────────────────
function renderAlertas(){
  const{patients,appts,sessoes,envios}=allData;
  const active=patients.filter(p=>p.active);
  const todayInt=parseDateInt(todayStr());
  const patMap={};patients.forEach(p=>patMap[p.id]=p.name);
  let html='';

  // Envio alerts
  const envioAlerts=[];
  active.filter(p=>p.modality==='Online').forEach(p=>{
    const lastEnvio=envios.filter(e=>e.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_envio)-parseDateInt(a.data_envio))[0];
    if(lastEnvio){
      const total=(lastEnvio.sessoes_ev||0)+(lastEnvio.sessoes_im||0);
      const feitas=sessoes.filter(s=>s.patient_id===p.id&&s.envio_id===lastEnvio.id).length;
      const rest=total-feitas;
      if(rest<=2)envioAlerts.push({p,rest,lastEnvio});
    }
  });
  envioAlerts.sort((a,b)=>a.rest-b.rest);
  if(envioAlerts.length){
    html+='<div class="section-label">\ud83d\udce6 Alertas de Envio ('+envioAlerts.length+')</div>';
    envioAlerts.forEach(({p,rest,lastEnvio})=>{
      html+='<div class="alert alert-'+(rest<=1?'danger':'warning')+' clickable" onclick="openPatientDetail('+p.id+')">'
        +'<div style="flex:1"><strong>'+p.name+'</strong>'
        +'<div style="font-size:12px;margin-top:3px">'+(rest<=1?'\ud83d\udea9 Enviar protocolo AGORA!':'\u26a0\ufe0f Preparar pr\u00f3ximo envio')+'</div>'
        +'<div style="font-size:11px;margin-top:3px;opacity:.8">\u00daltimo envio: '+fmtDate(lastEnvio.data_envio)+' \u00b7 '+rest+' sess\u00e3o(oes) restante(s)</div>'
        +'</div></div>';
    });
  }

  // Consultas sem status (sem origem_tabela)
  const overdue=appts.filter(a=>parseDateInt(a.date_str)<todayInt&&(!a.status||a.status==='Agendado')&&!a.origem_tabela);
  if(overdue.length){
    html+='<div class="section-label">\ud83d\udcc5 Consultas sem Status ('+overdue.length+')</div>';
    overdue.sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str)).forEach(a=>{
      html+='<div class="alert alert-warning clickable" onclick="openPatientDetail('+a.patient_id+')">'
        +'<div><strong>'+(patMap[a.patient_id]||'\u2014')+'</strong>'
        +'<div style="font-size:12px;margin-top:2px">'+fmtDate(a.date_str)+' \u00b7 '+(a.procedimento||'')+' \u00b7 <strong>'+daysAgo(a.date_str)+'d atr\u00e1s</strong></div>'
        +'</div></div>';
    });
  }

  // Fase 3
  const ending=active.filter(p=>p.inicio_programa&&calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3)===3);
  if(ending.length){
    html+='<div class="section-label">\u23f3 Encerrando em Breve \u2014 Fase 3 ('+ending.length+')</div><div class="card">';
    ending.forEach(p=>{
      html+='<div class="pat-row clickable" onclick="openPatientDetail('+p.id+')">'
        +'<div class="avatar">'+p.name.charAt(0)+'</div>'
        +'<div class="pat-info">'
        +'<div class="pat-name">'+p.name+'</div>'
        +'<div class="pat-meta"><span class="phase-badge phase-3">Fase 3</span><span style="font-size:10px">Fim: '+addMonths(fmtDate(p.inicio_programa||''),p.duracao_programa||3)+'</span></div>'
        +'</div></div>';
    });
    html+='</div>';
  }

  // Renovação próxima
  const renovacao=active.filter(p=>(p.etiquetas||[]).some(t=>t.name==='Renova\u00e7\u00e3o Pr\u00f3xima'));
  if(renovacao.length){
    html+='<div class="section-label">\ud83d\udd04 Renova\u00e7\u00e3o Pr\u00f3xima ('+renovacao.length+')</div><div class="card">';
    renovacao.forEach(p=>{
      html+='<div class="pat-row clickable" onclick="openPatientDetail('+p.id+')">'
        +'<div class="avatar">'+p.name.charAt(0)+'</div>'
        +'<div class="pat-info">'
        +'<div class="pat-name">'+p.name+'</div>'
        +'<div class="pat-meta">'+(p.plan_type||'')+' \u00b7 '+(p.modality||'')+'</div>'
        +'</div></div>';
    });
    html+='</div>';
  }

  if(!html)html='<div class="empty" style="padding:60px">\u2705 Nenhum alerta no momento</div>';
  document.getElementById('main-content').innerHTML=html;
}

// ── FINANCEIRO ─────────────────────────────────────────────────
function renderFinanceiro(fromDate,toDate){
  const{fin,patients}=allData;
  const patMap={};patients.forEach(p=>patMap[p.id]=p.name);
  const fromInt=fromDate?parseInt(fromDate.replace(/-/g,'')):null;
  const toInt=toDate?parseInt(toDate.replace(/-/g,'')):null;
  const filtered=!!(fromDate||toDate);
  const inRange=d=>{const di=parseDateInt(d);if(fromInt&&di<fromInt)return false;if(toInt&&di>toInt)return false;return true;};
  const mes=filtered?fin.filter(f=>inRange(f.data_pagamento)):fin.filter(f=>dateInCurrMonth(f.data_pagamento));
  const totalMes=mes.reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const pix=mes.filter(f=>f.forma==='PIX').reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const cartao=mes.filter(f=>f.forma==='Cart\u00e3o').reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const misto=mes.filter(f=>f.forma==='Misto').reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const recent=mes.slice().sort((a,b)=>parseDateInt(b.data_pagamento)-parseDateInt(a.data_pagamento));
  const perPat={};mes.forEach(f=>{perPat[f.patient_id]=(perPat[f.patient_id]||0)+(parseFloat(f.valor)||0);});
  const avgPat=Object.keys(perPat).length?totalMes/Object.keys(perPat).length:0;
  const periodLabel=filtered?(fromDate&&toDate?fromDate+' \u00e0 '+toDate:fromDate||toDate):'M\u00eas Atual';
  let html='';
  html+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">'
    +'<input type="date" id="fin-from" value="'+(fromDate||'')+'" style="flex:1;min-width:120px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:var(--font);background:var(--white);color:var(--text)">'
    +'<span style="font-size:12px;color:var(--text-muted)">at\u00e9</span>'
    +'<input type="date" id="fin-to" value="'+(toDate||'')+'" style="flex:1;min-width:120px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:var(--font);background:var(--white);color:var(--text)">'
    +'<button onclick="renderFinanceiro(document.getElementById(\'fin-from\').value,document.getElementById(\'fin-to\').value)" style="padding:8px 14px;background:var(--deep-ocean);color:var(--ivory);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Filtrar</button>'
    +(filtered?'<button onclick="renderFinanceiro()" style="padding:8px 10px;background:none;border:1.5px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-muted);cursor:pointer">Limpar</button>':'')
    +'</div>';
  html+='<div class="metric-grid">'
    +'<div class="metric-card" style="grid-column:1/-1"><div class="metric-num" style="font-size:32px;color:var(--success)">R$ '+totalMes.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="metric-label">Faturamento \u2014 '+periodLabel+'</div><div class="metric-sub">'+mes.length+' pagamento(s) \u00b7 M\u00e9dia R$ '+avgPat.toLocaleString('pt-BR',{minimumFractionDigits:2})+'/paciente</div></div>'
    +'<div class="metric-card"><div class="metric-num" style="font-size:20px">R$ '+pix.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="metric-label">PIX</div></div>'
    +'<div class="metric-card"><div class="metric-num" style="font-size:20px">R$ '+(cartao+misto).toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="metric-label">Cart\u00e3o / Misto</div></div>'
    +'</div>'
    +'<div class="section-label">'+(filtered?'Pagamentos no per\u00edodo':'\u00daltimos Pagamentos')+'</div><div class="card">';
  recent.forEach(f=>{
    const icon=f.forma==='PIX'?'\ud83d\udca0':'\ud83d\udcb3';
    html+='<div class="fin-row clickable" onclick="openPatientDetail('+f.patient_id+')">'
      +'<div><div style="font-weight:600;font-size:13px">'+(patMap[f.patient_id]||'\u2014')+'</div>'
      +'<div style="font-size:11px;color:var(--text-muted)">'+(f.data_pagamento||'')+' \u00b7 '+icon+' '+(f.forma||'')+(f.parcelas?' ('+f.parcelas+')':'')+'</div>'
      +(f.observacao?'<div style="font-size:11px;color:var(--text-muted)">'+f.observacao+'</div>':'')
      +'</div>'
      +'<div style="font-weight:700;font-size:15px;color:var(--success)">R$ '+parseFloat(f.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div>'
      +'</div>';
  });
  if(!recent.length)html+='<div class="empty">Sem pagamentos</div>';
  html+='</div>';
  document.getElementById('main-content').innerHTML=html;
}


// PATIENT DETAIL MODAL
function openPatientDetail(patientId){
  const{patients,appts,sessoes,envios,fin,impl,pends,pendItens,hist}=allData;
  const p=patients.find(x=>x.id===patientId);
  if(!p)return;
  const phase=p.inicio_programa?calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3):1;
  const months=p.inicio_programa?monthsSince(fmtDate(p.inicio_programa)):0;
  const endDate=p.inicio_programa?addMonths(fmtDate(p.inicio_programa),p.duracao_programa||3):'\u2014';
  const phaseColors=['','phase-1','phase-2','phase-3'];
  let html='<div class="modal-title">'+escHtml(p.name)+'</div>';
  html+='<div class="modal-sub">'+(p.cpf?'CPF '+escHtml(p.cpf)+' \u00b7 ':'')+(p.telefone||'')+'</div>';
  html+='<div class="pat-meta" style="margin-bottom:14px">'
    +'<span class="phase-badge '+phaseColors[phase]+'">Fase '+phase+'</span>'
    +'<span class="pill pill-'+(p.modality==='Presencial'?'blue':'purple')+'">'+(p.modality||'\u2014')+'</span>'
    +'<span style="font-size:11px;color:var(--text-muted)">'+(p.plan_type||'')+' \u00b7 M\u00eas '+(months+1)+'</span>'
    +(p.active?'':'<span class="enc-badge enc-des">Inativo</span>')
    +'</div>';
  if(p.inicio_programa){
    html+='<div class="card" style="margin-bottom:10px;padding:12px 14px">'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">'
      +'<div><div style="color:var(--text-muted);font-size:10px">In\u00edcio do Programa</div><div style="font-weight:600">'+fmtDate(p.inicio_programa)+'</div></div>'
      +'<div><div style="color:var(--text-muted);font-size:10px">Fim Estimado</div><div style="font-weight:600">'+endDate+'</div></div>'
      +'</div></div>';
  }
  const patConsultas=(appts||[]).filter(a=>a.patient_id===patientId&&!a.origem_tabela).sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
  html+=collSection('cons-'+patientId,'\ud83d\udcc5 Consultas ('+patConsultas.length+')',()=>{
    if(!patConsultas.length)return'<div class="empty" style="padding:12px">Sem consultas registradas</div>';
    let h='';
    patConsultas.slice(0,15).forEach(a=>{
      const statusCls='status-'+(a.status||'agendado').toLowerCase().replace(/\s/g,'-');
      h+='<div class="appt-item">'
        +'<div class="appt-time">'+fmtDate(a.date_str)+'</div>'
        +'<div class="appt-info"><div class="appt-name">'+(a.procedimento||a.tipo||'Consulta')+'</div>'
        +'<div class="appt-sub">'+(a.time_str||'')+(a.tipo?' \u00b7 '+a.tipo:'')+'</div></div>'
        +'<span class="appt-status '+statusCls+'">'+(a.status||'Agendado')+'</span>'
        +'</div>';
    });
    return h;
  });
  const patSoro=(sessoes||[]).filter(s=>s.patient_id===patientId).sort((a,b)=>parseDateInt(b.data_sessao)-parseDateInt(a.data_sessao));
  const patEnvios=(envios||[]).filter(e=>e.patient_id===patientId).sort((a,b)=>parseDateInt(b.data_envio)-parseDateInt(a.data_envio));
  html+=collSection('soro-'+patientId,'\ud83d\udc89 Soroterapia ('+patSoro.length+' sess\u00f5es)',()=>{
    let h='';
    if(patEnvios.length){
      const le=patEnvios[0];
      const total=(le.sessoes_ev||0)+(le.sessoes_im||0);
      const feitas=(sessoes||[]).filter(s=>s.patient_id===patientId&&s.envio_id===le.id).length;
      h+='<div style="font-size:12px;margin-bottom:8px"><strong>\u00daltimo envio:</strong> '+fmtDate(le.data_envio)+' \u2014 '+feitas+'/'+total+' sess\u00f5es realizadas</div>';
      if(le.substancias)h+='<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;white-space:pre-wrap">'+escHtml(le.substancias)+'</div>';
    }
    if(!patSoro.length)return h+'<div class="empty" style="padding:12px">Sem sess\u00f5es registradas</div>';
    patSoro.slice(0,10).forEach(s=>{
      h+='<div class="appt-item"><div class="appt-time">'+fmtDate(s.data_sessao)+'</div>'
        +'<div class="appt-info"><div class="appt-name">'+(s.tipo_sessao||'Sess\u00e3o')+'</div>'
        +(s.observacao?'<div class="appt-sub">'+escHtml(s.observacao)+'</div>':'')+'</div></div>';
    });
    return h;
  });
  const patImpl=(impl||[]).filter(i=>i.patient_id===patientId).sort((a,b)=>parseDateInt(b.data_implante)-parseDateInt(a.data_implante));
  if(patImpl.length){
    html+=collSection('impl-'+patientId,'\ud83e\uddec Implantes ('+patImpl.length+')',()=>{
      let h='';
      patImpl.forEach(i=>{
        h+='<div class="appt-item"><div class="appt-time">'+fmtDate(i.data_implante)+'</div>'
          +'<div class="appt-info"><div class="appt-name">'+(i.tipo||'Implante')+'</div>'
          +(i.observacao?'<div class="appt-sub">'+escHtml(i.observacao)+'</div>':'')+'</div></div>';
      });
      return h;
    });
  }
  const patFin=(fin||[]).filter(f=>f.patient_id===patientId).sort((a,b)=>parseDateInt(b.data_pagamento)-parseDateInt(a.data_pagamento));
  const totalFin=patFin.reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  html+=collSection('fin-'+patientId,'\ud83d\udcb0 Financeiro \u2014 R$ '+totalFin.toLocaleString('pt-BR',{minimumFractionDigits:2}),()=>{
    if(!patFin.length)return'<div class="empty" style="padding:12px">Sem pagamentos</div>';
    let h='';
    patFin.slice(0,10).forEach(f=>{
      const icon=f.forma==='PIX'?'\ud83d\udca0':'\ud83d\udcb3';
      h+='<div class="fin-row"><div><div style="font-weight:600;font-size:13px">'+fmtDate(f.data_pagamento)+'</div>'
        +'<div style="font-size:11px;color:var(--text-muted)">'+icon+' '+(f.forma||'')+(f.parcelas?' ('+f.parcelas+')':'')+'</div></div>'
        +'<div style="font-weight:700;font-size:14px;color:var(--success)">R$ '+parseFloat(f.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div></div>';
    });
    return h;
  });
  const rec=(pends||[]).find(pd=>pd.patient_id===patientId);
  const itens=rec?(pendItens||[]).filter(it=>it.pend_id===rec.id&&!it.concluida):[];
  const semPend=rec&&rec.sem_pendencias;
  html+=collSection('pend-'+patientId,'\ud83d\udccc Pend\u00eancias '+(rec?(semPend?'\u2014 \u2705 Sem pend\u00eancias':'\u2014 '+itens.length+' em aberto'):''),()=>{
    if(!rec)return'<div class="empty" style="padding:12px">Paciente n\u00e3o est\u00e1 na lista de pend\u00eancias</div>';
    if(!itens.length)return'<div class="empty" style="padding:12px">'+(semPend?'\u2705 Sem pend\u00eancias registradas':'Nenhuma pend\u00eancia em aberto')+'</div>';
    let h='';
    itens.forEach(it=>{
      h+='<div class="pend-item"><div class="pend-chk"></div><div style="flex:1">'
        +'<div style="font-size:13px">'+escHtml(it.texto)+'</div>'
        +(it.obs?'<div style="font-size:11px;color:var(--text-muted);margin-top:2px">\ud83d\udccb '+escHtml(it.obs)+'</div>':'')
        +'</div></div>';
    });
    return h;
  });
  const patHist=(hist||[]).filter(h=>h.patient_id===patientId).slice(0,10);
  if(patHist.length){
    html+=collSection('hist-'+patientId,'\ud83d\udcdc Hist\u00f3rico Recente',()=>{
      let h='';
      patHist.forEach(x=>{
        h+='<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px">'
          +'<div style="font-weight:600">'+escHtml(x.campo||'')+'</div>'
          +'<div style="color:var(--text-muted);margin-top:2px">'+escHtml((x.valor_novo||'').slice(0,120))+'</div>'
          +'<div style="font-size:10px;color:var(--text-muted);margin-top:3px">'+escHtml(x.editado_por||'')+' \u00b7 '+fmtDatetime(x.editado_em)+'</div>'
          +'</div>';
      });
      return h;
    });
  }
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function collSection(id,title,bodyFn){
  const body=bodyFn();
  return '<div class="card" style="margin-bottom:10px;padding:12px 14px">'
    +'<div class="coll-header" onclick="toggleColl(\''+id+'\')">'
    +'<div style="font-size:13px;font-weight:700;flex:1">'+title+'</div>'
    +'<span class="coll-arrow" id="arrow-'+id+'">\u203a</span>'
    +'</div>'
    +'<div class="coll-body" id="body-'+id+'">'+body+'</div>'
    +'</div>';
}

// PENDENCIAS (mobile, read-only)
function renderPendenciasMobile(){
  const{patients,pends,pendItens}=allData;
  const recs=(pends||[]).slice().sort((a,b)=>{
    const sa=a.sem_pendencias?1:0,sb=b.sem_pendencias?1:0;
    if(sa!==sb)return sa-sb;
    const pa=patients.find(p=>p.id===a.patient_id),pb=patients.find(p=>p.id===b.patient_id);
    return (pa?pa.name:'').localeCompare(pb?pb.name:'');
  });
  if(!recs.length){document.getElementById('main-content').innerHTML='<div class="empty">Nenhum paciente na lista de pend\u00eancias</div>';return;}
  const totalAbertos=recs.filter(r=>!r.sem_pendencias).length;
  let html='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
    +'<div style="font-size:13px;color:var(--text-muted)">'+recs.length+' paciente(s) na lista</div>';
  if(totalAbertos>0)html+='<span style="background:var(--danger);color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700">'+totalAbertos+' n\u00e3o verificado'+(totalAbertos>1?'s':'')+'</span>';
  else html+='<span style="background:var(--success);color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700">\u2705 Tudo ok</span>';
  html+='</div>';
  recs.forEach(rec=>{
    const p=patients.find(x=>x.id===rec.patient_id);
    if(!p)return;
    const itens=(pendItens||[]).filter(it=>it.pend_id===rec.id&&!it.concluida);
    const semPend=rec.sem_pendencias===true;
    const cid='dpend-'+rec.id;
    html+='<div class="card" style="margin-bottom:10px;padding:0;overflow:hidden;border:1.5px solid '+(semPend?'var(--success)':'var(--border)')+'">';
    html+='<div class="coll-header" style="padding:12px 14px;background:'+(semPend?'#f0faf9':'var(--white)')+'" onclick="toggleColl(\''+cid+'\')">';
    html+='<div class="avatar" style="width:34px;height:34px;font-size:13px;background:'+(semPend?'var(--success)':'var(--navy)')+'">'+p.name.charAt(0)+'</div>';
    html+='<div style="flex:1"><div style="font-weight:700;font-size:13px">'+escHtml(p.name)+'</div>';
    html+='<div style="font-size:11px;'+(semPend?'color:var(--success);font-weight:600':'color:var(--warning)')+'">'+(semPend?'\u2705 Sem pend\u00eancias':'\u26a0\ufe0f '+itens.length+' em aberto')+'</div></div>';
    html+='<span class="coll-arrow" id="arrow-'+cid+'">\u203a</span>';
    html+='</div>';
    html+='<div class="coll-body" id="body-'+cid+'" style="padding:0 14px 12px;margin-top:0;border-top:none">';
    if(itens.length){
      itens.forEach(it=>{
        html+='<div class="pend-item"><div class="pend-chk"></div><div style="flex:1">'
          +'<div style="font-size:13px">'+escHtml(it.texto)+'</div>'
          +(it.obs?'<div style="font-size:11px;color:var(--text-muted);margin-top:2px">\ud83d\udccb '+escHtml(it.obs)+'</div>':'')
          +'</div></div>';
      });
    } else {
      html+='<div style="font-size:12px;color:var(--text-muted);padding-top:8px">'+(semPend?'Sem pend\u00eancias registradas.':'Nenhuma pend\u00eancia em aberto.')+'</div>';
    }
    html+='<div style="margin-top:8px"><button onclick="event.stopPropagation();openPatientDetail('+p.id+')" style="font-size:12px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;padding:6px 0">Ver prontu\u00e1rio completo \u203a</button></div>';
    html+='</div>';
    html+='</div>';
  });
  document.getElementById('main-content').innerHTML=html;
}

// ========== CRM LEADS MOBILE ==========
async function renderLeadsMobile(){
  const c=document.getElementById('main-content');
  c.innerHTML='<div class="loading"><div class="spinner"></div>Carregando leads...</div>';
  let leads=[];
  try{const{data}=await sb.from('planos_leads').select('*').order('created_at',{ascending:false});leads=data||[];}catch(e){}
  const hoje=new Date().toISOString().split('T')[0];
  const colunas=[
    {id:'novo',label:'Novo Lead',color:'#3b82f6'},
    {id:'contato',label:'Contato Feito',color:'#f59e0b'},
    {id:'negociacao',label:'Em Negocição',color:'#8b5cf6'},
    {id:'agendado',label:'Agendado',color:'#10b981'},
    {id:'perdido',label:'Perdido',color:'#ef4444'}
  ];
  const atrasados=leads.filter(l=>l.proximo_contato&&l.proximo_contato<hoje&&l.status!=='agendado'&&l.status!=='perdido').length;
  const ativos=leads.filter(l=>l.status!=='perdido').length;
  const novos=leads.filter(l=>l.status==='novo').length;
  const agendados=leads.filter(l=>l.status==='agendado').length;
  let html='<div style="display:flex;gap:8px;margin-bottom:14px">';
  html+='<div style="flex:1;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700">'+ativos+'</div><div style="font-size:10px;color:var(--text-muted)">Ativos</div></div>';
  html+='<div style="flex:1;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:#3b82f6">'+novos+'</div><div style="font-size:10px;color:var(--text-muted)">Novos</div></div>';
  html+='<div style="flex:1;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:#10b981">'+agendados+'</div><div style="font-size:10px;color:var(--text-muted)">Agendados</div></div>';
  if(atrasados>0)html+='<div style="flex:1;background:#fef2f2;border:1px solid #ef4444;border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:#ef4444">'+atrasados+'</div><div style="font-size:10px;color:#ef4444">Atrasados</div></div>';
  html+='</div>';
  colunas.forEach(function(col){
    const colLeads=leads.filter(l=>(l.status||'novo')===col.id);
    if(!colLeads.length)return;
    html+='<div style="margin-bottom:16px">';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:10px;height:10px;border-radius:50%;background:'+col.color+'"></div>';
    html+='<span style="font-size:12px;font-weight:700;color:'+col.color+'">'+col.label+'</span>';
    html+='<span style="background:'+col.color+';color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700">'+colLeads.length+'</span></div>';
    colLeads.forEach(function(lead){
      const atrasado=lead.proximo_contato&&lead.proximo_contato<hoje&&col.id!=='agendado'&&col.id!=='perdido';
      const waNum=(lead.telefone||'').replace(/\D/g,'');
      html+='<div class="card" style="margin-bottom:8px;border:1.5px solid '+(atrasado?'#ef4444':'var(--border)')+'">';
      html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
      html+='<div class="avatar" style="background:'+col.color+';width:34px;height:34px;font-size:13px">'+lead.nome.charAt(0).toUpperCase()+'</div>';
      html+='<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escHtml(lead.nome)+'</div>';
      html+='<div style="font-size:11px;color:var(--text-muted)">'+escHtml(lead.origem||'')+(lead.medico_interesse?' · '+escHtml(lead.medico_interesse):'')+'</div></div>';
      if(atrasado)html+='<span style="font-size:14px">🔔</span>';
      html+='</div>';
      if(lead.telefone)html+='<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">📱 '+escHtml(lead.telefone)+'</div>';
      if(lead.proximo_contato)html+='<div style="font-size:11px;color:'+(atrasado?'#ef4444':'var(--text-muted)')+';margin-bottom:6px">📅 '+(atrasado?'Atrasado: ':'')+lead.proximo_contato+'</div>';
      if(lead.observacao)html+='<div style="font-size:11px;color:var(--text-muted);background:var(--bg-page);border-radius:6px;padding:5px 8px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escHtml(lead.observacao)+'</div>';
      html+='<div style="display:flex;gap:6px;margin-top:8px">';
      if(waNum)html+='<a href="https://wa.me/55'+waNum+'" target="_blank" style="flex:1;text-align:center;padding:7px 0;background:#25d366;color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">WhatsApp</a>';
      const ordem=['novo','contato','negociacao','agendado'];
      const idx=ordem.indexOf(col.id);
      if(col.id!=='agendado'&&col.id!=='perdido'&&idx<ordem.length-1)html+='<button onclick="avancarLeadMobile('+lead.id+')" style="flex:1;padding:7px 0;background:'+col.color+';color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)">Avançar →</button>';
      html+='<button onclick="registrarAtivMobile('+lead.id+',\'nao_respondeu\')" style="padding:7px 10px;background:#fff8ed;border:1px solid #f59e0b;border-radius:8px;font-size:11px;cursor:pointer;font-family:var(--font)" title="Não respondeu">🔇</button>';
      html+='<button onclick="registrarAtivMobile('+lead.id+',\'contato_feito\')" style="padding:7px 10px;background:#e6f4f4;border:1px solid var(--tidal);border-radius:8px;font-size:11px;cursor:pointer;font-family:var(--font)" title="Contato feito">📞</button>';
      html+='</div></div>';
    });
    html+='</div>';
  });
  c.innerHTML=html||'<div class="empty">Nenhum lead cadastrado.</div>';
}

async function avancarLeadMobile(id){
  let lead=null;
  try{const{data}=await sb.from('planos_leads').select('*').eq('id',id).single();lead=data;}catch(e){}
  if(!lead)return;
  const ordem=['novo','contato','negociacao','agendado'];
  const idx2=ordem.indexOf(lead.status||'novo');
  if(idx2<0||idx2>=ordem.length-1)return;
  const proximo=ordem[idx2+1];
  await sb.from('planos_leads').update({status:proximo,updated_at:new Date().toISOString()}).eq('id',id);
  const labels={novo:'Novo Lead',contato:'Contato Feito',negociacao:'Em Negociação',agendado:'Agendado'};
  await sb.from('planos_leads_atividades').insert({lead_id:id,tipo:'status_alterado',descricao:'Status: '+(labels[lead.status]||lead.status)+' → '+(labels[proximo]||proximo),registrado_por:'Mobile',created_at:new Date().toISOString()});
  showToastMobile('Lead avançado!');
  renderLeadsMobile();
}

async function registrarAtivMobile(leadId,tipo){
  const msgs={contato_feito:'Contato realizado',nao_respondeu:'Tentativa sem resposta'};
  await sb.from('planos_leads_atividades').insert({lead_id:leadId,tipo:tipo,descricao:msgs[tipo]||tipo,registrado_por:'Mobile',created_at:new Date().toISOString()});
  showToastMobile(tipo==='contato_feito'?'📞 Contato registrado!':'🔇 Não respondeu registrado!');
}

// ========== RELACIONAMENTO MOBILE ==========
async function renderRelacionamentoMobile(){
  const c=document.getElementById('main-content');
  c.innerHTML='<div class="loading"><div class="spinner"></div>Carregando...</div>';
  try{
    const now=new Date();
    const mes=String(now.getMonth()+1).padStart(2,'0');
    const ano=now.getFullYear();
    const[{data:pats},{data:appts},{data:jornada},{data:soroH},{data:implH},{data:compH}]=await Promise.all([
      sb.from('planos_patients').select('id,name,telefone,active').order('name'),
      sb.from('planos_appointments').select('patient_id,date_str').order('date_str',{ascending:false}),
      sb.from('planos_jornada').select('*'),
      sb.from('planos_soro_sessoes').select('patient_id'),
      sb.from('planos_implantes').select('patient_id'),
      sb.from('planos_appointments').select('patient_id,date_str').eq('status','Compareceu')
    ]);
    const mesAppts=(appts||[]).filter(a=>{
      if(!a.date_str)return false;
      const p=a.date_str.split('/');
      return p.length===3&&p[1]===mes&&p[2]===ano.toString();
    });
    const mesIds=[...new Set(mesAppts.map(a=>a.patient_id))];
    const recentPats=(pats||[]).filter(p=>p.active&&mesIds.includes(p.id));
    function isPrimeiraVez(patId){
      const apptAtual=mesAppts.filter(a=>a.patient_id===patId).map(a=>a.date_str);
      return (compH||[]).filter(c=>c.patient_id===patId&&!apptAtual.includes(c.date_str)).length===0
        &&(soroH||[]).filter(s=>s.patient_id===patId).length===0
        &&(implH||[]).filter(i=>i.patient_id===patId).length===0;
    }
    const etapas=[
      {id:'boasvindas',label:'Boas-vindas'},
      {id:'formulario',label:'Formulário'},
      {id:'alinhamento',label:'Alinhamento'},
      {id:'confirmacao',label:'Confirmação'},
      {id:'consulta',label:'Consulta'}
    ];
    let html='';
    etapas.forEach(function(etapa){
      const pats2=recentPats.filter(p=>{
        if((jornada||[]).some(j=>j.patient_id===p.id&&j.etapa===etapa.id&&j.concluida))return false;
        if(etapa.id==='consulta')return (jornada||[]).some(j=>j.patient_id===p.id&&j.etapa==='consulta');
        const manuais=(jornada||[]).filter(j=>j.etapa==='_manual_'+etapa.id&&!j.concluida).map(j=>j.patient_id);
        return isPrimeiraVez(p.id)||manuais.includes(p.id);
      });
      if(!pats2.length)return;
      html+='<div style="margin-bottom:16px">';
      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
      html+='<span style="font-size:12px;font-weight:700;color:var(--tidal);text-transform:uppercase;letter-spacing:.5px">'+etapa.label+'</span>';
      html+='<span style="background:var(--tidal);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700">'+pats2.length+'</span>';
      html+='</div>';
      pats2.forEach(function(p){
        const waNum=(p.telefone||'').replace(/\D/g,'');
        const pv=isPrimeiraVez(p.id);
        html+='<div class="card" style="margin-bottom:8px;padding:12px 14px">';
        html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
        html+='<div class="avatar" style="width:34px;height:34px;font-size:13px">'+p.name.charAt(0)+'</div>';
        html+='<div style="flex:1"><div style="font-weight:700;font-size:13px">'+escHtml(p.name)+'</div>';
        html+='<span style="font-size:10px;font-weight:700;background:'+(pv?'#e6f4f4':'#f3f4f6')+';color:'+(pv?'var(--tidal)':'var(--ash)')+';border-radius:12px;padding:2px 8px">'+(pv?'1ª vez':'Recorrente')+'</span>';
        html+='</div></div>';
        html+='<div style="display:flex;gap:6px">';
        if(waNum&&etapa.id!=='consulta')html+='<a href="https://wa.me/55'+waNum+'" target="_blank" style="flex:1;text-align:center;padding:7px 0;background:#25d366;color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">WhatsApp</a>';
        html+='<button onclick="marcarEtapaMobile('+p.id+',\''+etapa.id+'\',event)" style="flex:1;padding:7px 0;background:var(--deep-ocean);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)">'+(etapa.id==='consulta'?'Compareceu':'Marcar feito')+'</button>';
        html+='</div></div>';
      });
      html+='</div>';
    });
    c.innerHTML=html||'<div class="empty">Nenhum paciente na jornada este mês.</div>';
  }catch(e){c.innerHTML='<div class="empty">Erro: '+escHtml(e.message)+'</div>';}
}

async function marcarEtapaMobile(patId,etapaId,evt){
  if(evt)evt.stopPropagation();
  await sb.from('planos_jornada').upsert({patient_id:patId,etapa:etapaId,concluida:true,updated_at:new Date().toISOString()},{onConflict:'patient_id,etapa'});
  if(etapaId==='confirmacao'){
    await sb.from('planos_jornada').upsert({patient_id:patId,etapa:'consulta',concluida:false,updated_at:new Date().toISOString()},{onConflict:'patient_id,etapa'});
  }
  showToastMobile('✅ Marcado!');
  renderRelacionamentoMobile();
}

function showToastMobile(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1F2033;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-family:var(--font);z-index:9999;white-space:nowrap';
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},2500);
}
