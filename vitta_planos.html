<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#1D2846"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Clínica Vitta | Alphaville — Planos de Cuidado</title>
<link rel="manifest" id="pwa-manifest"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{
  --navy:#1D2846;--navy-light:#2d3d6b;--navy-dark:#141c32;
  --bg:#EDEDED;--white:#FFFFFF;--text:#1a1a2e;--text-muted:#6b7280;
  --border:#d1d5db;--border-light:#e5e7eb;
  --accent:#4A90D9;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(29,40,70,.12);--shadow-lg:0 8px 32px rgba(29,40,70,.18);
  --font:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);font-size:15px;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}
/* LOGIN */
#screen-login{align-items:center;justify-content:center;background:var(--navy);padding:24px}
.login-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;text-align:center}
.login-logo{width:64px;height:64px;background:rgba(255,255,255,.12);border-radius:16px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px}
.login-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,.55);font-size:13px;margin-bottom:28px}
.login-type{display:flex;gap:8px;margin-bottom:24px;background:rgba(0,0,0,.2);border-radius:10px;padding:4px}
.login-type button{flex:1;padding:8px;border:none;background:transparent;color:rgba(255,255,255,.55);border-radius:8px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.login-type button.active{background:var(--accent);color:#fff}
.input-group{margin-bottom:14px;text-align:left}
.input-group label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.65);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.input-group input,.input-group select{width:100%;padding:11px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s}
.input-group input::placeholder{color:rgba(255,255,255,.35)}
.input-group input:focus{border-color:var(--accent)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy-light)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:#3b7bc4}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--border)}.btn-ghost:hover{border-color:var(--navy)}
.btn-warning{background:var(--warning);color:#fff}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:6px}
.btn-full{width:100%;justify-content:center;padding:13px}
.btn-icon{padding:8px;border-radius:8px;background:transparent;border:1.5px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all .2s}
.btn-icon:hover{background:var(--bg);border-color:var(--navy);color:var(--navy)}
/* TOPBAR */
.topbar{background:var(--navy);padding:0 20px;display:flex;align-items:center;gap:10px;min-height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.topbar-logo{color:#fff;font-weight:700;font-size:15px;letter-spacing:-.3px}
.topbar-user{color:rgba(255,255,255,.6);font-size:12px;margin-left:4px}
.topbar-spacer{flex:1}
.topbar-action{background:transparent;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;padding:6px;border-radius:8px;transition:all .2s;font-family:var(--font)}
.topbar-action:hover{color:#fff;background:rgba(255,255,255,.1)}
.topbar-back{color:#fff;font-size:20px;background:none;border:none;cursor:pointer;padding:4px 8px}
/* NAV TABS */
.navtabs{background:var(--white);border-bottom:1px solid var(--border-light);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:90}
.navtabs::-webkit-scrollbar{display:none}
.ntab{padding:13px 16px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px}
.ntab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:700}
/* INNER TABS */
.tabs{display:flex;gap:2px;overflow-x:auto;padding:0 16px;background:var(--white);border-bottom:1px solid var(--border-light);position:sticky;top:56px;z-index:50;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 13px;border:none;background:transparent;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:700}
/* CONTENT */
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:40px}
/* CARDS */
.card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
/* FIELDS */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy)}
.field textarea{resize:vertical;min-height:72px}
/* DASH CARDS */
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.dash-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.dash-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:all .18s;border:2px solid transparent}
.dash-card:hover{border-color:var(--navy);box-shadow:var(--shadow-lg)}
.dash-card-num{font-size:32px;font-weight:700;color:var(--navy);line-height:1}
.dash-card-label{font-size:12px;color:var(--text-muted);margin-top:4px;font-weight:500}
.dash-card-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
/* PATIENT ROW */
.patient-row{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .18s;border:1.5px solid transparent}
.patient-row:hover{border-color:var(--navy);box-shadow:var(--shadow)}
.patient-avatar{width:42px;height:42px;border-radius:12px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.patient-info{flex:1;min-width:0}
.patient-name{font-weight:700;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.patient-meta{font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
/* PHASE BADGES */
.phase-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.phase-1{background:#dbeafe;color:#1d4ed8}
.phase-2{background:#dcfce7;color:#166534}
.phase-3{background:#fef9c3;color:#854d0e}
/* STATUS PILLS */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.pill-green{background:#dcfce7;color:#166534}
.pill-red{background:#fee2e2;color:#991b1b}
.pill-amber{background:#fef3c7;color:#92400e}
.pill-blue{background:#dbeafe;color:#1e40af}
.pill-gray{background:#f3f4f6;color:#6b7280}
.pill-purple{background:#ede9fe;color:#5b21b6}
/* AGENDA */
.agenda-day-header{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:4px 0;border-bottom:1.5px solid var(--border-light)}
.appt-item{background:var(--white);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.appt-item.overdue{border-left:3px solid var(--danger);background:#fff5f5}
.appt-time{font-weight:700;font-size:13px;color:var(--navy);min-width:46px}
.appt-info{flex:1}
.appt-name{font-weight:600;font-size:14px}
.appt-sub{font-size:12px;color:var(--text-muted)}
/* PROGRAMA ROW */
.prog-row{background:var(--white);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prog-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer}
.prog-detail{padding:0 16px 16px;display:none;border-top:1px solid var(--border-light)}
.prog-detail.open{display:block}
/* ATTACH */
.attach-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:6px}
.attach-icon{font-size:20px;flex-shrink:0}
.attach-info{flex:1;min-width:0}
.attach-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attach-date{font-size:11px;color:var(--text-muted)}
/* ETIQUETAS */
.etiqueta{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;color:#fff;margin-right:4px;margin-bottom:4px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 20px 32px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
/* TOAST */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
/* SEARCH */
.search-bar{display:flex;align-items:center;gap:10px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;margin-bottom:14px}
.search-bar input{border:none;outline:none;flex:1;font-family:var(--font);font-size:14px;background:transparent}
/* TOGGLE */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:99px;cursor:pointer;transition:.25s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-slider{background:var(--success)}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}
/* ALERT BANNER */
.alert-banner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:13px;font-weight:600}
.alert-warning{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.alert-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
/* MISC */
.divider{height:1px;background:var(--border-light);margin:12px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:16px;font-weight:700;color:var(--text)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.text-sm{font-size:12px}.text-muted{color:var(--text-muted)}.text-bold{font-weight:700}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-muted);font-size:14px}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text-muted);padding:8px 10px;text-align:left;border-bottom:2px solid var(--border-light)}
.tbl td{padding:10px;border-bottom:1px solid var(--border-light);font-size:13px;vertical-align:middle}
.user-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:#ede9fe;color:#5b21b6}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-card">
    <div class="login-logo">🏥</div>
    <div class="login-title">Clínica Vitta | Alphaville</div>
    <div class="login-sub">Controle de Planos de Cuidado</div>
    <div class="login-type">
      <button id="btn-type-doc" class="active" onclick="setLoginType('doctor')">Dr. José Carlos</button>
      <button id="btn-type-sec" onclick="setLoginType('secretary')">Secretária</button>
    </div>
    <div class="input-group">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-accent btn-full" onclick="doLogin()">Entrar</button>
    <div id="login-error" style="color:#f87171;font-size:13px;margin-top:12px;display:none"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="screen-app" class="screen" style="background:var(--bg)">
  <div class="topbar">
    <span class="topbar-logo">🏥 Clínica Vitta</span>
    <span class="topbar-user" id="topbar-user"></span>
    <div class="topbar-spacer"></div>
    <button class="topbar-action" onclick="logout()" style="font-size:13px;font-weight:600;letter-spacing:.3px">Sair →</button>
  </div>
  <div class="navtabs">
    <button class="ntab active" id="ntab-dashboard" onclick="mainNav('dashboard')">Dashboard</button>
    <button class="ntab" id="ntab-patients" onclick="mainNav('patients')">Pacientes</button>
    <button class="ntab" id="ntab-agenda" onclick="mainNav('agenda')">Agenda</button>
    <button class="ntab" id="ntab-programa" onclick="mainNav('programa')">Programa</button>
    <button class="ntab" id="ntab-config" onclick="mainNav('config')">Configurações</button>
    <button class="ntab" id="ntab-relatorios" onclick="mainNav('relatorios')">Relatórios</button>
  </div>
  <div id="main-content" class="content"></div>
</div>

<!-- PATIENT DETAIL -->
<div id="screen-patient-detail" class="screen" style="background:var(--bg)">
  <div class="topbar">
    <button class="topbar-back" onclick="backToMain()">‹</button>
    <span class="topbar-logo" id="pd-name-header">Paciente</span>
    <div class="topbar-spacer"></div>
    <button class="topbar-action" id="btn-toggle-active" onclick="togglePatientActive()" title="Ativar/Inativar">⊙</button>
  </div>
  <div class="tabs" id="patient-tabs">
    <button class="tab active" onclick="patTab('info')">Info</button>
    <button class="tab" onclick="patTab('financeiro')">Financeiro</button>
    <button class="tab" onclick="patTab('soroterapia')">Soroterapia</button>
    <button class="tab" onclick="patTab('implante')">Implante</button>
    <button class="tab" onclick="patTab('agenda')">Agenda</button>
    <button class="tab" onclick="patTab('contrato')">Contrato</button>
    <button class="tab" onclick="patTab('historico')">Histórico</button>
  </div>
  <div id="patient-tab-content" class="content"></div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-new-patient">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Novo Paciente</div>
    <div id="new-patient-form"></div>
  </div>
</div>
<div class="modal-overlay" id="modal-generic">
  <div class="modal" id="modal-generic-body">
    <div class="modal-handle"></div>
    <div id="modal-generic-content"></div>
  </div>
</div>
<div class="modal-overlay" id="modal-patient-list">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-patient-list-content"></div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────
const SUPABASE_URL = 'https://tzsamyaobtzswpklxpzx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6c2FteWFvYnR6c3dwa2x4cHp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzkxNjEsImV4cCI6MjA5NDg1NTE2MX0.okDoh3yP2HHPQKIUFf64X0UzBp0aWK_5WirprPsL8vM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── STATE ──────────────────────────────────────────────────────
let currentUser = null; // {type:'doctor'|'secretary', name}
let currentSection = 'dashboard';
let currentPatientId = null;
let currentPatientData = null;
let allPatients = [];

// ── UTILS ──────────────────────────────────────────────────────
const titleCase = s => s ? s.toLowerCase().replace(/(?:^|\s|'|-)[a-záàãâéêíóôõúç]/g, c => c.toUpperCase()) : '';
const normStr = s => (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
function parseDateInt(d){if(!d)return 0;const p=d.split('/');if(p.length!==3)return 0;return parseInt(p[2]+p[1]+p[0]);}
function fmtDate(d){if(!d)return'';if(d.includes('/'))return d;const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function todayStr(){const n=new Date();return String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+n.getFullYear();}
function todayISO(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function displayToISO(d){if(!d)return'';const p=d.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:d;}
function isoToDisplay(iso){if(!iso)return'';const p=iso.split('T')[0].split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;}
function daysAgo(dateStr){if(!dateStr)return null;const p=dateStr.split('/');if(p.length!==3)return null;const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const now=new Date();now.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((now-d)/86400000);}
function monthsSince(dateStr){if(!dateStr)return 0;const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return 0;const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const n=new Date();return Math.max(0,(n.getFullYear()-d.getFullYear())*12+(n.getMonth()-d.getMonth()));}
function addMonthsToDisplay(dateStr,months){if(!dateStr)return'';const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return'';const d=new Date(parseInt(p[2]),parseInt(p[1])-1+months,parseInt(p[0]));return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function calcPhase(inicioStr, duracao){
  const months=monthsSince(inicioStr);
  const third=Math.ceil(duracao/3);
  if(months<third)return 1;
  if(months<third*2)return 2;
  return 3;
}
function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.style.background=type==='error'?'#dc2626':type==='success'?'#059669':'var(--navy)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

async function doLogin(){
  const pass=document.getElementById('login-pass').value.trim();
  if(!pass){showLoginError('Informe a senha');return;}
  const key=loginType==='doctor'?'doctor_password':'secretary_password';
  const{data}=await sb.from('planos_config').select('value').eq('key',key).single();

function mainNav(section){
  currentSection=section;
  document.querySelectorAll('[id^="ntab-"]').forEach(t=>t.classList.remove('active'));
  const t=document.getElementById('ntab-'+section);if(t)t.classList.add('active');
  const c=document.getElementById('main-content');
  c.innerHTML='<div class="loading"><div class="spinner"></div>Carregando...</div>';
  if(section==='dashboard')renderDashboard();
  else if(section==='patients')renderPatients();
  else if(section==='agenda')renderAgenda();
  else if(section==='programa')renderPrograma();
  else if(section==='config')renderConfig();
  else if(section==='relatorios')renderRelatorios();
}

    const patAppts=(appts||[]).filter(a=>a.patient_id===pid&&a.status==='Compareceu');

    const sorted=patAppts.sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));

      <div class="dash-card-num">${p90.length}</div>

    </div>
    <div class="dash-card" onclick="showPatientListModal('Pacientes — últimos 120 dias',${JSON.stringify(p120.map(p=>p.id))})">
      <div class="dash-card-num">${p120.length}</div>
      <div class="dash-card-label">Últimos 120 dias</div>
      <div class="dash-card-sub">por última consulta</div>
    </div>

      <div class="dash-card-num">${p365.length}</div>
      <div class="dash-card-label">Últimos 365 dias</div>
      <div class="dash-card-sub">por última consulta</div>
    </div>

  <div class="dash-card" style="margin-bottom:16px" onclick="mainNav('patients')">
    <div class="dash-card-num">${total}</div>
    <div class="dash-card-label">Total de Pacientes</div>
    <div class="dash-card-sub">desde o início</div>

function patientRowHtml(p){
  const phase=p.inicio_programa?calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3):1;
  const phaseColors=['','phase-1','phase-2','phase-3'];
  const months=p.inicio_programa?monthsSince(fmtDate(p.inicio_programa)):0;
  const tags=(p.etiquetas||[]);
  const endDate=p.inicio_programa?addMonthsToDisplay(fmtDate(p.inicio_programa),p.duracao_programa||3):'—';
  const inicioDisplay=p.inicio_programa?fmtDate(p.inicio_programa):'—';
  const encerramentoHtml=p.motivo_encerramento
    ?`<span style="font-weight:700;color:${p.motivo_encerramento==='fim'?'#3b82f6':'#f97316'}">Encerrado: ${isoToDisplay(p.data_encerramento||'')} — ${p.motivo_encerramento==='fim'?'Fim do Plano':'Desistência'}</span>`
    :'';
  return`<div class="patient-row" onclick="openPatient(${p.id})">
    <div class="patient-avatar">${p.name.charAt(0)}</div>
    <div class="patient-info">
      <div class="patient-name" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        ${p.name}
        ${tags.map(tag=>`<span class="etiqueta" style="background:${tag.color||'#6b7280'}">${tag.name}</span>`).join('')}
      </div>
      <div class="patient-meta">
        <span class="phase-badge ${phaseColors[phase]}">F${phase}</span>
        <span>${p.plan_type||'—'}</span>
        <span>Mês ${months+1}</span>
        <span class="pill pill-${p.modality==='Presencial'?'blue':'purple'}">${p.modality||'—'}</span>
        <span>${inicioDisplay}</span>
        ${p.inicio_programa?`<span>Fim: ${endDate}</span>`:''}
        ${encerramentoHtml}
      </div>
    </div>
    <span style="color:var(--text-muted);font-size:18px">›</span>
  </div>`;
}

  c.innerHTML=`

function toggleTag(el,name,color){
  let tags=JSON.parse(document.getElementById('pi-tags').value||'[]');
  const idx=tags.findIndex(t=>t.name===name);
  if(idx>=0){tags.splice(idx,1);el.style.background='#e5e7eb';el.style.color='#6b7280';}
  else{tags.push({name,color});el.style.background=color;el.style.color='#fff';}
  document.getElementById('pi-tags').value=JSON.stringify(tags);
}
async function saveNewTagFromInfo(){
  const name=document.getElementById('new-tag-name').value.trim();
  const color=document.getElementById('new-tag-color').value;
  if(!name){return;}
  // Load existing tags from config
  const{data}=await sb.from('planos_config').select('value').eq('key','etiquetas').single();
  let tags=[];try{tags=JSON.parse(data?.value||'[]')}catch(e){}
  if(tags.some(t=>t.name===name)){toast('Etiqueta já existe','error');return;}
  tags.push({name,color});
  await sb.from('planos_config').upsert({key:'etiquetas',value:JSON.stringify(tags)});
  toast('Etiqueta criada!','success');
  // Re-render the info tab
  const p=currentPatientData;
  await renderPatInfo();
}

async function savePatInfo(){
  const inicio=displayToISO(document.getElementById('pi-inicio').value.trim());
  const planType=document.getElementById('pi-plan').value;
  const duracao=planType==='Plano 6 meses'?6:planType==='Plano 3 meses'?3:1;
  const data={
    name:titleCase(document.getElementById('pi-name').value.trim()),
    dob:displayToISO(document.getElementById('pi-dob').value.trim())||null,
    cpf:document.getElementById('pi-cpf').value.trim(),
    telefone:document.getElementById('pi-tel').value.trim(),
    plan_type:planType,duracao_programa:duracao,
    modality:document.getElementById('pi-modality').value,
    inicio_programa:inicio||null,
    observacao:document.getElementById('pi-obs').value.trim(),
    etiquetas:JSON.parse(document.getElementById('pi-tags').value||'[]'),
    updated_by:currentUser.name,updated_at:new Date().toISOString()
  };
  // Handle encerramento separately
  const motivoSel = document.getElementById('pi-encerramento')?.value || null;
  const motivoAtual = currentPatientData.motivo_encerramento;
  if(motivoSel && motivoSel !== motivoAtual){
    const label = motivoSel==='fim'?'Fim do Plano':'Desistência';
    if(!confirm('Confirmar encerramento por "'+label+'"?\n\nAs sessões de soroterapia e envios serão arquivados e zerados para um novo ciclo.')){
      return;
    }
    // Archive and reset
    const [{data:sessoes},{data:envios}] = await Promise.all([
      sb.from('planos_soro_sessoes').select('*').eq('patient_id',currentPatientId),
      sb.from('planos_soro_envios').select('*').eq('patient_id',currentPatientId)
    ]);
    await sb.from('planos_historico_ciclos').insert({
      patient_id:currentPatientId, data_encerramento:todayISO(), motivo:motivoSel,
      plan_type:currentPatientData.plan_type, inicio_programa:currentPatientData.inicio_programa,
      sessoes_count:(sessoes||[]).length, envios_count:(envios||[]).length,
      sessoes_data:sessoes||[], envios_data:envios||[], registrado_por:currentUser.name
    });
    if((sessoes||[]).length) await sb.from('planos_soro_sessoes').delete().eq('patient_id',currentPatientId);
    if((envios||[]).length) await sb.from('planos_soro_envios').delete().eq('patient_id',currentPatientId);
    data.motivo_encerramento = motivoSel;
    data.data_encerramento = todayISO();
    data.active = false;
  } else if(!motivoSel) {
    data.motivo_encerramento = null;
    data.data_encerramento = null;
  }
  const{error}=await sb.from('planos_patients').update(data).eq('id',currentPatientId);
  if(error){toast('Erro ao salvar','error');return;}
  Object.assign(currentPatientData,data);
  document.getElementById('pd-name-header').textContent=data.name;
  toast('Salvo!','success');
}
function updateEncerramentoColor(sel){
  const colors={'':'var(--text)','fim':'#3b82f6','desistencia':'#f97316'};
  sel.style.color = colors[sel.value]||'var(--text)';
}

async function encerrarPlano(motivo){
  const label = motivo === 'fim' ? 'Fim do Plano' : 'Desistência';
  if(!confirm('Confirmar encerramento por "' + label + '"?\n\nAs sessões de soroterapia e envios serão arquivados e zerados para um novo ciclo.')) return;

  // 1. Buscar dados atuais para arquivar
  const [{data:sessoes},{data:envios}] = await Promise.all([
    sb.from('planos_soro_sessoes').select('*').eq('patient_id', currentPatientId),
    sb.from('planos_soro_envios').select('*').eq('patient_id', currentPatientId)
  ]);

  // 2. Salvar histórico do ciclo encerrado
  const ciclo = {
    patient_id: currentPatientId,
    data_encerramento: todayISO(),
    motivo: motivo,
    plan_type: currentPatientData.plan_type,
    inicio_programa: currentPatientData.inicio_programa,
    sessoes_count: (sessoes||[]).length,
    envios_count: (envios||[]).length,
    sessoes_data: JSON.stringify(sessoes||[]),
    envios_data: JSON.stringify(envios||[]),
    registrado_por: currentUser.name
  };
  await sb.from('planos_historico_ciclos').insert(ciclo);

  // 3. Zerar sessões e envios
  if((sessoes||[]).length) await sb.from('planos_soro_sessoes').delete().eq('patient_id', currentPatientId);
  if((envios||[]).length) await sb.from('planos_soro_envios').delete().eq('patient_id', currentPatientId);

  // 4. Atualizar paciente
  await sb.from('planos_patients').update({
    active: false,
    motivo_encerramento: motivo,
    data_encerramento: todayISO(),
    updated_by: currentUser.name,
    updated_at: new Date().toISOString()
  }).eq('id', currentPatientId);

  currentPatientData.active = false;
  currentPatientData.motivo_encerramento = motivo;
  toast('Plano encerrado e histórico salvo!', 'success');
  patTab('info');
}

async function renderSoroterapia(){
  const[{data:sessoes},{data:envios}]=await Promise.all([

  let alertHtml='';
  if(isOnline&&envios&&envios.length){

  c.innerHTML=`

  <div class="card">

      <button class="btn btn-primary btn-sm" onclick="showAddSessao()">+ Add</button></div>
    ${(sessoes||[]).length?(sessoes||[]).slice().reverse().map(s=>`
    <div class="attach-item">

        <div class="attach-date">${s.substancias||''}</div>
        ${s.observacao?`<div class="attach-date" style="font-style:italic">${s.observacao}</div>`:''}

      </div>
      ${s.receita_path?`<button class="btn btn-ghost btn-sm" onclick="openFile('documents','${s.receita_path}')">📄</button>`:''}
      <button class="btn-icon btn-sm" onclick="deleteSessao(${s.id})">🗑</button>
    </div>`).join(''):'<div class="text-muted text-sm">Nenhuma sessão registrada</div>'}
  </div>
  ${isOnline?`
  <!-- ENVIOS (online only) -->
  <div class="card">
    <div class="card-header"><div class="card-title" style="margin:0">📦 Envios de Protocolo</div>
      <button class="btn btn-primary btn-sm" onclick="showAddEnvio()">+ Add</button></div>
    ${(envios||[]).length?(envios||[]).slice().reverse().map(e=>{
      const total=(e.sessoes_ev||0)+(e.sessoes_im||0);
      const feitas=(sessoes||[]).filter(s=>s.envio_id===e.id).length;
      const restantes=total-feitas;
      return`<div class="attach-item">
        <div class="attach-icon" style="font-size:11px;font-weight:700;color:var(--text-muted);width:36px;text-align:center">Envio</div>
        <div class="attach-info">
          <div class="attach-name">Envio ${e.data_envio||'—'}</div>
          <div class="attach-date">EV: ${e.sessoes_ev||0} sessões · IM: ${e.sessoes_im||0} sessões</div>
          <div class="attach-date">${e.substancias||''}</div>
          <div class="attach-date">Feitas: ${feitas}/${total} · Restantes: <strong style="color:${restantes<=1?'var(--danger)':restantes<=2?'var(--warning)':'inherit'}">${restantes}</strong></div>
          <div class="attach-date"><span class="user-badge">${e.registrado_por||''}</span></div>
        </div>
        ${e.receita_path?`<button class="btn btn-ghost btn-sm" onclick="openFile('documents','${e.receita_path}')">📄</button>`:''}
        <button class="btn-icon btn-sm" onclick="deleteEnvio(${e.id})">🗑</button>
      </div>`;
    }).join(''):'<div class="text-muted text-sm">Nenhum envio registrado</div>'}

async function renderPrograma(){
  const[{data:patients},{data:appts},{data:sessoes},{data:implantes},{data:envios}]=await Promise.all([
    sb.from('planos_patients').select('*').order('name'),
    sb.from('planos_appointments').select('*'),
    sb.from('planos_soro_sessoes').select('*'),
    sb.from('planos_implantes').select('*'),
    sb.from('planos_soro_envios').select('*')
  ]);
  allPatients=patients||[];
  let progFilter='active';let phaseFilter=0;
  const c=document.getElementById('main-content');
  function buildProg(){
    let filtered=allPatients;
    if(progFilter==='active')filtered=filtered.filter(p=>p.active);
    else if(progFilter==='inactive')filtered=filtered.filter(p=>!p.active);
    if(phaseFilter>0)filtered=filtered.filter(p=>p.inicio_programa&&calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3)===phaseFilter);
    const phaseColors=['','phase-1','phase-2','phase-3'];

        ${['active','inactive','all'].map(f=>`<button class="btn btn-sm ${progFilter===f?'btn-primary':'btn-ghost'}" onclick="window._progFilter='${f}';window._phaseFilter=${phaseFilter};rebuildProg()">${f==='active'?'Ativos':f==='inactive'?'Inativos':'Todos'}</button>`).join('')}
        ${[0,1,2,3].map(ph=>`<button class="btn btn-sm ${phaseFilter===ph?'btn-accent':'btn-ghost'}" onclick="window._progFilter='${progFilter}';window._phaseFilter=${ph};rebuildProg()">${ph===0?'F-Todos':'F'+ph}</button>`).join('')}
      </div>
    </div>
    ${filtered.map(p=>{
      const phase=p.inicio_programa?calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3):1;

      const lastConsult=patAppts.find(a=>a.status==='Compareceu'&&(a.tipo==='Consulta'||a.procedimento?.includes('Consulta')));
      const patSoro=(sessoes||[]).filter(s=>s.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_sessao)-parseDateInt(a.data_sessao));
      const lastSoro=patSoro[0];
      const patImpl=(implantes||[]).filter(i=>i.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_implante)-parseDateInt(a.data_implante));
      const lastImpl=patImpl[0];
      const patEnvios=(envios||[]).filter(e=>e.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_envio)-parseDateInt(a.data_envio));
      const lastEnvio=patEnvios[0];
      const isOnline=p.modality==='Online';
      // envio alerts
      let envioAlert='';
      if(isOnline&&lastEnvio){
        const total=(lastEnvio.sessoes_ev||0)+(lastEnvio.sessoes_im||0);
        const feitas=(sessoes||[]).filter(s=>s.patient_id===p.id&&s.envio_id===lastEnvio.id).length;
        const rest=total-feitas;
        if(rest<=1)envioAlert=`<span style="color:var(--danger);font-weight:700">🚩 Enviar protocolo!</span>`;
        else if(rest<=2)envioAlert=`<span style="color:var(--warning);font-weight:700">⚠️ Preparar envio</span>`;
      }
      return`<div class="prog-row">
        <div class="prog-header" onclick="toggleProg(this)">
          <div class="patient-avatar" style="width:38px;height:38px;font-size:14px">${p.name.charAt(0)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px">
              ${p.name}
              ${tags.map(t=>`<span class="etiqueta" style="background:${t.color||'#6b7280'}">${t.name}</span>`).join('')}
              ${envioAlert}
            </div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap">
              <span class="phase-badge ${phaseColors[phase]}">F${phase}</span>
              <span>${p.plan_type||'—'}</span>
              <span>Mês ${months+1}</span>
              <span class="pill ${p.modality==='Presencial'?'pill-blue':'pill-purple'}">${p.modality||'—'}</span>
              <span>Início: ${fmtDate(p.inicio_programa||'')}</span>
              <span>Fim: ${endDate}</span>
              ${p.motivo_encerramento?`<span style="font-weight:700;color:${p.motivo_encerramento==='fim'?'#3b82f6':'#f97316'}">Encerrado: ${isoToDisplay(p.data_encerramento||'')} — ${p.motivo_encerramento==='fim'?'Fim do Plano':'Desistência'}</span>`:''}
            </div>
          </div>
          <span style="color:var(--text-muted)">▾</span>
        </div>
        <div class="prog-detail">
          <div class="grid-2" style="margin-bottom:10px">
            <div class="card" style="margin:0;padding:12px">
              <div class="card-title">Última Consulta</div>
              <div style="font-size:14px;font-weight:600">${lastConsult?fmtDate(lastConsult.date_str):'—'}</div>
              ${lastConsult?`<div class="text-sm text-muted">${lastConsult.procedimento||''}</div>`:''}
            </div>
            <div class="card" style="margin:0;padding:12px">
              <div class="card-title">Última Sessão Soro</div>
              <div style="font-size:14px;font-weight:600">${lastSoro?fmtDate(lastSoro.data_sessao):'—'}</div>
              ${lastSoro?`<div class="text-sm text-muted">${(lastSoro.substancias||'').slice(0,40)}</div>`:''}
            </div>
            <div class="card" style="margin:0;padding:12px">
              <div class="card-title">Último Implante</div>
              <div style="font-size:14px;font-weight:600">${lastImpl?fmtDate(lastImpl.data_implante):'—'}</div>
            </div>
            ${isOnline&&lastEnvio?`
            <div class="card" style="margin:0;padding:12px;border:2px solid ${((lastEnvio.sessoes_ev||0)+(lastEnvio.sessoes_im||0)-((sessoes||[]).filter(s=>s.patient_id===p.id&&s.envio_id===lastEnvio.id).length))<=1?'var(--danger)':'var(--border)'}">
              <div class="card-title">Último Envio</div>
              <div style="font-size:14px;font-weight:600">${fmtDate(lastEnvio.data_envio)}</div>
              <div class="text-sm text-muted">EV:${lastEnvio.sessoes_ev} IM:${lastEnvio.sessoes_im}</div>
            </div>`:''}
          </div>
          <button class="btn btn-ghost btn-sm" onclick="openPatient(${p.id})">Ver Prontuário →</button>
        </div>
      </div>`;
    }).join('')||'<div class="empty"><div class="empty-icon">👥</div>Sem pacientes</div>'}`;
  }
  window._progFilter='active';window._phaseFilter=0;
  window.rebuildProg=function(){
    progFilter=window._progFilter;phaseFilter=window._phaseFilter;
    c.innerHTML=buildProg();
  };
  c.innerHTML=buildProg();
}

// ── RELATÓRIOS ────────────────────────────────────────────────
let relCharts = {};
function destroyRelCharts(){Object.values(relCharts).forEach(c=>{try{c.destroy()}catch(e){}});relCharts={};}

function getMonthRange(period){
  const now = new Date();
  let start, end;
  if(period === 'mes'){
    start = new Date(now.getFullYear(), now.getMonth(), 1);
    end = new Date(now.getFullYear(), now.getMonth()+1, 0);
  } else if(period === 'trimestre'){
    const q = Math.floor(now.getMonth()/3);
    start = new Date(now.getFullYear(), q*3, 1);
    end = new Date(now.getFullYear(), q*3+3, 0);
  } else if(period === 'semestre'){
    const s = now.getMonth() < 6 ? 0 : 6;
    start = new Date(now.getFullYear(), s, 1);
    end = new Date(now.getFullYear(), s+6, 0);
  } else { // ano
    start = new Date(now.getFullYear(), 0, 1);
    end = new Date(now.getFullYear(), 11, 31);
  }
  return {start, end};
}

function dateInRange(dateStr, start, end){
  if(!dateStr) return false;
  const p = (dateStr.includes('/') ? dateStr : isoToDisplay(dateStr)).split('/');
  if(p.length !== 3) return false;
  const d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  return d >= start && d <= end;
}

function isoInRange(isoStr, start, end){
  if(!isoStr) return false;
  const d = new Date(isoStr.split('T')[0]);
  return d >= start && d <= end;
}

async function renderRelatorios(period='mes'){
  destroyRelCharts();
  const c = document.getElementById('main-content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div>Carregando relatório...</div>';

  const [{data:patients},{data:fin},{data:appts},{data:sessoes},{data:ciclos}] = await Promise.all([
    sb.from('planos_patients').select('*'),
    sb.from('planos_financeiro').select('*'),
    sb.from('planos_appointments').select('*'),
    sb.from('planos_soro_sessoes').select('*'),
    sb.from('planos_historico_ciclos').select('*')
  ]);

  const {start, end} = getMonthRange(period);
  const allP = patients || [];
  const allF = fin || [];
  const allA = appts || [];
  const allS = sessoes || [];
  const allC = ciclos || [];

  // ── FINANCIAL ──
  const finPeriod = allF.filter(f => dateInRange(f.data_pagamento, start, end));
  const totalFat = finPeriod.reduce((s,f) => s+(parseFloat(f.valor)||0), 0);
  const patientsWithPayment = [...new Set(finPeriod.map(f=>f.patient_id))];
  const avgPat = patientsWithPayment.length ? totalFat/patientsWithPayment.length : 0;

  // ── PLANS ──
  const active = allP.filter(p=>p.active).length;
  const inactive = allP.filter(p=>!p.active).length;
  const plan3 = allP.filter(p=>p.plan_type==='Plano 3 meses').length;
  const plan6 = allP.filter(p=>p.plan_type==='Plano 6 meses').length;
  const avulsa = allP.filter(p=>p.plan_type==='Consulta Avulsa').length;
  const presencial = allP.filter(p=>p.modality==='Presencial').length;
  const online = allP.filter(p=>p.modality==='Online').length;

  // ── RENOVATION ──
  const patCiclos = {};
  allC.forEach(c=>{patCiclos[c.patient_id]=(patCiclos[c.patient_id]||0)+1;});
  const renovados = Object.values(patCiclos).filter(v=>v>1).length;
  const taxaRenovacao = allP.length ? ((renovados/allP.length)*100).toFixed(1) : 0;

  // ── PERMANENCIA ──
  const duracoes = allP.filter(p=>p.inicio_programa).map(p=>monthsSince(fmtDate(p.inicio_programa||'')));
  const avgPermanencia = duracoes.length ? (duracoes.reduce((s,v)=>s+v,0)/duracoes.length).toFixed(1) : 0;

  // ── SESSOES ──
  const sessoesPeriod = allS.filter(s => dateInRange(s.data_sessao, start, end));

  // ── MONTHLY NEW PATIENTS (last 12 months) ──
  const monthLabels = [];
  const monthData = [];
  for(let i=11; i>=0; i--){
    const d = new Date();
    d.setMonth(d.getMonth()-i);
    const y = d.getFullYear();
    const m = d.getMonth();
    const label = String(m+1).padStart(2,'0')+'/'+y;
    monthLabels.push(label);
    const count = allP.filter(p=>{
      if(!p.created_at) return false;
      const pd = new Date(p.created_at);
      return pd.getFullYear()===y && pd.getMonth()===m;
    }).length;
    monthData.push(count);
  }

  // ── DESISTENCIA ──
  const fimPlano = allC.filter(c=>c.motivo==='fim').length;
  const desistencia = allC.filter(c=>c.motivo==='desistencia').length;

  const periodLabels = {mes:'Mês Atual',trimestre:'Trimestre',semestre:'Semestre',ano:'Ano'};

  c.innerHTML = `
  <!-- PERIOD SELECTOR -->
  <div class="card" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div style="font-weight:700;font-size:14px">Período:</div>
    ${['mes','trimestre','semestre','ano'].map(p=>`
    <button class="btn btn-sm ${period===p?'btn-primary':'btn-ghost'}" onclick="renderRelatorios('${p}')">${periodLabels[p]}</button>`).join('')}
    <div style="flex:1"></div>
    <button class="btn btn-sm btn-ghost" onclick="exportRelPDF()">📄 PDF</button>
    <button class="btn btn-sm btn-ghost" onclick="exportRelExcel()">📊 Excel</button>
  </div>

  <!-- FINANCIAL CARDS -->
  <div class="section-header"><div class="section-title">💰 Financeiro — ${periodLabels[period]}</div></div>
  <div class="dash-grid-2">
    <div class="dash-card" style="cursor:default">
      <div class="dash-card-num">R$ ${totalFat.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
      <div class="dash-card-label">Faturamento no Período</div>
      <div class="dash-card-sub">${finPeriod.length} pagamento(s)</div>
    </div>
    <div class="dash-card" style="cursor:default">
      <div class="dash-card-num">R$ ${avgPat.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
      <div class="dash-card-label">Média por Paciente</div>
      <div class="dash-card-sub">${patientsWithPayment.length} paciente(s) com pagamento</div>
    </div>
  </div>

  <!-- PLAN CARDS -->
  <div class="section-header"><div class="section-title">📋 Planos</div></div>
  <div class="dash-grid">
    <div class="dash-card" style="cursor:default">
      <div class="dash-card-num">${active}</div>
      <div class="dash-card-label">Ativos</div>
    </div>
    <div class="dash-card" style="cursor:default">
      <div class="dash-card-num">${inactive}</div>
      <div class="dash-card-label">Finalizados</div>
    </div>
    <div class="dash-card" style="cursor:default">
      <div class="dash-card-num">${sessoesPeriod.length}</div>
      <div class="dash-card-label">Sessões Soro</div>
      <div class="dash-card-sub">no período</div>
    </div>
  </div>
  <div class="dash-grid-2">
    <div class="dash-card" style="cursor:default">
      <div class="dash-card-num" style="color:var(--success)">${taxaRenovacao}%</div>
      <div class="dash-card-label">Taxa de Renovação</div>
      <div class="dash-card-sub">${renovados} paciente(s) com 2+ ciclos</div>
    </div>
    <div class="dash-card" style="cursor:default">
      <div class="dash-card-num">${avgPermanencia}</div>
      <div class="dash-card-label">Permanência Média</div>
      <div class="dash-card-sub">meses por paciente</div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="card">
    <div class="card-title">Novos Pacientes — Últimos 12 Meses</div>
    <div style="position:relative;height:200px"><canvas id="chart-novos"></canvas></div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Tipo de Plano</div>
      <div style="position:relative;height:180px"><canvas id="chart-tipo"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Modalidade</div>
      <div style="position:relative;height:180px"><canvas id="chart-modal"></canvas></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Enceramentos</div>
    <div style="position:relative;height:160px"><canvas id="chart-enc"></canvas></div>
  </div>
  `;

  // Render charts
  setTimeout(()=>{
    const opts = {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{font:{size:10},stepSize:1}}}};
    
    relCharts['novos'] = new Chart(document.getElementById('chart-novos'),{type:'line',data:{labels:monthLabels,datasets:[{label:'Novos Pacientes',data:monthData,borderColor:'#1D2846',backgroundColor:'rgba(29,40,70,.1)',fill:true,tension:0.35,pointRadius:4,borderWidth:2}]},options:opts});

    relCharts['tipo'] = new Chart(document.getElementById('chart-tipo'),{type:'doughnut',data:{labels:['3 meses','6 meses','Avulsa'],datasets:[{data:[plan3,plan6,avulsa],backgroundColor:['#1D2846','#4A90D9','#10b981'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:10}}}}});

    relCharts['modal'] = new Chart(document.getElementById('chart-modal'),{type:'doughnut',data:{labels:['Presencial','Online'],datasets:[{data:[presencial,online],backgroundColor:['#3b82f6','#8b5cf6'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:10}}}}});

    relCharts['enc'] = new Chart(document.getElementById('chart-enc'),{type:'bar',data:{labels:['Fim do Plano','Desistência'],datasets:[{data:[fimPlano,desistencia],backgroundColor:['#3b82f6','#f97316'],borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{stepSize:1},grid:{color:'rgba(0,0,0,.06)'}}}}});
  }, 150);
}

// ── EXPORT PDF ────────────────────────────────────────────────
function exportRelPDF(){
  window.print();
}

// ── EXPORT EXCEL ──────────────────────────────────────────────
async function exportRelExcel(){
  const [{data:patients},{data:fin},{data:sessoes}] = await Promise.all([
    sb.from('planos_patients').select('*'),
    sb.from('planos_financeiro').select('*'),
    sb.from('planos_soro_sessoes').select('*')
  ]);
  const patMap = {};
  (patients||[]).forEach(p=>patMap[p.id]=p.name);

  // Build CSV
  let csv = 'RELATÓRIO CLÍNICA VITTA\n\n';
  csv += 'PACIENTES\n';
  csv += 'Nome,Tipo de Plano,Modalidade,Início,Status,Motivo Encerramento\n';
  (patients||[]).forEach(p=>{
    csv += `"${p.name}","${p.plan_type||''}","${p.modality||''}","${isoToDisplay(p.inicio_programa||'')}","${p.active?'Ativo':'Encerrado'}","${p.motivo_encerramento||''}"\n`;
  });
  csv += '\nPAGAMENTOS\n';
  csv += 'Paciente,Data,Forma,Valor,Parcelas\n';
  (fin||[]).forEach(f=>{
    csv += `"${patMap[f.patient_id]||f.patient_id}","${f.data_pagamento||''}","${f.forma||''}","${f.valor||0}","${f.parcelas||''}"\n`;
  });
  csv += '\nSESSÕES DE SOROTERAPIA\n';
  csv += 'Paciente,Data,Substâncias\n';
  (sessoes||[]).forEach(s=>{
    csv += `"${patMap[s.patient_id]||s.patient_id}","${s.data_sessao||''}","${(s.substancias||'').replace(/"/g,"'")}"\n`;
  });

  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'relatorio_vitta_'+todayStr().replace(/\//g,'-')+'.csv';
  a.click();
  toast('Excel exportado!','success');
}
