<style>
:root{
  --navy:#1D2846;--navy-light:#2d3d6b;
  --bg:#EDEDED;--white:#FFFFFF;--text:#1a1a2e;--text-muted:#6b7280;
  --border:#d1d5db;--border-light:#e5e7eb;
  --accent:#4A90D9;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(29,40,70,.12);--shadow-lg:0 8px 32px rgba(29,40,70,.18);
  --font:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);font-size:15px;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}
#screen-login{align-items:center;justify-content:center;background:var(--navy);padding:24px}
.login-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;text-align:center}
.login-logo{width:64px;height:64px;background:rgba(255,255,255,.12);border-radius:16px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px}
.login-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,.55);font-size:13px;margin-bottom:28px}
.login-type{display:flex;gap:8px;margin-bottom:24px;background:rgba(0,0,0,.2);border-radius:10px;padding:4px}
.login-type button{flex:1;padding:8px;border:none;background:transparent;color:rgba(255,255,255,.55);border-radius:8px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.login-type button.active{background:var(--accent);color:#fff}
.input-group{margin-bottom:14px;text-align:left}
.input-group label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.65);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.input-group input{width:100%;padding:11px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s}
.input-group input::placeholder{color:rgba(255,255,255,.35)}
.input-group input:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy-light)}
.btn-accent{background:var(--accent);color:#fff}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--border)}.btn-ghost:hover{border-color:var(--navy)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:6px}
.btn-full{width:100%;justify-content:center;padding:13px}
.btn-icon{padding:7px 9px;border-radius:7px;background:transparent;border:1.5px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all .2s;font-size:13px;font-family:var(--font)}
.btn-icon:hover{background:var(--bg);border-color:var(--navy);color:var(--navy)}
.topbar{background:var(--navy);padding:0 20px;display:flex;align-items:center;gap:10px;min-height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.topbar-logo{color:#fff;font-weight:700;font-size:15px}
.topbar-user{color:rgba(255,255,255,.6);font-size:12px;margin-left:4px}
.topbar-spacer{flex:1}
.topbar-action{background:transparent;border:none;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:8px;transition:all .2s;font-family:var(--font)}
.topbar-action:hover{color:#fff;background:rgba(255,255,255,.1)}
.topbar-back{color:#fff;font-size:20px;background:none;border:none;cursor:pointer;padding:4px 8px}
.navtabs{background:var(--white);border-bottom:1px solid var(--border-light);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:90}
.navtabs::-webkit-scrollbar{display:none}
.ntab{padding:13px 16px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px}
.ntab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:700}
.tabs{display:flex;gap:2px;overflow-x:auto;padding:0 16px;background:var(--white);border-bottom:1px solid var(--border-light);position:sticky;top:56px;z-index:50;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 13px;border:none;background:transparent;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:700}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:40px}
.card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy)}
.field textarea{resize:vertical;min-height:72px}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.dash-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.dash-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:all .18s;border:2px solid transparent}
.dash-card:hover{border-color:var(--navy);box-shadow:var(--shadow-lg)}
.dash-card-num{font-size:32px;font-weight:700;color:var(--navy);line-height:1}
.dash-card-label{font-size:12px;color:var(--text-muted);margin-top:4px;font-weight:500}
.dash-card-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.patient-row{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .18s;border:1.5px solid transparent}
.patient-row:hover{border-color:var(--navy);box-shadow:var(--shadow)}
.patient-avatar{width:42px;height:42px;border-radius:12px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.patient-info{flex:1;min-width:0}
.patient-name{font-weight:700;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.patient-meta{font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.phase-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.phase-1{background:#dbeafe;color:#1d4ed8}.phase-2{background:#dcfce7;color:#166534}.phase-3{background:#fef9c3;color:#854d0e}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.pill-green{background:#dcfce7;color:#166534}.pill-red{background:#fee2e2;color:#991b1b}
.pill-amber{background:#fef3c7;color:#92400e}.pill-blue{background:#dbeafe;color:#1e40af}
.pill-gray{background:#f3f4f6;color:#6b7280}.pill-purple{background:#ede9fe;color:#5b21b6}
.agenda-day-header{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:4px 0;border-bottom:1.5px solid var(--border-light)}
.appt-item{background:var(--white);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.appt-item.overdue{border-left:3px solid var(--danger);background:#fff5f5}
.appt-time{font-weight:700;font-size:13px;color:var(--navy);min-width:46px}
.appt-info{flex:1}
.appt-name{font-weight:600;font-size:14px}
.appt-sub{font-size:12px;color:var(--text-muted)}
.prog-row{background:var(--white);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prog-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer}
.prog-detail{padding:0 16px 16px;display:none;border-top:1px solid var(--border-light)}
.prog-detail.open{display:block}
.attach-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:6px;flex-wrap:wrap}
.attach-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.attach-info{flex:1;min-width:160px}
.attach-name{font-weight:600;font-size:13px}
.attach-date{font-size:11px;color:var(--text-muted);margin-top:2px}
.etiqueta{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;color:#fff;margin-right:4px;margin-bottom:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 20px 32px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
.search-bar{display:flex;align-items:center;gap:10px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;margin-bottom:14px}
.search-bar input{border:none;outline:none;flex:1;font-family:var(--font);font-size:14px;background:transparent}
.alert-banner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:13px;font-weight:600}
.alert-warning{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.alert-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.alert-info{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.divider{height:1px;background:var(--border-light);margin:12px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:16px;font-weight:700;color:var(--text)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.text-sm{font-size:12px}.text-muted{color:var(--text-muted)}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-muted);font-size:14px}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.user-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:#ede9fe;color:#5b21b6}
.resumo-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.resumo-mini-card{background:var(--bg);border-radius:10px;padding:12px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:all .18s}
.resumo-mini-card:hover{border-color:var(--navy);background:#fff}
.resumo-mini-num{font-size:26px;font-weight:700;color:var(--navy);line-height:1}
.resumo-mini-label{font-size:11px;color:var(--text-muted);margin-top:3px}
.resumo-mini-link{font-size:10px;color:var(--accent);font-weight:600;margin-top:4px}
.enc-box-encerrado{background:#eff6ff;border:2px solid #93c5fd;border-radius:var(--radius-sm);padding:14px;margin-top:4px;display:flex;align-items:flex-start;gap:12px}
.enc-box-ativo{background:#f9fafb;border:1.5px solid var(--border-light);border-radius:var(--radius-sm);padding:14px;margin-top:4px}
.edit-inline{background:#f0f5ff;border:1.5px solid var(--accent);border-radius:var(--radius-sm);padding:12px;margin-top:8px;width:100%;display:none}
.edit-inline.open{display:block}
.edit-inline .field{margin-bottom:10px}
.edit-inline .field input,.edit-inline .field select,.edit-inline .field textarea{font-size:13px;padding:8px 10px}
.agenda-link-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:#dcfce7;color:#166534;cursor:pointer}
.agenda-link-badge.pending{background:#fef3c7;color:#92400e}
.hist-box{border-radius:var(--radius-sm);padding:14px;margin-bottom:10px}
.hist-box-soro{background:#f0f9ff;border:1.5px solid #bae6fd}
.hist-box-impl{background:#fdf4ff;border:1.5px solid #e9d5ff}
.hist-box-consult{background:#f0fdf4;border:1.5px solid #bbf7d0}
</style>
</head>

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let currentUser=null,currentSection='dashboard',currentPatientId=null,currentPatientData=null,allPatients=[];
const TIPOS_SESSAO=['Soroterapia EV','Soroterapia IM','Soroterapia EV + IM','Outro'];
const titleCase=s=>s?s.toLowerCase().replace(/(?:^|\s|'|-)[a-z\u00e1\u00e0\u00e3\u00e2\u00e9\u00ea\u00ed\u00f3\u00f4\u00f5\u00fa\u00e7]/g,c=>c.toUpperCase()):'';
const normStr=s=>(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
function parseDateInt(d){if(!d)return 0;const p=d.split('/');if(p.length!==3)return 0;return parseInt(p[2]+p[1]+p[0]);}
function fmtDate(d){if(!d)return'';if(d.includes('/'))return d;const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function todayStr(){const n=new Date();return String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+n.getFullYear();}
function todayISO(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function displayToISO(d){if(!d)return'';const p=d.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:d;}
function isoToDisplay(iso){if(!iso)return'';const p=iso.split('T')[0].split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;}
function daysAgo(dateStr){if(!dateStr)return null;const p=dateStr.split('/');if(p.length!==3)return null;const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const now=new Date();now.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((now-d)/86400000);}
function monthsSince(dateStr){if(!dateStr)return 0;const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return 0;const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const n=new Date();return Math.max(0,(n.getFullYear()-d.getFullYear())*12+(n.getMonth()-d.getMonth()));}
function addMonthsToDisplay(dateStr,months){if(!dateStr)return'';const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return'';const d=new Date(parseInt(p[2]),parseInt(p[1])-1+months,parseInt(p[0]));return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function addDaysToDisplay(dateStr,days){if(!dateStr)return'\u2014';const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return'\u2014';const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));d.setDate(d.getDate()+days);return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function calcPhase(inicioStr,duracao){const months=monthsSince(inicioStr);const third=Math.ceil(duracao/3);if(months<third)return 1;if(months<third*2)return 2;return 3;}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.style.background=type==='error'?'#dc2626':type==='success'?'#059669':'var(--navy)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

async function criarAgendaAutomatica(tipo,data,descricao,registroId,tabelaOrigem){
  try{
    const proc=tipo==='implante'?'Implante Hormonal':'Soroterapia';
    const {data:existing}=await sb.from('planos_appointments')
      .select('id').eq('patient_id',currentPatientId)
      .eq('origem_tabela',tabelaOrigem).eq('origem_id',registroId).maybeSingle();
    if(existing)return existing.id;
    const {data:sameDay}=await sb.from('planos_appointments')
      .select('id,origem_tabela').eq('patient_id',currentPatientId).eq('date_str',data);
    const dupLinked=(sameDay||[]).find(a=>a.origem_tabela===tabelaOrigem);
    if(dupLinked)return dupLinked.id;
    const {data:appt,error}=await sb.from('planos_appointments').insert({
      patient_id:currentPatientId,date_str:data,time_str:'09:00',
      procedimento:proc,tipo:'Ijet\u00e1vel',
      observacao:descricao?(descricao+'').slice(0,80):'',
      status:'Compareceu',registrado_por:currentUser.name,
      origem_tabela:tabelaOrigem,origem_id:registroId
    }).select().single();
    if(!error&&appt)return appt.id;
  }catch(e){console.warn('Auto-agenda falhou:',e);}
  return null;
}

function patientRowHtml(p){
  const phase=p.inicio_programa?calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3):1;
  const months=p.inicio_programa?monthsSince(fmtDate(p.inicio_programa)):0;
  const endDate=p.inicio_programa?addMonthsToDisplay(fmtDate(p.inicio_programa),p.duracao_programa||3):'\u2014';
  const tags=(p.etiquetas||[]);
  let tagHtml=tags.map(tag=>'<span class="etiqueta" style="background:'+(tag.color||'#6b7280')+'">'+tag.name+'</span>').join('');
  let encHtml=p.motivo_encerramento?'<span style="font-weight:700;color:'+(p.motivo_encerramento==='fim'?'#3b82f6':'#f97316')+'">Encerrado: '+isoToDisplay(p.data_encerramento||'')+' \u2014 '+(p.motivo_encerramento==='fim'?'Fim do Plano':'Desist\u00eancia')+'</span>':'';
  return '<div class="patient-row" onclick="openPatient('+p.id+')">'
    +'<div class="patient-avatar">'+p.name.charAt(0)+'</div>'
    +'<div class="patient-info">'
    +'<div class="patient-name" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+p.name+tagHtml+'</div>'
    +'<div class="patient-meta"><span class="phase-badge phase-'+phase+'">F'+phase+'</span><span>'+(p.plan_type||'\u2014')+'</span><span>M\u00eas '+(months+1)+'</span>'
    +'<span class="pill pill-'+(p.modality==='Presencial'?'blue':'purple')+'">'+(p.modality||'\u2014')+'</span>'
    +'<span>'+fmtDate(p.inicio_programa||'')+'</span>'
    +(p.inicio_programa?'<span>Fim: '+endDate+'</span>':'')
    +encHtml+'</div></div>'
    +'<span style="color:var(--text-muted);font-size:18px">\u203a</span></div>';
}
let patientsFilter='active';
async function renderPatients(query){
  // Preserve current search query if not passed
  if(query===undefined){
    const inp=document.getElementById('patient-search-input');
    query=inp?inp.value:'';
  }
  query=query||'';
  const{data}=await sb.from('planos_patients').select('*').order('name');
  allPatients=data||[];
  // Clear container so full structure rebuilds (needed when switching filters)
  const c=document.getElementById('main-content');
  c.innerHTML='';
  renderPatientList(query);
  // Restore search input focus
  const inp=document.getElementById('patient-search-input');
  if(inp&&query){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
}
function renderPatientListLocal(){
  // Re-filter locally without DB reload, preserving search query
  const inp=document.getElementById('patient-search-input');
  const q=inp?inp.value:'';
  // Force full rebuild to update button styles
  const c=document.getElementById('main-content');
  c.innerHTML='';
  renderPatientList(q);
  // Restore focus
  const inp2=document.getElementById('patient-search-input');
  if(inp2){inp2.focus();inp2.setSelectionRange(inp2.value.length,inp2.value.length);}
}
function renderPatientList(query){
  query=query||'';
  const c=document.getElementById('main-content');
  const norm=normStr(query);
  let filtered=allPatients;
  // Apply status filter first
  if(patientsFilter==='active')filtered=filtered.filter(p=>p.active);
  else if(patientsFilter==='inactive')filtered=filtered.filter(p=>!p.active);
  // Apply search filter - searches name and CPF
  if(norm)filtered=filtered.filter(p=>normStr(p.name).includes(norm)||normStr(p.cpf||'').includes(norm));

  // Build only the list part - NOT the search bar (to avoid focus loss)
  const listHtml=(filtered.length?filtered.map(p=>patientRowHtml(p)).join(''):'<div class="empty"><div class="empty-icon">\ud83d\udd0d</div>Nenhum paciente encontrado</div>');
  
  // Update counters on filter buttons
  const btnTodos=document.getElementById('pbtn-todos');
  const btnAtivos=document.getElementById('pbtn-ativos');
  const btnEnc=document.getElementById('pbtn-enc');
  if(btnTodos)btnTodos.textContent='Todos ('+allPatients.length+')';
  if(btnAtivos)btnAtivos.textContent='Ativos ('+allPatients.filter(p=>p.active).length+')';
  if(btnEnc)btnEnc.textContent='Encerrados ('+allPatients.filter(p=>!p.active).length+')';

  // Only update the list container, not the whole content (preserves search input focus)
  const listContainer=document.getElementById('patient-list-container');
  if(listContainer){
    listContainer.innerHTML=listHtml;
  } else {
    // First render: build full structure including search bar
    c.innerHTML=
      '<div class="search-bar"><span>\ud83d\udd0d</span>'
      +'<input type="text" id="patient-search-input" placeholder="Buscar por nome ou CPF..." value="'+query+'" oninput="renderPatientList(this.value)" autocomplete="off"/>'
      +'<button class="btn btn-primary btn-sm" onclick="showNewPatientModal()">+</button></div>'
      +'<div style="display:flex;gap:8px;margin-bottom:14px">'
      +'<button id="pbtn-todos" class="btn btn-sm '+(patientsFilter==='all'?'btn-primary':'btn-ghost')+'" onclick="patientsFilter=\'all\';renderPatientListLocal()">Todos ('+allPatients.length+')</button>'
      +'<button id="pbtn-ativos" class="btn btn-sm '+(patientsFilter==='active'?'btn-primary':'btn-ghost')+'" onclick="patientsFilter=\'active\';renderPatientListLocal()">Ativos ('+allPatients.filter(p=>p.active).length+')</button>'
      +'<button id="pbtn-enc" class="btn btn-sm '+(patientsFilter==='inactive'?'btn-primary':'btn-ghost')+'" onclick="patientsFilter=\'inactive\';renderPatientListLocal()">Encerrados ('+allPatients.filter(p=>!p.active).length+')</button>'
      +'</div>'
      +'<div id="patient-list-container">'+listHtml+'</div>';
    // Focus the search input if query exists
    if(query){
      const inp=document.getElementById('patient-search-input');
      if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
    }
  }
}

async function executarDeletePaciente(){
  const p=currentPatientData;
  const confirmName=document.getElementById('delete-confirm-name')?.value.trim();
  const motivo=document.getElementById('delete-motivo')?.value;
  const obs=document.getElementById('delete-obs')?.value.trim();

  // Validate name confirmation
  if(confirmName.toLowerCase()!==p.name.toLowerCase()){
    toast('Nome n\u00e3o confere. Digite exatamente: '+p.name,'error');
    return;
  }

  const btn=document.querySelector('#modal-generic-content .btn-danger');
  if(btn){btn.disabled=true;btn.textContent='Excluindo...';}

  try{
    // 1. Fetch all related data for backup
    const [{data:appts},{data:fin},{data:soro},{data:envios},{data:impl},{data:contratos},{data:ciclos},{data:edicoes}]=await Promise.all([
      sb.from('planos_appointments').select('*').eq('patient_id',p.id),
      sb.from('planos_financeiro').select('*').eq('patient_id',p.id),
      sb.from('planos_soro_sessoes').select('*').eq('patient_id',p.id),
      sb.from('planos_soro_envios').select('*').eq('patient_id',p.id),
      sb.from('planos_implantes').select('*').eq('patient_id',p.id),
      sb.from('planos_contratos').select('*').eq('patient_id',p.id),
      sb.from('planos_historico_ciclos').select('*').eq('patient_id',p.id),
      sb.from('planos_historico_edicoes').select('*').eq('patient_id',p.id)
    ]);

    // 2. Save full backup to planos_pacientes_deletados
    const backup={
      paciente_id_original:p.id,
      dados_paciente:JSON.stringify(p),
      dados_appointments:JSON.stringify(appts||[]),
      dados_financeiro:JSON.stringify(fin||[]),
      dados_soro_sessoes:JSON.stringify(soro||[]),
      dados_soro_envios:JSON.stringify(envios||[]),
      dados_implantes:JSON.stringify(impl||[]),
      dados_contratos:JSON.stringify(contratos||[]),
      dados_ciclos:JSON.stringify(ciclos||[]),
      dados_edicoes:JSON.stringify(edicoes||[]),
      motivo_exclusao:motivo,
      observacao:obs||null,
      deletado_por:currentUser.name,
      deletado_em:new Date().toISOString()
    };

    const {error:backupErr}=await sb.from('planos_pacientes_deletados').insert(backup);
    if(backupErr){
      console.error('Erro no backup:',backupErr);
      toast('Erro ao fazer backup: '+backupErr.message+'. Exclus\u00e3o cancelada.','error');
      if(btn){btn.disabled=false;btn.textContent='\ud83d\uddd1 Confirmar Exclus\u00e3o';}
      return;
    }

    // 3. Delete all related records
    await Promise.all([
      sb.from('planos_appointments').delete().eq('patient_id',p.id),
      sb.from('planos_financeiro').delete().eq('patient_id',p.id),
      sb.from('planos_soro_sessoes').delete().eq('patient_id',p.id),
      sb.from('planos_soro_envios').delete().eq('patient_id',p.id),
      sb.from('planos_implantes').delete().eq('patient_id',p.id),
      sb.from('planos_contratos').delete().eq('patient_id',p.id),
      sb.from('planos_historico_ciclos').delete().eq('patient_id',p.id),
      sb.from('planos_historico_edicoes').delete().eq('patient_id',p.id),
    ]);

    // 4. Delete patient
    await sb.from('planos_patients').delete().eq('id',p.id);

    closeModal('modal-generic');
    toast('Paciente exclu\u00eddo e backup salvo!','success');
    backToMain();
    mainNav('patients');

  }catch(e){
    console.error('Erro na exclus\u00e3o:',e);
    toast('Erro inesperado: '+e.message,'error');
    if(btn){btn.disabled=false;btn.textContent='\ud83d\uddd1 Confirmar Exclus\u00e3o';}
  }
}

function toggleTag(el,name,color){
  let tags=JSON.parse(document.getElementById('pi-tags').value||'[]');
  const idx=tags.findIndex(t=>t.name===name);
  if(idx>=0){tags.splice(idx,1);el.style.background='#e5e7eb';el.style.color='#6b7280';}
  else{tags.push({name,color});el.style.background=color;el.style.color='#fff';}
  document.getElementById('pi-tags').value=JSON.stringify(tags);
}
async function saveNewTagFromInfo(){
  const name=document.getElementById('new-tag-name').value.trim();
  const color=document.getElementById('new-tag-color').value;
  if(!name)return;
  const{data}=await sb.from('planos_config').select('value').eq('key','etiquetas').single();
  let tags=[];try{tags=JSON.parse(data?.value||'[]')}catch(e){}
  if(tags.some(t=>t.name===name)){toast('Etiqueta j\u00e1 existe','error');return;}
  tags.push({name,color});
  await sb.from('planos_config').upsert({key:'etiquetas',value:JSON.stringify(tags)});
  toast('Etiqueta criada!','success');renderPatInfo();
}
async function savePatInfo(){
  const inicio=displayToISO(document.getElementById('pi-inicio').value.trim());
  const planType=document.getElementById('pi-plan').value;
  const duracao=planType==='Plano 6 meses'?6:planType==='Plano 3 meses'?3:1;
  const data={name:titleCase(document.getElementById('pi-name').value.trim()),dob:displayToISO(document.getElementById('pi-dob').value.trim())||null,cpf:document.getElementById('pi-cpf').value.trim(),telefone:document.getElementById('pi-tel').value.trim(),plan_type:planType,duracao_programa:duracao,modality:document.getElementById('pi-modality').value,inicio_programa:inicio||null,observacao:document.getElementById('pi-obs').value.trim(),etiquetas:JSON.parse(document.getElementById('pi-tags').value||'[]'),updated_by:currentUser.name,updated_at:new Date().toISOString()};
  const{error}=await sb.from('planos_patients').update(data).eq('id',currentPatientId);
  if(error){toast('Erro ao salvar','error');return;}
  Object.assign(currentPatientData,data);document.getElementById('pd-name-header').textContent=data.name;toast('Salvo!','success');
}
async function encerrarPlano(motivo){
  const label=motivo==='fim'?'Fim do Plano':'Desist\u00eancia';
  if(!confirm('Confirmar encerramento por "'+label+'"?\n\nAs sess\u00f5es de soroterapia ser\u00e3o arquivadas.'))return;
  const [{data:sessoes},{data:envios}]=await Promise.all([sb.from('planos_soro_sessoes').select('*').eq('patient_id',currentPatientId),sb.from('planos_soro_envios').select('*').eq('patient_id',currentPatientId)]);
  await sb.from('planos_historico_ciclos').insert({patient_id:currentPatientId,data_encerramento:todayISO(),motivo,plan_type:currentPatientData.plan_type,inicio_programa:currentPatientData.inicio_programa,sessoes_count:(sessoes||[]).length,envios_count:(envios||[]).length,sessoes_data:JSON.stringify(sessoes||[]),envios_data:JSON.stringify(envios||[]),registrado_por:currentUser.name});
  if((sessoes||[]).length)await sb.from('planos_soro_sessoes').delete().eq('patient_id',currentPatientId);
  if((envios||[]).length)await sb.from('planos_soro_envios').delete().eq('patient_id',currentPatientId);
  await sb.from('planos_patients').update({active:false,motivo_encerramento:motivo,data_encerramento:todayISO(),updated_by:currentUser.name,updated_at:new Date().toISOString()}).eq('id',currentPatientId);
  currentPatientData.active=false;currentPatientData.motivo_encerramento=motivo;currentPatientData.data_encerramento=todayISO();
  toast('Plano encerrado!','success');patTab('info');
}
async function reativarPlano(){
  if(!confirm('Reativar este plano?'))return;
  await sb.from('planos_patients').update({active:true,motivo_encerramento:null,data_encerramento:null,updated_by:currentUser.name,updated_at:new Date().toISOString()}).eq('id',currentPatientId);
  currentPatientData.active=true;currentPatientData.motivo_encerramento=null;currentPatientData.data_encerramento=null;
  toast('Plano reativado!','success');patTab('info');
}

async function saveSessao(){
  let receita_path=null;
  const file=document.getElementById('ss-file')?.files[0];
  if(file){const safeName=file.name.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]/g,'_');const path=currentPatientId+'/soro_'+Date.now()+'_'+safeName;const{error}=await sb.storage.from('documents').upload(path,file,{contentType:file.type||'application/octet-stream'});if(!error)receita_path=path;}
  const tipo=document.getElementById('ss-tipo').value;
  const dataSessao=document.getElementById('ss-data').value;
  const hora=document.getElementById('ss-hora').value||'09:00';
  const subs=document.getElementById('ss-subs').value.trim();
  const obs=document.getElementById('ss-obs').value.trim();
  const{data:novaSessao,error}=await sb.from('planos_soro_sessoes').insert({patient_id:currentPatientId,tipo_sessao:tipo,data_sessao:dataSessao,substancias:subs,observacao:obs,receita_path,registrado_por:currentUser.name}).select().single();
  if(error){toast('Erro ao salvar sess\u00e3o','error');return;}
  const apptId=await criarAgendaAutomatica('soro',dataSessao,tipo+(subs?': '+subs.slice(0,50):''),novaSessao.id,'soro_sessoes');
  if(apptId)await sb.from('planos_appointments').update({time_str:hora}).eq('id',apptId);
  closeModal('modal-generic');toast('Sess\u00e3o registrada + agenda criada!','success');patTab('soroterapia');
}
async function deleteSessao(id,apptId){
  if(!confirm('Remover esta sess\u00e3o? O agendamento vinculado tamb\u00e9m ser\u00e1 removido.'))return;
  const{data:old}=await sb.from('planos_soro_sessoes').select('*').eq('id',id).single();
  await sb.from('planos_soro_sessoes').delete().eq('id',id);
  if(apptId)await sb.from('planos_appointments').delete().eq('id',apptId);
  await logHistorico('soro_sessoes',id,'exclusao',old,null);
  patTab('soroterapia');
}

async function renderPatAgenda(){
  const[{data:appts},{data:histAppts}]=await Promise.all([
    sb.from('planos_appointments').select('*').eq('patient_id',currentPatientId).order('created_at'),
    sb.from('planos_appt_historico').select('*').eq('patient_id',currentPatientId)
  ]);
  const c=document.getElementById('patient-tab-content');
  const sorted=(appts||[]).sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
  const hist=histAppts||[];
  const cancelCount=hist.filter(h=>h.tipo==='cancelamento').length;
  const remarcCount=hist.filter(h=>h.tipo==='remarcacao').length;
  const cancelFromStatus=(appts||[]).filter(a=>a.status==='Cancelou').length;
  const totalCanc=Math.max(cancelCount,cancelFromStatus);

  function apptHtml(a){
    const isAuto=!!a.origem_tabela;
    const statusOpts=['Agendado','Compareceu','Faltou','Cancelou'].map(s=>'<option '+(a.status===s?'selected':'')+'>'+s+'</option>').join('');
    const borderLeft=isAuto?'border-left:3px solid var(--success)':a.status==='Cancelou'?'border-left:3px solid var(--danger)':a.status==='Faltou'?'border-left:3px solid var(--warning)':'';
    return '<div class="appt-item" style="'+borderLeft+'">'
      +'<div class="appt-time">'+(a.time_str||'--:--')+'</div>'
      +'<div class="appt-info">'
      +'<div class="appt-name">'+fmtDate(a.date_str||'')+' \u00b7 '+(a.procedimento||'')+'</div>'
      +'<div class="appt-sub">'+(a.tipo||'')+(a.observacao?' \u00b7 '+a.observacao:'')+'</div>'
      +(isAuto?'<div class="appt-sub" style="color:var(--success);font-weight:600">\ud83d\udd17 '+(a.origem_tabela==='soro_sessoes'?'Soroterapia':'Implante')+'</div>':'')
      +(a.profissional_nome?'<div class="appt-sub" style="color:var(--navy);font-weight:600">\ud83d\udc64 '+a.profissional_nome+'</div>':'')
      +'<div style="margin-top:2px"><span class="user-badge">'+(a.registrado_por||'')+'</span></div>'
      +'</div>'
      +'<select style="border:1.5px solid var(--border);border-radius:8px;padding:4px 8px;font-size:12px;font-family:var(--font)" onchange="handleApptStatusChange('+a.id+','+currentPatientId+',this.value,this)">'+statusOpts+'</select>'
      +'<button class="btn-icon" onclick="excluirAgendamentoPat('+a.id+')" title="Excluir cadastro errado">\ud83d\uddd1</button>'
      +'</div>';
  }

  let html='';

  // Counter badges
  if(totalCanc>0||remarcCount>0){
    html+='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">';
    if(totalCanc>0)html+='<span style="background:#fee2e2;color:#991b1b;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700">\u274c '+totalCanc+' cancelamento(s)</span>';
    if(remarcCount>0)html+='<span style="background:#dbeafe;color:#1e40af;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700">\ud83d\udd04 '+remarcCount+' remarca\u00e7\u00e3o(oes)</span>';
    html+='</div>';
  }

  html+='<div class="section-header"><div class="section-title">Agendamentos</div><button class="btn btn-primary btn-sm" onclick="showAddApptPatient()">+ Add</button></div>';
  html+=sorted.slice(0,5).map(a=>apptHtml(a)).join('');

  if(sorted.length>5){
    html+='<div id="more-appts" style="display:none">'+sorted.slice(5).map(a=>apptHtml(a)).join('')+'</div>';
    html+='<button class="btn btn-ghost btn-full" onclick="document.getElementById(\'more-appts\').style.display=\'block\';this.style.display=\'none\'">Ver todos ('+sorted.length+') \u2193</button>';
  }
  if(!sorted.length)html+='<div class="empty"><div class="empty-icon">\ud83d\udcc5</div>Sem agendamentos</div>';

  // History of cancellations/reschedules
  if(hist.length){
    html+='<div class="card" style="margin-top:12px"><div class="card-title">\ud83d\udcdd Hist\u00f3rico de Cancelamentos e Remarca\u00e7\u00f5es</div>';
    hist.slice().reverse().forEach(h=>{
      const cor=h.tipo==='cancelamento'?'var(--danger)':'var(--accent)';
      const icon=h.tipo==='cancelamento'?'\u274c':'\ud83d\udd04';
      html+='<div style="padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px;display:flex;align-items:flex-start;gap:8px">'
        +'<span>'+icon+'</span>'
        +'<div><div style="font-weight:600;color:'+cor+'">'+(h.tipo==='cancelamento'?'Cancelamento':'Remarca\u00e7\u00e3o')+'</div>'
        +(h.observacao?'<div style="color:var(--text-muted)">'+h.observacao+'</div>':'')
        +'<div style="font-size:11px;color:var(--text-muted);margin-top:2px">'+isoToDisplay(h.created_at||'')+' \u00b7 <span class="user-badge">'+h.registrado_por+'</span></div>'
        +'</div></div>';
    });
    html+='</div>';
  }

  c.innerHTML=html;
}

        +'<span style="font-weight:700;font-size:12px;color:'+(ci.motivo==='fim'?'#3b82f6':'#f97316')+'">'+(ci.motivo==='fim'?'Fim do Plano':'Desist\u00eancia')+'</span>'
        +'</div>'
        +'<div style="font-size:12px;color:var(--text-muted);margin-top:3px">In\u00edcio: '+isoToDisplay(ci.inicio_programa||'')+' \u00b7 Encerrado: '+isoToDisplay(ci.data_encerramento||'')+'</div>'
        +'<div style="font-size:12px;color:var(--text-muted)">'+(ci.sessoes_count||0)+' sess\u00f5es \u00b7 '+(ci.envios_count||0)+' envios</div>'
        +'<div style="font-size:11px;margin-top:2px"><span class="user-badge">'+(ci.registrado_por||'')+'</span></div>'
        +'</div>';
    });
    html+='</div>';
  }

  // LOG EDICOES
  if((edicoes||[]).length){
    const tabelaLabel=t=>t==='soro_sessoes'?'Sess\u00e3o Soro':t==='implantes'?'Implante':t==='financeiro'?'Pagamento':'Registro';
    const acaoLabel=a=>a==='edicao'?'Editado':a==='exclusao'?'Exclu\u00eddo':'Criado';
    const acaoColor=a=>a==='edicao'?'var(--accent)':a==='exclusao'?'var(--danger)':'var(--success)';
    const acaoBg=a=>a==='edicao'?'#dbeafe':a==='exclusao'?'#fee2e2':'#dcfce7';
    const campos={tipo_sessao:'Tipo',data_sessao:'Data',substancias:'Subs.',observacao:'Obs',data_implante:'Data Impl.',forma:'Forma',valor:'Valor',data_pagamento:'Data Pag.'};
    html+='<div class="card"><div class="card-title">\ud83d\udcdd Log de Edi\u00e7\u00f5es e Exclus\u00f5es</div>';
    edicoes.forEach(e=>{
      let dadosAntes={};let dadosNovos={};
      try{dadosAntes=JSON.parse(e.dados_anteriores||'{}')}catch(x){}
      try{dadosNovos=JSON.parse(e.dados_novos||'{}')}catch(x){}
      const diffs=e.acao==='edicao'?Object.keys(campos).filter(k=>dadosAntes[k]!==dadosNovos[k]&&(dadosAntes[k]||dadosNovos[k])).map(k=>campos[k]+': '+(dadosAntes[k]||'\u2014')+' \u2192 '+(dadosNovos[k]||'\u2014')):[];
      html+='<div style="padding:10px 0;border-bottom:1px solid var(--border-light)">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'
        +'<div style="flex:1">'
        +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
        +'<span style="font-weight:700;font-size:13px">'+tabelaLabel(e.tabela)+'</span>'
        +'<span style="font-size:11px;font-weight:700;color:'+acaoColor(e.acao)+';background:'+acaoBg(e.acao)+';padding:2px 7px;border-radius:99px">'+acaoLabel(e.acao)+'</span>'
        +'</div>'
        +(diffs.length?'<div style="font-size:11px;color:var(--text-muted);margin-top:4px">'+diffs.join(' | ')+'</div>':'')
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0">'
        +'<div style="font-size:11px;color:var(--text-muted)">'+isoToDisplay(e.created_at||'')+'</div>'
        +'<div style="margin-top:2px"><span class="user-badge">'+(e.registrado_por||'')+'</span></div>'
        +'</div></div></div>';
    });
    html+='</div>';
  }

  c.innerHTML=html;
}

function goToAgendaDate(dateStr){
  closeModal('modal-generic');
  window._agDate=dateStr;
  window._agView='dia';
  if(typeof renderAgendaContent==='function')renderAgendaContent();
  else mainNav('agenda');

async function excluirAgendamento(id){
  if(!confirm('Excluir este agendamento?\n\nUse apenas para cadastros errados.\nEste registro N\u00c3O ficar\u00e1 no hist\u00f3rico.'))return;
  await sb.from('planos_appointments').delete().eq('id',id);
  toast('Agendamento exclu\u00eddo','success');
  // Refresh the agenda list immediately
  if(typeof window.renderAgendaContent==='function'){
    window.renderAgendaContent();
  } else {
    mainNav('agenda');
  }
}

async function handleApptStatusChange(id,patientId,newStatus,selectEl){
  const oldStatus=selectEl.dataset.oldStatus||'Agendado';
  // If changing to Cancelou or keeping Agendado (remarcação), ask for reason
  if(newStatus==='Cancelou'){
    const motivo=prompt('Motivo do cancelamento (opcional):');
    // Save cancellation log
    await sb.from('planos_appt_historico').insert({
      appointment_id:id,
      patient_id:patientId,
      tipo:'cancelamento',
      observacao:motivo||null,
      registrado_por:currentUser?currentUser.name:'Sistema',
      created_at:new Date().toISOString()
    }).then(({error})=>{if(error)console.warn('Log cancelamento falhou:',error);});
    await sb.from('planos_appointments').update({status:newStatus,updated_by:currentUser?currentUser.name:'Sistema'}).eq('id',id);
    toast('Cancelamento registrado','success');
  } else if(newStatus==='Agendado' && (oldStatus==='Cancelou'||oldStatus==='Faltou')){
    // Remarcação
    const motivo=prompt('Observação sobre a remarcação (opcional):');
    await sb.from('planos_appt_historico').insert({
      appointment_id:id,
      patient_id:patientId,
      tipo:'remarcacao',
      observacao:motivo||null,
      registrado_por:currentUser?currentUser.name:'Sistema',
      created_at:new Date().toISOString()
    }).then(({error})=>{if(error)console.warn('Log remarcação falhou:',error);});
    await sb.from('planos_appointments').update({status:newStatus,updated_by:currentUser?currentUser.name:'Sistema'}).eq('id',id);
    toast('Remarcação registrada','success');
  } else {
    await sb.from('planos_appointments').update({status:newStatus,updated_by:currentUser?currentUser.name:'Sistema'}).eq('id',id);
    toast('Status atualizado','success');
  }
  selectEl.dataset.oldStatus=newStatus;
}

  await sb.from('planos_appointments').update({status,updated_by:currentUser?currentUser.name:'Sistema'}).eq('id',id);

}

function showOverduePending(){
  const overdue=window._overdueAppts||[];
  const patMap=window._overduePatMap||{};
  if(!overdue.length){toast('Nenhuma pend\u00eancia','info');return;}
  const sorted=overdue.slice().sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
  let html='<div style="max-height:60vh;overflow-y:auto">';
  html+='<div style="font-size:13px;color:var(--text-muted);margin-bottom:14px">Clique em uma consulta para navegar at\u00e9 aquele dia e atualizar o status.</div>';
  sorted.forEach(a=>{
    const d=daysAgo(fmtDate(a.date_str));
    const dStr=fmtDate(a.date_str);
    html+='<div onclick="goToAgendaDate(\'' + dStr + '\')" '
      +'style="padding:12px 14px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;border:1.5px solid var(--border)">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">'
      +'<div>'
      +'<div style="font-weight:700;font-size:14px">'+(patMap[a.patient_id]||'Paciente #'+a.patient_id)+'</div>'
      +'<div style="font-size:12px;color:var(--text-muted);margin-top:3px">\ud83d\udcc5 '+dStr+' \u00b7 '+(a.time_str||'--:--')+' \u00b7 '+(a.procedimento||'')+' \u00b7 '+(a.tipo||'')+'</div>'
      +(a.profissional_nome?'<div style="font-size:11px;color:var(--navy)">\ud83d\udc64 '+a.profissional_nome+'</div>':'')
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0">'
      +'<span style="font-size:12px;font-weight:700;color:var(--danger);background:#fee2e2;padding:3px 10px;border-radius:99px">'+(d||0)+'d atr\u00e1s</span>'
      +'<div style="font-size:11px;color:var(--accent);margin-top:4px">Ir para este dia \u2192</div>'
      +'</div>'
      +'</div></div>';
  });
  html+='</div>';
  showGenericModal(html,'\u26a0\ufe0f Consultas Pendentes de Status ('+sorted.length+')');
}

async function renderAgenda(){
  const[{data:appts},{data:patients}]=await Promise.all([
    sb.from('planos_appointments').select('*').order('created_at'),
    sb.from('planos_patients').select('id,name')
  ]);
  const patMap={};(patients||[]).forEach(p=>patMap[p.id]=p.name);
  const patIdMap={};(patients||[]).forEach(p=>patIdMap[p.id]=p.id);
  const todayInt=parseDateInt(todayStr());
  const c=document.getElementById('main-content');

  // State
  if(!window._agView)window._agView='dia';
  if(!window._agDate)window._agDate=todayStr();

  function getWeekDates(dateStr){
    const p=dateStr.split('/');
    const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
    const day=d.getDay();
    const monday=new Date(d);monday.setDate(d.getDate()-day+(day===0?-6:1));
    const dates=[];
    for(let i=0;i<7;i++){const dd=new Date(monday);dd.setDate(monday.getDate()+i);dates.push(String(dd.getDate()).padStart(2,'0')+'/'+String(dd.getMonth()+1).padStart(2,'0')+'/'+dd.getFullYear());}
    return dates;
  }

  function getMonthDates(dateStr){
    const p=dateStr.split('/');
    const y=parseInt(p[2]),m=parseInt(p[1])-1;
    const first=new Date(y,m,1),last=new Date(y,m+1,0);
    const dates=[];
    for(let d=1;d<=last.getDate();d++){dates.push(String(d).padStart(2,'0')+'/'+String(m+1).padStart(2,'0')+'/'+y);}
    return dates;
  }

  function navigateDate(dir){
    const p=window._agDate.split('/');
    const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
    if(window._agView==='dia')d.setDate(d.getDate()+dir);
    else if(window._agView==='semana')d.setDate(d.getDate()+dir*7);
    else if(window._agView==='mes')d.setMonth(d.getMonth()+dir);
    window._agDate=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
    renderAgendaContent();
  }

  function renderAgendaContent(){
    const view=window._agView;
    const curDate=window._agDate;
    const todayStr_=todayStr();

    // Calendar mini
    const cp=curDate.split('/');
    const cy=parseInt(cp[2]),cm=parseInt(cp[1])-1;
    const firstDay=new Date(cy,cm,1).getDay();
    const daysInMonth=new Date(cy,cm+1,0).getDate();
    const monthNames=['Janeiro','Fevereiro','Mar\u00e7o','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const dayNames=['D','S','T','Q','Q','S','S'];

    // Get dates with appts for highlighting
    const apptDatesSet=new Set((appts||[]).map(a=>a.date_str));

    let calHtml='<div style="background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:14px">';
    calHtml+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
    calHtml+='<button class="btn-icon" onclick="navigateCalMonth(-1)">&#8249;</button>';
    calHtml+='<span style="font-weight:700;font-size:14px">'+monthNames[cm]+' '+cy+'</span>';
    calHtml+='<button class="btn-icon" onclick="navigateCalMonth(1)">&#8250;</button>';
    calHtml+='</div>';
    calHtml+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
    dayNames.forEach(d=>{calHtml+='<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text-muted);padding:2px">'+d+'</div>';});
    calHtml+='</div>';
    calHtml+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
    // Empty cells before first day
    const startDay=firstDay===0?6:firstDay-1; // Mon=0
    for(let i=0;i<startDay;i++)calHtml+='<div></div>';
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=String(d).padStart(2,'0')+'/'+String(cm+1).padStart(2,'0')+'/'+cy;
      const isToday=dateStr===todayStr_;
      const isSelected=view==='dia'?dateStr===curDate:(view==='semana'?getWeekDates(curDate).includes(dateStr):(cp[1]===String(cm+1).padStart(2,'0')&&cp[2]===String(cy)));
      const hasAppt=apptDatesSet.has(dateStr);
      const bg=isToday?'var(--navy)':isSelected?'#dbeafe':'transparent';
      const col=isToday?'#fff':isSelected?'var(--navy)':'var(--text)';
      calHtml+='<div onclick="window._agDate=\''+dateStr+'\';window._agView=\'dia\';renderAgendaContent()" '
        +'style="text-align:center;padding:4px 2px;border-radius:6px;cursor:pointer;background:'+bg+';color:'+col+';font-size:12px;font-weight:'+(isToday||isSelected?'700':'400')+';position:relative">'
        +d
        +(hasAppt?'<div style="width:4px;height:4px;border-radius:50%;background:'+(isToday?'#fff':'var(--accent)')+';margin:0 auto;margin-top:1px"></div>':'<div style="height:5px"></div>')
        +'</div>';
    }
    calHtml+='</div></div>';

    // View controls + navigation
    let viewLabel='';
    if(view==='dia')viewLabel=curDate===(todayStr_)?'Hoje \u2014 '+curDate:fmtDate(curDate);
    else if(view==='semana'){const w=getWeekDates(curDate);viewLabel='Semana: '+fmtDate(w[0])+' a '+fmtDate(w[6]);}
    else if(view==='mes'){const mp=curDate.split('/');viewLabel=monthNames[parseInt(mp[1])-1]+' '+mp[2];}

    let html2='';
    html2+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">';
    html2+='<button class="btn btn-primary btn-sm" onclick="window._agDate=\''+todayStr_+'\';window._agView=\'dia\';renderAgendaContent()">&#128197; Hoje</button>';
    html2+='<button class="btn-icon" onclick="navigateDate(-1)">&#8249;</button>';
    html2+='<button class="btn-icon" onclick="navigateDate(1)">&#8250;</button>';
    html2+='<span style="font-weight:700;font-size:14px;flex:1">'+viewLabel+'</span>';
    html2+='<div style="display:flex;gap:4px">';
    ['dia','semana','mes'].forEach(v=>{
      const label=v==='dia'?'Dia':v==='semana'?'Semana':'M\u00eas';
      html2+='<button class="btn btn-sm '+(view===v?'btn-primary':'btn-ghost')+'" onclick="window._agView=\''+v+'\';renderAgendaContent()">'+label+'</button>';
    });
    html2+='</div>';
    html2+='<button class="btn btn-primary btn-sm" onclick="showAddApptGlobal()">+ Add</button>';
    html2+='</div>';

    // Get dates to show
    let datesToShow=[];
    if(view==='dia')datesToShow=[curDate];
    else if(view==='semana')datesToShow=getWeekDates(curDate);
    else if(view==='mes')datesToShow=getMonthDates(curDate);

    const todayIntLocal=parseDateInt(todayStr_);

    // Overdue (only in dia/semana view)
    if(view!=='mes'){
      const overdue=(appts||[]).filter(a=>parseDateInt(a.date_str)<todayIntLocal&&(!a.status||a.status==='Agendado')&&!a.origem_tabela);
      if(overdue.length&&view==='dia'){
        window._overdueAppts=overdue;window._overduePatMap=patMap;
        html2+='<div onclick="showOverduePending()" style="background:#fff5f5;border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#991b1b;cursor:pointer;display:flex;align-items:center;justify-content:space-between">';
        html2+='<span>\u26a0\ufe0f <strong>'+overdue.length+' consulta(s) sem status</strong> em datas passadas.</span>';
        html2+='<span style="font-weight:700;font-size:12px;background:#fca5a5;color:#991b1b;padding:3px 10px;border-radius:99px">Ver pendentes \u2192</span>';
        html2+='</div>';
      }
    }

    // Build agenda list
    let hasAny=false;
    datesToShow.forEach(date=>{
      const dayAppts=(appts||[]).filter(a=>a.date_str===date).sort((a,b)=>(a.time_str||'').localeCompare(b.time_str||''));
      if(!dayAppts.length&&view!=='semana')return;
      const isPast=parseDateInt(date)<todayIntLocal;
      const isToday=date===todayStr_;
      hasAny=true;

      if(view!=='dia'){
        html2+='<div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;padding:4px 0;border-bottom:1.5px solid var(--border-light)">';
        html2+=fmtDate(date)+(isToday?' \u2014 Hoje':'')+(dayAppts.length?' ('+dayAppts.length+')':'');
        html2+='</div>';
      }

      if(!dayAppts.length){
        if(view==='semana')html2+='<div style="font-size:12px;color:var(--text-muted);padding:6px 0;font-style:italic">Sem agendamentos</div>';
        return;
      }

      html2+='<div style="background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:'+(view==='dia'?'6':'10')+'px;overflow:hidden">';
      dayAppts.forEach(a=>{
        const isAuto=!!a.origem_tabela;
        const isOverdue=isPast&&(!a.status||a.status==='Agendado')&&!isAuto;
        const statusOpts=['Agendado','Compareceu','Faltou','Cancelou'].map(s=>'<option '+(a.status===s?'selected':'')+'>'+s+'</option>').join('');
        html2+='<div style="padding:12px 14px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px;'+(isAuto?'border-left:3px solid var(--success)':isOverdue?'border-left:3px solid var(--danger);background:#fff9f9':'')+'">'; 
        html2+='<div style="font-weight:700;font-size:13px;color:var(--navy);min-width:46px">'+(a.time_str||'--:--')+'</div>';
        html2+='<div style="flex:1;min-width:0">';
        html2+='<div style="font-weight:600;font-size:14px">'+(patMap[a.patient_id]||'#'+a.patient_id)+'</div>';
        html2+='<div style="font-size:12px;color:var(--text-muted)">'+(a.procedimento||'')+' \u00b7 '+(a.tipo||'')+(a.observacao?' \u00b7 '+a.observacao:'')+(isOverdue?' <span style="color:var(--danger);font-weight:700">'+daysAgo(a.date_str)+'d atr\u00e1s</span>':'')+'</div>';
        if(isAuto)html2+='<div style="font-size:11px;color:var(--success);font-weight:600">\ud83d\udd17 '+(a.origem_tabela==='soro_sessoes'?'Soroterapia':'Implante')+'</div>';
        if(a.profissional_nome)html2+='<div style="font-size:12px;color:var(--navy);font-weight:600">\ud83d\udc64 '+a.profissional_nome+'</div>';
        html2+='</div>';
        // Prontu\u00e1rio button
        if(patIdMap[a.patient_id])html2+='<button class="btn btn-ghost btn-sm" onclick="openPatient('+a.patient_id+')" title="Abrir Prontu\u00e1rio" style="flex-shrink:0">\ud83d\udcc2</button>';
        html2+='<select style="border:1.5px solid var(--border);border-radius:8px;padding:4px 8px;font-size:12px;font-family:var(--font);flex-shrink:0" onchange="handleApptStatusChange('+a.id+','+a.patient_id+',this.value,this)">'+statusOpts+'</select>';
        html2+='<button onclick="excluirAgendamento('+a.id+')" title="Excluir (cadastro errado - sem registro)" style="padding:5px 9px;border-radius:7px;background:transparent;border:1.5px solid #fca5a5;color:#ef4444;cursor:pointer;font-size:14px;flex-shrink:0">\ud83d\uddd1</button>';
        html2+='</div>';
      });
      html2+='</div>';
    });

    if(!hasAny)html2+='<div class="empty"><div class="empty-icon">\ud83d\udcc5</div>Sem agendamentos neste per\u00edodo</div>';

    // Layout: calendar on left (sticky), agenda on right
    c.innerHTML='<div style="display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start">'
      +'<div style="position:sticky;top:70px">'+calHtml+'</div>'
      +'<div>'+html2+'</div>'
      +'</div>';

    // Attach navigation helpers to window
    window.navigateDate=navigateDate;
    window.navigateCalMonth=function(dir){
      const p2=window._agDate.split('/');
      const d2=new Date(parseInt(p2[2]),parseInt(p2[1])-1,parseInt(p2[0]));
      d2.setMonth(d2.getMonth()+dir);
      window._agDate=String(d2.getDate()).padStart(2,'0')+'/'+String(d2.getMonth()+1).padStart(2,'0')+'/'+d2.getFullYear();
      renderAgendaContent();
    };
    window.renderAgendaContent=renderAgendaContent;
  }

  window.navigateDate=navigateDate;
  window.renderAgendaContent=renderAgendaContent;
  renderAgendaContent();
}
