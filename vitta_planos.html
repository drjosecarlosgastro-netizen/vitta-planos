  });
  html+='</div>';
  showGenericModal(html,'\u26a0\ufe0f Consultas Pendentes de Status ('+sorted.length+')');

async function renderAgenda(){
  const[{data:appts},{data:patients}]=await Promise.all([
    sb.from('planos_appointments').select('*').order('created_at'),
    sb.from('planos_patients').select('id,name')
  ]);
  const patMap={};(patients||[]).forEach(p=>patMap[p.id]=p.name);
  const patIdMap={};(patients||[]).forEach(p=>patIdMap[p.id]=p.id);
  const c=document.getElementById('main-content');
  if(!window._agView)window._agView='dia';
  if(!window._agDate)window._agDate=todayStr();
  function getWeekDates(dateStr){
    const p=dateStr.split('/');const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
    const day=d.getDay();const monday=new Date(d);monday.setDate(d.getDate()-day+(day===0?-6:1));
    const dates=[];for(let i=0;i<7;i++){const dd=new Date(monday);dd.setDate(monday.getDate()+i);dates.push(String(dd.getDate()).padStart(2,'0')+'/'+String(dd.getMonth()+1).padStart(2,'0')+'/'+dd.getFullYear());}return dates;
  }
  function getMonthDates(dateStr){
    const p=dateStr.split('/');const y=parseInt(p[2]),m=parseInt(p[1])-1;const last=new Date(y,m+1,0);
    const dates=[];for(let d=1;d<=last.getDate();d++){dates.push(String(d).padStart(2,'0')+'/'+String(m+1).padStart(2,'0')+'/'+y);}return dates;
  }
  function navigateDate(dir){
    const p=window._agDate.split('/');const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
    if(window._agView==='dia')d.setDate(d.getDate()+dir);
    else if(window._agView==='semana')d.setDate(d.getDate()+dir*7);
    else if(window._agView==='mes')d.setMonth(d.getMonth()+dir);
    window._agDate=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
    renderAgendaContent();
  }
  function renderAgendaContent(){
    const view=window._agView;const curDate=window._agDate;const todayStr_=todayStr();
    const cp=curDate.split('/');const cy=parseInt(cp[2]),cm=parseInt(cp[1])-1;
    const firstDay=new Date(cy,cm,1).getDay();const daysInMonth=new Date(cy,cm+1,0).getDate();
    const monthNames=['Janeiro','Fevereiro','Mar\u00e7o','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const dayNames=['S','T','Q','Q','S','S','D'];
    const apptDatesSet=new Set((appts||[]).map(a=>a.date_str));
    let calHtml='<div style="background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:14px">';
    calHtml+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
    calHtml+='<button class="btn-icon" onclick="navigateCalMonth(-1)">&#8249;</button>';
    calHtml+='<span style="font-weight:700;font-size:14px">'+monthNames[cm]+' '+cy+'</span>';
    calHtml+='<button class="btn-icon" onclick="navigateCalMonth(1)">&#8250;</button>';
    calHtml+='</div>';
    calHtml+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
    dayNames.forEach(d=>{calHtml+='<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text-muted);padding:2px">'+d+'</div>';});
    calHtml+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
    const startDay=firstDay===0?6:firstDay-1;
    for(let i=0;i<startDay;i++)calHtml+='<div></div>';
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=String(d).padStart(2,'0')+'/'+String(cm+1).padStart(2,'0')+'/'+cy;
      const isToday=dateStr===todayStr_;
      const isSelected=view==='dia'?dateStr===curDate:(view==='semana'?getWeekDates(curDate).includes(dateStr):(cp[1]===String(cm+1).padStart(2,'0')&&cp[2]===String(cy)));
      const hasAppt=apptDatesSet.has(dateStr);
      const bg=isToday?'var(--navy)':isSelected?'#dbeafe':'transparent';
      const col=isToday?'#fff':isSelected?'var(--navy)':'var(--text)';
      calHtml+='<div onclick="window._agDate=\''+dateStr+'\';window._agView=\'dia\';renderAgendaContent()" style="text-align:center;padding:4px 2px;border-radius:6px;cursor:pointer;background:'+bg+';color:'+col+';font-size:12px;font-weight:'+(isToday||isSelected?'700':'400')+';position:relative">'+d+(hasAppt?'<div style="width:4px;height:4px;border-radius:50%;background:'+(isToday?'#fff':'var(--accent)')+';margin:0 auto;margin-top:1px"></div>':'<div style="height:5px"></div>')+'</div>';
    }
    calHtml+='</div></div>';
    let viewLabel='';
    if(view==='dia')viewLabel=curDate===(todayStr_)?'Hoje \u2014 '+curDate:fmtDate(curDate);
    else if(view==='semana'){const w=getWeekDates(curDate);viewLabel='Semana: '+fmtDate(w[0])+' a '+fmtDate(w[6]);}
    else if(view==='mes'){const mp=curDate.split('/');viewLabel=monthNames[parseInt(mp[1])-1]+' '+mp[2];}
    let html2='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">';
    html2+='<button class="btn btn-primary btn-sm" onclick="window._agDate=\''+todayStr_+'\';window._agView=\'dia\';renderAgendaContent()">&#128197; Hoje</button>';
    html2+='<button class="btn-icon" onclick="navigateDate(-1)">&#8249;</button>';
    html2+='<button class="btn-icon" onclick="navigateDate(1)">&#8250;</button>';
    html2+='<span style="font-weight:700;font-size:14px;flex:1">'+viewLabel+'</span>';
    html2+='<div style="display:flex;gap:4px">';
    ['dia','semana','mes'].forEach(v=>{const label=v==='dia'?'Dia':v==='semana'?'Semana':'M\u00eas';html2+='<button class="btn btn-sm '+(view===v?'btn-primary':'btn-ghost')+'" onclick="window._agView=\''+v+'\';renderAgendaContent()">'+label+'</button>';});
    html2+='</div>';
    html2+='<button class="btn btn-primary btn-sm" onclick="showAddApptGlobal()">+ Add</button>';
    html2+='</div>';
    let datesToShow=[];
    if(view==='dia')datesToShow=[curDate];
    else if(view==='semana')datesToShow=getWeekDates(curDate);
    else if(view==='mes')datesToShow=getMonthDates(curDate);
    const todayIntLocal=parseDateInt(todayStr_);
    if(view!=='mes'){
      const overdue=(appts||[]).filter(a=>parseDateInt(a.date_str)<todayIntLocal&&(!a.status||a.status==='Agendado')&&!a.origem_tabela);
      if(overdue.length&&view==='dia'){
        window._overdueAppts=overdue;window._overduePatMap=patMap;
        html2+='<div onclick="showOverduePending()" style="background:#fff5f5;border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#991b1b;cursor:pointer;display:flex;align-items:center;justify-content:space-between">';
        html2+='<span>\u26a0\ufe0f <strong>'+overdue.length+' consulta(s) sem status</strong> em datas passadas.</span>';
        html2+='<span style="font-weight:700;font-size:12px;background:#fca5a5;color:#991b1b;padding:3px 10px;border-radius:99px">Ver pendentes \u2192</span>';
        html2+='</div>';
      }
    }
    let hasAny=false;
    datesToShow.forEach(date=>{
      const dayAppts=(appts||[]).filter(a=>a.date_str===date).sort((a,b)=>(a.time_str||'').localeCompare(b.time_str||''));
      if(!dayAppts.length&&view!=='semana')return;
      // Legenda de medicos (so na visao dia)

async function renderPrograma(){
  const[{data:patients},{data:appts},{data:sessoes},{data:implantes},{data:envios}]=await Promise.all([

      +'<button class="btn btn-sm '+(phaseFilter===0?'btn-accent':'btn-ghost')+'" onclick="window._ph=0;rebuildProg()">F-Todos</button>'
      +'<button class="btn btn-sm '+(phaseFilter===1?'btn-accent':'btn-ghost')+'" onclick="window._ph=1;rebuildProg()">F1</button>'
      +'<button class="btn btn-sm '+(phaseFilter===2?'btn-accent':'btn-ghost')+'" onclick="window._ph=2;rebuildProg()">F2</button>'
      +'<button class="btn btn-sm '+(phaseFilter===3?'btn-accent':'btn-ghost')+'" onclick="window._ph=3;rebuildProg()">F3</button>'
      +'<span style="width:1px;height:20px;background:var(--border);display:inline-block;margin:0 2px"></span>'

      +'<option value="alpha" '+(progSort==='alpha'?'selected':'')+'>A\u2013Z</option>'
      +'<option value="fim_asc" '+(progSort==='fim_asc'?'selected':'')+'>Fim mais pr\u00f3ximo \u2191</option>'
      +'<option value="fim_desc" '+(progSort==='fim_desc'?'selected':'')+'>Fim mais distante \u2193</option>'

      +'</select>'

      const lastEnvio=(envios||[]).filter(e=>e.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_envio)-parseDateInt(a.data_envio))[0];

      const encHtml=p.motivo_encerramento?'<span style="font-weight:700;color:'+(p.motivo_encerramento==='fim'?'#3b82f6':'#f97316')+'">Encerrado: '+isoToDisplay(p.data_encerramento||'')+' \u2014 '+(p.motivo_encerramento==='fim'?'Fim do Plano':'Desist\u00eancia')+'</span>':'';
      html+='<div class="prog-row"><div class="prog-header" onclick="toggleProg(this)">'

        +'<div style="font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap">'
        +'<span class="phase-badge phase-'+phase+'">F'+phase+'</span><span>'+(p.plan_type||'\u2014')+'</span><span>M\u00eas '+(months+1)+'</span>'
        +'<span class="pill pill-'+(p.modality==='Presencial'?'blue':'purple')+'">'+(p.modality||'\u2014')+'</span>'

        +(isOnline&&lastEnvio?'<div class="card" style="margin:0;padding:12px"><div class="card-title">\u00daltimo Envio</div><div style="font-size:14px;font-weight:600">'+fmtDate(lastEnvio.data_envio)+'</div><div class="text-sm text-muted">EV:'+lastEnvio.sessoes_ev+' IM:'+lastEnvio.sessoes_im+'</div></div>':'')
        +'</div>'
        +'<button class="btn btn-ghost btn-sm" onclick="openPatient('+p.id+')">Ver Prontu\u00e1rio \u2192</button>'
        +'</div></div>';

async function renderImplantes(){
  const[{data:patients},{data:implantes}]=await Promise.all([
    sb.from('planos_patients').select('*').order('name'),
    sb.from('planos_implantes').select('*').order('created_at')
  ]);
  allPatients=patients||[];
  let implFilter='active';let implSort='ultimo_desc';
  const c=document.getElementById('main-content');
  function buildImpl(){
    let filtered=allPatients;
    if(implFilter==='active')filtered=filtered.filter(p=>p.active);
    else if(implFilter==='inactive')filtered=filtered.filter(p=>!p.active);
    else if(implFilter==='com_impl')filtered=filtered.filter(p=>(implantes||[]).some(i=>i.patient_id===p.id));
    else if(implFilter==='sem_impl')filtered=filtered.filter(p=>!(implantes||[]).some(i=>i.patient_id===p.id));
    const lastImplMap={};const allImplMap={};
    (implantes||[]).forEach(i=>{
      if(!allImplMap[i.patient_id])allImplMap[i.patient_id]=[];
      allImplMap[i.patient_id].push(i);
      const cur=lastImplMap[i.patient_id];
      if(!cur||parseDateInt(fmtDate(i.data_implante))>parseDateInt(fmtDate(cur.data_implante))){lastImplMap[i.patient_id]=i;}
    });
    if(implSort==='ultimo_desc'){filtered=filtered.slice().sort((a,b)=>{const da=lastImplMap[a.id]?parseDateInt(fmtDate(lastImplMap[a.id].data_implante)):0;const db=lastImplMap[b.id]?parseDateInt(fmtDate(lastImplMap[b.id].data_implante)):0;return db-da;});}
    else if(implSort==='ultimo_asc'){filtered=filtered.slice().sort((a,b)=>{const da=lastImplMap[a.id]?parseDateInt(fmtDate(lastImplMap[a.id].data_implante)):99999999;const db=lastImplMap[b.id]?parseDateInt(fmtDate(lastImplMap[b.id].data_implante)):99999999;return da-db;});}
    else if(implSort==='alpha'){filtered=filtered.slice().sort((a,b)=>a.name.localeCompare(b.name));}
    else if(implSort==='qtd_desc'){filtered=filtered.slice().sort((a,b)=>{const qa=(allImplMap[a.id]||[]).length;const qb=(allImplMap[b.id]||[]).length;return qb-qa;});}
    const totalImpl=(implantes||[]).length;const patComImpl=Object.keys(lastImplMap).length;
    let html='<div class="section-header"><div class="section-title">Implantes Hormonais</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
      +'<button class="btn btn-sm '+(implFilter==='active'?'btn-primary':'btn-ghost')+'" onclick="window._if=\'active\';rebuildImpl()">Ativos</button>'
      +'<button class="btn btn-sm '+(implFilter==='inactive'?'btn-primary':'btn-ghost')+'" onclick="window._if=\'inactive\';rebuildImpl()">Inativos</button>'
      +'<button class="btn btn-sm '+(implFilter==='all'?'btn-primary':'btn-ghost')+'" onclick="window._if=\'all\';rebuildImpl()">Todos</button>'
      +'<button class="btn btn-sm '+(implFilter==='com_impl'?'btn-accent':'btn-ghost')+'" onclick="window._if=\'com_impl\';rebuildImpl()">Com Implante</button>'
      +'<button class="btn btn-sm '+(implFilter==='sem_impl'?'btn-accent':'btn-ghost')+'" onclick="window._if=\'sem_impl\';rebuildImpl()">Sem Implante</button>'
      +'<select style="padding:5px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;background:var(--white)" onchange="window._isort=this.value;rebuildImpl()">'
      +'<option value="ultimo_desc" '+(implSort==='ultimo_desc'?'selected':'')+'>Mais recente primeiro</option>'
      +'<option value="ultimo_asc" '+(implSort==='ultimo_asc'?'selected':'')+'>Mais antigo primeiro</option>'
      +'<option value="alpha" '+(implSort==='alpha'?'selected':'')+'>A\u2013Z</option>'
      +'<option value="qtd_desc" '+(implSort==='qtd_desc'?'selected':'')+'>Mais implantes</option>'
      +'</select></div></div>';
    html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">'
      +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+totalImpl+'</div><div class="dash-card-label">Total de Implantes</div></div>'
      +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+patComImpl+'</div><div class="dash-card-label">Pacientes com Implante</div></div>'
      +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+(allPatients.filter(p=>p.active).length-Object.keys(lastImplMap).filter(id=>allPatients.find(p=>p.id==id&&p.active)).length)+'</div><div class="dash-card-label">Ativos sem Implante</div></div>'
      +'</div>';
    if(!filtered.length){html+='<div class="empty"><div class="empty-icon">\ud83d\udc89</div>Nenhum paciente encontrado</div>';return html;}
    filtered.forEach(p=>{
      const patImpls=(allImplMap[p.id]||[]).sort((a,b)=>parseDateInt(fmtDate(b.data_implante))-parseDateInt(fmtDate(a.data_implante)));
      const lastImpl=patImpls[0];
      const phase=p.inicio_programa?calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3):1;
      const months=p.inicio_programa?monthsSince(fmtDate(p.inicio_programa)):0;
      const tags=(p.etiquetas||[]);
      let diasBadge='';
      if(lastImpl&&lastImpl.data_implante){
        const dataImpl=fmtDate(lastImpl.data_implante);const dias=daysAgo(dataImpl);
        const diasParaVencer=150-(dias||0);
        let cor,bgCor,label;
        if(diasParaVencer<0){cor='var(--danger)';bgCor='#fee2e2';label='\u26a0\ufe0f Vencido h\u00e1 '+Math.abs(diasParaVencer)+'d';}
        else if(diasParaVencer<=30){cor='#c2410c';bgCor='#fff7ed';label='\ud83d\udea9 Vence em '+diasParaVencer+'d';}
        else if(diasParaVencer<=60){cor='var(--warning)';bgCor='#fef3c7';label='\u26a0\ufe0f Vence em '+diasParaVencer+'d';}
        else{cor='var(--success)';bgCor='#dcfce7';label='\u2705 Vence em ~'+diasParaVencer+'d';}
        diasBadge='<span style="font-size:11px;font-weight:700;color:'+cor+';background:'+bgCor+';padding:2px 8px;border-radius:99px">'+label+'</span>';
      }
      html+='<div class="prog-row"><div class="prog-header" onclick="toggleProgImpl(this)">'
        +'<div class="patient-avatar" style="width:38px;height:38px;font-size:14px">'+p.name.charAt(0)+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px">'+p.name+tags.map(t=>'<span class="etiqueta" style="background:'+(t.color||'#6b7280')+'">'+t.name+'</span>').join('')+'</div>'
        +'<div style="font-size:12px;color:var(--text-muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">'
        +'<span class="phase-badge phase-'+phase+'">F'+phase+'</span>'
        +'<span class="pill pill-'+(p.modality==='Presencial'?'blue':'purple')+'">'+(p.modality||'\u2014')+'</span>'
        +'<span>'+(p.plan_type||'\u2014')+' \u00b7 M\u00eas '+(months+1)+'</span>'
        +(lastImpl?'<span style="font-weight:600;color:var(--midnight)">\ud83d\udc89 \u00dalt: '+fmtDate(lastImpl.data_implante)+'</span>'+diasBadge:'<span style="color:var(--text-muted);font-style:italic">Sem implante</span>')
        +'<span style="font-size:11px;background:#f3f4f6;padding:2px 8px;border-radius:99px;color:var(--text-muted)">'+patImpls.length+' implante(s)</span>'
        +'</div>'
        +(lastImpl&&lastImpl.observacao?'<div style="font-size:11px;color:var(--text-muted);margin-top:3px;font-style:italic">\ud83d\udcac '+lastImpl.observacao.slice(0,80)+(lastImpl.observacao.length>80?'\u2026':'')+'</div>':'')
        +'</div><span style="color:var(--text-muted)">\u25be</span></div>'
        +'<div class="prog-detail">'
        +(patImpls.length
          ?'<div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">Hist\u00f3rico de Implantes ('+patImpls.length+')</div>'
          +patImpls.map((imp,idx)=>{
            const d=daysAgo(fmtDate(imp.data_implante));
            return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light)">'
              +'<div style="font-size:12px;font-weight:700;color:#fff;background:var(--midnight);border-radius:5px;padding:2px 8px;flex-shrink:0">#'+(patImpls.length-idx)+'</div>'
              +'<div style="flex:1">'
              +'<div style="font-weight:700;font-size:14px">\ud83d\udcc5 '+fmtDate(imp.data_implante)+(d!==null?' <span style="font-size:11px;color:var(--text-muted);font-weight:400">('+d+' dias atr\u00e1s)</span>':'')+'</div>'
              +(imp.observacao?'<div style="font-size:13px;color:var(--text);margin-top:3px">'+imp.observacao+'</div>':'<div style="font-size:12px;color:var(--text-muted);font-style:italic">Sem descri\u00e7\u00e3o</div>')
              +'<div style="margin-top:4px"><span class="user-badge">'+(imp.registrado_por||'')+'</span></div>'
              +'</div>'
              +(imp.receita_path?'<button class="btn btn-ghost btn-sm" onclick="openFile(\'documents\',\''+imp.receita_path+'\')">\ud83d\udcc4 Receita</button>':'')
              +'</div>';
          }).join('')
          :'<div style="font-size:13px;color:var(--text-muted);font-style:italic">Nenhum implante registrado para este paciente.</div>')
        +'<div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="openPatient('+p.id+')">Ver Prontu\u00e1rio \u2192</button></div>'
        +'</div></div>';
    });
    return html;
  }
  window._if='active';window._isort='ultimo_desc';
  window.rebuildImpl=function(){implFilter=window._if;implSort=window._isort;c.innerHTML=buildImpl();};
  c.innerHTML=buildImpl();
}

// ========== PENDENCIAS TAB ==========
function escHtml(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDatetime(iso){if(!iso)return '';try{const d=new Date(iso);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}catch(e){return '';}}

async function renderPendenciasTab(){
  const c=document.getElementById('main-content');
  c.innerHTML='<div class="loading"><div class="spinner"></div>Carregando...</div>';
  try{
  const res=await Promise.all([
    sb.from('planos_patients').select('*').order('name'),
    sb.from('planos_pendencias').select('*').order('updated_at',{ascending:false}),
    sb.from('planos_pendencias_itens').select('*').eq('concluida',false).order('created_at',{ascending:true})
  ]);
  const patients=res[0].data;const pends=res[1].data;const itens=res[2].data||[];
  if(res[0].error)throw res[0].error;
  if(res[1].error)throw res[1].error;
  // Auto-remove patients marked sem_pendencias whose updated_at is from a previous day
  const todayStr=new Date().toISOString().slice(0,10);
  const toAutoRemove=(pends||[]).filter(p=>{
    if(!p.sem_pendencias)return false;
    if(!p.updated_at)return false;
    return p.updated_at.slice(0,10)<todayStr;
  });
  if(toAutoRemove.length){
    await Promise.all(toAutoRemove.map(p=>sb.from('planos_pendencias').delete().eq('id',p.id)));
    toAutoRemove.forEach(p=>{const idx=(pends||[]).findIndex(x=>x.id===p.id);if(idx>-1)pends.splice(idx,1);});
  }
  allPatients=patients||[];
  const pendList=pends||[];
  // Auto-add patients seen in the last 7 days if not already in list
  const today=new Date();
  const weekAgo=new Date(today);weekAgo.setDate(weekAgo.getDate()-7);
  const todayInt=parseInt(today.toISOString().slice(0,10).replace(/-/g,''));
  const weekInt=parseInt(weekAgo.toISOString().slice(0,10).replace(/-/g,''));
  const res3=await sb.from('planos_appointments').select('patient_id,date_str,status');
  const appts=res3.data||[];
  const weekAppts=appts.filter(a=>{
    if(!a.date_str)return false;
    const d=parseDateInt(a.date_str);return d>=weekInt&&d<=todayInt&&a.status==='Compareceu';
  });
  const weekPatIds=[...new Set(weekAppts.map(a=>a.patient_id))];
  // Insert missing patients into planos_pendencias
  const existIds=pendList.map(p=>p.patient_id);
  const toInsert=weekPatIds.filter(id=>!existIds.includes(id));
  if(toInsert.length){
    const rows=toInsert.map(id=>({patient_id:id,texto:'',sem_pendencias:false,criado_por:'auto',updated_at:new Date().toISOString()}));
    const ins=await sb.from('planos_pendencias').insert(rows).select();
    if(ins.data)(ins.data).forEach(r=>pendList.push(r));
  }
  const patIds=[...new Set(pendList.map(p=>p.patient_id))];
  // Sort: sem_pendencias=false first, then by name
  const pendPats=allPatients.filter(p=>patIds.includes(p.id)).sort((a,b)=>{
    const ra=pendList.find(p=>p.patient_id===a.id);const rb=pendList.find(p=>p.patient_id===b.id);
    const sa=ra&&ra.sem_pendencias?1:0;const sb2=rb&&rb.sem_pendencias?1:0;
    if(sa!==sb2)return sa-sb2;
    return a.name.localeCompare(b.name);
  });
  const totalAbertos=pendList.filter(p=>!p.sem_pendencias).length;
  const totalPats=pendList.length;
  let html='<div class="section-header">'
    +'<div style="display:flex;align-items:center;gap:10px">'
    +'<div class="section-title">&#128204; Pend\u00eancias e Orienta\u00e7\u00f5es</div>'
    +(totalAbertos>0?'<span class="pend-counter-badge" style="background:#ef4444;color:#fff;border-radius:20px;padding:2px 10px;font-size:13px;font-weight:700">'+totalAbertos+' n\u00e3o verificado'+(totalAbertos>1?'s':'')+'</span>':'')
    +(totalPats>0&&totalAbertos===0?'<span style="background:#22c55e;color:#fff;border-radius:20px;padding:2px 10px;font-size:13px;font-weight:700">&#9989; Tudo ok</span>':'')
    +'</div>'
    +'<button class="btn btn-primary btn-sm" onclick="pendAddPatient()">+ Paciente avulso</button>'
    +'</div>';
  if(!pendPats.length){
    html+='<div class="empty"><div class="empty-icon">&#128204;</div>Nenhuma pend\u00eancia esta semana.</div>';
  } else {
    pendPats.forEach(p=>{
      const rec=pendList.find(pd=>pd.patient_id===p.id);
      if(!rec)return;
      const semPend=rec.sem_pendencias===true;
      const borderColor=semPend?'#22c55e':'var(--border)';
      const bgHeader=semPend?'#f0fdf4':'var(--bg-card)';
      const avatarBg=semPend?'#22c55e':'var(--accent)';
      const subColor=semPend?'#16a34a':'var(--text-muted)';
      const subWeight=semPend?'600':'400';
      const subText=semPend?'&#9989; Sem pend\u00eancias':'&#9888;&#65039; Com pend\u00eancias';
      // Last consult info for this patient
      const patAppts=appts.filter(a=>a.patient_id===p.id&&a.status==='Compareceu').sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
      const lastAppt=patAppts[0];
      const patModal=p.modality||'';
      const lastConsultStr=lastAppt?fmtDate(lastAppt.date_str)+(patModal?' \u00b7 '+patModal:''):'';
      html+='<div class="card" style="margin-bottom:10px;border-radius:12px;overflow:hidden;border:1.5px solid '+borderColor+'" id="pend-card-'+p.id+'">';
      html+='<div style="display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;background:'+bgHeader+'" onclick="pendToggle('+p.id+')">';
      html+='<div class="patient-avatar" style="width:36px;height:36px;font-size:14px;flex-shrink:0;background:'+avatarBg+'">'+p.name.charAt(0)+'</div>';
      html+='<div style="flex:1"><div style="font-weight:700;font-size:14px">'+escHtml(p.name)+'</div>';
      html+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px">';
      html+='<span style="font-size:12px;color:'+subColor+';font-weight:'+subWeight+'">'+subText+'</span>';
      if(lastConsultStr)html+='<span style="font-size:11px;color:var(--text-muted)">&#183; \u00dalt. consulta: '+escHtml(lastConsultStr)+'</span>';
      html+='</div></div>';
      html+='<span id="pend-arrow-'+p.id+'" style="font-size:18px;color:var(--text-muted);transition:transform 0.2s">&#8250;</span>';
      html+='</div>';
      const recItens=(itens||[]).filter(i=>i.pend_id===rec.id);
      html+='<div id="pend-body-'+p.id+'" style="display:none;padding:0 16px 16px">';
      // Sem Pendencias checkbox
      html+='<div style="display:flex;align-items:center;justify-content:space-between;margin:12px 0 10px">';
      const chkd=semPend?'checked':'';
      html+='<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;color:'+(semPend?'#16a34a':'var(--text)')+'">';
      html+='<input type="checkbox" '+chkd+' style="width:16px;height:16px;cursor:pointer;accent-color:#22c55e" onchange="pendToggleSemPend('+rec.id+','+p.id+',this)">Sem Pend\u00eancias</label>';
      html+='</div>';
      // Saved items list
      html+='<div id="pend-itens-'+rec.id+'" style="margin-bottom:10px">';
      recItens.forEach(it=>{
        const concluida=it.concluida===true;
        const bgItem=concluida?'#f0fdf4':'var(--bg-page)';
        const borderItem=concluida?'#22c55e':'var(--border)';
        html+='<div id="pend-item-'+it.id+'" style="background:'+bgItem+';border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid '+borderItem+';transition:background 0.3s">';
        html+='<div style="display:flex;align-items:flex-start;gap:8px">';
        html+='<input type="checkbox" '+(concluida?'checked':'')+' style="margin-top:3px;width:15px;height:15px;flex-shrink:0;cursor:pointer;accent-color:#22c55e" onchange="pendItemConcluir('+it.id+','+rec.id+','+p.id+',this)">';
        html+='<div style="flex:1">';
        html+='<div style="font-size:13px;line-height:1.5;'+(concluida?'text-decoration:line-through;color:var(--text-muted)':'')+'">'+escHtml(it.texto)+'</div>';
        if(it.obs)html+='<div style="font-size:12px;color:var(--text-muted);margin-top:3px">&#128203; '+escHtml(it.obs)+'</div>';
        html+='</div>';
        if(!concluida)html+='<button onclick="pendItemEditar('+it.id+','+rec.id+','+p.id+')" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;padding:2px 4px;flex-shrink:0" title="Editar">&#9998;</button>';
        html+='<button onclick="pendItemDelete('+it.id+','+rec.id+','+p.id+')" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;line-height:1;padding:0 0 0 4px;flex-shrink:0" title="Remover">&#215;</button>';
        html+='</div></div>';
      });
      html+='</div>';
      // Input box always visible
      html+='<div style="background:var(--bg-page);border-radius:8px;padding:12px;border:1.5px dashed var(--border);margin-bottom:10px">';
      html+='<textarea id="pend-new-txt-'+rec.id+'" rows="2" placeholder="Descrever pend\u00eancia ou orienta\u00e7\u00e3o..." style="width:100%;box-sizing:border-box;font-size:13px;line-height:1.5;padding:8px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);resize:none;font-family:inherit"></textarea>';
      html+='<input type="text" id="pend-new-obs-'+rec.id+'" placeholder="Observa\u00e7\u00e3o (opcional)..." style="width:100%;box-sizing:border-box;font-size:12px;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-family:inherit;margin-top:6px">';
      html+='<div style="display:flex;justify-content:flex-end;margin-top:8px">';
      html+='<button class="btn btn-primary btn-sm" onclick="pendSalvarItem('+rec.id+','+p.id+')">Salvar pend\u00eancia</button>';
      html+='</div></div>';
      html+='<div style="display:flex;justify-content:flex-end">';
      html+='<button onclick="pendRemovePat('+rec.id+','+p.id+')" style="background:none;border:1px solid var(--danger);cursor:pointer;font-size:12px;color:var(--danger);padding:4px 10px;border-radius:6px">Retirar da lista</button>';
      html+='</div>';
      html+='</div>';
      html+='</div>';
    });
  }
  c.innerHTML=html;
  }catch(e){c.innerHTML='<div class="empty"><div class="empty-icon">&#9888;</div>Erro ao carregar: '+e.message+'</div>';console.error('pendencias error:',e);}
}

function pendToggle(patId){
  const body=document.getElementById('pend-body-'+patId);
  const arrow=document.getElementById('pend-arrow-'+patId);
  if(!body)return;
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  if(arrow)arrow.style.transform=open?'none':'rotate(90deg)';
}

async function pendToggleSemPend(recId,patId,chk){
  const val=chk.checked;
  await sb.from('planos_pendencias').update({sem_pendencias:val,updated_at:new Date().toISOString()}).eq('id',recId);
  const card=document.getElementById('pend-card-'+patId);
  if(!card)return;
  card.style.border='1.5px solid '+(val?'#22c55e':'var(--border)');
  const header=card.querySelector('div[onclick]');
  if(header)header.style.background=val?'#f0fdf4':'var(--bg-card)';
  const avatar=card.querySelector('.patient-avatar');
  if(avatar)avatar.style.background=val?'#22c55e':'var(--accent)';
  const subEl=card.querySelectorAll('div[onclick] > div > div')[1];
  if(subEl){subEl.style.color=val?'#16a34a':'var(--text-muted)';subEl.style.fontWeight=val?'600':'400';subEl.innerHTML=val?'&#9989; Sem pend\u00eancias':'&#9888;&#65039; Com pend\u00eancias';}
  const lbl=card.querySelector('label');
  if(lbl)lbl.style.color=val?'#16a34a':'var(--text)';
}

async function pendSalvarItem(recId,patId){
  const txtEl=document.getElementById('pend-new-txt-'+recId);
  const obsEl=document.getElementById('pend-new-obs-'+recId);
  const texto=(txtEl&&txtEl.value.trim())||'';
  const obs=(obsEl&&obsEl.value.trim())||'';
  if(!texto){txtEl&&txtEl.focus();return;}
  const {data:nd,error}=await sb.from('planos_pendencias_itens').insert({pend_id:recId,texto,obs,concluida:false,created_at:new Date().toISOString()}).select().single();
  if(error){toast('Erro: '+error.message,'error');return;}
  if(txtEl)txtEl.value='';
  if(obsEl)obsEl.value='';
  const box=document.getElementById('pend-itens-'+recId);
  if(box){
    const div=document.createElement('div');
    div.id='pend-item-'+nd.id;
    div.style.cssText='background:var(--bg-page);border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border)';
    div.innerHTML='<div style="display:flex;align-items:flex-start;gap:8px">'
      +'<input type="checkbox" style="margin-top:3px;width:15px;height:15px;flex-shrink:0;cursor:pointer;accent-color:#22c55e" onchange="pendItemConcluir('+nd.id+','+recId+','+patId+',this)">'

async function renderAvulsas(){
  const[{data:patients},{data:appts},{data:fin}]=await Promise.all([
    sb.from('planos_patients').select('*').order('name'),
    sb.from('planos_appointments').select('*').order('created_at'),
    sb.from('planos_financeiro').select('*').order('created_at')
  ]);
  allPatients=patients||[];
  const avulsas=allPatients.filter(p=>p.plan_type==='Consulta Avulsa');
  let avSort='alpha';
  const c=document.getElementById('main-content');
  function lastConsultDate(patientId,appts){const pa=(appts||[]).filter(a=>a.patient_id===patientId&&a.status==='Compareceu'&&!a.origem_tabela).sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));return pa.length?fmtDate(pa[0].date_str):null;}
  function buildAvulsas(){
    let filtered=avulsas;
    if(avSort==='alpha')filtered=filtered.slice().sort((a,b)=>a.name.localeCompare(b.name));
    else if(avSort==='ultima_asc'){filtered=filtered.slice().sort((a,b)=>{const ua=lastConsultDate(a.id,appts);const ub=lastConsultDate(b.id,appts);return parseDateInt(ua)-parseDateInt(ub);});}
    else if(avSort==='ultima_desc'){filtered=filtered.slice().sort((a,b)=>{const ua=lastConsultDate(a.id,appts)||'00/00/0000';const ub=lastConsultDate(b.id,appts)||'00/00/0000';return parseDateInt(ub)-parseDateInt(ua);});}
    else if(avSort==='gasto_desc'){filtered=filtered.slice().sort((a,b)=>{const fa=(fin||[]).filter(f=>f.patient_id===a.id).reduce((s,f)=>s+(parseFloat(f.valor)||0),0);const fb=(fin||[]).filter(f=>f.patient_id===b.id).reduce((s,f)=>s+(parseFloat(f.valor)||0),0);return fb-fa;});}
    const ativos=avulsas.filter(p=>p.active).length;const inativos=avulsas.filter(p=>!p.active).length;
    const totalGasto=(fin||[]).filter(f=>avulsas.some(p=>p.id===f.patient_id)).reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
    let html='<div class="section-header"><div class="section-title">Consultas Avulsas</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
      +'<select style="padding:5px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;background:var(--white)" onchange="window._avsort=this.value;rebuildAvulsas()">'
      +'<option value="alpha" '+(avSort==='alpha'?'selected':'')+'>A\u2013Z</option>'
      +'<option value="ultima_desc" '+(avSort==='ultima_desc'?'selected':'')+'>Consulta mais recente</option>'
      +'<option value="ultima_asc" '+(avSort==='ultima_asc'?'selected':'')+'>Consulta mais antiga</option>'
      +'<option value="gasto_desc" '+(avSort==='gasto_desc'?'selected':'')+'>Maior gasto total</option>'
      +'</select>'
      +'</div></div>';
    html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">'
      +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+avulsas.length+'</div><div class="dash-card-label">Total Avulsos</div><div class="dash-card-sub">'+ativos+' ativos \u00b7 '+inativos+' inativos</div></div>'
      +'<div class="dash-card" style="cursor:default"><div class="dash-card-num" style="font-size:22px;color:var(--success)">R$ '+(totalGasto/1000).toFixed(1)+'k</div><div class="dash-card-label">Total Gerado</div></div>'
      +'<div class="dash-card" onclick="mainNav(\'patients\')" title="Ver todos os pacientes"><div class="dash-card-num" style="font-size:22px">\ud83d\udc4b</div><div class="dash-card-label">Converter para Plano</div><div class="dash-card-sub">Editar na aba Pacientes</div></div>'
      +'</div>';
    html+='<div style="background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#0369a1">'
      +'\u2139\ufe0f Pacientes com <strong>Consulta Avulsa</strong> aparecem aqui. Quando fecharem um <strong>Plano 3 ou 6 meses</strong>, migram automaticamente para a aba <strong>Programa</strong>.'
      +'</div>';
    if(!filtered.length){html+='<div class="empty"><div class="empty-icon">\ud83d\udc64</div>Nenhum paciente avulso</div>';return html;}
    filtered.forEach(p=>{
      const patAppts=(appts||[]).filter(a=>a.patient_id===p.id&&a.status==='Compareceu'&&!a.origem_tabela).sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
      const lastConsult=patAppts[0];const totalConsultas=patAppts.length;
      const totalPago=(fin||[]).filter(f=>f.patient_id===p.id).reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
      const tags=(p.etiquetas||[]);
      let semContato='';
      if(lastConsult){const d=daysAgo(fmtDate(lastConsult.date_str));if(d!==null&&d>60){const cor=d>120?'var(--danger)':d>60?'var(--warning)':'var(--text-muted)';const bg=d>120?'#fee2e2':d>60?'#fef3c7':'#f3f4f6';semContato='<span style="font-size:11px;font-weight:700;color:'+cor+';background:'+bg+';padding:2px 8px;border-radius:99px">\ud83d\udd54 '+d+'d sem consulta</span>';}}
      else{semContato='<span style="font-size:11px;font-weight:700;color:var(--text-muted);background:#f3f4f6;padding:2px 8px;border-radius:99px">Sem hist\u00f3rico</span>';}
      const statusDot=p.active?'<span style="width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block;flex-shrink:0"></span>':'<span style="width:8px;height:8px;border-radius:50%;background:var(--text-muted);display:inline-block;flex-shrink:0"></span>';
      html+='<div class="prog-row"><div class="prog-header" onclick="toggleProgImpl(this)">'
        +'<div class="patient-avatar" style="width:38px;height:38px;font-size:14px">'+p.name.charAt(0)+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px">'+statusDot+' '+p.name+tags.map(t=>'<span class="etiqueta" style="background:'+(t.color||'#6b7280')+'">'+t.name+'</span>').join('')+'</div>'
        +'<div style="font-size:12px;color:var(--text-muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">'
        +(lastConsult?'<span>\ud83d\udcc5 \u00dalt. consulta: <strong>'+fmtDate(lastConsult.date_str)+'</strong></span>':'<span style="font-style:italic">Sem consulta</span>')
        +'<span style="background:#f3f4f6;padding:2px 8px;border-radius:99px;font-size:11px">'+totalConsultas+' consulta(s)</span>'
        +'<span style="color:var(--success);font-weight:600">R$ '+totalPago.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</span>'+semContato+'</div></div>'
        +'<span style="color:var(--text-muted)">\u25be</span></div>'
        +'<div class="prog-detail">'
        +'<div class="grid-2" style="margin-bottom:12px">'
        +'<div class="card" style="margin:0;padding:12px"><div class="card-title">Total de Consultas</div><div style="font-size:24px;font-weight:700;color:var(--midnight)">'+totalConsultas+'</div></div>'
        +'<div class="card" style="margin:0;padding:12px"><div class="card-title">Total Pago</div><div style="font-size:20px;font-weight:700;color:var(--success)">R$ '+totalPago.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div></div>'
        +'</div>'
        +(patAppts.length?'<div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">\u00daltimas Consultas</div>'+patAppts.slice(0,5).map(a=>'<div style="padding:6px 0;border-bottom:1px solid var(--border-light);font-size:13px;display:flex;justify-content:space-between"><span><strong>'+fmtDate(a.date_str)+'</strong>'+(a.procedimento?' \u00b7 '+a.procedimento:'')+'</span><span class="pill pill-green">'+a.status+'</span></div>').join(''):'<div style="font-size:13px;color:var(--text-muted);font-style:italic">Nenhuma consulta registrada.</div>')
        +'<div style="margin-top:12px;display:flex;gap:8px">'
        +'<button class="btn btn-ghost btn-sm" onclick="openPatient('+p.id+')">Ver Prontu\u00e1rio \u2192</button>'
        +'</div></div></div>';
    });
    return html;
  }
  window._avsort='alpha';
  window.rebuildAvulsas=function(){avSort=window._avsort;c.innerHTML=buildAvulsas();};
  c.innerHTML=buildAvulsas();
}

async function renderFinanceiroGlobal(){
  const c=document.getElementById('main-content');
  // Estado do filtro
  if(!window._fgPeriod)window._fgPeriod='dia';
  if(!window._fgCStart)window._fgCStart=todayISO();
  if(!window._fgCEnd)window._fgCEnd=todayISO();

  function buildFgRange(period){
    const now=new Date();
    let start,end;
    if(period==='dia'){
      const d=window._fgCStart||todayISO();
      const p=d.split('-');
      start=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]),0,0,0);
      end=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]),23,59,59);
    } else if(period==='semana'){
      const day=now.getDay();
      const mon=new Date(now);mon.setDate(now.getDate()-day+(day===0?-6:1));mon.setHours(0,0,0,0);
      const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
      start=mon;end=sun;
    } else if(period==='mes'){
      start=new Date(now.getFullYear(),now.getMonth(),1);
      end=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);
    } else if(period==='custom'){
      const ps=window._fgCStart.split('-');
      const pe=window._fgCEnd.split('-');
      start=new Date(parseInt(ps[0]),parseInt(ps[1])-1,parseInt(ps[2]),0,0,0);
      end=new Date(parseInt(pe[0]),parseInt(pe[1])-1,parseInt(pe[2]),23,59,59);
    }
    return {start,end};
  }

  function fgDateInRange(dateStr,start,end){
    if(!dateStr)return false;
    const iso=dateStr.includes('/')?displayToISO(dateStr):dateStr.split('T')[0];
    const p=iso.split('-');
    const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]),12,0,0);
    return d>=start&&d<=end;
  }

  c.innerHTML='<div class="loading"><div class="spinner"></div>Carregando...</div>';

  const [{data:patients},{data:fin}]=await Promise.all([
    sb.from('planos_patients').select('id,name,plan_type'),
    sb.from('planos_financeiro').select('*').order('data_pagamento',{ascending:false})
  ]);

  const patMap={};(patients||[]).forEach(p=>patMap[p.id]=p);
  const period=window._fgPeriod;
  const {start,end}=buildFgRange(period);

  const finFiltrado=(fin||[]).filter(f=>fgDateInRange(f.data_pagamento,start,end));

  // Totais por forma
  const totalGeral=finFiltrado.reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const totalPix=finFiltrado.filter(f=>f.forma==='PIX').reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const totalCartao=finFiltrado.filter(f=>f.forma==='Cart\u00e3o').reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const totalMisto=finFiltrado.filter(f=>f.forma==='Misto').reduce((s,f)=>s+(parseFloat(f.valor)||0),0);

  // Label do período
  const periodoLabel=period==='dia'?'Dia: '+isoToDisplay(window._fgCStart)
    :period==='semana'?'Semana atual'
    :period==='mes'?'M\u00eas atual'
    :'Per\u00edodo: '+isoToDisplay(window._fgCStart)+' a '+isoToDisplay(window._fgCEnd);

  // Construir HTML
  let html='<div class="section-header"><div class="section-title">\ud83d\udcb0 Financeiro \u2014 Movimenta\u00e7\u00f5es</div>'
    +'<button class="btn btn-ghost btn-sm" onclick="exportFinanceiroCSV()">\ud83d\udcca Exportar CSV</button></div>';

  // Filtros de período
  html+='<div class="card" style="margin-bottom:12px">'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
    +'<button class="btn btn-sm '+(period==='dia'?'btn-primary':'btn-ghost')+'" onclick="window._fgPeriod=\'dia\';window._fgCStart=\''+todayISO()+'\';renderFinanceiroGlobal()">Hoje</button>'
    +'<button class="btn btn-sm '+(period==='semana'?'btn-primary':'btn-ghost')+'" onclick="window._fgPeriod=\'semana\';renderFinanceiroGlobal()">Semana</button>'
    +'<button class="btn btn-sm '+(period==='mes'?'btn-primary':'btn-ghost')+'" onclick="window._fgPeriod=\'mes\';renderFinanceiroGlobal()">M\u00eas</button>'
    +'<button class="btn btn-sm '+(period==='custom'?'btn-primary':'btn-ghost')+'" onclick="window._fgPeriod=\'custom\';document.getElementById(\'fg-custom-wrap\').style.display=\'flex\'">Per\u00edodo livre</button>'
    +'</div>'
    +'<div id="fg-custom-wrap" style="display:'+(period==='custom'?'flex':'none')+';gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px">'
    +'<span style="font-size:12px;font-weight:600;color:var(--text-muted)">De</span>'
    +'<input type="date" id="fg-start" value="'+(window._fgCStart||todayISO())+'" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px"/>'
    +'<span style="font-size:12px;font-weight:600;color:var(--text-muted)">at\u00e9</span>'
    +'<input type="date" id="fg-end" value="'+(window._fgCEnd||todayISO())+'" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px"/>'
    +'<button class="btn btn-accent btn-sm" onclick="window._fgCStart=document.getElementById(\'fg-start\').value;window._fgCEnd=document.getElementById(\'fg-end\').value;renderFinanceiroGlobal()">Filtrar</button>'
    +'</div>'
    +'<div style="margin-top:8px;font-size:12px;color:var(--text-muted)">\ud83d\udcc5 '+periodoLabel+'</div>'
    +'</div>';

  // Cards resumo
  html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
    +'<div class="dash-card" style="cursor:default;border-left:4px solid var(--navy)"><div class="dash-card-num">R$ '+totalGeral.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="dash-card-label">Total Recebido</div><div class="dash-card-sub">'+finFiltrado.length+' pagamento(s)</div></div>'
    +'<div class="dash-card" style="cursor:default;border-left:4px solid #10b981"><div class="dash-card-num" style="font-size:22px">R$ '+totalPix.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="dash-card-label">PIX</div></div>'
    +'<div class="dash-card" style="cursor:default;border-left:4px solid #3b82f6"><div class="dash-card-num" style="font-size:22px">R$ '+totalCartao.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="dash-card-label">Cart\u00e3o</div></div>'
    +'<div class="dash-card" style="cursor:default;border-left:4px solid #f59e0b"><div class="dash-card-num" style="font-size:22px">R$ '+totalMisto.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="dash-card-label">Misto</div></div>'
    +'</div>';

  // Lista de movimentações
  html+='<div class="card"><div class="card-header"><div class="card-title" style="margin:0">Movimenta\u00e7\u00f5es ('+finFiltrado.length+')</div></div>';

  if(!finFiltrado.length){
    html+='<div class="empty"><div class="empty-icon">\ud83d\udcb0</div>Nenhum pagamento neste per\u00edodo</div>';
  } else {
    // Agrupar por data
    const byDate={};
    finFiltrado.forEach(f=>{
      const d=f.data_pagamento||'Sem data';
      if(!byDate[d])byDate[d]=[];
      byDate[d].push(f);
    });
    const sortedDates=Object.keys(byDate).sort((a,b)=>parseDateInt(b)-parseDateInt(a));

    sortedDates.forEach(date=>{
      const items=byDate[date];
      const totalDia=items.reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
      html+='<div style="margin-bottom:4px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg);padding:7px 12px;border-radius:8px;margin-bottom:6px">'
        +'<span style="font-size:12px;font-weight:700;color:var(--midnight)">\ud83d\udcc5 '+fmtDate(date)+'</span>'
        +'<span style="font-size:13px;font-weight:700;color:var(--success)">R$ '+totalDia.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</span>'

        const formaIcon=f.forma==='PIX'?'\ud83d\udca0':f.forma==='Cart\u00e3o'?'\ud83d\udcb3':'\ud83d\udd04';
        const formaCor=f.forma==='PIX'?'#10b981':f.forma==='Cart\u00e3o'?'#3b82f6':'#f59e0b';
        html+='<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--white);border-radius:8px;margin-bottom:6px;border:1px solid var(--border-light)">'
          +'<div style="font-size:18px">'+formaIcon+'</div>'
          +'<div style="flex:1;min-width:0">'
          +'<div style="font-weight:700;font-size:14px">'+patName+'</div>'
          +'<div style="font-size:12px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap">'
          +(patType?'<span style="background:#ede9fe;color:#5b21b6;padding:1px 7px;border-radius:99px;font-size:11px;font-weight:600">'+patType+'</span>':'')
          +(f.observacao?'<span>'+f.observacao+'</span>':'')
          +(f.parcelas?'<span>'+f.parcelas+'</span>':'')
          +'<span class="user-badge">'+( f.registrado_por||'')+'</span>'
          +'</div></div>'
          +'<div style="text-align:right;flex-shrink:0">'
          +'<div style="font-size:16px;font-weight:700;color:var(--midnight)">R$ '+parseFloat(f.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div>'
          +'<div style="font-size:11px;font-weight:700;color:'+formaCor+';margin-top:2px">'+f.forma+'</div>'
          +'</div>'
          +'<button class="btn-icon" onclick="openPatient('+f.patient_id+')" title="Ver prontu\u00e1rio">\ud83d\udcc2</button>'
          +'</div>';
      });
      html+='</div>';
    });
  }
  html+='</div>';
  c.innerHTML=html;

  // Guardar dados para exportar
  window._fgFinData=finFiltrado;
  window._fgPatMap=patMap;
  window._fgPeriodoLabel=periodoLabel;
}

async function exportFinanceiroCSV(){
  const fin=window._fgFinData||[];
  const patMap=window._fgPatMap||{};
  const periodo=window._fgPeriodoLabel||'';
  let csv='MOVIMENTA\u00c7\u00d5ES FINANCEIRAS \u2014 CL\u00cdNICA VITTA\n';
  csv+='Per\u00edodo: '+periodo+'\nGerado em: '+todayStr()+'\n\n';
  csv+='Data,Paciente,Tipo de Plano,Forma de Pagamento,Valor (R$),Parcelas,Observa\u00e7\u00e3o,Registrado por\n';
  fin.sort((a,b)=>parseDateInt(b.data_pagamento)-parseDateInt(a.data_pagamento)).forEach(f=>{
    const pat=patMap[f.patient_id];
    csv+='"'+fmtDate(f.data_pagamento||'')+'","'+(pat?pat.name:'#'+f.patient_id)+'","'+(pat?pat.plan_type||'':'')+'","'+(f.forma||'')+'","'+parseFloat(f.valor||0).toFixed(2)+'","'+(f.parcelas||'')+'","'+(f.observacao||'').replace(/"/g,"'")+'","'+(f.registrado_por||'')+'"\n';
  });
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='financeiro_vitta_'+todayStr().replace(/\//g,'-')+'.csv';a.click();
  toast('CSV exportado!','success');
}

async function savePass(type){

  if(!p1||p1!==p2){toast('Senhas n\u00e3o coincidem','error');return;}
  await sb.from('planos_config').upsert({key:type==='doctor'?'doctor_password':'secretary_password',value:p1});

}

function getMonthRange(period,customStart,customEnd){
  if(period==='custom'&&customStart&&customEnd){
    const ps=customStart.split('-');const pe=customEnd.split('-');
    return{start:new Date(parseInt(ps[0]),parseInt(ps[1])-1,parseInt(ps[2])),end:new Date(parseInt(pe[0]),parseInt(pe[1])-1,parseInt(pe[2]),23,59,59)};
  }
  const now=new Date();let start,end;
  if(period==='mes'){start=new Date(now.getFullYear(),now.getMonth(),1);end=new Date(now.getFullYear(),now.getMonth()+1,0);}
  else if(period==='trimestre'){const q=Math.floor(now.getMonth()/3);start=new Date(now.getFullYear(),q*3,1);end=new Date(now.getFullYear(),q*3+3,0);}
  else if(period==='semestre'){const s=now.getMonth()<6?0:6;start=new Date(now.getFullYear(),s,1);end=new Date(now.getFullYear(),s+6,0);}
  else{start=new Date(now.getFullYear(),0,1);end=new Date(now.getFullYear(),11,31);}
  return{start,end};
}
function dateInRange(dateStr,start,end){
  if(!dateStr)return false;
  const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');
  if(p.length!==3)return false;
  const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));return d>=start&&d<=end;
}

function relToggleRoteiro(key){
  const body=document.getElementById('roteiro-body-'+key);
  const arrow=document.getElementById('roteiro-arrow-'+key);
  if(!body)return;
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  if(arrow)arrow.style.transform=open?'none':'rotate(90deg)';
}

function relEditarRoteiro(key){
  // Make sure body is open first
  const body=document.getElementById('roteiro-body-'+key);
  const arrow=document.getElementById('roteiro-arrow-'+key);
  if(body)body.style.display='block';
  if(arrow)arrow.style.transform='rotate(90deg)';
  document.getElementById('roteiro-view-'+key).style.display='none';
  document.getElementById('roteiro-edit-'+key).style.display='block';
}

function relCancelarRoteiro(key){
  document.getElementById('roteiro-edit-'+key).style.display='none';
  document.getElementById('roteiro-view-'+key).style.display='block';
}

function relSalvarRoteiro(key,patId,etapaId){
  const txt=document.getElementById('roteiro-txt-'+key);
  if(!txt)return;
  const novoTexto=txt.value.trim();
  const tel=(window._relAllPatients||[]).find(p=>p.id===patId);
  const telNum=tel?(tel.telefone||'').replace(/\D/g,''):'';
  if(telNum){
    const waUrl='https://wa.me/55'+telNum+'?text='+encodeURIComponent(novoTexto);
    window.open(waUrl,'_blank');
  }
  relMarcarEtapa(patId,etapaId);
}

function relJourneyFilter(q){
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const box=document.getElementById('rel-journey-content');
  if(!box)return;
  if(!q.trim()){
    // Restore full list
    const step=window._relJourneyStep||'boasvindas';
    const pts=window._relAllPatients||[];
    const rl=window._relResList||[];
    const jn=window._relJornada||[];
    const am=window._relApptsMes||[];
    const ms=window._relMesStr||'';
    const nw=window._relNow||new Date();
    box.innerHTML=relJourneyContent(step,pts,rl,am,ms,nw);
    if(step==='formulario')setTimeout(renderFormBibliotecaCards,50);
    return;
  }
  const all=window._relAllPatients||[];
  const matches=all.filter(p=>norm(p.name).includes(norm(q))||norm(p.cpf||'').includes(norm(q)));
  const step=window._relJourneyStep||'boasvindas';
  const jn=window._relJornada||[];
  const rl=window._relResList||[];
  if(!matches.length){box.innerHTML='<div class="empty" style="padding:16px 0">Nenhum paciente encontrado</div>';return;}
  let h='<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">'+matches.length+' resultado'+(matches.length>1?'s':'')+'</div>';
  matches.forEach(p=>{h+=relJourneyPatCard(p,jn,step);});
  box.innerHTML=h;
}

  var jornada=window._relJornada||[];
  var etapasObrigatorias=['boasvindas','formulario','alinhamento','confirmacao'];
  var etapasLabels={boasvindas:'Boas-vindas',formulario:'Formul\u00e1rio',alinhamento:'Alinhamento 48h',confirmacao:'Confirma\u00e7\u00e3o 24h'};
  var pendentes=etapasObrigatorias.filter(function(e){
    var reg=jornada.find(function(j){return j.patient_id===patId&&j.etapa===e;});
    return !reg||!reg.concluida;
  });
  // 3. Avan\u00e7ar para etapa 'consulta' automaticamente
  await sb.from('planos_jornada').upsert({patient_id:patId,etapa:'consulta',concluida:false,updated_at:new Date().toISOString()},{onConflict:'patient_id,etapa'});
  // 4. Marcar todas etapas anteriores como conclu\u00eddas (para sumir das listas)
  var upserts=etapasObrigatorias.map(function(e){
    return sb.from('planos_jornada').upsert({patient_id:patId,etapa:e,concluida:true,updated_at:new Date().toISOString()},{onConflict:'patient_id,etapa'});
  });
  await Promise.all(upserts);
  closeModal('modal-generic');
  // 5. Mostrar alerta se houver etapas n\u00e3o feitas
  if(pendentes.length){
    var labels=pendentes.map(function(e){return etapasLabels[e];}).join(', ');
    var html='<div style="padding:4px">';
    html+='<div style="font-size:16px;font-weight:700;margin-bottom:12px">\u26a0\ufe0f Etapas n\u00e3o conclu\u00eddas</div>';
    html+='<div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">O pagamento foi registrado e o paciente avan\u00e7ou para a etapa <strong>Consulta</strong>, mas as seguintes etapas n\u00e3o foram feitas:</div>';
    html+='<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px">';
    pendentes.forEach(function(e){
      html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff8ed;border:1.5px solid #f0a500;border-radius:10px">';
      html+='<span style="font-size:16px">\u26a0\ufe0f</span>';
      html+='<span style="font-size:13px;font-weight:600;color:var(--text)">'+etapasLabels[e]+'</span>';
      html+='<span style="font-size:11px;color:var(--text-muted);margin-left:auto">N\u00e3o foi feita</span>';
      html+='</div>';
    });
    html+='</div>';
    html+='<div style="display:flex;justify-content:flex-end">';
    html+='<button onclick="closeModal(\'modal-generic\');renderRelacionamento(_relRelTab)" class="btn btn-primary">Entendido</button>';
    html+='</div></div>';
    document.getElementById('modal-generic-content').innerHTML=html;
    openModal('modal-generic');
  } else {
    toast('Pagamento registrado \u2014 paciente avan\u00e7ado para Consulta','success');
    renderRelacionamento(_relRelTab);
  }
}

async function relBulkMarcarFeito(){
  var cbs=document.querySelectorAll('.rel-bulk-cb:checked');
  if(!cbs.length)return;
  var bar=document.getElementById('rel-bulk-bar');
  if(bar){var btn=bar.querySelector('button');if(btn){btn.textContent='Salvando...';btn.disabled=true;}}
  var promises=[];
  cbs.forEach(function(cb){
    promises.push(relMarcarEtapa(parseInt(cb.dataset.patId),cb.dataset.etapa,true));
  });
  await Promise.all(promises);
  relBulkClear();
  renderRelacionamento(_relRelTab);
  toast(cbs.length+' paciente'+(cbs.length>1?'s':'')+' marcado'+(cbs.length>1?'s':'')+' como feito','success');
}

async function relMarcarEtapa(patId,etapaId,silent){
  await sb.from('planos_jornada').upsert({patient_id:patId,etapa:etapaId,concluida:true,updated_at:new Date().toISOString()},{onConflict:'patient_id,etapa'});
  // Ao concluir Confirma\u00e7\u00e3o, avan\u00e7ar automaticamente para Consulta
  if(etapaId==='confirmacao'){
    await sb.from('planos_jornada').upsert({patient_id:patId,etapa:'consulta',concluida:false,updated_at:new Date().toISOString()},{onConflict:'patient_id,etapa'});
  }
  if(!silent)renderRelacionamento(_relRelTab);
}

async function relEncerrarConsulta(patId,patName){
  if(!confirm('Encerrar o ciclo de '+patName+'?\nEle sair\u00e1 da jornada do m\u00eas.'))return;

}

async function relDesmarcarEtapa(patId,etapaId){

}

  var allPats=(window._relAllPatients||[]).filter(function(p){return p.active;}).sort(function(a,b){return a.name.localeCompare(b.name);});
  var html='<div style="padding:4px">';
  html+='<div style="font-size:16px;font-weight:700;margin-bottom:6px">Incluir paciente manualmente</div>';

  html+='<input id="incman-busca" type="text" placeholder="Buscar paciente por nome..." oninput="filtrarIncluirManual()" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);box-sizing:border-box;margin-bottom:12px">';
  html+='<div id="incman-lista" style="max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:6px">';
  allPats.slice(0,30).forEach(function(p){
    html+='<div class="incman-item" data-name="'+escHtml(p.name).toLowerCase()+'" onclick="confirmarIncluirManual('+p.id+',\''+step+'\')" style="padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">'+escHtml(p.name)+'</div>';
  });
  html+='</div>';
  html+='<div style="display:flex;justify-content:flex-end;margin-top:16px">';
  html+='<button onclick="closeModal(\'modal-generic\')" style="padding:9px 18px;border:1.5px solid var(--border);border-radius:8px;background:none;font-size:13px;font-family:var(--font);cursor:pointer">Cancelar</button>';
  html+='</div></div>';

}

function filtrarIncluirManual(){
  var q=document.getElementById('incman-busca').value.toLowerCase();
  document.querySelectorAll('.incman-item').forEach(function(el){
    el.style.display=el.dataset.name.indexOf(q)!==-1?'block':'none';
  });
}

async function confirmarIncluirManual(patId,step){
  await sb.from('planos_jornada').upsert({patient_id:patId,etapa:'_manual_'+step,concluida:false,updated_at:new Date().toISOString()},{onConflict:'patient_id,etapa'});
  closeModal('modal-generic');
  toast('Paciente incluído na etapa!','success');
  renderRelacionamento(_relRelTab);
}

function relIsPrimeiraVez(patId){
  var _compList=window._relComparecimentos||[];
  var _soroList=window._relSoroHist||[];
  var _implList=window._relImplHist||[];
  var _apptsMes=window._relApptsMes||[];
  var _apptAtualDates=_apptsMes.filter(function(a){return a.patient_id===patId;}).map(function(a){return a.date_str;});
  var _compAnteriores=_compList.filter(function(c){
    if(c.patient_id!==patId)return false;
    return !_apptAtualDates.includes(c.date_str);
  });
  var _soroAnteriores=_soroList.filter(function(s){return s.patient_id===patId;});
  var _implAnteriores=_implList.filter(function(i){return i.patient_id===patId;});
  return _compAnteriores.length===0&&_soroAnteriores.length===0&&_implAnteriores.length===0;
}

function relJourneyContent(step,patients,resList,apptsMes,mesStr,now){
  const all=patients||[];
  const jornada=window._relJornada||[];
  // Last 20 patients this month for all steps
  // Use _preconsulta_ativo flag (set when patient is scheduled)
  // Fallback: also include last 20 from this month if no jornada records yet
  const preAtivos=(jornada||[]).filter(j=>j.etapa==='_preconsulta_ativo'&&!j.concluida).map(j=>j.patient_id);
  const mesAppts=(apptsMes||[]).filter(a=>{
    if(!a.date_str)return false;
    const p=a.date_str.split('/');if(p.length!==3)return false;
    return p[1]===mesStr&&p[2]===now.getFullYear().toString();
  });
  const mesIds=[...new Set(mesAppts.map(a=>a.patient_id))];
  const allPreIds=[...new Set([...preAtivos,...mesIds])].slice(0,30);
  const recentPats=all.filter(p=>p.active&&allPreIds.includes(p.id))
    .sort((a,b)=>allPreIds.indexOf(a.id)-allPreIds.indexOf(b.id));
  const stepInfo={
    boasvindas:{title:'Boas-vindas',sub:'Enviar guia de boas-vindas e link do formulario no ato do agendamento',moment:'No ato do agendamento'},
    formulario:{title:'Envio de Formul\u00e1rio',sub:'Selecione e envie o formul\u00e1rio mais adequado ao paciente',moment:'3 a 4 dias antes'},
    alinhamento:{title:'Alinhamento 48h',sub:'Check-in ativo — o medico ja esta estudando o caso do paciente',moment:'48 horas antes'},
    confirmacao:{title:'Confirma\u00e7\u00e3o 24h',sub:'Confirmacao estrategica e alinhamento de dados para faturamento\/reembolso',moment:'24 horas antes'},
    consulta:{title:'Dia da Consulta',sub:'Paciente chega preparado, engajado e ciente do valor do servico',moment:'Dia da consulta'}
  }[step]||{title:step,sub:'',moment:''};
  let h='<div style="margin-bottom:16px">';
  h+='<div style="font-size:14px;font-weight:700;color:var(--text)">'+stepInfo.title+'</div>';
  h+='<div style="font-size:12px;color:var(--text-muted);margin-top:3px">'+stepInfo.sub+'</div>';
  h+='<div style="font-size:11px;font-weight:600;color:var(--tidal);margin-top:4px;text-transform:uppercase;letter-spacing:.5px">'+stepInfo.moment+'</div>';
  if(step==='formulario'){
    h+='<button onclick="abrirGerenciarFormularios()" style="font-size:12px;font-weight:600;color:var(--tidal);background:none;border:1.5px solid var(--tidal);border-radius:8px;padding:5px 14px;cursor:pointer;margin-top:10px">&#9881; Gerenciar Formul\u00e1rios</button>';
  }
  h+='</div>';
  if(step==='formulario'){
    h+='<div id="form-biblioteca-preview" style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Formul\u00e1rios dispon\u00edveis</div>';
    h+='<div id="form-biblioteca-cards" style="display:flex;flex-direction:column;gap:6px"><div style="font-size:12px;color:var(--text-muted)">Carregando...</div></div>';
    h+='</div>';
  }
  if(step==='consulta'){
    var _finMes=window._relFinMes||[];
    var _jornada=window._relJornada||[];
    // Pacientes que avanc\u00e7aram para consulta (tem registro na jornada etapa=consulta)
    var _encerrados=new Set(_jornada.filter(function(j){return j.etapa==='_encerrado'&&j.concluida;}).map(function(j){return j.patient_id;}));
    var _prontos=recentPats.filter(function(p){
      return !_encerrados.has(p.id)&&_jornada.some(function(j){return j.patient_id===p.id&&j.etapa==='consulta';});
    });
    // Conta comparecidos (marcou compareceu mas ainda n\u00e3o encerrou)
    var _comparecidos=_prontos.filter(function(p){
      return _jornada.some(function(j){return j.patient_id===p.id&&j.etapa==='consulta'&&j.concluida;});
    });
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">';
    h+='<span style="font-size:12px;color:var(--text-muted)">'+_prontos.length+' prontos para consulta</span>';
    if(_comparecidos.length)h+='<span style="background:var(--success);color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700">'+_comparecidos.length+' compareceram</span>';
    var _aguardando=_prontos.length-_comparecidos.length;
    if(_aguardando>0)h+='<span style="background:#3b82f6;color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700">'+_aguardando+' aguardando</span>';
    h+='</div>';
    if(!_prontos.length){
      h+='<div class="card" style="padding:24px;text-align:center">';
      h+='<div style="font-size:36px;margin-bottom:12px">\ud83d\udcc5</div>';
      h+='<div style="font-size:14px;font-weight:600;color:var(--text-muted)">Nenhum paciente pronto ainda.</div>';
      h+='<div style="font-size:12px;color:var(--text-muted);margin-top:6px">Pacientes avan\u00e7am aqui automaticamente ao registrar pagamento.</div>';
      h+='</div>';
    } else {
      // Sort: nao compareceu primeiro
      var _sortedProntos=[..._prontos].sort(function(a,b){
        var ca=_jornada.some(function(j){return j.patient_id===a.id&&j.etapa==='consulta'&&j.concluida;});
        var cb=_jornada.some(function(j){return j.patient_id===b.id&&j.etapa==='consulta'&&j.concluida;});
        return ca-cb;
      });
      _sortedProntos.forEach(function(p){
        var _pago=_finMes.find(function(f){return f.patient_id===p.id;});
        var _jRec=_jornada.find(function(j){return j.patient_id===p.id&&j.etapa==='consulta';});
        var _compareceu=_jRec&&_jRec.concluida;
        var _bgColor=_compareceu?'#f0faf9':(_pago?'#f0f7ff':'var(--white)');
        var _borderColor=_compareceu?'var(--success)':(_pago?'#3b82f6':'var(--border)');
        h+='<div class="card" style="margin-bottom:8px;padding:12px 16px;border:1.5px solid '+_borderColor+';background:'+_bgColor+'">';
        h+='<div style="display:flex;align-items:center;gap:12px">';
        h+='<div class="patient-avatar" style="width:34px;height:34px;font-size:14px;background:'+(_compareceu?'var(--success)':(_pago?'#3b82f6':'var(--deep-ocean)'))+'">'+p.name.charAt(0)+'</div>';
        h+='<div style="flex:1">';
        h+='<div style="display:flex;align-items:center;gap:8px">';
        h+='<span style="font-weight:600;font-size:13px">'+escHtml(p.name)+'</span>';
        if(_pago)h+='<span style="font-size:10px;font-weight:700;background:#dbeafe;color:#2563eb;border-radius:12px;padding:2px 8px">&#128179; Pago R$'+(parseFloat(_pago.valor)||0).toLocaleString('pt-BR',{minimumFractionDigits:2})+'</span>';
        h+='</div>';
        h+='<div style="font-size:11px;color:var(--text-muted);margin-top:2px">'+(p.telefone||'Sem telefone')+'</div>';
        h+='<div style="font-size:11px;margin-top:2px;color:'+(_compareceu?'var(--success)':'#3b82f6')+'">'+(_compareceu?'\u2705 Compareceu':'\ud83d\udd51 Aguardando consulta')+'</div>';
        h+='</div>';
        h+='<div style="display:flex;gap:6px;flex-shrink:0">';
        if(!_compareceu){
          h+='<button class="btn btn-ghost btn-sm" onclick="relMarcarEtapa('+p.id+',\'consulta\')" style="font-size:11px">Marcar compareceu</button>';
        } else {
          h+='<button onclick="relEncerrarConsulta('+p.id+',\''+escHtml(p.name)+'\')" style="font-size:11px;font-weight:700;background:var(--success);color:#fff;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-family:var(--font)">&#10003; Encerrar consulta</button>';
          h+='<button class="btn btn-ghost btn-sm" onclick="relDesmarcarEtapa('+p.id+',\'consulta\')" style="font-size:11px;color:var(--text-muted)">Desfazer</button>';
        }
        h+='</div></div></div>';
      });
    }
    return h;
  }
  // Count completed for this step
  const concluidosCount=recentPats.filter(p=>(jornada||[]).some(j=>j.patient_id===p.id&&j.etapa===step&&j.concluida)).length;
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">';
  h+='<span style="font-size:12px;color:var(--text-muted)">'+recentPats.length+' pacientes neste mes</span>';
  h+='<span style="background:var(--success);color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700">'+concluidosCount+' feitos</span>';
  if(concluidosCount<recentPats.length)h+='<span style="background:#ef4444;color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700">'+(recentPats.length-concluidosCount)+' pendentes</span>';
  h+='<div style="flex:1"></div>';
  if(step!=='consulta')h+='<button onclick="abrirIncluirManual(\''+step+'\')" style="font-size:11px;font-weight:600;color:var(--tidal);background:none;border:1.5px solid var(--tidal);border-radius:8px;padding:5px 12px;cursor:pointer;font-family:var(--font)">+ Incluir paciente manualmente</button>';
  h+='</div>';
  // Manual inclusions for this step (recorrentes incluidos a mao)
  var _manuais=(jornada||[]).filter(j=>j.etapa==='_manual_'+step&&!j.concluida).map(j=>j.patient_id);
  if(!recentPats.length&&!_manuais.length){
    h+='<div class="empty"><div class="empty-icon">\uD83D\uDCC5</div>Nenhum paciente atendido este mes. Use a busca acima.</div>';
  } else {
    // Only show pending (not yet concluded for this step)
    let sorted=[...recentPats].filter(p=>!(jornada||[]).some(j=>j.patient_id===p.id&&j.etapa===step&&j.concluida));
    // Jornada pre-consulta e exclusiva para pacientes de primeira vez (exceto inclusoes manuais)
    if(step!=='consulta')sorted=sorted.filter(p=>relIsPrimeiraVez(p.id)||_manuais.includes(p.id));
    if(!sorted.length){
      h+='<div class="empty"><div class="empty-icon">\u2705</div>Todos os pacientes desta etapa j\u00e1 foram conclu\u00eddos.</div>';
    } else {
      sorted.forEach(p=>{h+=relJourneyPatCard(p,jornada,step);});
    }
  }
  return h;
}


function relMostrarEnviados(){
  _relRelTab='pre';
  const box=document.getElementById('rel-journey-content');
  const all=window._relAllPatients||allPatients||[];
  const resList=window._relResList||[];
  if(!box){renderRelacionamento('pre');setTimeout(relMostrarEnviados,500);return;}
  const enviados=resList.filter(r=>r.status==='enviado'||r.status==='respondido');
  const pats=all.filter(p=>enviados.some(r=>r.patient_id===p.id));
  if(!pats.length){box.innerHTML='<div class="empty" style="padding:16px 0">Nenhum formul\u00e1rio enviado ainda</div>';return;}
  box.innerHTML='<div style="font-size:11px;color:var(--tidal);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">'
    +pats.length+' paciente'+(pats.length>1?'s':'')+' com formul\u00e1rio enviado</div>'
    +pats.map(p=>relPatRow(p,resList)).join('');
  box.scrollIntoView({behavior:'smooth',block:'start'});
}

function relMostrarRespondidos(){
  _relRelTab='pre';
  const box=document.getElementById('rel-journey-content');
  const search=document.getElementById('rel-journey-search');
  const all=window._relAllPatients||allPatients||[];
  const resList=window._relResList||[];
  if(!box){
    // Tab not rendered yet - re-render with filter
    renderRelacionamento('pre');
    setTimeout(relMostrarRespondidos,500);
    return;
  }
  const respondidos=resList.filter(r=>r.status==='respondido');
  const pats=all.filter(p=>respondidos.some(r=>r.patient_id===p.id));
  if(search)search.value='';
  if(!pats.length){
    box.innerHTML='<div class="empty" style="padding:16px 0">Nenhum paciente respondeu ainda</div>';
    return;

    +pats.length+' paciente'+(pats.length>1?'s':'')+' responderam o formul\u00e1rio</div>'

}

function relFilterPats(q){
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const box=document.getElementById('rel-pat-list');
  if(!box)return;
  // Use both sources - window store and global allPatients
  const all=(window._relAllPatients&&window._relAllPatients.length?window._relAllPatients:allPatients)||[];
  const resList=window._relResList||[];
  if(!q.trim()){
    box.innerHTML='<div style="font-size:12px;color:var(--text-muted);padding:8px 0">Digite um nome para buscar em todos os pacientes cadastrados.</div>';
    return;
  }
  const matches=all.filter(p=>norm(p.name).includes(norm(q))||norm(p.cpf||'').includes(norm(q))).slice(0,20);
  if(!matches.length){box.innerHTML='<div class="empty" style="padding:16px 0">Nenhum paciente encontrado para "'+escHtml(q)+'"</div>';return;}
  box.innerHTML='<div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">'+matches.length+' resultado'+(matches.length>1?'s':'')+'</div>'
    +matches.map(p=>relPatRow(p,resList)).join('');
}

function gerarInterpretacaoClinica(eixos,labels,scores){
  const implicacoes={
    estomago:['hipocloridria, gastrite ou disbiose gastrica com impacto na digestao de proteinas e absorcao de micronutrientes','disfuncao digestiva moderada, possivelmente associada a habitos alimentares ou estresse cronico','leve alteracao na funcao gastrica, com digestao preservada na maioria das situacoes'],
    intestino:['disbiose intestinal significativa, permeabilidade intestinal aumentada e possivel sindrome do intestino irritavel, com impacto sistemico relevante','alteracao da microbiota com repercussao inflamatoria e possivel comprometimento da imunidade mucosa','transito intestinal levemente alterado, com microbiota possivelmente em desequilibrio'],
    figado:['sobrecarga hepatica com possivel esteatose, reducao da depuracao de toxinas e comprometimento do metabolismo hormonal e lipidico','funcao hepatica moderadamente sobrecarregada, possivelmente por dieta, alcool ou estresse oxidativo','funcao hepatica levemente comprometida, requerendo suporte nutricional e reducao de carga toxica'],
    hormonios:['desregulacao hormonal importante com impacto no ciclo menstrual, peso, sono e libido, sugestivo de resistencia insulinica ou disfuncao tireoidiana','desequilibrio hormonal moderado com sintomas de hipoestrogenismo, dominancia estrogenica ou fadiga adrenal','flutuacoes hormonais leves, possivelmente relacionadas a estresse ou fase do ciclo'],
    cerebro:['comprometimento significativo do eixo intestino-cerebro, com brain fog, ansiedade ou depressao como manifestacoes provaveis de neuroinflamacao','disfuncao neurocomportamental moderada com impacto na concentracao, humor e energia ao longo do dia','flutuacoes leves de energia mental e humor, responsivas a melhora do sono e reducao do estresse']
  };
  const pares={
    'estomago-intestino':'A disfuncao gastrica e intestinal frequentemente coexistem, formando um ciclo de disbiose e ma-digestao que perpetua a inflamacao de baixo grau.',
    'intestino-cerebro':'O eixo intestino-cerebro esta comprometido. A disbiose alimenta neuroinflamacao, ansiedade e brain fog atraves do nervo vago e producao de neurotransmissores.',
    'intestino-hormonios':'O intestino tem papel central no metabolismo estrogenico via beta-glicuronidase. A disbiose pode perpetuar o desequilibrio hormonal.',
    'figado-hormonios':'O figado e essencial para a depuracao hormonal. Sua sobrecarga compromete o metabolismo de estrogenios, cortisol e hormonios tireoidianos.',
    'figado-intestino':'Figado e intestino funcionam em circuito fechado via circulacao enterohepatica. A sobrecarga de um retroalimenta o outro.',
    'hormonios-cerebro':'O desequilibrio hormonal tem impacto direto na funcao cognitiva, humor e ciclo sono-vigilia, explicando os sintomas neurologicos relatados.',
    'estomago-figado':'A hipocloridria reduz a absorcao de aminoacidos necessarios a detoxificacao hepatica, sobrecarregando ainda mais o figado.',
    'estomago-hormonios':'A disfuncao gastrica compromete a absorcao de zinco, magnesio e vitamina B6, cofatores essenciais para a sintese hormonal.',
    'estomago-cerebro':'A ma-digestao de proteinas reduz a disponibilidade de triptofano e tirosina, precursores de serotonina e dopamina.',
    'figado-cerebro':'A sobrecarga hepatica eleva toxinas sistemicas com impacto direto na funcao cognitiva e humor.'
  };
  const prioridades={
    estomago:'Investigar hipocloridria, uso de IBP e habitos alimentares. Considerar teste de HCl, probioticos gastricos e suporte enzimatico.',
    intestino:'Avaliar microbiota (calprotectina, zonulina). Protocolo de restauracao intestinal com prebioticos, probioticos e L-glutamina.',
    figado:'Solicitar perfil hepatico completo, GGT e ferritina. Suporte com silimarina, N-acetilcisteina e dieta anti-inflamatoria.',
    hormonios:'Perfil hormonal completo (estrogenios, progesterona, cortisol, TSH, T3L, T4L). Avaliar ciclo circadiano do cortisol.',
    cerebro:'Avaliar estresse cronico, qualidade do sono e marcadores inflamatorios. Suporte com magnesio, ashwagandha e otimizacao do sono.'
  };
  const sorted=eixos.map((e,i)=>({e,label:labels[i],val:scores[i]})).sort((a,b)=>a.val-b.val);
  const pior=sorted[0];const segundo=sorted[1];const melhor=sorted[sorted.length-1];
  const getImpl=(e,val)=>{const arr=implicacoes[e]||['comprometimento funcional'];return val<4?arr[0]:val<6?arr[1]:arr[2];};
  let t='';
  t+='Eixo mais comprometido: '+pior.label+' ('+pior.val.toFixed(1)+'/10)\n';
  t+='O eixo de '+pior.label.toLowerCase()+' apresenta o maior grau de comprometimento, sugestivo de '+getImpl(pior.e,pior.val)+'. Este achado merece atencao prioritaria na consulta.\n\n';
  if(segundo.val<7){
    t+='Relacao com o eixo de '+segundo.label.toLowerCase()+' ('+segundo.val.toFixed(1)+'/10):\n';
    const chave=pior.e+'-'+segundo.e;const chave2=segundo.e+'-'+pior.e;
    t+=(pares[chave]||pares[chave2]||'A inter-relacao entre esses dois eixos amplifica o impacto clinico e deve ser abordada de forma integrada.')+'\n\n';
  }
  t+='Prioridades para a consulta:\n';
  sorted.slice(0,3).forEach(item=>{if(item.val<7)t+='- '+prioridades[item.e]+'\n';});
  if(melhor.val>=8)t+='\nPonto positivo: o eixo de '+melhor.label.toLowerCase()+' apresenta boa reserva funcional ('+melhor.val.toFixed(1)+'/10), favorecendo a resposta ao tratamento integrado.';
  return t;
}

  labels.forEach((lb,i)=>{const a=-Math.PI/2+(2*Math.PI*i/5);const rr=R+24;const x=(cx+rr*Math.cos(a)).toFixed(1);const y=(cy+rr*Math.sin(a)).toFixed(1);const anchor=Math.cos(a)>0.1?'start':Math.cos(a)<-0.1?'end':'middle';labelsSVG+='<text x="'+x+'" y="'+y+'" text-anchor="'+anchor+'" dominant-baseline="middle" font-size="11" font-family="DM Sans,sans-serif" fill="#5A7381">'+lb+' '+scores[i].toFixed(1)+'</text>';});

    +'@media print{body{padding:20px}}'

  ]);

  const score=sc[0];
  const eixos=['estomago','intestino','figado','hormonios','cerebro'];
  const labels=['Est\u00f4mago','Intestino','F\u00edgado','Horm\u00f4nios','C\u00e9rebro'];
  const scores2=eixos.map(e=>score['score_'+e]||0);

  html+='<canvas id="pentagon-canvas" width="280" height="280" style="display:block;margin:0 auto 16px"></canvas>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">';
  eixos.forEach((e,i)=>{
    const val=score['score_'+e]||0;
    const color=val>=7?'var(--success)':val>=4?'var(--warning)':'var(--danger)';
    html+='<div style="background:var(--bg-page);border-radius:8px;padding:10px 12px;border:1px solid var(--border)">';
    html+='<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">'+labels[i]+'</div>';
