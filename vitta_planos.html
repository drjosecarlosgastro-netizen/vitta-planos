async function renderFinanceiroGlobal(){
  const c=document.getElementById('main-content');
  // Estado do filtro
  if(!window._fgPeriod)window._fgPeriod='dia';
  if(!window._fgCStart)window._fgCStart=todayISO();
  if(!window._fgCEnd)window._fgCEnd=todayISO();

  function buildFgRange(period){
    const now=new Date();
    let start,end;
    if(period==='dia'){
      const d=window._fgCStart||todayISO();
      const p=d.split('-');
      start=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]),0,0,0);
      end=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]),23,59,59);
    } else if(period==='semana'){
      const day=now.getDay();
      const mon=new Date(now);mon.setDate(now.getDate()-day+(day===0?-6:1));mon.setHours(0,0,0,0);
      const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
      start=mon;end=sun;
    } else if(period==='mes'){
      start=new Date(now.getFullYear(),now.getMonth(),1);
      end=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);
    } else if(period==='custom'){
      const ps=window._fgCStart.split('-');
      const pe=window._fgCEnd.split('-');
      start=new Date(parseInt(ps[0]),parseInt(ps[1])-1,parseInt(ps[2]),0,0,0);
      end=new Date(parseInt(pe[0]),parseInt(pe[1])-1,parseInt(pe[2]),23,59,59);
    }
    return {start,end};
  }

  function fgDateInRange(dateStr,start,end){
    if(!dateStr)return false;
    const iso=dateStr.includes('/')?displayToISO(dateStr):dateStr.split('T')[0];
    const p=iso.split('-');
    const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]),12,0,0);
    return d>=start&&d<=end;
  }

  c.innerHTML='<div class="loading"><div class="spinner"></div>Carregando...</div>';

  const [{data:patients},{data:fin}]=await Promise.all([
    sb.from('planos_patients').select('id,name,plan_type'),
    sb.from('planos_financeiro').select('*').order('data_pagamento',{ascending:false})
  ]);

  const patMap={};(patients||[]).forEach(p=>patMap[p.id]=p);
  const period=window._fgPeriod;
  const {start,end}=buildFgRange(period);

  const finFiltrado=(fin||[]).filter(f=>fgDateInRange(f.data_pagamento,start,end));

  // Totais por forma
  const totalGeral=finFiltrado.reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const totalPix=finFiltrado.filter(f=>f.forma==='PIX').reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const totalCartao=finFiltrado.filter(f=>f.forma==='Cart\u00e3o').reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const totalMisto=finFiltrado.filter(f=>f.forma==='Misto').reduce((s,f)=>s+(parseFloat(f.valor)||0),0);

  // Label do período
  const periodoLabel=period==='dia'?'Dia: '+isoToDisplay(window._fgCStart)
    :period==='semana'?'Semana atual'
    :period==='mes'?'M\u00eas atual'
    :'Per\u00edodo: '+isoToDisplay(window._fgCStart)+' a '+isoToDisplay(window._fgCEnd);

  // Construir HTML
  let html='<div class="section-header"><div class="section-title">\ud83d\udcb0 Financeiro \u2014 Movimenta\u00e7\u00f5es</div>'
    +'<button class="btn btn-ghost btn-sm" onclick="exportFinanceiroCSV()">\ud83d\udcca Exportar CSV</button></div>';

  // Filtros de período
  html+='<div class="card" style="margin-bottom:12px">'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
    +'<button class="btn btn-sm '+(period==='dia'?'btn-primary':'btn-ghost')+'" onclick="window._fgPeriod=\'dia\';window._fgCStart=\''+todayISO()+'\';renderFinanceiroGlobal()">Hoje</button>'
    +'<button class="btn btn-sm '+(period==='semana'?'btn-primary':'btn-ghost')+'" onclick="window._fgPeriod=\'semana\';renderFinanceiroGlobal()">Semana</button>'
    +'<button class="btn btn-sm '+(period==='mes'?'btn-primary':'btn-ghost')+'" onclick="window._fgPeriod=\'mes\';renderFinanceiroGlobal()">M\u00eas</button>'
    +'<button class="btn btn-sm '+(period==='custom'?'btn-primary':'btn-ghost')+'" onclick="window._fgPeriod=\'custom\';document.getElementById(\'fg-custom-wrap\').style.display=\'flex\'">Per\u00edodo livre</button>'
    +'</div>'
    +'<div id="fg-custom-wrap" style="display:'+(period==='custom'?'flex':'none')+';gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px">'
    +'<span style="font-size:12px;font-weight:600;color:var(--text-muted)">De</span>'
    +'<input type="date" id="fg-start" value="'+(window._fgCStart||todayISO())+'" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px"/>'
    +'<span style="font-size:12px;font-weight:600;color:var(--text-muted)">at\u00e9</span>'
    +'<input type="date" id="fg-end" value="'+(window._fgCEnd||todayISO())+'" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px"/>'
    +'<button class="btn btn-accent btn-sm" onclick="window._fgCStart=document.getElementById(\'fg-start\').value;window._fgCEnd=document.getElementById(\'fg-end\').value;renderFinanceiroGlobal()">Filtrar</button>'
    +'</div>'
    +'<div style="margin-top:8px;font-size:12px;color:var(--text-muted)">\ud83d\udcc5 '+periodoLabel+'</div>'
    +'</div>';

  // Cards resumo
  html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
    +'<div class="dash-card" style="cursor:default;border-left:4px solid var(--navy)"><div class="dash-card-num">R$ '+totalGeral.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="dash-card-label">Total Recebido</div><div class="dash-card-sub">'+finFiltrado.length+' pagamento(s)</div></div>'
    +'<div class="dash-card" style="cursor:default;border-left:4px solid #10b981"><div class="dash-card-num" style="font-size:22px">R$ '+totalPix.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="dash-card-label">PIX</div></div>'
    +'<div class="dash-card" style="cursor:default;border-left:4px solid #3b82f6"><div class="dash-card-num" style="font-size:22px">R$ '+totalCartao.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="dash-card-label">Cart\u00e3o</div></div>'
    +'<div class="dash-card" style="cursor:default;border-left:4px solid #f59e0b"><div class="dash-card-num" style="font-size:22px">R$ '+totalMisto.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="dash-card-label">Misto</div></div>'
    +'</div>';

  // Lista de movimentações
  html+='<div class="card"><div class="card-header"><div class="card-title" style="margin:0">Movimenta\u00e7\u00f5es ('+finFiltrado.length+')</div></div>';

  if(!finFiltrado.length){
    html+='<div class="empty"><div class="empty-icon">\ud83d\udcb0</div>Nenhum pagamento neste per\u00edodo</div>';
  } else {
    // Agrupar por data
    const byDate={};
    finFiltrado.forEach(f=>{
      const d=f.data_pagamento||'Sem data';
      if(!byDate[d])byDate[d]=[];
      byDate[d].push(f);
    });
    const sortedDates=Object.keys(byDate).sort((a,b)=>parseDateInt(b)-parseDateInt(a));

    sortedDates.forEach(date=>{
      const items=byDate[date];
      const totalDia=items.reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
      html+='<div style="margin-bottom:4px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg);padding:7px 12px;border-radius:8px;margin-bottom:6px">'
        +'<span style="font-size:12px;font-weight:700;color:var(--navy)">\ud83d\udcc5 '+fmtDate(date)+'</span>'
        +'<span style="font-size:13px;font-weight:700;color:var(--success)">R$ '+totalDia.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</span>'
        +'</div>';

      items.forEach(f=>{
        const pat=patMap[f.patient_id];
        const patName=pat?pat.name:'Paciente #'+f.patient_id;
        const patType=pat?pat.plan_type:'';
        const formaIcon=f.forma==='PIX'?'\ud83d\udca0':f.forma==='Cart\u00e3o'?'\ud83d\udcb3':'\ud83d\udd04';
        const formaCor=f.forma==='PIX'?'#10b981':f.forma==='Cart\u00e3o'?'#3b82f6':'#f59e0b';
        html+='<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--white);border-radius:8px;margin-bottom:6px;border:1px solid var(--border-light)">'
          +'<div style="font-size:18px">'+formaIcon+'</div>'
          +'<div style="flex:1;min-width:0">'
          +'<div style="font-weight:700;font-size:14px">'+patName+'</div>'
          +'<div style="font-size:12px;color:var(--text-muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap">'
          +(patType?'<span style="background:#ede9fe;color:#5b21b6;padding:1px 7px;border-radius:99px;font-size:11px;font-weight:600">'+patType+'</span>':'')
          +(f.observacao?'<span>'+f.observacao+'</span>':'')
          +(f.parcelas?'<span>'+f.parcelas+'</span>':'')
          +'<span class="user-badge">'+( f.registrado_por||'')+'</span>'
          +'</div></div>'
          +'<div style="text-align:right;flex-shrink:0">'
          +'<div style="font-size:16px;font-weight:700;color:var(--navy)">R$ '+parseFloat(f.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div>'
          +'<div style="font-size:11px;font-weight:700;color:'+formaCor+';margin-top:2px">'+f.forma+'</div>'
          +'</div>'
          +'<button class="btn-icon" onclick="openPatient('+f.patient_id+')" title="Ver prontu\u00e1rio">\ud83d\udcc2</button>'
          +'</div>';
      });
      html+='</div>';
    });
  }
  html+='</div>';
  c.innerHTML=html;

  // Guardar dados para exportar
  window._fgFinData=finFiltrado;
  window._fgPatMap=patMap;
  window._fgPeriodoLabel=periodoLabel;
}

async function exportFinanceiroCSV(){
  const fin=window._fgFinData||[];
  const patMap=window._fgPatMap||{};
  const periodo=window._fgPeriodoLabel||'';
  let csv='MOVIMENTA\u00c7\u00d5ES FINANCEIRAS \u2014 CL\u00cdNICA VITTA\n';
  csv+='Per\u00edodo: '+periodo+'\nGerado em: '+todayStr()+'\n\n';
  csv+='Data,Paciente,Tipo de Plano,Forma de Pagamento,Valor (R$),Parcelas,Observa\u00e7\u00e3o,Registrado por\n';
  fin.sort((a,b)=>parseDateInt(b.data_pagamento)-parseDateInt(a.data_pagamento)).forEach(f=>{
    const pat=patMap[f.patient_id];
    csv+='"'+fmtDate(f.data_pagamento||'')+'","'+(pat?pat.name:'#'+f.patient_id)+'","'+(pat?pat.plan_type||'':'')+'","'+(f.forma||'')+'","'+parseFloat(f.valor||0).toFixed(2)+'","'+(f.parcelas||'')+'","'+(f.observacao||'').replace(/"/g,"'")+'","'+(f.registrado_por||'')+'"\n';
  });
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='financeiro_vitta_'+todayStr().replace(/\//g,'-')+'.csv';a.click();
  toast('CSV exportado!','success');
}

async function saveNewPatient(){
  const btn=document.querySelector('#new-patient-form .btn-primary');
  if(btn&&btn.disabled)return;
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const name=titleCase(document.getElementById('np-name').value.trim());
  if(!name){toast('Nome obrigat\u00f3rio','error');if(btn){btn.disabled=false;btn.textContent='Criar Paciente';}return;}
  const planType=document.getElementById('np-plan').value;
  const duracao=planType==='Plano 6 meses'?6:planType==='Plano 3 meses'?3:1;
  const{error,data:newPat}=await sb.from('planos_patients').insert({name,dob:displayToISO(document.getElementById('np-dob').value)||null,cpf:document.getElementById('np-cpf').value.trim(),telefone:document.getElementById('np-tel').value.trim(),plan_type:planType,duracao_programa:duracao,modality:document.getElementById('np-modality').value,inicio_programa:displayToISO(document.getElementById('np-inicio').value)||null,observacao:document.getElementById('np-obs').value.trim(),active:true,etiquetas:[],created_by:currentUser.name,created_at:new Date().toISOString()}).select().single();
  if(error){toast('Erro: '+error.message,'error');const b=document.querySelector('#new-patient-form .btn-primary');if(b){b.disabled=false;b.textContent='Criar Paciente';}return;}
  closeModal('modal-new-patient');toast('Paciente criado!','success');await openPatient(newPat.id);
}

let relCharts={};
function destroyRelCharts(){Object.values(relCharts).forEach(c=>{try{c.destroy()}catch(e){}});relCharts={};}
function getMonthRange(period,customStart,customEnd){
  if(period==='custom'&&customStart&&customEnd){
    const ps=customStart.split('-');const pe=customEnd.split('-');
    return{start:new Date(parseInt(ps[0]),parseInt(ps[1])-1,parseInt(ps[2])),end:new Date(parseInt(pe[0]),parseInt(pe[1])-1,parseInt(pe[2]),23,59,59)};
  }
  const now=new Date();let start,end;
  if(period==='mes'){start=new Date(now.getFullYear(),now.getMonth(),1);end=new Date(now.getFullYear(),now.getMonth()+1,0);}
  else if(period==='trimestre'){const q=Math.floor(now.getMonth()/3);start=new Date(now.getFullYear(),q*3,1);end=new Date(now.getFullYear(),q*3+3,0);}
  else if(period==='semestre'){const s=now.getMonth()<6?0:6;start=new Date(now.getFullYear(),s,1);end=new Date(now.getFullYear(),s+6,0);}
  else{start=new Date(now.getFullYear(),0,1);end=new Date(now.getFullYear(),11,31);}
  return{start,end};
}
function dateInRange(dateStr,start,end){
  if(!dateStr)return false;
  const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');
  if(p.length!==3)return false;
  const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));return d>=start&&d<=end;
}

async function _renderRelFinanceiro(period){

    sb.from('planos_patients').select('*'),
    sb.from('planos_financeiro').select('*'),

    sb.from('planos_historico_ciclos').select('*')
  ]);
  const allP=patients||[],allF=fin||[],allS=sessoes||[],allC=ciclos||[];
  const finPeriod=allF.filter(f=>dateInRange(f.data_pagamento,start,end));
  const totalFat=finPeriod.reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const pWP=[...new Set(finPeriod.map(f=>f.patient_id))];
  const avgPat=pWP.length?totalFat/pWP.length:0;
  const active=allP.filter(p=>p.active).length,inactive=allP.filter(p=>!p.active).length;
  const plan3=allP.filter(p=>p.plan_type==='Plano 3 meses').length,plan6=allP.filter(p=>p.plan_type==='Plano 6 meses').length,avulsa=allP.filter(p=>p.plan_type==='Consulta Avulsa').length;
  const pres=allP.filter(p=>p.modality==='Presencial').length,online=allP.filter(p=>p.modality==='Online').length;
  const patC={};allC.forEach(ci=>{patC[ci.patient_id]=(patC[ci.patient_id]||0)+1;});
  const renovados=Object.values(patC).filter(v=>v>1).length;
  const taxaR=allP.length?((renovados/allP.length)*100).toFixed(1):0;
  const dur=allP.filter(p=>p.inicio_programa).map(p=>monthsSince(fmtDate(p.inicio_programa||'')));
  const avgP=dur.length?(dur.reduce((s,v)=>s+v,0)/dur.length).toFixed(1):0;
  const sessP=allS.filter(s=>dateInRange(s.data_sessao,start,end));
  const mLabels=[],mData=[];

  const fimQ=allC.filter(ci=>ci.motivo==='fim').length,desQ=allC.filter(ci=>ci.motivo==='desistencia').length;
  const tipoCount={};allS.forEach(s=>{const t=s.tipo_sessao||'N\u00e3o especificado';tipoCount[t]=(tipoCount[t]||0)+1;});
  const tipoLabels=Object.keys(tipoCount),tipoData=Object.values(tipoCount);

    +'<div class="section-header"><div class="section-title">\ud83d\udcb0 Financeiro</div></div>'

    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">R$ '+avgPat.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="dash-card-label">M\u00e9dia por Paciente</div></div>'
    +'</div>'
    +'<div class="section-header"><div class="section-title">\ud83d\udccb Planos</div></div>'
    +'<div class="dash-grid"><div class="dash-card" style="cursor:default"><div class="dash-card-num">'+active+'</div><div class="dash-card-label">Ativos</div></div>'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+inactive+'</div><div class="dash-card-label">Finalizados</div></div>'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+sessP.length+'</div><div class="dash-card-label">Sess\u00f5es Soro</div><div class="dash-card-sub">no per\u00edodo</div></div></div>'
    +'<div class="dash-grid-2"><div class="dash-card" style="cursor:default"><div class="dash-card-num" style="color:var(--success)">'+taxaR+'%</div><div class="dash-card-label">Taxa de Renova\u00e7\u00e3o</div></div>'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+avgP+'</div><div class="dash-card-label">Perman\u00eancia M\u00e9dia (meses)</div></div></div>'
    +'<div class="card"><div class="card-title">Novos Pacientes \u2014 \u00daltimos 12 Meses</div><div style="position:relative;height:200px"><canvas id="chart-novos"></canvas></div></div>'

async function _renderRelInjetaveis(period){
  const cstart=window._relCStart||null;
  const cend=window._relCEnd||null;
  const {start,end}=getMonthRange(period,cstart,cend);
  const sub=document.getElementById('rel-sub-content');
  sub.innerHTML='<div class="loading"><div class="spinner"></div>Carregando...</div>';
  const [{data:patients},{data:envios},{data:sessoes}]=await Promise.all([
    sb.from('planos_patients').select('id,name,modality,plan_type'),
    sb.from('planos_soro_envios').select('*').order('data_envio',{ascending:false}),
    sb.from('planos_soro_sessoes').select('id,patient_id,envio_id,data_sessao,tipo_sessao')
  ]);
  const patMap={};(patients||[]).forEach(p=>patMap[p.id]=p);
  const enviosPeriod=(envios||[]).filter(e=>dateInRange(e.data_envio,start,end));

  // Busca por paciente
  let busca=window._injetBusca||'';
  const normBusca=normStr(busca);
  const enviosFiltrados=normBusca
    ?enviosPeriod.filter(e=>{const p=patMap[e.patient_id];return p&&normStr(p.name).includes(normBusca);})
    :enviosPeriod;

  // Totais
  const totalEV=enviosFiltrados.reduce((s,e)=>s+(e.sessoes_ev||0),0);
  const totalIM=enviosFiltrados.reduce((s,e)=>s+(e.sessoes_im||0),0);
  const totalSessoes=totalEV+totalIM;
  const patsUnicos=new Set(enviosFiltrados.map(e=>e.patient_id)).size;

  // Sessoes realizadas vinculadas
  const sessMap={};(sessoes||[]).forEach(s=>{if(s.envio_id){if(!sessMap[s.envio_id])sessMap[s.envio_id]=[];sessMap[s.envio_id].push(s);}});

  // Por paciente agrupado
  const byPat={};
  enviosFiltrados.forEach(e=>{
    if(!byPat[e.patient_id])byPat[e.patient_id]={envios:[],totalEV:0,totalIM:0,totalSessFeitas:0};
    byPat[e.patient_id].envios.push(e);
    byPat[e.patient_id].totalEV+=(e.sessoes_ev||0);
    byPat[e.patient_id].totalIM+=(e.sessoes_im||0);
    byPat[e.patient_id].totalSessFeitas+=(sessMap[e.id]||[]).length;
  });

  // Substâncias mais enviadas
  const subsCount={};
  enviosFiltrados.forEach(e=>{
    if(!e.substancias)return;
    e.substancias.split(/[,\n;]/).map(s=>s.trim()).filter(Boolean).forEach(sub=>{
      const k=sub.toLowerCase().slice(0,40);
      subsCount[k]=(subsCount[k]||0)+1;
    });
  });
  const topSubs=Object.entries(subsCount).sort((a,b)=>b[1]-a[1]).slice(0,8);

  sub.innerHTML=
    '<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn btn-sm btn-ghost" onclick="exportInjetaveisCSV()">\ud83d\udcca Exportar CSV</button></div>'
    // Cards resumo
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+enviosFiltrados.length+'</div><div class="dash-card-label">Envios no per\u00edodo</div></div>'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+patsUnicos+'</div><div class="dash-card-label">Pacientes atendidos</div></div>'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+totalEV+'<span style="font-size:14px;font-weight:400"> EV</span></div><div class="dash-card-label">Sess\u00f5es EV prescritas</div></div>'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+totalIM+'<span style="font-size:14px;font-weight:400"> IM</span></div><div class="dash-card-label">Sess\u00f5es IM prescritas</div></div>'
    +'</div>'
    // Busca
    +'<div class="search-bar" style="margin-bottom:12px"><span>\ud83d\udd0d</span>'
    +'<input type="text" placeholder="Filtrar por paciente..." value="'+busca+'" oninput="window._injetBusca=this.value;_renderRelInjetaveis(window._relPeriod||\'mes\')" autocomplete="off"/>'
    +(busca?'<button class="btn btn-ghost btn-sm" onclick="window._injetBusca=\'\';_renderRelInjetaveis(window._relPeriod||\'mes\')">Limpar</button>':'')
    +'</div>'
    // Substâncias top
    +(topSubs.length
      ?'<div class="card" style="margin-bottom:12px"><div class="card-title">Substâncias mais enviadas (extraído dos textos)</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:6px">'
      +topSubs.map(([sub,cnt])=>'<span style="background:#f0f9ff;border:1px solid #bae6fd;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600;color:#0369a1">'+sub+' <span style="background:#0369a1;color:#fff;border-radius:99px;padding:1px 7px;font-size:11px">'+cnt+'</span></span>').join('')
      +'</div></div>'
      :'')
    // Lista por paciente
    +'<div class="section-header"><div class="section-title">Por Paciente ('+Object.keys(byPat).length+')</div></div>'
    +(!Object.keys(byPat).length
      ?'<div class="empty"><div class="empty-icon">\ud83d\udc89</div>Nenhum envio encontrado neste per\u00edodo</div>'
      :Object.entries(byPat).sort((a,b)=>{
          const na=(patMap[a[0]]&&patMap[a[0]].name)||'';
          const nb=(patMap[b[0]]&&patMap[b[0]].name)||'';
          return na.localeCompare(nb);
        }).map(([patId,info])=>{
          const p=patMap[patId]||{name:'Paciente #'+patId};
          const totalPrescrito=info.totalEV+info.totalIM;
          const pct=totalPrescrito>0?Math.round((info.totalSessFeitas/totalPrescrito)*100):0;
          const barCor=pct>=80?'var(--success)':pct>=50?'var(--warning)':'var(--danger)';
          const cId='inj-det-'+patId;
          return '<div class="prog-row" style="margin-bottom:8px">'
            +'<div class="prog-header" onclick="toggleEnvioCard(\''+cId+'\',this)">'
            +'<div class="patient-avatar" style="width:38px;height:38px;font-size:14px">'+p.name.charAt(0)+'</div>'
            +'<div style="flex:1;min-width:0">'
            +'<div style="font-weight:700;font-size:14px">'+p.name+'</div>'
            +'<div style="font-size:12px;color:var(--text-muted);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">'
            +'<span>\ud83d\udce6 '+info.envios.length+' envio(s)</span>'
            +'<span>EV: <strong>'+info.totalEV+'</strong> \u00b7 IM: <strong>'+info.totalIM+'</strong></span>'
            +'<span style="color:var(--success);font-weight:600">'+info.totalSessFeitas+' sess\u00f5es realizadas</span>'
            +'</div>'
            +'<div style="margin-top:6px;display:flex;align-items:center;gap:8px">'
            +'<div style="flex:1;height:6px;background:var(--border-light);border-radius:99px;overflow:hidden">'
            +'<div style="width:'+Math.min(pct,100)+'%;height:100%;background:'+barCor+';border-radius:99px;transition:width .3s"></div>'
            +'</div>'
            +'<span style="font-size:11px;font-weight:700;color:'+barCor+';min-width:36px">'+pct+'%</span>'
            +'</div>'
            +'</div>'
            +'<button class="btn btn-ghost btn-sm" onclick="openPatient('+patId+')" style="flex-shrink:0;margin-right:4px">\ud83d\udcc2</button>'
            +'<span class="envio-arrow" style="color:var(--text-muted);font-size:14px;transition:transform .2s">\u25bc</span>'
            +'</div>'
            +'<div id="'+cId+'" style="display:none;border-top:1px solid var(--border-light);padding:12px 16px">'
            +info.envios.map((e,ei)=>{
              const sessFeitasEnvio=(sessMap[e.id]||[]);
              const totEnvio=(e.sessoes_ev||0)+(e.sessoes_im||0);
              const proxData=e.data_envio?addDaysToDisplay(e.data_envio,28):'\u2014';
              return '<div style="padding:10px 0;border-bottom:1px solid var(--border-light)">'
                +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap">'
                +'<div style="flex:1">'
                +'<div style="font-weight:700;font-size:13px">\ud83d\udce6 Envio '+(ei+1)+' \u00b7 '+fmtDate(e.data_envio)+'</div>'
                +'<div style="font-size:12px;color:var(--text-muted);margin-top:4px">'
                +'EV: '+( e.sessoes_ev||0)+' \u00b7 IM: '+(e.sessoes_im||0)+' \u00b7 Total: '+totEnvio
                +' \u00b7 Realizadas: <strong style="color:var(--success)">'+sessFeitasEnvio.length+'</strong>'
                +'</div>'
                +'<div style="font-size:12px;color:var(--text-muted);margin-top:2px">Pr\u00f3ximo envio estimado: <strong>'+proxData+'</strong></div>'
                +(e.substancias?'<div style="font-size:12px;margin-top:6px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:8px 10px;color:#0369a1"><strong>Substâncias:</strong> '+e.substancias+'</div>':'')
                +(sessFeitasEnvio.length
                  ?'<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">'
                    +sessFeitasEnvio.map(s=>'<span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600">\u2713 '+fmtDate(s.data_sessao||'')+(s.tipo_sessao?' \u00b7 '+s.tipo_sessao:'')+'</span>').join('')
                  +'</div>'
                  :'<div style="font-size:12px;color:var(--text-muted);margin-top:6px;font-style:italic">Nenhuma sess\u00e3o realizada vinculada</div>')
                +'</div>'
                +'<span class="user-badge">'+(e.registrado_por||'')+'</span>'
                +'</div></div>';
            }).join('')
            +'</div></div>';
        }).join(''));
}

async function exportRelExcel(){
  const [{data:patients},{data:fin},{data:sessoes}]=await Promise.all([sb.from('planos_patients').select('*'),sb.from('planos_financeiro').select('*'),sb.from('planos_soro_sessoes').select('*')]);
  const patMap={};(patients||[]).forEach(p=>patMap[p.id]=p.name);
  let csv='RELAT\u00d3RIO CL\u00cdNICA VITTA\n\nPACIENTES\nNome,Tipo de Plano,Modalidade,In\u00edcio,Status,Motivo Encerramento\n';
  (patients||[]).forEach(p=>{csv+='"'+p.name+'","'+(p.plan_type||'')+'","'+(p.modality||'')+'","'+isoToDisplay(p.inicio_programa||'')+'","'+(p.active?'Ativo':'Encerrado')+'","'+(p.motivo_encerramento||'')+'"\n';});
  csv+='\nPAGAMENTOS\nPaciente,Data,Forma,Valor,Parcelas\n';
  (fin||[]).forEach(f=>{csv+='"'+(patMap[f.patient_id]||f.patient_id)+'","'+(f.data_pagamento||'')+'","'+(f.forma||'')+'","'+(f.valor||0)+'","'+(f.parcelas||'')+'"\n';});
  csv+='\nSESS\u00d5ES DE SOROTERAPIA\nPaciente,Tipo,Data,Substâncias\n';
  (sessoes||[]).forEach(s=>{const subsSafe=(s.substancias||'').replace(/"/g,"'");csv+='"'+(patMap[s.patient_id]||s.patient_id)+'","'+(s.tipo_sessao||'')+'","'+(s.data_sessao||'')+'","'+subsSafe+'"\n';});
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='relatorio_financeiro_vitta_'+todayStr().replace(/\//g,'-')+'.csv';a.click();
  toast('CSV exportado!','success');
}

async function exportInjetaveisCSV(){
  const period=window._relPeriod||'mes';
  const {start,end}=getMonthRange(period,window._relCStart||null,window._relCEnd||null);
  const [{data:patients},{data:envios},{data:sessoes}]=await Promise.all([
    sb.from('planos_patients').select('id,name,modality,plan_type'),
    sb.from('planos_soro_envios').select('*').order('data_envio',{ascending:false}),
    sb.from('planos_soro_sessoes').select('id,patient_id,envio_id,data_sessao,tipo_sessao')
  ]);
  const patMap={};(patients||[]).forEach(p=>patMap[p.id]=p);
  const sessMap={};(sessoes||[]).forEach(s=>{if(s.envio_id){if(!sessMap[s.envio_id])sessMap[s.envio_id]=[];sessMap[s.envio_id].push(s);}});
  const enviosFiltrados=(envios||[]).filter(e=>dateInRange(e.data_envio,start,end))
    .sort((a,b)=>{
      const na=(patMap[a.patient_id]&&patMap[a.patient_id].name)||'';
      const nb=(patMap[b.patient_id]&&patMap[b.patient_id].name)||'';
      return na.localeCompare(nb)||parseDateInt(fmtDate(a.data_envio))-parseDateInt(fmtDate(b.data_envio));
    });

  // Carrega SheetJS dinamicamente se necessário
  if(!window.XLSX){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload=res;s.onerror=rej;
      document.head.appendChild(s);
    });
  }
  const XLSX=window.XLSX;

  // Monta dados da planilha
  const periodoLabel=period==='mes'?'M\u00eas Atual':period==='trimestre'?'Trimestre':period==='semestre'?'Semestre':period==='ano'?'Ano Atual':((window._relCStart||'')+' a '+(window._relCEnd||''));
  const totalEV=enviosFiltrados.reduce((s,e)=>s+(e.sessoes_ev||0),0);
  const totalIM=enviosFiltrados.reduce((s,e)=>s+(e.sessoes_im||0),0);
  const totalFeitas=enviosFiltrados.reduce((s,e)=>s+(sessMap[e.id]||[]).length,0);
  const patsUnicos=new Set(enviosFiltrados.map(e=>e.patient_id)).size;

  // Cabeçalho com metadados
  const wsData=[];
  wsData.push(['CL\u00cdNICA VITTA \u2014 RELAT\u00d3RIO DE IJET\u00c1VEIS ENVIADOS']);
  wsData.push(['Per\u00edodo: '+periodoLabel,'','Gerado em: '+todayStr()]);
  wsData.push([]);
  wsData.push(['RESUMO','','','','']);
  wsData.push(['Total de Envios','Pacientes','Sess\u00f5es EV','Sess\u00f5es IM','Realizadas']);
  wsData.push([enviosFiltrados.length,patsUnicos,totalEV,totalIM,totalFeitas]);
  wsData.push([]);

  // Cabeçalho da tabela principal
  wsData.push([
    'Paciente',
    'Modalidade',
    'Data do Envio',
    'Pr\u00f3ximo Envio (28d)',
    'Sess\u00f5es EV',
    'Sess\u00f5es IM',
    'Total Prescrito',
    'Sess\u00f5es Realizadas',
    'Aproveitamento (%)',
    'Substâncias',
    'Registrado por'
  ]);

  // Linha de destaque para separar por paciente
  let lastPat='';
  enviosFiltrados.forEach((e,idx)=>{
    const p=patMap[e.patient_id]||{name:'#'+e.patient_id,modality:'',plan_type:''};
    const totPrescr=(e.sessoes_ev||0)+(e.sessoes_im||0);
    const sessFeitasEnvio=(sessMap[e.id]||[]);
    const totFeitas=sessFeitasEnvio.length;
    const pct=totPrescr>0?Math.round((totFeitas/totPrescr)*100):0;
    const prox=e.data_envio?addDaysToDisplay(e.data_envio,28):'-';
    const subsLimpa=(e.substancias||'').replace(/\n/g,' \u00b7 ').trim();

    // Linha separadora quando muda de paciente
    if(p.name!==lastPat&&idx>0){
      wsData.push([]);
    }
    lastPat=p.name;

    wsData.push([
      p.name,
      p.modality||'',
      fmtDate(e.data_envio),
      prox,
      e.sessoes_ev||0,
      e.sessoes_im||0,
      totPrescr,
      totFeitas,
      pct+'%',
      subsLimpa,
      e.registrado_por||''
    ]);

    // Sub-linhas com sessões realizadas
    if(sessFeitasEnvio.length>0){
      sessFeitasEnvio.forEach(s=>{
        wsData.push([
          '  \u21b3 Sess\u00e3o realizada',
          '',
          fmtDate(s.data_sessao||''),
          '',
          s.tipo_sessao&&s.tipo_sessao.includes('EV')?1:0,
          s.tipo_sessao&&s.tipo_sessao.includes('IM')?1:0,
          '',
          '',
          '',
          s.tipo_sessao||'',
          ''
        ]);
      });
    }
  });

  // Cria workbook
  const ws=XLSX.utils.aoa_to_sheet(wsData);

  // Larguras das colunas
  ws['!cols']=[
    {wch:30}, // Paciente
    {wch:12}, // Modalidade
    {wch:14}, // Data Envio
    {wch:18}, // Próximo Envio
    {wch:10}, // EV
    {wch:10}, // IM
    {wch:14}, // Total
    {wch:14}, // Realizadas
    {wch:14}, // %
    {wch:50}, // Substâncias
    {wch:16}  // Registrado por
  ];

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Ijet\u00e1veis Enviados');
  XLSX.writeFile(wb,'injetaveis_vitta_'+todayStr().replace(/\//g,'-')+'.xlsx');
  toast('Planilha Excel exportada!','success');
}
