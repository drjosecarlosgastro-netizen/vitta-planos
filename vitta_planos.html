async function renderPrograma(){
  const[{data:patients},{data:appts},{data:sessoes},{data:implantes},{data:envios}]=await Promise.all([
    sb.from('planos_patients').select('*').order('name'),
    sb.from('planos_appointments').select('*'),
    sb.from('planos_soro_sessoes').select('*'),
    sb.from('planos_implantes').select('*'),
    sb.from('planos_soro_envios').select('*')
  ]);
  allPatients=patients||[];
  let progFilter='active';let phaseFilter=0;let progSort='alpha';
  const c=document.getElementById('main-content');
  function buildProg(){
    let filtered=allPatients;
    // Programa only shows Plano 3/6 meses - Consulta Avulsa has its own tab
    filtered=filtered.filter(p=>p.plan_type!=='Consulta Avulsa');
    if(progFilter==='active')filtered=filtered.filter(p=>p.active);
    else if(progFilter==='inactive')filtered=filtered.filter(p=>!p.active);
    if(phaseFilter>0)filtered=filtered.filter(p=>p.inicio_programa&&calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3)===phaseFilter);
    // Ordenação
    if(progSort==='alpha'){
      filtered=filtered.slice().sort((a,b)=>a.name.localeCompare(b.name));
    }else if(progSort==='fim_asc'){
      // Mais próximos do fim primeiro
      filtered=filtered.slice().sort((a,b)=>{
        const fa=a.inicio_programa?addMonthsToDisplay(fmtDate(a.inicio_programa),a.duracao_programa||3):'99/99/9999';
        const fb=b.inicio_programa?addMonthsToDisplay(fmtDate(b.inicio_programa),b.duracao_programa||3):'99/99/9999';
        return parseDateInt(fa)-parseDateInt(fb);
      });
    }else if(progSort==='fim_desc'){
      // Mais distantes do fim primeiro
      filtered=filtered.slice().sort((a,b)=>{
        const fa=a.inicio_programa?addMonthsToDisplay(fmtDate(a.inicio_programa),a.duracao_programa||3):'00/00/0000';
        const fb=b.inicio_programa?addMonthsToDisplay(fmtDate(b.inicio_programa),b.duracao_programa||3):'00/00/0000';
        return parseDateInt(fb)-parseDateInt(fa);
      });
    }else if(progSort==='inicio'){
      filtered=filtered.slice().sort((a,b)=>parseDateInt(fmtDate(a.inicio_programa||''))-parseDateInt(fmtDate(b.inicio_programa||'')));
    }
    const sortLabel={alpha:'A–Z',fim_asc:'Fim ↑',fim_desc:'Fim ↓',inicio:'Mais Recentes'};
    let html='<div class="section-header"><div class="section-title">Programa</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
      +'<button class="btn btn-sm '+(progFilter==='active'?'btn-primary':'btn-ghost')+'" onclick="window._pf=\'active\';rebuildProg()">Ativos</button>'
      +'<button class="btn btn-sm '+(progFilter==='inactive'?'btn-primary':'btn-ghost')+'" onclick="window._pf=\'inactive\';rebuildProg()">Inativos</button>'
      +'<button class="btn btn-sm '+(progFilter==='all'?'btn-primary':'btn-ghost')+'" onclick="window._pf=\'all\';rebuildProg()">Todos</button>'
      +'<button class="btn btn-sm '+(phaseFilter===0?'btn-accent':'btn-ghost')+'" onclick="window._ph=0;rebuildProg()">F-Todos</button>'
      +'<button class="btn btn-sm '+(phaseFilter===1?'btn-accent':'btn-ghost')+'" onclick="window._ph=1;rebuildProg()">F1</button>'
      +'<button class="btn btn-sm '+(phaseFilter===2?'btn-accent':'btn-ghost')+'" onclick="window._ph=2;rebuildProg()">F2</button>'
      +'<button class="btn btn-sm '+(phaseFilter===3?'btn-accent':'btn-ghost')+'" onclick="window._ph=3;rebuildProg()">F3</button>'
      +'<div style="height:20px;width:1px;background:var(--border);margin:0 2px"></div>'
      +'<span style="font-size:11px;color:var(--text-muted);font-weight:600">Ordem:</span>'
      +'<select style="padding:5px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;background:var(--white)" onchange="window._sort=this.value;rebuildProg()">'
      +'<option value="alpha" '+(progSort==='alpha'?'selected':'')+'>A–Z (Alfabético)</option>'
      +'<option value="fim_asc" '+(progSort==='fim_asc'?'selected':'')+'>Fim mais próximo ↑</option>'
      +'<option value="fim_desc" '+(progSort==='fim_desc'?'selected':'')+'>Fim mais distante ↓</option>'
      +'<option value="inicio" '+(progSort==='inicio'?'selected':'')+'>Início mais recente</option>'
      +'</select>'
      +'</div></div>';
    if(!filtered.length){html+='<div class="empty"><div class="empty-icon">\ud83d\udc65</div>Sem pacientes</div>';return html;}
    filtered.forEach(p=>{
      const phase=p.inicio_programa?calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3):1;
      const months=p.inicio_programa?monthsSince(fmtDate(p.inicio_programa)):0;
      const endDate=p.inicio_programa?addMonthsToDisplay(fmtDate(p.inicio_programa),p.duracao_programa||3):'\u2014';
      const tags=(p.etiquetas||[]);
      const patAppts=(appts||[]).filter(a=>a.patient_id===p.id).sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
      const lastConsult=patAppts.find(a=>a.status==='Compareceu'&&!a.origem_tabela&&(a.tipo==='Consulta'||!!(a.procedimento&&a.procedimento.includes('Consulta'))));
      const lastSoro=(sessoes||[]).filter(s=>s.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_sessao)-parseDateInt(a.data_sessao))[0];
      const lastImpl=(implantes||[]).filter(i=>i.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_implante)-parseDateInt(a.data_implante))[0];
      const lastEnvio=(envios||[]).filter(e=>e.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_envio)-parseDateInt(a.data_envio))[0];
      const isOnline=p.modality==='Online';
      let envioAlert='';
      if(isOnline&&lastEnvio){
        const total=(lastEnvio.sessoes_ev||0)+(lastEnvio.sessoes_im||0);
        const feitas=(sessoes||[]).filter(s=>s.patient_id===p.id&&s.envio_id===lastEnvio.id).length;
        const rest=total-feitas;
        if(rest<=1)envioAlert='<span style="color:var(--danger);font-weight:700">\ud83d\udea9 Enviar!</span>';
        else if(rest<=2)envioAlert='<span style="color:var(--warning);font-weight:700">\u26a0\ufe0f Preparar</span>';
      }
      const tagHtml=tags.map(t=>'<span class="etiqueta" style="background:'+(t.color||'#6b7280')+'">'+t.name+'</span>').join('');
      const encHtml=p.motivo_encerramento?'<span style="font-weight:700;color:'+(p.motivo_encerramento==='fim'?'#3b82f6':'#f97316')+'">Encerrado: '+isoToDisplay(p.data_encerramento||'')+' \u2014 '+(p.motivo_encerramento==='fim'?'Fim do Plano':'Desist\u00eancia')+'</span>':'';
      html+='<div class="prog-row">'
        +'<div class="prog-header" onclick="toggleProg(this)">'
        +'<div class="patient-avatar" style="width:38px;height:38px;font-size:14px">'+p.name.charAt(0)+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px">'+p.name+tagHtml+envioAlert+'</div>'
        +'<div style="font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap">'
        +'<span class="phase-badge phase-'+phase+'">F'+phase+'</span>'
        +'<span>'+(p.plan_type||'\u2014')+'</span>'
        +'<span>M\u00eas '+(months+1)+'</span>'
        +'<span class="pill pill-'+(p.modality==='Presencial'?'blue':'purple')+'">'+(p.modality||'\u2014')+'</span>'
        +'<span>In\u00edcio: '+fmtDate(p.inicio_programa||'')+'</span>'
        +'<span>Fim: '+endDate+'</span>'
        +encHtml
        +'</div></div>'
        +'<span style="color:var(--text-muted)">\u25be</span>'
        +'</div>'
        +'<div class="prog-detail">'
        +'<div class="grid-2" style="margin-bottom:10px">'
        +'<div class="card" style="margin:0;padding:12px"><div class="card-title">\u00daltima Consulta</div><div style="font-size:14px;font-weight:600">'+(lastConsult?fmtDate(lastConsult.date_str):'\u2014')+'</div>'+(lastConsult?'<div class="text-sm text-muted">'+(lastConsult.procedimento||'')+'</div>':'')+'</div>'
        +'<div class="card" style="margin:0;padding:12px"><div class="card-title">\u00daltima Sess\u00e3o Soro</div><div style="font-size:14px;font-weight:600">'+(lastSoro?fmtDate(lastSoro.data_sessao):'\u2014')+'</div>'+(lastSoro?'<div class="text-sm text-muted">'+(lastSoro.tipo_sessao||'')+'</div>':'')+'</div>'
        +'<div class="card" style="margin:0;padding:12px"><div class="card-title">\u00daltimo Implante</div><div style="font-size:14px;font-weight:600">'+(lastImpl?fmtDate(lastImpl.data_implante):'\u2014')+'</div></div>'
        +(isOnline&&lastEnvio?'<div class="card" style="margin:0;padding:12px"><div class="card-title">\u00daltimo Envio</div><div style="font-size:14px;font-weight:600">'+fmtDate(lastEnvio.data_envio)+'</div><div class="text-sm text-muted">EV:'+lastEnvio.sessoes_ev+' IM:'+lastEnvio.sessoes_im+'</div></div>':'')
        +'</div>'
        +'<button class="btn btn-ghost btn-sm" onclick="openPatient('+p.id+')">Ver Prontu\u00e1rio \u2192</button>'
        +'</div></div>';
    });
    return html;
  }
  window._pf='active';window._ph=0;window._sort='alpha';
  window.rebuildProg=function(){progFilter=window._pf;phaseFilter=window._ph;progSort=window._sort;c.innerHTML=buildProg();};
  c.innerHTML=buildProg();
}

async function renderImplantes(){
  const[{data:patients},{data:implantes}]=await Promise.all([
    sb.from('planos_patients').select('*').order('name'),
    sb.from('planos_implantes').select('*').order('created_at')
  ]);
  allPatients=patients||[];
  let implFilter='active';let implSort='ultimo_desc';
  const c=document.getElementById('main-content');

  function buildImpl(){
    let filtered=allPatients;
    if(implFilter==='active')filtered=filtered.filter(p=>p.active);
    else if(implFilter==='inactive')filtered=filtered.filter(p=>!p.active);
    else if(implFilter==='com_impl')filtered=filtered.filter(p=>(implantes||[]).some(i=>i.patient_id===p.id));
    else if(implFilter==='sem_impl')filtered=filtered.filter(p=>!(implantes||[]).some(i=>i.patient_id===p.id));

    // Build map: last implant per patient
    const lastImplMap={};
    const allImplMap={};
    (implantes||[]).forEach(i=>{
      if(!allImplMap[i.patient_id])allImplMap[i.patient_id]=[];
      allImplMap[i.patient_id].push(i);
      const cur=lastImplMap[i.patient_id];
      if(!cur||parseDateInt(fmtDate(i.data_implante))>parseDateInt(fmtDate(cur.data_implante))){
        lastImplMap[i.patient_id]=i;
      }
    });

    // Sort
    if(implSort==='ultimo_desc'){
      filtered=filtered.slice().sort((a,b)=>{
        const da=lastImplMap[a.id]?parseDateInt(fmtDate(lastImplMap[a.id].data_implante)):0;
        const db=lastImplMap[b.id]?parseDateInt(fmtDate(lastImplMap[b.id].data_implante)):0;
        return db-da;
      });
    }else if(implSort==='ultimo_asc'){
      filtered=filtered.slice().sort((a,b)=>{
        const da=lastImplMap[a.id]?parseDateInt(fmtDate(lastImplMap[a.id].data_implante)):99999999;
        const db=lastImplMap[b.id]?parseDateInt(fmtDate(lastImplMap[b.id].data_implante)):99999999;
        return da-db;
      });
    }else if(implSort==='alpha'){
      filtered=filtered.slice().sort((a,b)=>a.name.localeCompare(b.name));
    }else if(implSort==='qtd_desc'){
      filtered=filtered.slice().sort((a,b)=>{
        const qa=(allImplMap[a.id]||[]).length;
        const qb=(allImplMap[b.id]||[]).length;
        return qb-qa;
      });
    }

    // Stats
    const totalImpl=(implantes||[]).length;
    const patComImpl=Object.keys(lastImplMap).length;

    let html='<div class="section-header"><div class="section-title">Implantes Hormonais</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
      +'<button class="btn btn-sm '+(implFilter==='active'?'btn-primary':'btn-ghost')+'" onclick="window._if=\'active\';rebuildImpl()">Ativos</button>'
      +'<button class="btn btn-sm '+(implFilter==='inactive'?'btn-primary':'btn-ghost')+'" onclick="window._if=\'inactive\';rebuildImpl()">Inativos</button>'
      +'<button class="btn btn-sm '+(implFilter==='all'?'btn-primary':'btn-ghost')+'" onclick="window._if=\'all\';rebuildImpl()">Todos</button>'
      +'<button class="btn btn-sm '+(implFilter==='com_impl'?'btn-accent':'btn-ghost')+'" onclick="window._if=\'com_impl\';rebuildImpl()">Com Implante</button>'
      +'<button class="btn btn-sm '+(implFilter==='sem_impl'?'btn-accent':'btn-ghost')+'" onclick="window._if=\'sem_impl\';rebuildImpl()">Sem Implante</button>'
      +'<div style="height:20px;width:1px;background:var(--border);margin:0 2px"></div>'
      +'<span style="font-size:11px;color:var(--text-muted);font-weight:600">Ordem:</span>'
      +'<select style="padding:5px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;background:var(--white)" onchange="window._isort=this.value;rebuildImpl()">'
      +'<option value="ultimo_desc" '+(implSort==='ultimo_desc'?'selected':'')+'>Mais recente primeiro</option>'
      +'<option value="ultimo_asc" '+(implSort==='ultimo_asc'?'selected':'')+'>Mais antigo primeiro</option>'
      +'<option value="alpha" '+(implSort==='alpha'?'selected':'')+'>A\u2013Z (Alfab\u00e9tico)</option>'
      +'<option value="qtd_desc" '+(implSort==='qtd_desc'?'selected':'')+'>Mais implantes</option>'
      +'</select>'
      +'</div></div>';

    // Summary cards
    html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">'
      +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+totalImpl+'</div><div class="dash-card-label">Total de Implantes</div></div>'
      +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+patComImpl+'</div><div class="dash-card-label">Pacientes com Implante</div></div>'
      +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+(allPatients.filter(p=>p.active).length-Object.keys(lastImplMap).filter(id=>allPatients.find(p=>p.id==id&&p.active)).length)+'</div><div class="dash-card-label">Ativos sem Implante</div></div>'
      +'</div>';

    if(!filtered.length){html+='<div class="empty"><div class="empty-icon">\ud83d\udc89</div>Nenhum paciente encontrado</div>';return html;}

    filtered.forEach(p=>{
      const patImpls=(allImplMap[p.id]||[]).sort((a,b)=>parseDateInt(fmtDate(b.data_implante))-parseDateInt(fmtDate(a.data_implante)));
      const lastImpl=patImpls[0];
      const phase=p.inicio_programa?calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3):1;
      const months=p.inicio_programa?monthsSince(fmtDate(p.inicio_programa)):0;
      const tags=(p.etiquetas||[]);

      // Implant expiry badge (implant lasts 4-6 months, warn when close to 5 months)
      let diasBadge='';
      let expiryInfo='';
      if(lastImpl&&lastImpl.data_implante){
        const dataImpl=fmtDate(lastImpl.data_implante);
        const dias=daysAgo(dataImpl);
        // Estimate: 5 months avg = 150 days. Warn at <30 days to expiry, expired if >150
        const diasParaVencer=150-(dias||0);
        let cor,bgCor,label;
        if(diasParaVencer<0){
          cor='var(--danger)';bgCor='#fee2e2';
          label='\u26a0\ufe0f Vencido h\u00e1 '+Math.abs(diasParaVencer)+'d';
        }else if(diasParaVencer<=30){
          cor='#c2410c';bgCor='#fff7ed';
          label='\ud83d\udea9 Vence em '+diasParaVencer+'d';
        }else if(diasParaVencer<=60){
          cor='var(--warning)';bgCor='#fef3c7';
          label='\u26a0\ufe0f Vence em '+diasParaVencer+'d';
        }else{
          cor='var(--success)';bgCor='#dcfce7';
          label='\u2705 Vence em ~'+diasParaVencer+'d';
        }
        diasBadge='<span style="font-size:11px;font-weight:700;color:'+cor+';background:'+bgCor+';padding:2px 8px;border-radius:99px">'+label+'</span>';
        expiryInfo=label;
      }

      html+='<div class="prog-row"><div class="prog-header" onclick="toggleProgImpl(this)">'
        +'<div class="patient-avatar" style="width:38px;height:38px;font-size:14px">'+p.name.charAt(0)+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px">'+p.name
        +tags.map(t=>'<span class="etiqueta" style="background:'+(t.color||'#6b7280')+'">'+t.name+'</span>').join('')
        +'</div>'
        +'<div style="font-size:12px;color:var(--text-muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">'
        +'<span class="phase-badge phase-'+phase+'">F'+phase+'</span>'
        +'<span class="pill pill-'+(p.modality==='Presencial'?'blue':'purple')+'">'+(p.modality||'\u2014')+'</span>'
        +'<span>'+(p.plan_type||'\u2014')+' \u00b7 M\u00eas '+(months+1)+'</span>'
        +(lastImpl
          ?'<span style="font-weight:600;color:var(--navy)">\ud83d\udc89 \u00dalt: '+fmtDate(lastImpl.data_implante)+'</span>'+diasBadge
          :'<span style="color:var(--text-muted);font-style:italic">Sem implante</span>')
        +'<span style="font-size:11px;background:#f3f4f6;padding:2px 8px;border-radius:99px;color:var(--text-muted)">'+patImpls.length+' implante(s)</span>'
        +'</div>'
        +(lastImpl&&lastImpl.observacao?'<div style="font-size:11px;color:var(--text-muted);margin-top:3px;font-style:italic">\ud83d\udcac '+lastImpl.observacao.slice(0,80)+(lastImpl.observacao.length>80?'\u2026':'')+'</div>':'')
        +'</div>'
        +'<span style="color:var(--text-muted)">\u25be</span>'
        +'</div>'
        +'<div class="prog-detail">'
        +(patImpls.length
          ?'<div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">Hist\u00f3rico de Implantes ('+patImpls.length+')</div>'
          +patImpls.map((imp,idx)=>{
            const d=daysAgo(fmtDate(imp.data_implante));
            return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light)">'
              +'<div style="font-size:12px;font-weight:700;color:#fff;background:var(--navy);border-radius:5px;padding:2px 8px;flex-shrink:0">#'+(patImpls.length-idx)+'</div>'
              +'<div style="flex:1">'
              +'<div style="font-weight:700;font-size:14px">\ud83d\udcc5 '+fmtDate(imp.data_implante)+(d!==null?' <span style="font-size:11px;color:var(--text-muted);font-weight:400">('+d+' dias atr\u00e1s)</span>':'')+'</div>'
              +(imp.observacao?'<div style="font-size:13px;color:var(--text);margin-top:3px">'+imp.observacao+'</div>':'<div style="font-size:12px;color:var(--text-muted);font-style:italic">Sem descri\u00e7\u00e3o</div>')
              +'<div style="margin-top:4px"><span class="user-badge">'+(imp.registrado_por||'')+'</span></div>'
              +'</div>'
              +(imp.receita_path?'<button class="btn btn-ghost btn-sm" onclick="openFile(\'documents\',\''+imp.receita_path+'\')">\ud83d\udcc4 Receita</button>':'')
              +'</div>';
          }).join('')
          :'<div style="font-size:13px;color:var(--text-muted);font-style:italic">Nenhum implante registrado para este paciente.</div>')
        +'<div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="openPatient('+p.id+')">Ver Prontu\u00e1rio \u2192</button></div>'
        +'</div></div>';
    });
    return html;
  }

  window._if='active';window._isort='ultimo_desc';
  window.rebuildImpl=function(){implFilter=window._if;implSort=window._isort;c.innerHTML=buildImpl();};
  c.innerHTML=buildImpl();
}

async function renderAvulsas(){
  const[{data:patients},{data:appts},{data:fin}]=await Promise.all([
    sb.from('planos_patients').select('*').order('name'),
    sb.from('planos_appointments').select('*').order('created_at'),
    sb.from('planos_financeiro').select('*').order('created_at')
  ]);
  allPatients=patients||[];
  // Consulta Avulsa = plan_type === 'Consulta Avulsa'
  const avulsas=allPatients.filter(p=>p.plan_type==='Consulta Avulsa');
  let avSort='alpha';
  const c=document.getElementById('main-content');

  function buildAvulsas(){
    let filtered=avulsas;
    if(avSort==='alpha')filtered=filtered.slice().sort((a,b)=>a.name.localeCompare(b.name));
    else if(avSort==='ultima_asc'){
      filtered=filtered.slice().sort((a,b)=>{
        const ua=lastConsultDate(a.id,appts);
        const ub=lastConsultDate(b.id,appts);
        return parseDateInt(ua)-parseDateInt(ub);
      });
    }else if(avSort==='ultima_desc'){
      filtered=filtered.slice().sort((a,b)=>{
        const ua=lastConsultDate(a.id,appts)||'00/00/0000';
        const ub=lastConsultDate(b.id,appts)||'00/00/0000';
        return parseDateInt(ub)-parseDateInt(ua);
      });
    }else if(avSort==='gasto_desc'){
      filtered=filtered.slice().sort((a,b)=>{
        const fa=(fin||[]).filter(f=>f.patient_id===a.id).reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
        const fb=(fin||[]).filter(f=>f.patient_id===b.id).reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
        return fb-fa;
      });
    }

    const ativos=avulsas.filter(p=>p.active).length;
    const inativos=avulsas.filter(p=>!p.active).length;
    const totalGasto=(fin||[]).filter(f=>avulsas.some(p=>p.id===f.patient_id)).reduce((s,f)=>s+(parseFloat(f.valor)||0),0);

    let html='<div class="section-header"><div class="section-title">Consultas Avulsas</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
      +'<span style="font-size:11px;color:var(--text-muted);font-weight:600">Ordem:</span>'
      +'<select style="padding:5px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;background:var(--white)" onchange="window._avsort=this.value;rebuildAvulsas()">'
      +'<option value="alpha" '+(avSort==='alpha'?'selected':'')+'>A\u2013Z (Alfab\u00e9tico)</option>'
      +'<option value="ultima_desc" '+(avSort==='ultima_desc'?'selected':'')+'>Consulta mais recente</option>'
      +'<option value="ultima_asc" '+(avSort==='ultima_asc'?'selected':'')+'>Consulta mais antiga</option>'
      +'<option value="gasto_desc" '+(avSort==='gasto_desc'?'selected':'')+'>Maior gasto total</option>'
      +'</select>'
      +'</div></div>';

    // Summary
    html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">'
      +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+avulsas.length+'</div><div class="dash-card-label">Total Avulsos</div><div class="dash-card-sub">'+ativos+' ativos \u00b7 '+inativos+' inativos</div></div>'
      +'<div class="dash-card" style="cursor:default"><div class="dash-card-num" style="font-size:22px;color:var(--success)">R$ '+(totalGasto/1000).toFixed(1)+'k</div><div class="dash-card-label">Total Gerado</div></div>'
      +'<div class="dash-card" onclick="mainNav(\'patients\')" title="Ver todos os pacientes"><div class="dash-card-num" style="font-size:22px">\ud83d\udc4b</div><div class="dash-card-label">Converter para Plano</div><div class="dash-card-sub">Editar na aba Pacientes</div></div>'
      +'</div>';

    // Info banner
    html+='<div style="background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#0369a1">'
      +'\u2139\ufe0f Pacientes com <strong>Consulta Avulsa</strong> aparecem aqui. Quando fecharem um <strong>Plano 3 ou 6 meses</strong>, migram automaticamente para a aba <strong>Programa</strong>.'
      +'</div>';

    if(!filtered.length){html+='<div class="empty"><div class="empty-icon">\ud83d\udc64</div>Nenhum paciente avulso</div>';return html;}

    filtered.forEach(p=>{
      const patAppts=(appts||[]).filter(a=>a.patient_id===p.id&&a.status==='Compareceu'&&!a.origem_tabela).sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
      const lastConsult=patAppts[0];
      const totalConsultas=(appts||[]).filter(a=>a.patient_id===p.id&&a.status==='Compareceu'&&!a.origem_tabela).length;
      const totalPago=(fin||[]).filter(f=>f.patient_id===p.id).reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
      const tags=(p.etiquetas||[]);

      // Time since last consult - alert if >60 days inactive
      let semContato='';
      if(lastConsult){
        const d=daysAgo(fmtDate(lastConsult.date_str));
        if(d!==null&&d>60){
          const cor=d>120?'var(--danger)':d>60?'var(--warning)':'var(--text-muted)';
          const bg=d>120?'#fee2e2':d>60?'#fef3c7':'#f3f4f6';
          semContato='<span style="font-size:11px;font-weight:700;color:'+cor+';background:'+bg+';padding:2px 8px;border-radius:99px">\ud83d\udd54 '+d+'d sem consulta</span>';
        }
      }else{
        semContato='<span style="font-size:11px;font-weight:700;color:var(--text-muted);background:#f3f4f6;padding:2px 8px;border-radius:99px">Sem hist\u00f3rico</span>';
      }

      const statusDot=p.active
        ?'<span style="width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block;flex-shrink:0"></span>'
        :'<span style="width:8px;height:8px;border-radius:50%;background:var(--text-muted);display:inline-block;flex-shrink:0"></span>';

      html+='<div class="prog-row"><div class="prog-header" onclick="toggleProgImpl(this)">'
        +'<div class="patient-avatar" style="width:38px;height:38px;font-size:14px">'+p.name.charAt(0)+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px">'+statusDot+' '+p.name
        +tags.map(t=>'<span class="etiqueta" style="background:'+(t.color||'#6b7280')+'">'+t.name+'</span>').join('')
        +'</div>'
        +'<div style="font-size:12px;color:var(--text-muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">'
        +(lastConsult?'<span>\ud83d\udcc5 \u00dalt. consulta: <strong>'+fmtDate(lastConsult.date_str)+'</strong></span>':'<span style="font-style:italic">Sem consulta</span>')
        +'<span style="background:#f3f4f6;padding:2px 8px;border-radius:99px;font-size:11px">'+totalConsultas+' consulta(s)</span>'
        +'<span style="color:var(--success);font-weight:600">R$ '+totalPago.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</span>'
        +semContato
        +'</div>'
        +'</div>'
        +'<span style="color:var(--text-muted)">\u25be</span>'
        +'</div>'
        +'<div class="prog-detail">'
        +'<div class="grid-2" style="margin-bottom:12px">'
        +'<div class="card" style="margin:0;padding:12px"><div class="card-title">Total de Consultas</div><div style="font-size:24px;font-weight:700;color:var(--navy)">'+totalConsultas+'</div></div>'
        +'<div class="card" style="margin:0;padding:12px"><div class="card-title">Total Pago</div><div style="font-size:20px;font-weight:700;color:var(--success)">R$ '+totalPago.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div></div>'
        +'</div>'
        // Last 5 appointments
        +(patAppts.length
          ?'<div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">\u00daltimas Consultas</div>'
          +patAppts.slice(0,5).map(a=>'<div style="padding:6px 0;border-bottom:1px solid var(--border-light);font-size:13px;display:flex;justify-content:space-between">'
            +'<span><strong>'+fmtDate(a.date_str)+'</strong>'+(a.procedimento?' \u00b7 '+a.procedimento:'')+'</span>'
            +'<span class="pill pill-green">'+a.status+'</span>'

          :'<div style="font-size:13px;color:var(--text-muted);font-style:italic">Nenhuma consulta registrada.</div>')
        +'<div style="margin-top:12px;display:flex;gap:8px">'
        +'<button class="btn btn-ghost btn-sm" onclick="openPatient('+p.id+')">Ver Prontu\u00e1rio \u2192</button>'
        +'<button class="btn btn-primary btn-sm" onclick="convertToPlano('+p.id+')">&#x1F4CB; Converter para Plano</button>'
        +'</div>'
        +'</div></div>';
    });
    return html;
  }

  window._avsort='alpha';
  window.rebuildAvulsas=function(){avSort=window._avsort;c.innerHTML=buildAvulsas();};
  c.innerHTML=buildAvulsas();
}

function lastConsultDate(patientId, appts){
  const pa=(appts||[]).filter(a=>a.patient_id===patientId&&a.status==='Compareceu'&&!a.origem_tabela).sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
  return pa.length?fmtDate(pa[0].date_str):null;
}

function getMonthRange(period){
  const now=new Date();let start,end;
  if(period==='mes'){start=new Date(now.getFullYear(),now.getMonth(),1);end=new Date(now.getFullYear(),now.getMonth()+1,0);}
  else if(period==='trimestre'){const q=Math.floor(now.getMonth()/3);start=new Date(now.getFullYear(),q*3,1);end=new Date(now.getFullYear(),q*3+3,0);}
  else if(period==='semestre'){const s=now.getMonth()<6?0:6;start=new Date(now.getFullYear(),s,1);end=new Date(now.getFullYear(),s+6,0);}
  else{start=new Date(now.getFullYear(),0,1);end=new Date(now.getFullYear(),11,31);}
  return{start,end};
}
function dateInRange(dateStr,start,end){
  if(!dateStr)return false;
  const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');
  if(p.length!==3)return false;
  const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
  return d>=start&&d<=end;
}
async function renderRelatorios(period){
  period=period||'mes';
  destroyRelCharts();
  const c=document.getElementById('main-content');
  c.innerHTML='<div class="loading"><div class="spinner"></div>Carregando relat\u00f3rio...</div>';
  const [{data:patients},{data:fin},{data:sessoes},{data:ciclos}]=await Promise.all([
    sb.from('planos_patients').select('*'),
    sb.from('planos_financeiro').select('*'),
    sb.from('planos_soro_sessoes').select('*'),
    sb.from('planos_historico_ciclos').select('*')
  ]);
  const {start,end}=getMonthRange(period);
  const allP=patients||[],allF=fin||[],allS=sessoes||[],allC=ciclos||[];
  const finPeriod=allF.filter(f=>dateInRange(f.data_pagamento,start,end));
  const totalFat=finPeriod.reduce((s,f)=>s+(parseFloat(f.valor)||0),0);
  const pWP=[...new Set(finPeriod.map(f=>f.patient_id))];
  const avgPat=pWP.length?totalFat/pWP.length:0;
  const active=allP.filter(p=>p.active).length,inactive=allP.filter(p=>!p.active).length;
  const plan3=allP.filter(p=>p.plan_type==='Plano 3 meses').length,plan6=allP.filter(p=>p.plan_type==='Plano 6 meses').length,avulsa=allP.filter(p=>p.plan_type==='Consulta Avulsa').length;
  const pres=allP.filter(p=>p.modality==='Presencial').length,online=allP.filter(p=>p.modality==='Online').length;
  const patC={};allC.forEach(ci=>{patC[ci.patient_id]=(patC[ci.patient_id]||0)+1;});
  const renovados=Object.values(patC).filter(v=>v>1).length;
  const taxaR=allP.length?((renovados/allP.length)*100).toFixed(1):0;
  const dur=allP.filter(p=>p.inicio_programa).map(p=>monthsSince(fmtDate(p.inicio_programa||'')));
  const avgP=dur.length?(dur.reduce((s,v)=>s+v,0)/dur.length).toFixed(1):0;
  const sessP=allS.filter(s=>dateInRange(s.data_sessao,start,end));
  const mLabels=[],mData=[];
  for(let i=11;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const y=d.getFullYear(),m=d.getMonth();mLabels.push(String(m+1).padStart(2,'0')+'/'+y);mData.push(allP.filter(p=>{if(!p.created_at)return false;const pd=new Date(p.created_at);return pd.getFullYear()===y&&pd.getMonth()===m;}).length);}
  const fimQ=allC.filter(ci=>ci.motivo==='fim').length,desQ=allC.filter(ci=>ci.motivo==='desistencia').length;
  const tipoCount={};allS.forEach(s=>{const t=s.tipo_sessao||'N\u00e3o especificado';tipoCount[t]=(tipoCount[t]||0)+1;});
  const tipoLabels=Object.keys(tipoCount),tipoData=Object.values(tipoCount);
  const pL={mes:'M\u00eas Atual',trimestre:'Trimestre',semestre:'Semestre',ano:'Ano'};
  const periodos=['mes','trimestre','semestre','ano'];
  let periodBtns=periodos.map(p=>'<button class="btn btn-sm '+(period===p?'btn-primary':'btn-ghost')+'" onclick="renderRelatorios(\''+p+'\')">'+pL[p]+'</button>').join('');
  c.innerHTML='<div class="card" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><div style="font-weight:700;font-size:14px">Per\u00edodo:</div>'+periodBtns+'<div style="flex:1"></div><button class="btn btn-sm btn-ghost" onclick="exportRelExcel()">\ud83d\udcca Excel</button></div>'
    +'<div class="section-header"><div class="section-title">\ud83d\udcb0 Financeiro \u2014 '+pL[period]+'</div></div>'
    +'<div class="dash-grid-2">'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">R$ '+totalFat.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="dash-card-label">Faturamento</div><div class="dash-card-sub">'+finPeriod.length+' pagamento(s)</div></div>'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">R$ '+avgPat.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div><div class="dash-card-label">M\u00e9dia por Paciente</div></div>'
    +'</div>'
    +'<div class="section-header"><div class="section-title">\ud83d\udccb Planos</div></div>'
    +'<div class="dash-grid">'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+active+'</div><div class="dash-card-label">Ativos</div></div>'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+inactive+'</div><div class="dash-card-label">Finalizados</div></div>'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+sessP.length+'</div><div class="dash-card-label">Sess\u00f5es Soro</div><div class="dash-card-sub">no per\u00edodo</div></div>'
    +'</div>'
    +'<div class="dash-grid-2">'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num" style="color:var(--success)">'+taxaR+'%</div><div class="dash-card-label">Taxa de Renova\u00e7\u00e3o</div></div>'
    +'<div class="dash-card" style="cursor:default"><div class="dash-card-num">'+avgP+'</div><div class="dash-card-label">Perman\u00eancia M\u00e9dia (meses)</div></div>'
    +'</div>'
    +'<div class="card"><div class="card-title">Novos Pacientes \u2014 \u00daltimos 12 Meses</div><div style="position:relative;height:200px"><canvas id="chart-novos"></canvas></div></div>'
    +'<div class="grid-2">'
    +'<div class="card"><div class="card-title">Tipo de Plano</div><div style="position:relative;height:180px"><canvas id="chart-tipo"></canvas></div></div>'
    +'<div class="card"><div class="card-title">Modalidade</div><div style="position:relative;height:180px"><canvas id="chart-modal"></canvas></div></div>'
    +'</div>'
    +(tipoLabels.length?'<div class="card"><div class="card-title">Sess\u00f5es de Soro por Tipo</div><div style="position:relative;height:180px"><canvas id="chart-soro-tipo"></canvas></div></div>':'')
    +'<div class="card"><div class="card-title">Encerramentos</div><div style="position:relative;height:140px"><canvas id="chart-enc"></canvas></div></div>';
  setTimeout(()=>{
    const bOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{font:{size:10},stepSize:1}}}};
    relCharts['novos']=new Chart(document.getElementById('chart-novos'),{type:'line',data:{labels:mLabels,datasets:[{label:'Novos',data:mData,borderColor:'#1D2846',backgroundColor:'rgba(29,40,70,.1)',fill:true,tension:0.35,pointRadius:4,borderWidth:2}]},options:bOpts});
    relCharts['tipo']=new Chart(document.getElementById('chart-tipo'),{type:'doughnut',data:{labels:['3 meses','6 meses','Avulsa'],datasets:[{data:[plan3,plan6,avulsa],backgroundColor:['#1D2846','#4A90D9','#10b981'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:10}}}}});
    relCharts['modal']=new Chart(document.getElementById('chart-modal'),{type:'doughnut',data:{labels:['Presencial','Online'],datasets:[{data:[pres,online],backgroundColor:['#3b82f6','#8b5cf6'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:10}}}}});
    if(tipoLabels.length)relCharts['soro']=new Chart(document.getElementById('chart-soro-tipo'),{type:'bar',data:{labels:tipoLabels,datasets:[{data:tipoData,backgroundColor:'#4A90D9',borderRadius:6}]},options:{...bOpts,plugins:{legend:{display:false}}}});
    relCharts['enc']=new Chart(document.getElementById('chart-enc'),{type:'bar',data:{labels:['Fim do Plano','Desist\u00eancia'],datasets:[{data:[fimQ,desQ],backgroundColor:['#3b82f6','#f97316'],borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{stepSize:1},grid:{color:'rgba(0,0,0,.06)'}}}}});
  },150);
}
async function exportRelExcel(){
  const [{data:patients},{data:fin},{data:sessoes}]=await Promise.all([sb.from('planos_patients').select('*'),sb.from('planos_financeiro').select('*'),sb.from('planos_soro_sessoes').select('*')]);
  const patMap={};(patients||[]).forEach(p=>patMap[p.id]=p.name);
  let csv='RELAT\u00d3RIO CL\u00cdNICA VITTA\n\nPACIENTES\nNome,Tipo de Plano,Modalidade,In\u00edcio,Status,Motivo Encerramento\n';
  (patients||[]).forEach(p=>{csv+='"'+p.name+'","'+(p.plan_type||'')+'","'+(p.modality||'')+'","'+isoToDisplay(p.inicio_programa||'')+'","'+(p.active?'Ativo':'Encerrado')+'","'+(p.motivo_encerramento||'')+'"\n';});
  csv+='\nPAGAMENTOS\nPaciente,Data,Forma,Valor,Parcelas\n';
  (fin||[]).forEach(f=>{csv+='"'+(patMap[f.patient_id]||f.patient_id)+'","'+(f.data_pagamento||'')+'","'+(f.forma||'')+'","'+(f.valor||0)+'","'+(f.parcelas||'')+'"\n';});
  csv+='\nSESS\u00d5ES DE SOROTERAPIA\nPaciente,Tipo,Data,Substâncias\n';
  (sessoes||[]).forEach(s=>{const subsSafe=(s.substancias||'').replace(/"/g,"'");csv+='"'+(patMap[s.patient_id]||s.patient_id)+'","'+(s.tipo_sessao||'')+'","'+(s.data_sessao||'')+'","'+subsSafe+'"\n';});
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='relatorio_vitta_'+todayStr().replace(/\//g,'-')+'.csv';a.click();
  toast('Excel exportado!','success');
}
