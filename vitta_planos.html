<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#1D2846"/>
<title>Clínica Vitta | Alphaville — Planos de Cuidado</title>
<link rel="manifest" id="pwa-manifest"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{
  --navy:#1F2033;--navy-light:#2d3d4a;
  --bg:#f4f7f8;--white:#FFFFFF;--text:#1F2033;--text-muted:#5A7381;
  --border:#e4eaed;--border-light:#edf1f3;
  --accent:#19807f;--success:#19807f;--warning:#C9B382;--danger:#ef4444;--purple:#154C56;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(31,32,51,.10);--shadow-lg:0 8px 32px rgba(31,32,51,.16);
  --font:'DM Sans',sans-serif;
  --font-display:'Cormorant Garamond',serif;
  --deep-ocean:#154C56;--tidal:#19807f;--ivory:#FFFAE5;--gold:#C9B382;--sky:#9CB7C7;--midnight:#1F2033;--ash:#5A7381;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);font-size:15px;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}
#screen-login{align-items:center;justify-content:center;background:var(--midnight);padding:24px}
.login-card{background:rgba(255,255,255,.07);border:1px solid rgba(150,183,199,.20);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;text-align:center}
.login-logo{width:64px;height:64px;background:rgba(255,255,255,.12);border-radius:16px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px}
.login-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,.55);font-size:13px;margin-bottom:28px}
.login-type{display:flex;gap:8px;margin-bottom:24px;background:rgba(0,0,0,.2);border-radius:10px;padding:4px}
.login-type button{flex:1;padding:8px;border:none;background:transparent;color:rgba(255,255,255,.55);border-radius:8px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.login-type button.active{background:var(--accent);color:#fff}
.input-group{margin-bottom:14px;text-align:left}
.input-group label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.65);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.input-group input{width:100%;padding:11px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s}
.input-group input::placeholder{color:rgba(255,255,255,.35)}
.input-group input:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-primary{background:var(--deep-ocean);color:var(--ivory)}.btn-primary:hover{background:var(--tidal)}
.btn-accent{background:var(--tidal);color:var(--ivory)}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--midnight);border:1.5px solid var(--border)}.btn-ghost:hover{border-color:var(--midnight)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:6px}
.btn-full{width:100%;justify-content:center;padding:13px}
.btn-icon{padding:7px 9px;border-radius:7px;background:transparent;border:1.5px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all .2s;font-size:13px;font-family:var(--font)}
.btn-icon:hover{background:var(--bg);border-color:var(--midnight);color:var(--midnight)}
.topbar{background:#13141f;border-bottom:2px solid var(--tidal);padding:0 20px;display:flex;align-items:center;gap:10px;min-height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.35)}
.topbar-logo{color:var(--ivory);font-weight:600;font-size:18px;font-family:var(--font-display)}
.topbar-user{color:rgba(255,255,255,.6);font-size:12px;margin-left:4px}
.topbar-spacer{flex:1}
.topbar-action{background:transparent;border:none;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:8px;transition:all .2s;font-family:var(--font)}
.topbar-action:hover{color:#fff;background:rgba(255,255,255,.1)}
.topbar-back{color:#fff;font-size:20px;background:none;border:none;cursor:pointer;padding:4px 8px}
.navtabs{background:#13141f;border-bottom:2px solid var(--tidal);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:90}
.navtabs::-webkit-scrollbar{display:none}
.ntab{padding:13px 16px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:rgba(200,220,230,0.7);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px}
.ntab.active{color:#ffffff;border-bottom-color:var(--tidal);font-weight:600}
.tabs{display:flex;gap:2px;overflow-x:auto;padding:0 16px;background:var(--white);border-bottom:1px solid var(--border-light);position:sticky;top:56px;z-index:50;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 13px;border:none;background:transparent;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px}
.tab.active{color:var(--midnight);border-bottom-color:var(--midnight);font-weight:700}
.subtabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg);border-radius:10px;padding:4px}
.subtab{flex:1;padding:9px 12px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-radius:8px;transition:all .2s;text-align:center}
.subtab.active{background:var(--white);color:var(--midnight);font-weight:700;box-shadow:var(--shadow)}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:40px}
.card{background:var(--white);border-radius:var(--radius);padding:16px;border:1px solid var(--border);margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--midnight)}
.field textarea{resize:vertical;min-height:72px}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.dash-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.dash-card{background:var(--white);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all .18s;border:1px solid var(--border)}
.dash-card:hover{border-color:var(--midnight);box-shadow:var(--shadow-lg)}
.dash-card-num{font-size:32px;font-weight:700;color:var(--deep-ocean);line-height:1;font-family:'DM Sans',sans-serif}
.dash-card-label{font-size:12px;color:var(--ash);margin-top:4px;font-weight:500}
.dash-card-sub{font-size:11px;color:var(--sky);margin-top:2px}
.patient-row{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .18s;border:1.5px solid transparent}
.patient-row:hover{border-color:var(--midnight);box-shadow:var(--shadow)}
.patient-avatar{width:42px;height:42px;border-radius:12px;background:var(--deep-ocean);color:var(--ivory);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;font-family:var(--font-display)}
.patient-info{flex:1;min-width:0}
.patient-name{font-weight:700;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.patient-meta{font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.phase-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.phase-1{background:#dbeafe;color:#1d4ed8}.phase-2{background:#dcfce7;color:#166534}.phase-3{background:#fef9c3;color:#854d0e}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.pill-green{background:#dcfce7;color:#166534}.pill-red{background:#fee2e2;color:#991b1b}
.pill-amber{background:#fef3c7;color:#92400e}.pill-blue{background:#dbeafe;color:#1e40af}
.pill-gray{background:#f3f4f6;color:#6b7280}.pill-purple{background:#ede9fe;color:#5b21b6}
.agenda-day-header{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:4px 0;border-bottom:1.5px solid var(--border-light)}
.appt-item{background:var(--white);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.appt-item.overdue{border-left:3px solid var(--danger);background:#fff5f5}
.appt-time{font-weight:700;font-size:13px;color:var(--midnight);min-width:46px}
.appt-info{flex:1}
.appt-name{font-weight:600;font-size:14px}
.appt-sub{font-size:12px;color:var(--text-muted)}
.prog-row{background:var(--white);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prog-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer}
.prog-detail{padding:0 16px 16px;display:none;border-top:1px solid var(--border-light)}
.prog-detail.open{display:block}
.attach-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:6px;flex-wrap:wrap}
.attach-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.attach-info{flex:1;min-width:160px}
.attach-name{font-weight:600;font-size:13px}
.attach-date{font-size:11px;color:var(--text-muted);margin-top:2px}
.etiqueta{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;color:#fff;margin-right:4px;margin-bottom:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 20px 32px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--midnight);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
.search-bar{display:flex;align-items:center;gap:10px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;margin-bottom:14px}
.search-bar input{border:none;outline:none;flex:1;font-family:var(--font);font-size:14px;background:transparent}
.alert-banner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:13px;font-weight:600}
.alert-warning{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.alert-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.alert-info{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.divider{height:1px;background:var(--border-light);margin:12px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:16px;font-weight:700;color:var(--text);font-family:var(--font-display)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.text-sm{font-size:12px}.text-muted{color:var(--text-muted)}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-muted);font-size:14px}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--midnight);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.user-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:#ede9fe;color:#5b21b6}
.resumo-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.resumo-mini-card{background:var(--bg);border-radius:10px;padding:12px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:all .18s}
.resumo-mini-card:hover{border-color:var(--midnight);background:#fff}
.resumo-mini-num{font-size:26px;font-weight:700;color:var(--midnight);line-height:1}
.resumo-mini-label{font-size:11px;color:var(--text-muted);margin-top:3px}
.resumo-mini-link{font-size:10px;color:var(--accent);font-weight:600;margin-top:4px}
.enc-box-encerrado{background:#eff6ff;border:2px solid #93c5fd;border-radius:var(--radius-sm);padding:14px;margin-top:4px;display:flex;align-items:flex-start;gap:12px}
.enc-box-ativo{background:#f9fafb;border:1.5px solid var(--border-light);border-radius:var(--radius-sm);padding:14px;margin-top:4px}
.edit-inline{background:#f0f5ff;border:1.5px solid var(--accent);border-radius:var(--radius-sm);padding:12px;margin-top:8px;width:100%;display:none}
.edit-inline.open{display:block}
.edit-inline .field{margin-bottom:10px}
.edit-inline .field input,.edit-inline .field select,.edit-inline .field textarea{font-size:13px;padding:8px 10px}
.agenda-link-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:#dcfce7;color:#166534;cursor:pointer}
.agenda-link-badge.pending{background:#fef3c7;color:#92400e}
.hist-box{border-radius:var(--radius-sm);padding:14px;margin-bottom:10px}
.hist-box-soro{background:#f0f9ff;border:1.5px solid #bae6fd}
.hist-box-impl{background:#fdf4ff;border:1.5px solid #e9d5ff}
.hist-box-consult{background:#f0fdf4;border:1.5px solid #bbf7d0}
.hist-box-trhe{background:#fff7ed;border:1.5px solid #fed7aa}
.subtabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg);border-radius:10px;padding:4px}
.subtab{flex:1;padding:9px 12px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-radius:8px;transition:all .2s;text-align:center}
.subtab.active{background:var(--white);color:var(--midnight);font-weight:700;box-shadow:var(--shadow)}
.laudo-section{margin-bottom:16px}
.laudo-section-title{font-size:13px;font-weight:700;color:var(--midnight);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--border-light)}
.laudo-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px}
.laudo-table th{background:var(--midnight);color:#fff;padding:7px 10px;text-align:center;font-weight:600;font-size:12px}
.laudo-table td{padding:6px 10px;text-align:center;border-bottom:1px solid var(--border-light)}
.laudo-table tr:nth-child(even){background:#f9fafb}
.laudo-table td.highlight{background:#fef3c7;font-weight:700;color:#92400e}
.trhe-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.trhe-stat{background:var(--bg);border-radius:10px;padding:10px 12px;text-align:center}
.trhe-stat-num{font-size:22px;font-weight:700;color:var(--midnight);line-height:1}
.trhe-stat-label{font-size:10px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.trhe-evolutivo-item{background:var(--white);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;border:1.5px solid transparent;transition:all .18s}
.trhe-evolutivo-item:hover{border-color:var(--midnight)}
.trhe-evolutivo-item.selected{border-color:var(--accent);background:#f0f7ff}
.laudo-editavel{width:100%;padding:10px 13px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color .2s;resize:vertical;min-height:80px}
.laudo-editavel:focus{border-color:var(--midnight)}
.sibo-positivo{background:#fee2e2;border:2px solid #fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:12px}
.sibo-negativo{background:#dcfce7;border:2px solid #86efac;border-radius:10px;padding:12px 16px;margin-bottom:12px}
@media print{
  body > *:not(#laudo-print-overlay){display:none!important}
  #laudo-print-overlay{display:block!important;position:static!important;background:#fff!important;padding:0!important}
  #laudo-print-page{box-shadow:none!important;margin:0!important;padding:10mm 14mm!important;max-width:none!important;width:100%!important}
  @page{size:A4 portrait;margin:0}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div id="toast"></div>

<div id="screen-login" class="screen active">
  <div class="login-card">
    <div class="login-logo">&#127973;</div>
    <div class="login-title">Cl&#237;nica Vitta | Alphaville</div>
    <div class="login-sub">Controle de Planos de Cuidado</div>
    <div class="login-type">
      <button id="btn-type-doc" class="active" onclick="setLoginType('doctor')">Dr. Jos&#233; Carlos</button>
      <button id="btn-type-sec" onclick="setLoginType('secretary')">Secret&#225;ria</button>
    </div>
    <div class="input-group"><label>Senha</label>
      <input type="password" id="login-pass" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-accent btn-full" onclick="doLogin()">Entrar</button>
    <div id="login-error" style="color:#f87171;font-size:13px;margin-top:12px;display:none"></div>
  </div>
</div>

<div id="screen-app" class="screen" style="background:var(--bg)">
  <div class="topbar">
    <span class="topbar-logo">&#127973; Cl&#237;nica Vitta</span>
    <span class="topbar-user" id="topbar-user"></span>
    <div class="topbar-spacer"></div>
    <button class="topbar-action" onclick="logout()">Sair &#8594;</button>
  </div>
  <div class="navtabs">
    <button class="ntab active" id="ntab-dashboard" onclick="mainNav('dashboard')">Dashboard</button>
    <button class="ntab" id="ntab-patients" onclick="mainNav('patients')">Pacientes</button>
    <button class="ntab" id="ntab-agenda" onclick="mainNav('agenda')">Agenda</button>
    <button class="ntab" id="ntab-programa" onclick="mainNav('programa')">Programas</button>
    <button class="ntab" id="ntab-implantes" onclick="mainNav('implantes')">Implantes</button>
    <button class="ntab" id="ntab-avulsas" onclick="mainNav('avulsas')">Consultas Avulsas</button>
    <button class="ntab" id="ntab-pendencias" onclick="mainNav('pendencias')">Pend&#234;ncias</button>
    <button class="ntab" id="ntab-leads" onclick="mainNav('leads')">CRM Leads</button>

function parseDateInt(d){if(!d)return 0;const p=d.split('/');if(p.length!==3)return 0;return parseInt(p[2]+p[1]+p[0]);}
function fmtDate(d){if(!d)return'';if(d.includes('/'))return d;const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function todayStr(){const n=new Date();return String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+n.getFullYear();}
function todayISO(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function displayToISO(d){if(!d)return'';const p=d.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:d;}
function isoToDisplay(iso){if(!iso)return'';const p=iso.split('T')[0].split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;}
function daysAgo(dateStr){if(!dateStr)return null;const p=dateStr.split('/');if(p.length!==3)return null;const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const now=new Date();now.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((now-d)/86400000);}
function monthsSince(dateStr){if(!dateStr)return 0;const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return 0;const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const n=new Date();return Math.max(0,(n.getFullYear()-d.getFullYear())*12+(n.getMonth()-d.getMonth()));}
function addMonthsToDisplay(dateStr,months){if(!dateStr)return'';const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return'';const d=new Date(parseInt(p[2]),parseInt(p[1])-1+months,parseInt(p[0]));return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function addDaysToDisplay(dateStr,days){if(!dateStr)return'\u2014';const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return'\u2014';const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));d.setDate(d.getDate()+days);return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function calcPhase(inicioStr,duracao){const months=monthsSince(inicioStr);const third=Math.ceil(duracao/3);if(months<third)return 1;if(months<third*2)return 2;return 3;}

async function criarAgendaAutomatica(tipo,data,descricao,registroId,tabelaOrigem){
  try{
    const proc=tipo==='implante'?'Implante Hormonal':'Soroterapia';
    const {data:existing}=await sb.from('planos_appointments')
      .select('id').eq('patient_id',currentPatientId)
      .eq('origem_tabela',tabelaOrigem).eq('origem_id',registroId).maybeSingle();
    if(existing)return existing.id;
    const {data:sameDay}=await sb.from('planos_appointments')
      .select('id,origem_tabela').eq('patient_id',currentPatientId).eq('date_str',data);
    const dupLinked=(sameDay||[]).find(a=>a.origem_tabela===tabelaOrigem);
    if(dupLinked)return dupLinked.id;
    const {data:appt,error}=await sb.from('planos_appointments').insert({
      patient_id:currentPatientId,date_str:data,time_str:'09:00',
      procedimento:proc,tipo:'Ijet\u00e1vel',
      observacao:descricao?(descricao+'').slice(0,80):'',
      status:'Compareceu',registrado_por:currentUser.name,
      origem_tabela:tabelaOrigem,origem_id:registroId
    }).select().single();
    if(!error&&appt)return appt.id;
  }catch(e){console.warn('Auto-agenda falhou:',e);}
  return null;
}

async function renderDashboard(){
  const[{data:patients},{data:appts},{data:sessoes},{data:envios},{data:pends},{data:pendItens},{data:leadsAtend}]=await Promise.all([
    sb.from('planos_patients').select('*').order('name'),

  ]);
  allPatients=patients||[];
  const c=document.getElementById('main-content');
  const active=allPatients.filter(p=>p.active),finished=allPatients.filter(p=>!p.active);
  // Alertas de envio (soroterapia online)
  let alertItems=[];
  active.filter(p=>p.modality==='Online').forEach(p=>{
    const lastEnvio=(envios||[]).filter(e=>e.patient_id===p.id).sort((a,b)=>parseDateInt(b.data_envio)-parseDateInt(a.data_envio))[0];
    if(lastEnvio){
      const total=(lastEnvio.sessoes_ev||0)+(lastEnvio.sessoes_im||0);
      const feitas=(sessoes||[]).filter(s=>s.patient_id===p.id&&s.envio_id===lastEnvio.id).length;
      const rest=total-feitas;
      if(rest<=1)alertItems.push({id:p.id,name:p.name,msg:'\ud83d\ude9a Enviar protocolo agora!',type:'danger'});
      else if(rest<=2)alertItems.push({id:p.id,name:p.name,msg:'\u26a0\ufe0f Preparar pr\u00f3ximo envio',type:'warning'});
    }
  });
  // Alertas de pend\u00eancias em aberto
  (pendItens||[]).forEach(it=>{
    const rec=(pends||[]).find(p=>p.id===it.pend_id);
    if(!rec)return;
    const pat=allPatients.find(p=>p.id===rec.patient_id);
    if(!pat)return;
    alertItems.push({id:pat.id,name:pat.name,msg:'\ud83d\udccc '+escHtml(it.texto||'Pend\u00eancia em aberto'),type:'warning'});
  });
  function lastConsultDays(pid){const pa=(appts||[]).filter(a=>a.patient_id===pid&&a.status==='Compareceu'&&!a.origem_tabela);if(!pa.length)return null;return daysAgo(pa.sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str))[0].date_str);}
  const p90=allPatients.filter(p=>{const d=lastConsultDays(p.id);return d!==null&&d<=90;});
  const p120=allPatients.filter(p=>{const d=lastConsultDays(p.id);return d!==null&&d<=120;});
  const p365=allPatients.filter(p=>{const d=lastConsultDays(p.id);return d!==null&&d<=365;});
  const activeIds=JSON.stringify(active.map(p=>p.id));
  const finIds=JSON.stringify(finished.map(p=>p.id));
  const p90ids=JSON.stringify(p90.map(p=>p.id));
  const p120ids=JSON.stringify(p120.map(p=>p.id));
  const p365ids=JSON.stringify(p365.map(p=>p.id));
  let alertsHtml='';
  if(alertItems.length){
    alertsHtml+='<div class="section-title" style="font-size:14px;margin-bottom:10px">&#128276; Alertas</div>';
    alertItems.forEach(a=>{
      const isDanger=a.type==='danger';
      alertsHtml+='<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:10px;margin-bottom:8px;font-size:13px;cursor:pointer;background:'+(isDanger?'#fff5f5':'#fffbeb')+';border:1px solid '+(isDanger?'#fca5a5':'#fcd34d')+';color:'+(isDanger?'#991b1b':'#92400e')+'" onclick="openPatient('+a.id+')">';
      alertsHtml+='<div><strong>'+escHtml(a.name)+'</strong><br/>'+a.msg+'</div>';
      alertsHtml+='</div>';
    });
    alertsHtml+='<div style="height:8px"></div>';
  }
  c.innerHTML=
    '<div class="section-header"><div class="section-title">Vis\u00e3o Geral</div><button class="btn btn-primary btn-sm" onclick="showNewPatientModal()">+ Novo Paciente</button></div>'+
    alertsHtml+
    '<div class="dash-grid-2">'+
    '<div class="dash-card" onclick="showPatientListModal(\'Planos Ativos\','+activeIds+')"><div class="dash-card-num">'+active.length+'</div><div class="dash-card-label">Planos Ativos</div></div>'+
    '<div class="dash-card" onclick="showPatientListModal(\'Planos Finalizados\','+finIds+')"><div class="dash-card-num">'+finished.length+'</div><div class="dash-card-label">Planos Finalizados</div></div>'+
    '</div>'+
    '<div class="dash-grid">'+
    '<div class="dash-card" onclick="showPatientListModal(\'90 dias\','+p90ids+')"><div class="dash-card-num">'+p90.length+'</div><div class="dash-card-label">\u00daltimos 90 dias</div><div class="dash-card-sub">por \u00faltima consulta</div></div>'+
    '<div class="dash-card" onclick="showPatientListModal(\'120 dias\','+p120ids+')"><div class="dash-card-num">'+p120.length+'</div><div class="dash-card-label">\u00daltimos 120 dias</div></div>'+
    '<div class="dash-card" onclick="showPatientListModal(\'365 dias\','+p365ids+')"><div class="dash-card-num">'+p365.length+'</div><div class="dash-card-label">\u00daltimos 365 dias</div></div>'+
    '</div>'+
    '<div class="dash-card" onclick="mainNav(\'patients\')"><div class="dash-card-num">'+allPatients.length+'</div><div class="dash-card-label">Total de Pacientes</div></div>';
  // Bloco faturamento por canal CRM
  var _leadsA=leadsAtend||[];
  var _totalFat=_leadsA.reduce(function(s,l){return s+(parseFloat(l.valor_atendimento)||0);},0);
  var _dashContainer=document.getElementById('main-content');
  if(_leadsA.length>0){
    var _canalMap={};
    _leadsA.forEach(function(l){
      var _canaisList=(l.canal_marketing||'Direto').split(',');
      _canaisList.forEach(function(canal){
        var _ck=canal.trim()||'Direto';
        if(!_canalMap[_ck])_canalMap[_ck]={count:0,valor:0};
        _canalMap[_ck].count++;
        _canalMap[_ck].valor+=(parseFloat(l.valor_atendimento)||0)/_canaisList.length;
      });
    });
    var _fatHtml='<div class="card" style="margin-top:16px">';
    _fatHtml+='<div class="card-title" style="margin-bottom:14px">📣 Faturamento por Canal de Marketing</div>';
    _fatHtml+='<div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">';
    _fatHtml+='<div><div style="font-size:28px;font-weight:700;color:var(--tidal)">R$ '+_totalFat.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div>';
    _fatHtml+='<div style="font-size:12px;color:var(--text-muted)">Total convertido via CRM — '+_leadsA.length+' leads atendidos</div></div></div>';

    Object.keys(_canalMap).sort(function(a,b){return _canalMap[b].valor-_canalMap[a].valor;}).forEach(function(canalKey){
      var item=_canalMap[canalKey];
      var pct=_totalFat>0?Math.round(item.valor/_totalFat*100):0;
      var cor=_canalColors[canalKey]||'var(--ash)';
      _fatHtml+='<div style="margin-bottom:12px">';
      _fatHtml+='<div style="display:flex;justify-content:space-between;margin-bottom:5px">';
      _fatHtml+='<span style="font-size:13px;font-weight:600">'+escHtml(canalKey)+'</span>';
      _fatHtml+='<div><span style="font-size:13px;font-weight:700;color:var(--tidal)">R$ '+item.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</span>';
      _fatHtml+='<span style="font-size:11px;color:var(--text-muted);margin-left:8px">('+item.count+' lead'+(item.count>1?'s':'')+' · '+pct+'%)</span></div></div>';
      _fatHtml+='<div style="height:8px;background:var(--border);border-radius:4px"><div style="height:8px;background:'+cor+';border-radius:4px;width:'+pct+'%"></div></div>';
      _fatHtml+='</div>';
    });
    _fatHtml+='</div>';
    var _fatDiv=document.createElement('div');
    _fatDiv.innerHTML=_fatHtml;
    _dashContainer.appendChild(_fatDiv);
  }
}

function renderPatientList(query){
  query=query||'';

  const norm=normStr(query);
  let filtered=allPatients;
  if(!norm){
    if(patientsFilter==='active')filtered=filtered.filter(p=>p.active);

async function executarDeletePaciente(){

      sb.from('planos_implantes').delete().eq('patient_id',p.id),
      sb.from('planos_contratos').delete().eq('patient_id',p.id),
      sb.from('planos_historico_ciclos').delete().eq('patient_id',p.id),

function toggleTag(el,name,color){
  let tags=JSON.parse(document.getElementById('pi-tags').value||'[]');
  const idx=tags.findIndex(t=>t.name===name);
  if(idx>=0){tags.splice(idx,1);el.style.background='#e5e7eb';el.style.color='#6b7280';}
  else{tags.push({name,color});el.style.background=color;el.style.color='#fff';}
  document.getElementById('pi-tags').value=JSON.stringify(tags);
}
async function saveNewTagFromInfo(){
  const name=document.getElementById('new-tag-name').value.trim();

  const{data}=await sb.from('planos_config').select('value').eq('key','etiquetas').single();
  let tags=[];try{tags=JSON.parse(data?.value||'[]')}catch(e){}

async function salvarBio(id) {
  const fv = function(fid) { const el = document.getElementById('bio-' + fid); return el ? (el.value.trim() || null) : null; };
  const fnum = function(fid) { const v = fv(fid); return v !== null ? parseFloat(v) : null; };
  const respRaw = (document.getElementById('bio-resp') || {}).value || '';
  const respParts = respRaw.split('|');
  const p = currentPatientData;
  const payload = {
    patient_id: currentPatientId,
    data_exame: fv('data'),
    responsavel: respParts[0] || '',

    amg_peso: fnum('amg_peso'),
    amg_musculo: fnum('amg_musculo'),
    amg_gordura: fnum('amg_gordura'),
    peso: fnum('amg_peso'),
    massa_magra: fnum('amg_musculo'),
    gordura_corporal: fnum('amg_gordura'),
    agua_corporal: fnum('agua_corporal'),
    proteina: fnum('proteina'),
    minerais: fnum('minerais'),
    imc: fnum('imc'),
    perc_gordura: fnum('perc_gordura'),
    tmb: fnum('tmb'),
    gordura_visceral: fnum('gordura_visceral'),
    seg_braco_d: fnum('seg_braco_d'),
    seg_braco_e: fnum('seg_braco_e'),
    seg_abdome: fnum('seg_abdome'),
    seg_perna_d: fnum('seg_perna_d'),
    seg_perna_e: fnum('seg_perna_e'),
    gord_braco_d: fnum('gord_braco_d'),
    gord_braco_e: fnum('gord_braco_e'),
    gord_abdome: fnum('gord_abdome'),
    gord_perna_d: fnum('gord_perna_d'),
    gord_perna_e: fnum('gord_perna_e'),
    diag_imc: (function() {
      var v = fnum('imc'); if (!v) return null;
      return v < 18.5 ? 'Baixo peso' : v < 25 ? 'Normal' : v < 30 ? 'Sobrepeso' : v < 35 ? 'Obesidade I' : 'Obesidade II';
    })(),
    diag_gordura: (function() {
      var v = fnum('perc_gordura'); var sx = (p.gender || '').toLowerCase(); if (!v) return null;
      if (sx === 'masculino' || sx === 'male') return v < 8 ? 'Abaixo do ideal' : v <= 19 ? 'Normal' : 'Acima do ideal';
      return v < 15 ? 'Abaixo do ideal' : v <= 33 ? 'Normal' : 'Acima do ideal';
    })(),
    diag_visceral: (function() {
      var v = fnum('gordura_visceral'); if (!v) return null;
      return v <= 9 ? 'Normal' : v <= 14 ? 'Limite normal' : 'Alto';
    })(),
    peso_ideal: (function() {
      var alt = parseFloat(p.altura || 0);
      if (!alt) return null;
      return parseFloat((alt * alt * 24.9).toFixed(1));
    })(),
    delta_peso_ideal: (function() {
      var alt = parseFloat(p.altura || 0);
      var pesoAtual = fnum('amg_peso');
      if (!alt || !pesoAtual) return null;
      return parseFloat((pesoAtual - (alt * alt * 24.9)).toFixed(1));
    })(),
    nota_medico: fv('nota'),
    altura: fnum('altura') || parseFloat(p.altura || 0) || null,
    sexo: p.gender || null,
    updated_by: currentUser.name,

  };
  let err;
  if (id) { const r = await sb.from('planos_bioimpedancia').update(payload).eq('id', id); err = r.error; }
  else { const r = await sb.from('planos_bioimpedancia').insert(payload); err = r.error; }
  if (err) { toast('Erro ao salvar: ' + err.message, 'error'); return; }
  closeModal('modal-generic');
  toast('Avaliação salva!', 'success');
  await renderBioimpedancia();
}

async function deletarBio(id) {

  const p = currentPatientData;

  const sexo = atual.sexo || p.gender || null;
  const altura = atual.altura ? atual.altura + ' m' : (p.altura ? p.altura + ' m' : '--');
  const resp = atual.responsavel || 'Dra. Bruna';
  const crm = atual.responsavel_crm || 'CRM-SP 11111';
  const dataFmt = fmtDate(atual.data_exame);

  // SCORE calculado (0-100 baseado nos índices)

  // Evolução (últimas 3 avaliações incluindo atual)
  var _altRef = parseFloat(atual.altura || 0);
  if (!_altRef && p.altura) _altRef = parseFloat(p.altura);
  if (_altRef) {
    atual.peso_ideal = parseFloat((_altRef * _altRef * 24.9).toFixed(1));
    if (atual.peso) atual.delta_peso_ideal = parseFloat((atual.peso - atual.peso_ideal).toFixed(1));
  }
  const historico = lista.slice(-3);
  const primeiroAnterior = historico.length > 1 ? historico[0] : null;
  const deltaPeso = primeiroAnterior && atual.peso && primeiroAnterior.peso ? (atual.peso - primeiroAnterior.peso) : null;
  const deltaGord = primeiroAnterior && atual.gordura_corporal && primeiroAnterior.gordura_corporal ? (atual.gordura_corporal - primeiroAnterior.gordura_corporal) : null;

    })() : '')


    // COMPOSIÇÃO + ÍNDICES
    + '<div class="g2">'
    + '<div class="card"><div class="ctop"></div><div class="ct">Composição Corporal</div>'
    + '<div class="mr"><span class="mnm">Água Corporal Total</span><div class="mbar"><div class="mfil" style="width:68%;background:#34d399"></div></div><span class="mval" style="color:#1a7a3e">' + (atual.agua_corporal || '--') + ' kg</span></div>'

    + '<div class="mr"><span class="mnm">Massa Magra Total</span><div class="mbar"><div class="mfil" style="width:65%;background:#34d399"></div></div><span class="mval" style="color:#1a7a3e">' + (atual.massa_magra || '--') + ' kg</span></div>'

    + '</div>'

    + '<div class="dg">'
    + '<div class="di"><div class="dl">IMC</div><div class="dv">' + (atual.imc || '--') + '</div><div class="dr">Normal: 18,5–24,9</div>' + diagTag(atual.diag_imc) + '</div>'
    + '<div class="di"><div class="dl">% Gordura</div><div class="dv">' + (atual.perc_gordura || '--') + '%</div><div class="dr">Normal: 21–33%</div>' + diagTag(atual.diag_gordura) + '</div>'

    + '<div class="di"><div class="dl">Peso Ideal / Meta</div><div class="dv">' + (atual.peso_ideal ? atual.peso_ideal + ' kg' : '--') + '</div><div class="dr">' + (atual.delta_peso_ideal !== null && atual.delta_peso_ideal !== undefined ? (atual.delta_peso_ideal > 0 ? '+' : '') + atual.delta_peso_ideal + ' kg do ideal' : 'IMC 24,9') + '</div>'
    + (atual.delta_peso_ideal > 2 ? '<span style="display:inline-block;margin-top:4px;padding:1px 7px;border-radius:8px;font-size:9px;font-weight:600;background:#fef3e2;color:#9a5c00;border:1px solid #f0c97a">Acima do ideal</span>' : '<span style="display:inline-block;margin-top:4px;padding:1px 7px;border-radius:8px;font-size:9px;font-weight:600;background:#e8f8ee;color:#1a7a3e;border:1px solid #a3d9b8">No ideal</span>')
    + '</div></div></div>'
    + '</div>'

    // BARRAS EVOLUTIVAS
    + '<div class="card" style="padding:6px 10px"><div class="ctop"></div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div class="ct" style="margin-bottom:0">Evolução Corporal — Jornada de Transformação</div>'
    + '<div style="display:flex;gap:10px"><span style="display:flex;align-items:center;gap:3px;font-size:8pt;color:#7a7a7a"><span style="width:9px;height:9px;background:#34d399;border-radius:2px;display:inline-block"></span>Massa Magra</span>'
    + '<span style="display:flex;align-items:center;gap:3px;font-size:8pt;color:#7a7a7a"><span style="width:9px;height:9px;background:#f59e0b;border-radius:2px;display:inline-block"></span>Gordura</span></div></div>'
    + '<div style="display:flex;gap:10px;align-items:flex-end;justify-content:space-around;padding:0 20px">' + barrasEvo(historico) + '</div></div>'

    // GRÁFICO HISTÓRICO ESTILO INBODY
    + (function(){
      var hist = historico;
      if (!hist.length) return '';

      // Build SVG inline - InBody style track chart
      var W = 680; var ROW_H = 52; var LABEL_W = 130; var CHART_W = W - LABEL_W - 10;
      var ROWS = [
        { label: 'Peso', unit: '(kg)', key: 'peso', color: '#1a1a1a', fmt: function(v){ return v ? v.toFixed(1) : '--'; } },
        { label: 'Massa Muscular\nEsquelética', unit: '(kg)', key: 'magra', color: '#1a7a3e', fmt: function(v){ return v ? v.toFixed(1) : '--'; } },
        { label: 'PGC', unit: '(%)\nPercentual de Gordura', key: 'gord_perc', color: '#a32d2d', fmt: function(v){ return v ? v.toFixed(1) : '--'; } }
      ];

      // Map data
      var pts = hist.map(function(h) {
        return {
          label: fmtDate(h.data_exame),
          peso: h.peso,
          magra: h.massa_magra,
          gord_perc: h.perc_gordura
        };
      });

      var N = pts.length;
      var colW = N > 1 ? Math.floor(CHART_W / N) : CHART_W;
      var SVG_H = ROW_H * ROWS.length + 36;

      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + SVG_H + '" style="font-family:Rajdhani,sans-serif;overflow:visible">';

      // Title row background
      svg += '<rect x="0" y="0" width="' + W + '" height="' + SVG_H + '" fill="#fff" rx="2"/>';

      // Column date headers at bottom
      var dateY = SVG_H - 4;
      for (var ci = 0; ci < N; ci++) {
        var cx = LABEL_W + ci * colW + colW / 2;
        // vertical dashed line
        svg += '<line x1="' + cx + '" y1="0" x2="' + cx + '" y2="' + (SVG_H - 28) + '" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="3,3"/>';
        // date label
        svg += '<text x="' + cx + '" y="' + dateY + '" text-anchor="middle" font-size="8" fill="#7a7a7a">' + (pts[ci].label || '') + '</text>';
      }

      // Row separators and content
      ROWS.forEach(function(row, ri) {
        var rowY = ri * ROW_H;
        var midY = rowY + ROW_H / 2;

        // Row separator
        if (ri > 0) svg += '<line x1="0" y1="' + rowY + '" x2="' + W + '" y2="' + rowY + '" stroke="#e8e0d0" stroke-width="1"/>';

        // Label area background
        svg += '<rect x="0" y="' + rowY + '" width="' + LABEL_W + '" height="' + ROW_H + '" fill="#f9f6f0"/>';

        // Row label
        var labelLines = row.label.split('\n');
        var unitLines = row.unit.split('\n');
        var allLines = labelLines.concat(unitLines);
        var startY = midY - ((allLines.length - 1) * 9);
        allLines.forEach(function(ln, li) {
          var isUnit = li >= labelLines.length;
          svg += '<text x="8" y="' + (startY + li * 11) + '" font-size="' + (isUnit ? '7' : '8.5') + '" font-weight="' + (isUnit ? '400' : '600') + '" fill="' + (isUnit ? '#7a7a7a' : '#1a1a1a') + '">' + ln + '</text>';
        });

        // Collect valid points for this row
        var rowPts = pts.map(function(p, ci) {
          return { x: LABEL_W + ci * colW + colW / 2, v: p[row.key] };
        });
        var validPts = rowPts.filter(function(p){ return p.v != null; });

        // Scale values to Y within row
        var vals = validPts.map(function(p){ return p.v; });
        var vMin = Math.min.apply(null, vals);
        var vMax = Math.max.apply(null, vals);
        var vRange = vMax - vMin || 1;
        var PAD = 18;

        function scaleY(v) {
          return rowY + PAD + (1 - (v - vMin) / vRange) * (ROW_H - PAD * 2);
        }

        // Draw connecting line
        if (validPts.length > 1) {
          var linePts = validPts.map(function(p){ return p.x + ',' + scaleY(p.v); }).join(' ');
          svg += '<polyline points="' + linePts + '" fill="none" stroke="' + row.color + '" stroke-width="1.5" stroke-linejoin="round"/>';
        }

        // Draw points and values
        validPts.forEach(function(p) {
          var py = scaleY(p.v);
          svg += '<circle cx="' + p.x + '" cy="' + py + '" r="4" fill="' + row.color + '"/>';
          svg += '<text x="' + p.x + '" y="' + (py - 7) + '" text-anchor="middle" font-size="8.5" font-weight="700" fill="' + row.color + '">' + row.fmt(p.v) + '</text>';
        });
      });

      // Recent/Total legend
      svg += '<text x="4" y="' + (SVG_H - 4) + '" font-size="8" fill="#7a7a7a">✓ Recente</text>';

      svg += '</svg>';

      return '<div class="card" style="padding:10px 12px"><div class="ctop"></div>'
        + '<div style="font-size:7.5pt;font-weight:700;color:#1a1a1a;margin-bottom:8px;letter-spacing:0.5px">Histórico da Composição Corporal</div>'
        + svg
        + (deltaGord !== null && deltaGord < 0 ? '<div style="text-align:center;margin-top:10px"><span style="display:inline-block;padding:4px 16px;border-radius:14px;font-size:9pt;font-weight:600;background:#e8f8ee;color:#1a7a3e;border:1px solid #a3d9b8">Redução de ' + Math.abs(deltaGord).toFixed(1) + ' kg de gordura — excelente!</span></div>' : '')
        + '</div>';
    })()


    // NOTA MÉDICA (se existir)


    + '</div>'

    // FOOTER
    + '<div class="ftr"><div style="text-align:right"><div style="font-family:Playfair Display,serif;font-size:11pt;color:#1a1a1a">' + resp + '</div><div style="font-size:8pt;color:#7a7a7a;letter-spacing:1px;margin-top:1px">' + crm + '</div></div></div>'
    + '</div>'

    // SCRIPTS
    + '<script>'
    + 'function initLaudo(){setTimeout(function(){'
    + 'var btn=document.createElement("div");btn.id="btn-bar";btn.style.cssText="position:fixed;top:0;left:0;right:0;z-index:9999;background:#1D2846;display:flex;align-items:center;gap:10px;padding:10px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.2)";'
    + 'btn.innerHTML="<span style=\'color:rgba(255,255,255,0.6);font-size:12px;font-family:Rajdhani,sans-serif;flex:1\'>Cl\u00ednica Vitta | Bioimpedância</span><button onclick=\'window.print()\' style=\'background:#C9A84C;color:#1D2846;border:none;padding:8px 20px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer\'>\ud83d\udda8\ufe0f Imprimir</button><button onclick=\'salvarPDF()\' style=\'background:transparent;color:#C9A84C;border:2px solid #C9A84C;padding:8px 20px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer\'> Salvar PDF</button><button onclick=\'window.close()\' style=\'background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.2);padding:8px 14px;border-radius:4px;font-size:12px;cursor:pointer\'>\u2715 Fechar</button>";'
    + 'document.body.insertBefore(btn,document.body.firstChild);document.body.style.paddingTop="52px";'
    + '},300);}; if(typeof Chart!=="undefined")initLaudo();'
    + 'function salvarPDF(){var b=document.getElementById("btn-bar");if(b)b.style.display="none";document.body.style.paddingTop="0";window.print();setTimeout(function(){if(b){b.style.display="flex";document.body.style.paddingTop="52px";}},1200);}'
    + '<\/script><\/body><\/html>';

  const win = window.open('', '_blank');
  if (!win) { toast('Permita pop-ups para abrir o laudo', 'error'); return; }
  win.document.write(laudoHTML);
  win.document.close();
}

// ========== TRHE ==========
async function renderTRHE() {
  const { data: exames } = await sb.from('planos_trhe').select('*').eq('patient_id', currentPatientId).order('data_exame', { ascending: false });
  const lista = exames || [];
  const c = document.getElementById('clinica-sub-content');

  let html = '<div class="section-header"><div class="section-title">\ud83e\udeb2 Teste Respirat\u00f3rio do H\u00e2 (TRHE)</div>'
    + '<button class="btn btn-primary btn-sm" onclick="showFormTRHE(null)">+ Novo Exame</button></div>';

  if (!lista.length) {
    html += '<div class="empty"><div class="empty-icon">\ud83e\udeb2</div><div>Nenhum exame registrado</div><div style="font-size:12px;color:var(--text-muted);margin-top:8px">Clique em "+ Novo Exame" para registrar o primeiro TRHE deste paciente.</div></div>';
    c.innerHTML = html;
    return;
  }

  // Evolutivo list
  html += '<div style="margin-bottom:16px">';
  lista.forEach((ex, idx) => {
    const siboLabel = ex.sibo ? '\u2713 SIBO Positivo' : 'SIBO Negativo';
    const siboCor = ex.sibo ? '#991b1b' : '#166534';
    const siboBg = ex.sibo ? '#fee2e2' : '#dcfce7';
    const sgfCls = ex.sgf >= 61 ? '#dc2626' : ex.sgf >= 41 ? '#d97706' : ex.sgf >= 21 ? '#2563eb' : '#6b7280';
    const sgfBg = ex.sgf >= 61 ? '#fee2e2' : ex.sgf >= 41 ? '#fef3c7' : ex.sgf >= 21 ? '#dbeafe' : '#f3f4f6';
    html += '<div class="trhe-evolutivo-item" onclick="showLaudoTRHE(' + ex.id + ')">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">'
      + '<div>'
      + '<div style="font-weight:700;font-size:14px">\ud83d\udcc5 ' + isoToDisplay(ex.data_exame) + '</div>'
      + '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">'
      + 'Delta H\u2082: <strong>' + (ex.delta_h2 || 0) + ' ppm</strong>'
      + ' \u00b7 IFI: <strong>' + (ex.ifi || 0) + '</strong>'
      + ' \u00b7 AUC: <strong>' + (ex.auc || 0) + '</strong>'
      + (ex.preparo_adequado === false ? ' \u00b7 <span style="color:var(--warning)">Preparo inadequado</span>' : '')
      + '</div>'
      + '</div>'
      + '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
      + '<span style="font-size:11px;font-weight:700;color:' + siboCor + ';background:' + siboBg + ';padding:3px 10px;border-radius:99px">' + siboLabel + '</span>'
      + '<span style="font-size:11px;font-weight:700;color:' + sgfCls + ';background:' + sgfBg + ';padding:3px 10px;border-radius:99px">SGF: ' + (ex.sgf || 0) + '</span>'
      + '<span style="font-size:11px;color:var(--accent)">Ver laudo \u2192</span>'
      + '</div></div></div>';
  });
  html += '</div>';

  // Chart evolutivo SGF se tiver 2+ exames
  if (lista.length >= 2) {
    html += '<div class="card"><div class="card-title">Evolu\u00e7\u00e3o do SGF (Score Global de Fermenta\u00e7\u00e3o)</div>'
      + '<div style="position:relative;height:160px"><canvas id="chart-trhe-evolutivo"></canvas></div></div>';
  }

  c.innerHTML = html;

  if (lista.length >= 2) {
    setTimeout(() => {
      const canvas = document.getElementById('chart-trhe-evolutivo');
      if (!canvas) return;
      const labels = [...lista].reverse().map(e => isoToDisplay(e.data_exame));
      const sgfData = [...lista].reverse().map(e => e.sgf || 0);
      new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'SGF',
            data: sgfData,
            borderColor: '#1D2846',
            backgroundColor: 'rgba(29,40,70,.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 5,
            borderWidth: 2,
            pointBackgroundColor: sgfData.map(v => v >= 61 ? '#dc2626' : v >= 41 ? '#d97706' : '#1D2846')
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 10 } } },
            y: { min: 0, max: 100, grid: { color: 'rgba(0,0,0,.06)' }, ticks: { font: { size: 10 }, stepSize: 20 } }
          }
        }
      });
    }, 150);
  }
}

function calcularTRHE(vals, sintomas, intensidade, preparoAdequado) {
  const { t0, t15, t30, t45, t60, t90, t120, t150, t180 } = vals;
  const pontos90 = [t15, t30, t45, t60, t90];
  const pico90 = Math.max(...pontos90);
  const tempoPico90 = [15, 30, 45, 60, 90][pontos90.indexOf(pico90)];
  const deltaH2 = pico90 - t0;
  const sibo = deltaH2 >= 20;
  const todosValores = [t0, t15, t30, t45, t60, t90, t120, t150, t180];
  const picoAbsoluto = Math.max(...todosValores);
  const temposPicoAbs = [0, 15, 30, 45, 60, 90, 120, 150, 180];
  const tempoPicoAbsoluto = temposPicoAbs[todosValores.indexOf(picoAbsoluto)];
  const ifi = picoAbsoluto - t0;
  const basalElevado = t0 > 20;
  const fermentacaoColonica = t120 > t90 || t150 > t90 || t180 > t90;
  const baixaProducao = todosValores.every(v => v < 10);

  // AUC trapezoidal
  const tempos = [0, 15, 30, 45, 60, 90, 120, 150, 180];
  let auc = 0;
  for (let i = 1; i < tempos.length; i++) {
    auc += (tempos[i] - tempos[i-1]) * (todosValores[i-1] + todosValores[i]) / 2;
  }
  auc = Math.round(auc);

  // SGF
  let sgf = 0;
  sgf += ifi < 20 ? 10 : ifi <= 40 ? 20 : ifi <= 60 ? 30 : 40;
  sgf += picoAbsoluto < 20 ? 5 : picoAbsoluto <= 40 ? 10 : picoAbsoluto <= 60 ? 15 : 20;
  sgf += t0 < 10 ? 0 : t0 <= 20 ? 5 : 15;
  sgf += fermentacaoColonica ? 15 : 0;
  const isfMap = { 'sem': 0, 'leve': 3, 'moderado': 6, 'intenso': 10 };
  sgf += isfMap[intensidade] || 0;

  const isf = intensidade === 'intenso' ? 3 : intensidade === 'moderado' ? 2 : intensidade === 'leve' ? 1 : 0;

  const perfilIFI = ifi < 20 ? 'Baixa fermenta\u00e7\u00e3o' : ifi <= 40 ? 'Fermenta\u00e7\u00e3o habitual' : ifi <= 60 ? 'Fermenta\u00e7\u00e3o aumentada' : 'Hiperfermenta\u00e7\u00e3o intestinal';
  const classSGF = sgf <= 20 ? 'Fermenta\u00e7\u00e3o reduzida' : sgf <= 40 ? 'Fermenta\u00e7\u00e3o habitual' : sgf <= 60 ? 'Fermenta\u00e7\u00e3o aumentada' : sgf <= 80 ? 'Hiperfermenta\u00e7\u00e3o intestinal' : 'Hiperfermenta\u00e7\u00e3o intestinal intensa';

  return {
    t0, t15, t30, t45, t60, t90, t120, t150, t180,
    pico90, tempoPico90, deltaH2, sibo,
    picoAbsoluto, tempoPicoAbsoluto, ifi, basalElevado,
    fermentacaoColonica, baixaProducao, auc, sgf, isf,
    perfilIFI, classSGF, sintomas, intensidade, preparoAdequado
  };
}

async function salvarTRHE(exameId) {
  const vals = getTRHEInputValues();
  const sintomas = document.getElementById('trhe-sintomas').value.trim();
  const intensidade = document.getElementById('trhe-intensidade').value;
  const preparo = document.getElementById('trhe-preparo').value === 'sim';
  const dataExame = displayToISO(document.getElementById('trhe-data').value.trim());

  if (!dataExame) { toast('Informe a data do exame', 'error'); return; }

  const r = calcularTRHE(vals, sintomas, intensidade, preparo);
  const textos = gerarLaudoTextos(r);

  const payload = {
    patient_id: currentPatientId,
    data_exame: dataExame,
    preparo_adequado: preparo,
    sintomas: sintomas || null,
    isf: r.isf,
    valores_h2: vals,
    delta_h2: r.deltaH2,
    pico_h2_90: r.pico90,
    tempo_pico_90: r.tempoPico90,
    pico_h2_absoluto: r.picoAbsoluto,
    tempo_pico_absoluto: r.tempoPicoAbsoluto,
    ifi: r.ifi,
    sgf: r.sgf,
    auc: r.auc,
    sibo: r.sibo,
    basal_elevado: r.basalElevado,
    fermentacao_colonica: r.fermentacaoColonica,
    baixa_producao_h2: r.baixaProducao,
    perfil_fermentativo: r.perfilIFI,
    classificacao_sgf: r.classSGF,
    laudo_analise_curva: textos.analiseCurva,
    laudo_perfil: textos.perfilFermentativo,
    laudo_impressao: textos.impressaoCl,
    laudo_interpretacao: textos.interpretacao,
    laudo_conclusao: textos.conclusao,
    registrado_por: currentUser.name
  };

  let error;
  if (exameId) {
    payload.updated_by = currentUser.name;
    payload.updated_at = new Date().toISOString();
    const res = await sb.from('planos_trhe').update(payload).eq('id', exameId);
    error = res.error;
  } else {
    const res = await sb.from('planos_trhe').insert(payload);
    error = res.error;
  }

  if (error) { toast('Erro ao salvar: ' + error.message, 'error'); return; }
  closeModal('modal-generic');
  toast(exameId ? 'Exame atualizado!' : 'Exame registrado!', 'success');
  clinicaSubTab = 'trhe';
  renderClinica();
}

async function salvarEdicaoLaudo(id) {
  const updates = {
    laudo_analise_curva: document.getElementById('lte-analise')?.value || '',
    laudo_perfil: document.getElementById('lte-perfil')?.value || '',
    laudo_impressao: document.getElementById('lte-impressao')?.value || '',
    laudo_interpretacao: document.getElementById('lte-interp')?.value || '',
    laudo_conclusao: document.getElementById('lte-conclusao')?.value || '',
    updated_by: currentUser.name,
    updated_at: new Date().toISOString()
  };
  const { error } = await sb.from('planos_trhe').update(updates).eq('id', id);
  if (error) { toast('Erro ao salvar: ' + error.message, 'error'); return; }
  toast('Laudo salvo!', 'success');
  closeModal('modal-generic');
  clinicaSubTab = 'trhe';
  renderClinica();
}

  if (!confirm('Excluir este exame? Esta a\u00e7\u00e3o n\u00e3o pode ser desfeita.')) return;
  await sb.from('planos_trhe').delete().eq('id', id);
  toast('Exame exclu\u00eddo', 'success');
  closeModal('modal-generic');
  clinicaSubTab = 'trhe';
  renderClinica();
}

async function saveSessao(){
  let receita_path=null;
  const file=document.getElementById('ss-file')?.files[0];
  if(file){const safeName=file.name.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]/g,'_');const path=currentPatientId+'/soro_'+Date.now()+'_'+safeName;const{error}=await sb.storage.from('documents').upload(path,file,{contentType:file.type||'application/octet-stream'});if(!error)receita_path=path;}
  const tipo=document.getElementById('ss-tipo').value;
  const dataSessao=document.getElementById('ss-data').value;
  const hora=document.getElementById('ss-hora').value||'09:00';
  const subs=document.getElementById('ss-subs').value.trim();
  const obs=document.getElementById('ss-obs').value.trim();
  const{data:novaSessao,error}=await sb.from('planos_soro_sessoes').insert({patient_id:currentPatientId,tipo_sessao:tipo,data_sessao:dataSessao,substancias:subs,observacao:obs,receita_path,registrado_por:currentUser.name}).select().single();
  if(error){toast('Erro ao salvar sess\u00e3o','error');return;}
  const apptId=await criarAgendaAutomatica('soro',dataSessao,tipo+(subs?': '+subs.slice(0,50):''),novaSessao.id,'soro_sessoes');
  if(apptId)await sb.from('planos_appointments').update({time_str:hora}).eq('id',apptId);
  closeModal('modal-generic');toast('Sess\u00e3o registrada + agenda criada!','success');patTab('soroterapia');
}
async function deleteSessao(id,apptId){
  if(!confirm('Remover esta sess\u00e3o? O agendamento vinculado tamb\u00e9m ser\u00e1 removido.'))return;
  const{data:old}=await sb.from('planos_soro_sessoes').select('*').eq('id',id).single();
  await sb.from('planos_soro_sessoes').delete().eq('id',id);
  if(apptId)await sb.from('planos_appointments').delete().eq('id',apptId);

  patTab('soroterapia');
}

async function renderPatAgenda(){
  const[{data:appts},{data:histAppts}]=await Promise.all([
    sb.from('planos_appointments').select('*').eq('patient_id',currentPatientId).order('created_at'),
    sb.from('planos_appt_historico').select('*').eq('patient_id',currentPatientId)
  ]);
  const c=document.getElementById('patient-tab-content');
  const sorted=(appts||[]).sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
  const hist=histAppts||[];
  const cancelCount=hist.filter(h=>h.tipo==='cancelamento').length;
  const remarcCount=hist.filter(h=>h.tipo==='remarcacao').length;
  const cancelFromStatus=(appts||[]).filter(a=>a.status==='Cancelou').length;
  const totalCanc=Math.max(cancelCount,cancelFromStatus);
  function apptHtml(a){
    const isAuto=!!a.origem_tabela;
    const statusOpts=['Agendado','Compareceu','Faltou','Cancelou'].map(s=>'<option '+(a.status===s?'selected':'')+'>'+s+'</option>').join('');
    const borderLeft=isAuto?'border-left:3px solid var(--success)':a.status==='Cancelou'?'border-left:3px solid var(--danger)':a.status==='Faltou'?'border-left:3px solid var(--warning)':'';
    return '<div class="appt-item" style="'+borderLeft+'">'
      +'<div class="appt-time">'+(a.time_str||'--:--')+'</div>'
      +'<div class="appt-info">'
      +'<div class="appt-name">'+fmtDate(a.date_str||'')+' \u00b7 '+(a.procedimento||'')+'</div>'
      +'<div class="appt-sub">'+(a.tipo||'')+(a.observacao?' \u00b7 '+a.observacao:'')+'</div>'
      +(isAuto?'<div class="appt-sub" style="color:var(--success);font-weight:600">\ud83d\udd17 '+(a.origem_tabela==='soro_sessoes'?'Soroterapia':'Implante')+'</div>':'')
      +(a.profissional_nome?'<div class="appt-sub" style="color:var(--midnight);font-weight:600">\ud83d\udc64 '+a.profissional_nome+'</div>':'')
      +'<div style="margin-top:2px"><span class="user-badge">'+(a.registrado_por||'')+'</span></div>'
      +'</div>'
      +'<button onclick="editAppt('+a.id+')" title="Editar" style="padding:5px 9px;border-radius:7px;background:transparent;border:1.5px solid var(--border);color:var(--midnight);cursor:pointer;font-size:14px">&#9999;&#65039;</button>'
      +'<select style="border:1.5px solid var(--border);border-radius:8px;padding:4px 8px;font-size:12px;font-family:var(--font)" onchange="handleApptStatusChange('+a.id+','+currentPatientId+',this.value,this)">'+statusOpts+'</select>'
      +'<button class="btn-icon" onclick="excluirAgendamentoPat('+a.id+')" title="Excluir cadastro errado">\ud83d\uddd1</button>'
      +'</div>';
  }
  let html='';
  if(totalCanc>0||remarcCount>0){
    html+='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">';
    if(totalCanc>0)html+='<span style="background:#fee2e2;color:#991b1b;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700">\u274c '+totalCanc+' cancelamento(s)</span>';
    if(remarcCount>0)html+='<span style="background:#dbeafe;color:#1e40af;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700">\ud83d\udd04 '+remarcCount+' remarca\u00e7\u00e3o(oes)</span>';
    html+='</div>';
  }
  html+='<div class="section-header"><div class="section-title">Agendamentos</div><button class="btn btn-primary btn-sm" onclick="showAddApptPatient()">+ Add</button></div>';
  html+=sorted.slice(0,5).map(a=>apptHtml(a)).join('');
  if(sorted.length>5){
    html+='<div id="more-appts" style="display:none">'+sorted.slice(5).map(a=>apptHtml(a)).join('')+'</div>';
    html+='<button class="btn btn-ghost btn-full" onclick="document.getElementById(\'more-appts\').style.display=\'block\';this.style.display=\'none\'">Ver todos ('+sorted.length+') \u2193</button>';
  }
  if(!sorted.length)html+='<div class="empty"><div class="empty-icon">\ud83d\udcc5</div>Sem agendamentos</div>';
  if(hist.length){
    html+='<div class="card" style="margin-top:12px"><div class="card-title">\ud83d\udcdd Hist\u00f3rico de Presen\u00e7as e Ocorr\u00eancias</div>';
    hist.slice().reverse().forEach(h=>{
      const cor=h.tipo==='cancelamento'?'var(--danger)':h.tipo==='falta'?'var(--warning)':'var(--accent)';
      const icon=h.tipo==='cancelamento'?'\u274c':h.tipo==='falta'?'\u26a0\ufe0f':'\ud83d\udd04';
      const label=h.tipo==='cancelamento'?'Cancelamento':h.tipo==='falta'?'Falta':'Remarca\u00e7\u00e3o';
      html+='<div style="padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px;display:flex;align-items:flex-start;gap:8px">'
        +'<span>'+icon+'</span>'
        +'<div><div style="font-weight:600;color:'+cor+'">'+label+'</div>'
        +(h.observacao?'<div style="color:var(--text-muted)">'+h.observacao+'</div>':'')
        +'<div style="font-size:11px;color:var(--text-muted);margin-top:2px">'+isoToDisplay(h.created_at||'')+' \u00b7 <span class="user-badge">'+h.registrado_por+'</span></div>'
        +'</div></div>';
    });
    html+='</div>';
  }
  c.innerHTML=html;
}

function selectFormLibrary(id,patId,patName){

  // Update visual
  document.querySelectorAll('[name="form-lib"]').forEach(r=>{
    const lbl=r.closest('label');
    if(parseInt(r.value)===id){
      r.checked=true;
      lbl.style.border='1.5px solid var(--deep)';
      lbl.style.background='#f0f7f8';

  c.innerHTML='<div style="padding:32px 24px;font-size:13px;color:var(--text-muted)">Carregando leads...</div>';
  try{
    const[{data:leads},{data:ativs}]=await Promise.all([
      sb.from('planos_leads').select('*').order('created_at',{ascending:false}),
      sb.from('planos_leads_atividades').select('lead_id,tipo,descricao,created_at').order('created_at',{ascending:false})
    ]);
    _leadsData=leads||[];
    _leadsAtividades=ativs||[];
  }catch(e){_leadsData=[];_leadsAtividades=[];}
  buildLeadsUI();
  // Auto-refresh a cada 2 minutos
  if(_leadsInterval)clearInterval(_leadsInterval);
  _leadsInterval=setInterval(async function(){
    if(document.getElementById('ntab-leads')&&document.getElementById('ntab-leads').classList.contains('active')){
      try{
        const{data:leads}=await sb.from('planos_leads').select('*').order('created_at',{ascending:false});
        var novos=(leads||[]).filter(function(l){return !(_leadsData||[]).find(function(e){return e.id===l.id;});});
        _leadsData=leads||[];
        if(novos.length){
          buildLeadsUI();
          toast(novos.length+' novo'+(novos.length>1?'s leads chegaram':' lead chegou')+'!','success');
        }
      }catch(e){}
    } else {
      clearInterval(_leadsInterval);
    }
  },120000);
}

async function salvarNovoLead(){
  var nome=document.getElementById('lead-nome').value.trim();
  if(!nome){toast('Informe o nome','error');return;}
  var _canais=Array.from(document.querySelectorAll('input[name="lead-canal"]:checked')).map(function(c){return c.value;}).join(', ');
  var data={nome:nome,telefone:document.getElementById('lead-tel').value.trim(),email:document.getElementById('lead-email').value.trim(),origem:document.getElementById('lead-origem').value,canal_marketing:_canais||null,medico_interesse:document.getElementById('lead-medico').value,proximo_contato:document.getElementById('lead-pc').value||null,observacao:document.getElementById('lead-obs').value.trim()||null,status:'novo',created_at:new Date().toISOString()};
  try{
    await sb.from('planos_leads').insert(data);
    closeModal('modal-generic');
    toast('Lead cadastrado!','success');
    await renderLeads();
  }catch(e){toast('Erro ao salvar: '+e.message,'error');}
}

function toggleAtivObs(uid){
  var el=document.getElementById(uid);
  var arr=document.getElementById('arr-'+uid);
  if(!el)return;
  var aberto=el.style.display!=='none';
  el.style.display=aberto?'none':'block';
  if(arr)arr.style.transform=aberto?'':'rotate(90deg)';
}

async function salvarObsAtividade(ativId,uid){
  var obs=document.getElementById('obs-'+uid).value.trim();
  if(!obs){toast('Digite a observação','error');return;}
  try{
    await sb.from('planos_leads_atividades').update({obs:obs}).eq('id',ativId);
    toast('Observação salva!','success');
    // Atualiza visual sem fechar modal
    var el=document.getElementById(uid);
    if(el)el.style.borderTop='2px solid var(--tidal)';
  }catch(e){toast('Erro: '+e.message,'error');}
}

async function registrarAtividadeComObs(leadId,tipo,descricaoPadrao){
  var el=document.getElementById('reg-obs-'+leadId);
  var obs=el?el.value.trim():'';
  // Se for nota pura, obs e obrigatorio
  if(tipo==='nota'&&!obs){toast('Digite a nota antes de salvar','error');if(el)el.focus();return;}
  // Monta descricao: padrao + obs se houver
  var descricao=descricaoPadrao;
  if(obs)descricao=(descricaoPadrao?descricaoPadrao+': ':'')+obs;
  await registrarAtividade(leadId,tipo,descricao);
  if(el)el.value='';
}

async function registrarAtividade(leadId,tipo,descricao){

async function salvarLead(id){
  var lead=(_leadsData||[]).find(function(l){return l.id===id;});
  var novoStatus=document.getElementById('edlead-status').value;
  var _canaisEd=Array.from(document.querySelectorAll('input[name="edlead-canal"]:checked')).map(function(c){return c.value;}).join(', ');
  var data={status:novoStatus,telefone:document.getElementById('edlead-tel').value.trim(),email:document.getElementById('edlead-email').value.trim(),canal_marketing:_canaisEd||null,proximo_contato:document.getElementById('edlead-pc').value||null,observacao:document.getElementById('edlead-obs').value.trim()||null,updated_at:new Date().toISOString()};
  try{
    await sb.from('planos_leads').update(data).eq('id',id);
    // Registra automaticamente quando status muda
    if(lead&&lead.status!==novoStatus){
      var statusLabels={novo:'Novo Lead',contato:'Contato Feito',negociacao:'Em Negociação',agendado:'Agendado',atendido:'Atendido',perdido:'Perdido'};
      await sb.from('planos_leads_atividades').insert({lead_id:id,tipo:'status_alterado',descricao:'Status alterado: '+(statusLabels[lead.status]||lead.status)+' → '+(statusLabels[novoStatus]||novoStatus),registrado_por:currentUser?currentUser.name:'Secretaria',created_at:new Date().toISOString()});
    }
    closeModal('modal-generic');
    toast('Lead atualizado!','success');
    await renderLeads();
  }catch(e){toast('Erro: '+e.message,'error');}
}

async function avancarLead(id){
  var lead=(_leadsData||[]).find(function(l){return l.id===id;});
  if(!lead)return;
  var ordem=['novo','contato','negociacao','agendado','atendido'];
  var idx=ordem.indexOf(lead.status||'novo');
  if(idx<0||idx>=ordem.length-1)return;
  var proximo=ordem[idx+1];
  if(proximo==='agendado'){abrirModalAgendarLead(id);return;}
  if(proximo==='atendido'){abrirModalAtendido(id);return;}
  try{
    await sb.from('planos_leads').update({status:proximo,updated_at:new Date().toISOString()}).eq('id',id);
    toast('Lead avançado!','success');
    await renderLeads();
  }catch(e){toast('Erro: '+e.message,'error');}
}

async function confirmarAtendido(leadId){
  var _lead=(_leadsData||[]).find(function(l){return l.id===leadId;});
  var valor=parseFloat(document.getElementById('atend-valor').value)||0;
  var obs=document.getElementById('atend-obs').value.trim();
  var btn=document.querySelector('#modal-generic-content .btn-primary');
  if(btn){btn.textContent='Salvando...';btn.disabled=true;}
  try{
    await sb.from('planos_leads').update({status:'atendido',valor_atendimento:valor||null,updated_at:new Date().toISOString()}).eq('id',leadId);
    await sb.from('planos_leads_atividades').insert({lead_id:leadId,tipo:'status_alterado',descricao:'Atendido'+(valor?' — R$ '+valor.toLocaleString('pt-BR',{minimumFractionDigits:2}):'')+(obs?' — '+obs:''),registrado_por:currentUser?currentUser.name:'Secretaria',created_at:new Date().toISOString()});

async function reagendarLead(leadId,leadNome){
  // Verifica se ja existe agendamento futuro para esse paciente
  try{
    var hoje=new Date();
    var{data:pats}=await sb.from('planos_patients').select('id').eq('name',leadNome);
    if(pats&&pats.length){
      var patId=pats[0].id;
      var{data:appts}=await sb.from('planos_appointments').select('date_str,time_str,status').eq('patient_id',patId).neq('status','Cancelado').order('date_str',{ascending:false}).limit(1);
      if(appts&&appts.length){
        var ultimo=appts[0];
        if(confirm('Á aviso: '+escHtml(leadNome)+' já tem agendamento registrado ('+escHtml(ultimo.date_str||'')+(ultimo.time_str?' às '+escHtml(ultimo.time_str):'')+', status: '+escHtml(ultimo.status||'')+').\n\nDeseja criar um NOVO agendamento mesmo assim?')){
          abrirModalAgendarLead(leadId);
        }
        return;
      }
    }
  }catch(e){}
  // Sem agendamento existente, abre normalmente
  abrirModalAgendarLead(leadId);
}

async function confirmarAgendarLead(leadId){
  var lead=(_leadsData||[]).find(function(l){return l.id===leadId;});
  if(!lead)return;
  var dataVal=document.getElementById('aglead-data').value;
  if(!dataVal){toast('Informe a data','error');return;}

  var obs=document.getElementById('aglead-obs').value.trim();

  var btn=document.querySelector('#modal-generic-content .btn-primary');
  if(btn){btn.textContent='Salvando...';btn.disabled=true;}
  try{
    var patId=null;
    var _existingPat=null;
    try{const{data:_ep}=await sb.from('planos_patients').select('id').eq('name',lead.nome).maybeSingle();_existingPat=_ep;}catch(e){_existingPat=null;}
    if(_existingPat&&_existingPat.id){
      patId=_existingPat.id;
    } else {
      const{data:_np}=await sb.from('planos_patients').insert({name:lead.nome,telefone:lead.telefone||'',email:lead.email||'',active:true}).select('id');
      patId=_np&&_np[0]?_np[0].id:null;
    }
    if(!patId)throw new Error('N\u00e3o foi poss\u00edvel criar o paciente');
    await sb.from('planos_appointments').insert({patient_id:patId,date_str:dateStr,time_str:hora,profissional_nome:medico,status:'Agendado',observacao:obs||null});
    await jornadaOnAgendado(patId);
    await sb.from('planos_leads').update({status:'agendado',patient_id_vinculado:patId,updated_at:new Date().toISOString()}).eq('id',leadId);
    closeModal('modal-generic');
    toast(lead.nome+' agendado! Já aparece na Agenda e no Relacionamento.','success');
    await renderLeads();
  }catch(e){toast('Erro: '+e.message,'error');if(btn){btn.textContent='Confirmar agendamento';btn.disabled=false;}}
}

async function deletarLead(id){
  if(!confirm('Excluir este lead permanentemente?'))return;
  try{
    await sb.from('planos_leads').delete().eq('id',id);
    closeModal('modal-generic');
    toast('Lead excluído','success');
    await renderLeads();
  }catch(e){toast('Erro: '+e.message,'error');}
}

async function jornadaOnAgendado(patientId){
  // Insert patient into jornada at boasvindas stage if not already there
  let existing=null;
  try{const{data:_ex}=await sb.from('planos_jornada').select('id').eq('patient_id',patientId).eq('etapa','boasvindas').single();existing=_ex;}catch(e){existing=null;}
  if(!existing){
    try{await sb.from('planos_jornada').insert({patient_id:patientId,etapa:'_preconsulta_ativo',concluida:false,updated_at:new Date().toISOString()});}catch(e){}
  }
  // Mark patient as active in pre-consulta pipeline
  try{await sb.from('planos_jornada').upsert({patient_id:patientId,etapa:'_preconsulta_ativo',concluida:false,updated_at:new Date().toISOString()},{onConflict:'patient_id,etapa'});}catch(e){}
}

async function jornadaOnCompareceu(patientId){
  // Mark pre-consulta as done, move to pos-consulta
  await sb.from('planos_jornada').upsert({patient_id:patientId,etapa:'_preconsulta_ativo',concluida:true,updated_at:new Date().toISOString()},{onConflict:'patient_id,etapa'});
  await sb.from('planos_jornada').upsert({patient_id:patientId,etapa:'_posconsulta_ativo',concluida:false,updated_at:new Date().toISOString()},{onConflict:'patient_id,etapa'});
}
async function jornadaEncerrarPos(patientId){
  await sb.from('planos_jornada').upsert({patient_id:patientId,etapa:'_posconsulta_ativo',concluida:true,updated_at:new Date().toISOString()},{onConflict:'patient_id,etapa'});
  toast('Paciente conclu\u00eddo no p\u00f3s-consulta','success');
  renderRelacionamento(_relRelTab);
}

async function saveContrato(){
  const file=document.getElementById('cont-file')?.files[0];
  if(!file){toast('Selecione um arquivo','error');return;}
  const safeName=file.name.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]/g,'_');
  const path='pat'+currentPatientId+'_'+Date.now()+'_'+safeName;
  const{error}=await sb.storage.from('contracts').upload(path,file,{contentType:file.type||'application/octet-stream',upsert:true});
  if(error){toast('Erro: '+error.message,'error');return;}
  await sb.from('planos_contratos').insert({patient_id:currentPatientId,file_path:path,label:document.getElementById('cont-label').value.trim(),data_upload:todayStr(),registrado_por:currentUser.name});
  closeModal('modal-generic');toast('Contrato salvo!','success');patTab('contrato');
}

async function renderAnamnese(){

      html+='<div class="card" style="margin-bottom:14px;padding:18px 20px">';
      html+='<div style="font-size:13px;font-weight:700;color:var(--tidal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">'+escHtml(secao)+'</div>';

        html+='<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">';
        html+='<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">'+escHtml(r.pergunta_texto)+'</div>';
        html+='<div style="font-size:13px;color:var(--text-muted);white-space:pre-wrap">'+(r.resposta?escHtml(r.resposta):'<span style="color:#ccc;font-style:italic">N\u00e3o respondido</span>')+'</div>';
        html+='</div>';
      });
      html+='</div>';
    });
    c.innerHTML=html;
  }catch(e){
    c.innerHTML='<div class="empty">Erro ao carregar anamnese: '+escHtml(e.message)+'</div>';

  if((edicoes||[]).length){
    const tabelaLabel=t=>t==='soro_sessoes'?'Sess\u00e3o Soro':t==='implantes'?'Implante':t==='financeiro'?'Pagamento':'Registro';

    html+='<div class="card"><div class="card-title">\ud83d\udcdd Log de Edi\u00e7\u00f5es e Exclus\u00f5es</div>';
    edicoes.forEach(e=>{
      let dadosAntes={};let dadosNovos={};
      try{dadosAntes=JSON.parse(e.dados_anteriores||'{}')}catch(x){}

      html+='<div style="padding:10px 0;border-bottom:1px solid var(--border-light)">'

        +'<span style="font-size:11px;font-weight:700;color:'+acaoColor(e.acao)+';background:'+acaoBg(e.acao)+';padding:2px 7px;border-radius:99px">'+acaoLabel(e.acao)+'</span>'
        +'</div>'

        +'</div>'
        +'<div style="text-align:right;flex-shrink:0">'
        +'<div style="font-size:11px;color:var(--text-muted)">'+isoToDisplay(e.created_at||'')+'</div>'
        +'<div style="margin-top:2px"><span class="user-badge">'+(e.registrado_por||'')+'</span></div>'
        +'</div></div></div>';

function goToAgendaDate(dateStr){
  closeModal('modal-generic');
  window._agDate=dateStr;
  window._agView='dia';
  if(typeof renderAgendaContent==='function')renderAgendaContent();
  else mainNav('agenda');
}
async function excluirAgendamento(id){
  if(!confirm('Excluir este agendamento?\n\nUse apenas para cadastros errados.\nEste registro N\u00c3O ficar\u00e1 no hist\u00f3rico.'))return;
  await sb.from('planos_appointments').delete().eq('id',id);
  toast('Agendamento exclu\u00eddo','success');
  if(typeof window.renderAgendaContent==='function'){window.renderAgendaContent();}else{mainNav('agenda');}
}
async function handleApptStatusChange(id,patientId,newStatus,selectEl){
  const oldStatus=selectEl.dataset.oldStatus||'Agendado';
  if(newStatus==='Cancelou'){
    const motivo=prompt('Motivo do cancelamento (opcional):');
    await sb.from('planos_appt_historico').insert({appointment_id:id,patient_id:patientId,tipo:'cancelamento',observacao:motivo||null,registrado_por:currentUser?currentUser.name:'Sistema',created_at:new Date().toISOString()});
    await sb.from('planos_appointments').update({status:newStatus,updated_by:currentUser?currentUser.name:'Sistema'}).eq('id',id);
    toast('Cancelamento registrado','success');
  } else if(newStatus==='Agendado'&&(oldStatus==='Cancelou'||oldStatus==='Faltou')){
    const motivo=prompt('Observa\u00e7\u00e3o sobre a remarca\u00e7\u00e3o (opcional):');
    await sb.from('planos_appt_historico').insert({appointment_id:id,patient_id:patientId,tipo:'remarcacao',observacao:motivo||null,registrado_por:currentUser?currentUser.name:'Sistema',created_at:new Date().toISOString()});
    await sb.from('planos_appointments').update({status:newStatus,updated_by:currentUser?currentUser.name:'Sistema'}).eq('id',id);
    toast('Remarca\u00e7\u00e3o registrada','success');
  } else {
    await sb.from('planos_appointments').update({status:newStatus,updated_by:currentUser?currentUser.name:'Sistema'}).eq('id',id);
    toast('Status atualizado','success');
  }
  selectEl.dataset.oldStatus=newStatus;
}
async function updateApptStatusAgenda(id,status){
  await sb.from('planos_appointments').update({status,updated_by:currentUser?currentUser.name:'Sistema'}).eq('id',id);
  toast('Status atualizado','success');
}
function showOverduePending(){

  if(!overdue.length){toast('Nenhuma pend\u00eancia','info');return;}
  const sorted=overdue.slice().sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
  let html='<div style="max-height:60vh;overflow-y:auto">';
  html+='<div style="font-size:13px;color:var(--text-muted);margin-bottom:14px">Clique em uma consulta para navegar at\u00e9 aquele dia e atualizar o status.</div>';
  sorted.forEach(a=>{
    const d=daysAgo(fmtDate(a.date_str));
    const dStr=fmtDate(a.date_str);
    html+='<div onclick="goToAgendaDate(\''+dStr+'\')" style="padding:12px 14px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;border:1.5px solid var(--border)">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">'
      +'<div>'
      +'<div style="font-weight:700;font-size:14px">'+(patMap[a.patient_id]||'Paciente #'+a.patient_id)+'</div>'
      +'<div style="font-size:12px;color:var(--text-muted);margin-top:3px">\ud83d\udcc5 '+dStr+' \u00b7 '+(a.time_str||'--:--')+' \u00b7 '+(a.procedimento||'')+' \u00b7 '+(a.tipo||'')+'</div>'
      +(a.profissional_nome?'<div style="font-size:11px;color:var(--midnight)">\ud83d\udc64 '+a.profissional_nome+'</div>':'')
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0">'
      +'<span style="font-size:12px;font-weight:700;color:var(--danger);background:#fee2e2;padding:3px 10px;border-radius:99px">'+(d||0)+'d atr\u00e1s</span>'
      +'<div style="font-size:11px;color:var(--accent);margin-top:4px">Ir para este dia \u2192</div>'
      +'</div>'
