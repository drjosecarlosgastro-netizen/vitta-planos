<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#1D2846"/>
<title>Clínica Vitta | Alphaville — Planos de Cuidado</title>
<link rel="manifest" id="pwa-manifest"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{
  --navy:#1D2846;--navy-light:#2d3d6b;
  --bg:#EDEDED;--white:#FFFFFF;--text:#1a1a2e;--text-muted:#6b7280;
  --border:#d1d5db;--border-light:#e5e7eb;
  --accent:#4A90D9;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(29,40,70,.12);--shadow-lg:0 8px 32px rgba(29,40,70,.18);
  --font:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);font-size:15px;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}
#screen-login{align-items:center;justify-content:center;background:var(--navy);padding:24px}
.login-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;text-align:center}
.login-logo{width:64px;height:64px;background:rgba(255,255,255,.12);border-radius:16px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px}
.login-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,.55);font-size:13px;margin-bottom:28px}
.login-type{display:flex;gap:8px;margin-bottom:24px;background:rgba(0,0,0,.2);border-radius:10px;padding:4px}
.login-type button{flex:1;padding:8px;border:none;background:transparent;color:rgba(255,255,255,.55);border-radius:8px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.login-type button.active{background:var(--accent);color:#fff}
.input-group{margin-bottom:14px;text-align:left}
.input-group label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.65);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.input-group input{width:100%;padding:11px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s}
.input-group input::placeholder{color:rgba(255,255,255,.35)}
.input-group input:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy-light)}
.btn-accent{background:var(--accent);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--border)}.btn-ghost:hover{border-color:var(--navy)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:6px}
.btn-full{width:100%;justify-content:center;padding:13px}
.btn-icon{padding:7px 9px;border-radius:7px;background:transparent;border:1.5px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all .2s;font-size:13px;font-family:var(--font)}
.btn-icon:hover{background:var(--bg);border-color:var(--navy);color:var(--navy)}
.topbar{background:var(--navy);padding:0 20px;display:flex;align-items:center;gap:10px;min-height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.topbar-logo{color:#fff;font-weight:700;font-size:15px}
.topbar-user{color:rgba(255,255,255,.6);font-size:12px;margin-left:4px}
.topbar-spacer{flex:1}
.topbar-action{background:transparent;border:none;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:8px;transition:all .2s;font-family:var(--font)}
.topbar-action:hover{color:#fff;background:rgba(255,255,255,.1)}
.topbar-back{color:#fff;font-size:20px;background:none;border:none;cursor:pointer;padding:4px 8px}
.navtabs{background:var(--white);border-bottom:1px solid var(--border-light);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:90}
.navtabs::-webkit-scrollbar{display:none}
.ntab{padding:13px 16px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px}
.ntab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:700}
.tabs{display:flex;gap:2px;overflow-x:auto;padding:0 16px;background:var(--white);border-bottom:1px solid var(--border-light);position:sticky;top:56px;z-index:50;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 13px;border:none;background:transparent;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:700}
.subtabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg);border-radius:10px;padding:4px}
.subtab{flex:1;padding:9px 12px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-radius:8px;transition:all .2s;text-align:center}
.subtab.active{background:var(--white);color:var(--navy);font-weight:700;box-shadow:var(--shadow)}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:40px}
.card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy)}
.field textarea{resize:vertical;min-height:72px}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.dash-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.dash-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:all .18s;border:2px solid transparent}
.dash-card:hover{border-color:var(--navy);box-shadow:var(--shadow-lg)}
.dash-card-num{font-size:32px;font-weight:700;color:var(--navy);line-height:1}
.dash-card-label{font-size:12px;color:var(--text-muted);margin-top:4px;font-weight:500}
.dash-card-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.patient-row{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .18s;border:1.5px solid transparent}
.patient-row:hover{border-color:var(--navy);box-shadow:var(--shadow)}
.patient-avatar{width:42px;height:42px;border-radius:12px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.patient-info{flex:1;min-width:0}
.patient-name{font-weight:700;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.patient-meta{font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.phase-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.phase-1{background:#dbeafe;color:#1d4ed8}.phase-2{background:#dcfce7;color:#166534}.phase-3{background:#fef9c3;color:#854d0e}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.pill-green{background:#dcfce7;color:#166534}.pill-red{background:#fee2e2;color:#991b1b}
.pill-amber{background:#fef3c7;color:#92400e}.pill-blue{background:#dbeafe;color:#1e40af}
.pill-gray{background:#f3f4f6;color:#6b7280}.pill-purple{background:#ede9fe;color:#5b21b6}
.agenda-day-header{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:4px 0;border-bottom:1.5px solid var(--border-light)}
.appt-item{background:var(--white);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.appt-item.overdue{border-left:3px solid var(--danger);background:#fff5f5}
.appt-time{font-weight:700;font-size:13px;color:var(--navy);min-width:46px}
.appt-info{flex:1}
.appt-name{font-weight:600;font-size:14px}
.appt-sub{font-size:12px;color:var(--text-muted)}
.prog-row{background:var(--white);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prog-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer}
.prog-detail{padding:0 16px 16px;display:none;border-top:1px solid var(--border-light)}
.prog-detail.open{display:block}
.attach-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:6px;flex-wrap:wrap}
.attach-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.attach-info{flex:1;min-width:160px}
.attach-name{font-weight:600;font-size:13px}
.attach-date{font-size:11px;color:var(--text-muted);margin-top:2px}
.etiqueta{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;color:#fff;margin-right:4px;margin-bottom:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 20px 32px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
.search-bar{display:flex;align-items:center;gap:10px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;margin-bottom:14px}
.search-bar input{border:none;outline:none;flex:1;font-family:var(--font);font-size:14px;background:transparent}
.alert-banner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:13px;font-weight:600}
.alert-warning{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.alert-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.alert-info{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.divider{height:1px;background:var(--border-light);margin:12px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:16px;font-weight:700;color:var(--text)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.text-sm{font-size:12px}.text-muted{color:var(--text-muted)}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-muted);font-size:14px}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.user-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:#ede9fe;color:#5b21b6}
.resumo-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.resumo-mini-card{background:var(--bg);border-radius:10px;padding:12px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:all .18s}
.resumo-mini-card:hover{border-color:var(--navy);background:#fff}
.resumo-mini-num{font-size:26px;font-weight:700;color:var(--navy);line-height:1}
.resumo-mini-label{font-size:11px;color:var(--text-muted);margin-top:3px}
.resumo-mini-link{font-size:10px;color:var(--accent);font-weight:600;margin-top:4px}
.enc-box-encerrado{background:#eff6ff;border:2px solid #93c5fd;border-radius:var(--radius-sm);padding:14px;margin-top:4px;display:flex;align-items:flex-start;gap:12px}
.enc-box-ativo{background:#f9fafb;border:1.5px solid var(--border-light);border-radius:var(--radius-sm);padding:14px;margin-top:4px}
.edit-inline{background:#f0f5ff;border:1.5px solid var(--accent);border-radius:var(--radius-sm);padding:12px;margin-top:8px;width:100%;display:none}
.edit-inline.open{display:block}
.edit-inline .field{margin-bottom:10px}
.edit-inline .field input,.edit-inline .field select,.edit-inline .field textarea{font-size:13px;padding:8px 10px}
.agenda-link-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:#dcfce7;color:#166534;cursor:pointer}
.agenda-link-badge.pending{background:#fef3c7;color:#92400e}
.hist-box{border-radius:var(--radius-sm);padding:14px;margin-bottom:10px}
.hist-box-soro{background:#f0f9ff;border:1.5px solid #bae6fd}
.hist-box-impl{background:#fdf4ff;border:1.5px solid #e9d5ff}
.hist-box-consult{background:#f0fdf4;border:1.5px solid #bbf7d0}
.hist-box-trhe{background:#fff7ed;border:1.5px solid #fed7aa}
.subtabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg);border-radius:10px;padding:4px}
.subtab{flex:1;padding:9px 12px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-radius:8px;transition:all .2s;text-align:center}
.subtab.active{background:var(--white);color:var(--navy);font-weight:700;box-shadow:var(--shadow)}
.laudo-section{margin-bottom:16px}
.laudo-section-title{font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--border-light)}
.laudo-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px}
.laudo-table th{background:var(--navy);color:#fff;padding:7px 10px;text-align:center;font-weight:600;font-size:12px}
.laudo-table td{padding:6px 10px;text-align:center;border-bottom:1px solid var(--border-light)}
.laudo-table tr:nth-child(even){background:#f9fafb}
.laudo-table td.highlight{background:#fef3c7;font-weight:700;color:#92400e}
.trhe-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.trhe-stat{background:var(--bg);border-radius:10px;padding:10px 12px;text-align:center}
.trhe-stat-num{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.trhe-stat-label{font-size:10px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.trhe-evolutivo-item{background:var(--white);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;border:1.5px solid transparent;transition:all .18s}
.trhe-evolutivo-item:hover{border-color:var(--navy)}
.trhe-evolutivo-item.selected{border-color:var(--accent);background:#f0f7ff}
.laudo-editavel{width:100%;padding:10px 13px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color .2s;resize:vertical;min-height:80px}
.laudo-editavel:focus{border-color:var(--navy)}
.sibo-positivo{background:#fee2e2;border:2px solid #fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:12px}
.sibo-negativo{background:#dcfce7;border:2px solid #86efac;border-radius:10px;padding:12px 16px;margin-bottom:12px}
@media print{
  body > *:not(#laudo-print-overlay){display:none!important}
  #laudo-print-overlay{display:block!important;position:static!important;background:#fff!important;padding:0!important}
  #laudo-print-page{box-shadow:none!important;margin:0!important;padding:10mm 14mm!important;max-width:none!important;width:100%!important}
  @page{size:A4 portrait;margin:0}
}
</style>
</head>
<body>
<div id="toast"></div>

<div id="screen-login" class="screen active">
  <div class="login-card">
    <div class="login-logo">&#127973;</div>
    <div class="login-title">Cl&#237;nica Vitta | Alphaville</div>
    <div class="login-sub">Controle de Planos de Cuidado</div>
    <div class="login-type">
      <button id="btn-type-doc" class="active" onclick="setLoginType('doctor')">Dr. Jos&#233; Carlos</button>
      <button id="btn-type-sec" onclick="setLoginType('secretary')">Secret&#225;ria</button>
    </div>
    <div class="input-group"><label>Senha</label>
      <input type="password" id="login-pass" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-accent btn-full" onclick="doLogin()">Entrar</button>
    <div id="login-error" style="color:#f87171;font-size:13px;margin-top:12px;display:none"></div>
  </div>
</div>

<div id="screen-app" class="screen" style="background:var(--bg)">
  <div class="topbar">
    <span class="topbar-logo">&#127973; Cl&#237;nica Vitta</span>
    <span class="topbar-user" id="topbar-user"></span>
    <div class="topbar-spacer"></div>
    <button class="topbar-action" onclick="logout()">Sair &#8594;</button>
  </div>
  <div class="navtabs">
    <button class="ntab active" id="ntab-dashboard" onclick="mainNav('dashboard')">Dashboard</button>
    <button class="ntab" id="ntab-patients" onclick="mainNav('patients')">Pacientes</button>
    <button class="ntab" id="ntab-agenda" onclick="mainNav('agenda')">Agenda</button>
    <button class="ntab" id="ntab-programa" onclick="mainNav('programa')">Programas</button>
    <button class="ntab" id="ntab-implantes" onclick="mainNav('implantes')">Implantes</button>
    <button class="ntab" id="ntab-avulsas" onclick="mainNav('avulsas')">Consultas Avulsas</button>
    <button class="ntab" id="ntab-financeiro-global" onclick="mainNav('financeiro-global')">&#128176; Financeiro</button>
    <button class="ntab" id="ntab-relatorios" onclick="mainNav('relatorios')">Relat&#243;rios</button>
    <button class="ntab" id="ntab-config" onclick="mainNav('config')">&#9881; Configura&#231;&#245;es</button>
  </div>
  <div id="main-content" class="content"></div>
</div>

<div id="screen-patient-detail" class="screen" style="background:var(--bg)">
  <div class="topbar">
    <button class="topbar-back" onclick="backToMain()">&#8249;</button>
    <span class="topbar-logo" id="pd-name-header">Paciente</span>
    <div class="topbar-spacer"></div>
    <button class="topbar-action" onclick="confirmarDeletePaciente()" style="color:#f87171;font-size:12px" title="Excluir paciente">&#128465; Excluir</button>
  </div>

function parseDateInt(d){if(!d)return 0;const p=d.split('/');if(p.length!==3)return 0;return parseInt(p[2]+p[1]+p[0]);}
function fmtDate(d){if(!d)return'';if(d.includes('/'))return d;const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function todayStr(){const n=new Date();return String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+n.getFullYear();}
function todayISO(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function displayToISO(d){if(!d)return'';const p=d.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:d;}
function isoToDisplay(iso){if(!iso)return'';const p=iso.split('T')[0].split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;}
function daysAgo(dateStr){if(!dateStr)return null;const p=dateStr.split('/');if(p.length!==3)return null;const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const now=new Date();now.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((now-d)/86400000);}
function monthsSince(dateStr){if(!dateStr)return 0;const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return 0;const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const n=new Date();return Math.max(0,(n.getFullYear()-d.getFullYear())*12+(n.getMonth()-d.getMonth()));}
function addMonthsToDisplay(dateStr,months){if(!dateStr)return'';const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return'';const d=new Date(parseInt(p[2]),parseInt(p[1])-1+months,parseInt(p[0]));return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function addDaysToDisplay(dateStr,days){if(!dateStr)return'\u2014';const p=(dateStr.includes('/')?dateStr:isoToDisplay(dateStr)).split('/');if(p.length!==3)return'\u2014';const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));d.setDate(d.getDate()+days);return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function calcPhase(inicioStr,duracao){const months=monthsSince(inicioStr);const third=Math.ceil(duracao/3);if(months<third)return 1;if(months<third*2)return 2;return 3;}

async function criarAgendaAutomatica(tipo,data,descricao,registroId,tabelaOrigem){
  try{
    const proc=tipo==='implante'?'Implante Hormonal':'Soroterapia';
    const {data:existing}=await sb.from('planos_appointments')
      .select('id').eq('patient_id',currentPatientId)
      .eq('origem_tabela',tabelaOrigem).eq('origem_id',registroId).maybeSingle();
    if(existing)return existing.id;
    const {data:sameDay}=await sb.from('planos_appointments')
      .select('id,origem_tabela').eq('patient_id',currentPatientId).eq('date_str',data);
    const dupLinked=(sameDay||[]).find(a=>a.origem_tabela===tabelaOrigem);
    if(dupLinked)return dupLinked.id;
    const {data:appt,error}=await sb.from('planos_appointments').insert({
      patient_id:currentPatientId,date_str:data,time_str:'09:00',
      procedimento:proc,tipo:'Ijet\u00e1vel',
      observacao:descricao?(descricao+'').slice(0,80):'',
      status:'Compareceu',registrado_por:currentUser.name,
      origem_tabela:tabelaOrigem,origem_id:registroId
    }).select().single();
    if(!error&&appt)return appt.id;
  }catch(e){console.warn('Auto-agenda falhou:',e);}
  return null;
}

function patientRowHtml(p){

}

function renderPatientList(query){
  query=query||'';
  const c=document.getElementById('main-content');
  const norm=normStr(query);
  let filtered=allPatients;
  if(!norm){
    if(patientsFilter==='active')filtered=filtered.filter(p=>p.active);
    else if(patientsFilter==='inactive')filtered=filtered.filter(p=>!p.active);
  }
  if(norm)filtered=filtered.filter(p=>normStr(p.name).includes(norm)||normStr(p.cpf||'').includes(norm));
  const listHtml=(filtered.length?filtered.map(p=>patientRowHtml(p)).join(''):'<div class="empty"><div class="empty-icon">\ud83d\udd0d</div>Nenhum paciente encontrado</div>');
  const btnTodos=document.getElementById('pbtn-todos');
  const btnAtivos=document.getElementById('pbtn-ativos');
  const btnEnc=document.getElementById('pbtn-enc');
  if(btnTodos)btnTodos.textContent='Todos ('+allPatients.length+')';
  if(btnAtivos)btnAtivos.textContent='Ativos ('+allPatients.filter(p=>p.active).length+')';
  if(btnEnc)btnEnc.textContent='Encerrados ('+allPatients.filter(p=>!p.active).length+')';
  const listContainer=document.getElementById('patient-list-container');
  if(listContainer){
    listContainer.innerHTML=listHtml;
  } else {
    c.innerHTML=
      '<div class="search-bar"><span>\ud83d\udd0d</span>'
      +'<input type="text" id="patient-search-input" placeholder="Buscar por nome ou CPF..." value="'+query+'" oninput="renderPatientList(this.value)" autocomplete="off"/>'
      +'<button class="btn btn-primary btn-sm" onclick="showNewPatientModal()">+</button></div>'
      +'<div style="display:flex;gap:8px;margin-bottom:14px">'
      +'<button id="pbtn-todos" class="btn btn-sm '+(patientsFilter==='all'?'btn-primary':'btn-ghost')+'" onclick="patientsFilter=\'all\';renderPatientListLocal()">Todos ('+allPatients.length+')</button>'
      +'<button id="pbtn-ativos" class="btn btn-sm '+(patientsFilter==='active'?'btn-primary':'btn-ghost')+'" onclick="patientsFilter=\'active\';renderPatientListLocal()">Ativos ('+allPatients.filter(p=>p.active).length+')</button>'
      +'<button id="pbtn-enc" class="btn btn-sm '+(patientsFilter==='inactive'?'btn-primary':'btn-ghost')+'" onclick="patientsFilter=\'inactive\';renderPatientListLocal()">Encerrados ('+allPatients.filter(p=>!p.active).length+')</button>'
      +'</div>'
      +'<div id="patient-list-container">'+listHtml+'</div>';
    if(query){const inp=document.getElementById('patient-search-input');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}}
  }
}

async function executarDeletePaciente(){
  const p=currentPatientData;
  const confirmName=document.getElementById('delete-confirm-name')?.value.trim();
  const motivo=document.getElementById('delete-motivo')?.value;
  const obs=document.getElementById('delete-obs')?.value.trim();
  if(confirmName.toLowerCase()!==p.name.toLowerCase()){toast('Nome n\u00e3o confere. Digite exatamente: '+p.name,'error');return;}
  const btn=document.querySelector('#modal-generic-content .btn-danger');
  if(btn){btn.disabled=true;btn.textContent='Excluindo...';}
  try{
    const [{data:appts},{data:fin},{data:soro},{data:envios},{data:impl},{data:contratos},{data:ciclos},{data:edicoes}]=await Promise.all([
      sb.from('planos_appointments').select('*').eq('patient_id',p.id),
      sb.from('planos_financeiro').select('*').eq('patient_id',p.id),
      sb.from('planos_soro_sessoes').select('*').eq('patient_id',p.id),
      sb.from('planos_soro_envios').select('*').eq('patient_id',p.id),
      sb.from('planos_implantes').select('*').eq('patient_id',p.id),
      sb.from('planos_contratos').select('*').eq('patient_id',p.id),
      sb.from('planos_historico_ciclos').select('*').eq('patient_id',p.id),
      sb.from('planos_historico_edicoes').select('*').eq('patient_id',p.id)
    ]);
    const backup={paciente_id_original:p.id,dados_paciente:JSON.stringify(p),dados_appointments:JSON.stringify(appts||[]),dados_financeiro:JSON.stringify(fin||[]),dados_soro_sessoes:JSON.stringify(soro||[]),dados_soro_envios:JSON.stringify(envios||[]),dados_implantes:JSON.stringify(impl||[]),dados_contratos:JSON.stringify(contratos||[]),dados_ciclos:JSON.stringify(ciclos||[]),dados_edicoes:JSON.stringify(edicoes||[]),motivo_exclusao:motivo,observacao:obs||null,deletado_por:currentUser.name,deletado_em:new Date().toISOString()};
    const {error:backupErr}=await sb.from('planos_pacientes_deletados').insert(backup);

function patTab(tab){
  const tabNames=['info','financeiro','clinica','soroterapia','implante','agenda','contrato','historico'];
  document.querySelectorAll('#patient-tabs .tab').forEach((t,i)=>t.classList.toggle('active',tabNames[i]===tab));
  const c=document.getElementById('patient-tab-content');
  c.innerHTML='<div class="loading"><div class="spinner"></div>Carregando...</div>';
  if(tab==='info')renderPatInfo();
  else if(tab==='financeiro')renderFinanceiro();
  else if(tab==='clinica')renderClinica();
  else if(tab==='soroterapia')renderSoroterapia();
  else if(tab==='implante')renderImplante();
  else if(tab==='agenda')renderPatAgenda();
  else if(tab==='contrato')renderContrato();
  else if(tab==='historico')renderHistorico();
}

function toggleTag(el,name,color){
  let tags=JSON.parse(document.getElementById('pi-tags').value||'[]');
  const idx=tags.findIndex(t=>t.name===name);
  if(idx>=0){tags.splice(idx,1);el.style.background='#e5e7eb';el.style.color='#6b7280';}
  else{tags.push({name,color});el.style.background=color;el.style.color='#fff';}
  document.getElementById('pi-tags').value=JSON.stringify(tags);
}
async function saveNewTagFromInfo(){
  const name=document.getElementById('new-tag-name').value.trim();
  const color=document.getElementById('new-tag-color').value;
  if(!name)return;
  const{data}=await sb.from('planos_config').select('value').eq('key','etiquetas').single();
  let tags=[];try{tags=JSON.parse(data?.value||'[]')}catch(e){}
  if(tags.some(t=>t.name===name)){toast('Etiqueta j\u00e1 existe','error');return;}
  tags.push({name,color});
  await sb.from('planos_config').upsert({key:'etiquetas',value:JSON.stringify(tags)});
  toast('Etiqueta criada!','success');renderPatInfo();
}

  const inicio=displayToISO(document.getElementById('pi-inicio').value.trim());

async function encerrarPlano(motivo){
  const label=motivo==='fim'?'Fim do Plano':'Desist\u00eancia';
  if(!confirm('Confirmar encerramento por "'+label+'"?\n\nAs sess\u00f5es de soroterapia ser\u00e3o arquivadas.'))return;
  const [{data:sessoes},{data:envios}]=await Promise.all([sb.from('planos_soro_sessoes').select('*').eq('patient_id',currentPatientId),sb.from('planos_soro_envios').select('*').eq('patient_id',currentPatientId)]);
  await sb.from('planos_historico_ciclos').insert({patient_id:currentPatientId,data_encerramento:todayISO(),motivo,plan_type:currentPatientData.plan_type,inicio_programa:currentPatientData.inicio_programa,sessoes_count:(sessoes||[]).length,envios_count:(envios||[]).length,sessoes_data:JSON.stringify(sessoes||[]),envios_data:JSON.stringify(envios||[]),registrado_por:currentUser.name});
  if((sessoes||[]).length)await sb.from('planos_soro_sessoes').delete().eq('patient_id',currentPatientId);
  if((envios||[]).length)await sb.from('planos_soro_envios').delete().eq('patient_id',currentPatientId);
  await sb.from('planos_patients').update({active:false,motivo_encerramento:motivo,data_encerramento:todayISO(),updated_by:currentUser.name,updated_at:new Date().toISOString()}).eq('id',currentPatientId);
  currentPatientData.active=false;currentPatientData.motivo_encerramento=motivo;currentPatientData.data_encerramento=todayISO();
  toast('Plano encerrado!','success');patTab('info');
}
async function reativarPlano(){
  if(!confirm('Reativar este plano?'))return;
  await sb.from('planos_patients').update({active:true,motivo_encerramento:null,data_encerramento:null,updated_by:currentUser.name,updated_at:new Date().toISOString()}).eq('id',currentPatientId);
  currentPatientData.active=true;currentPatientData.motivo_encerramento=null;currentPatientData.data_encerramento=null;
  toast('Plano reativado!','success');patTab('info');

    var dVisc = visc <= 9 ? 'Normal' : visc <= 14 ? 'Limite normal' : 'Alto';

    var ctrlMusc = null;

      var ideal = (bioSexo === 'masculino' || bioSexo === 'male') ? (bioAltura * bioAltura * 8.0) : (bioAltura * bioAltura * 6.5);
      ctrlMusc = parseFloat((mm - ideal).toFixed(1));

    // Cores
    function tagStyle(v, okVals, warnVals) {
      if (okVals.indexOf(v) >= 0) return 'color:#1a7a3e;background:#e8f8ee;border:1px solid #a3d9b8';
      if (warnVals && warnVals.indexOf(v) >= 0) return 'color:#9a5c00;background:#fef3e2;border:1px solid #f0c97a';
      return 'color:#a32d2d;background:#fdf0f0;border:1px solid #f09595';

    var elGord = document.getElementById('bio-diag-gord-display');
    var elVisc = document.getElementById('bio-diag-visc-display');
    var elCtrl = document.getElementById('bio-ctrl-musc-display');

    if (elGord && perc) { elGord.textContent = dGord; elGord.style.cssText += ';' + tagStyle(dGord, ['Normal'], []); }
    if (elVisc && visc) { elVisc.textContent = dVisc + ' (nível ' + visc + ')'; elVisc.style.cssText += ';' + tagStyle(dVisc, ['Normal'], ['Limite normal']); }
    if (elCtrl && ctrlMusc !== null) {
      elCtrl.textContent = (ctrlMusc >= 0 ? '+' : '') + ctrlMusc + ' kg — ' + (ctrlMusc >= 0 ? 'No ideal' : 'Abaixo do ideal');
      elCtrl.style.cssText += ';' + (ctrlMusc >= 0 ? 'color:#1a7a3e;background:#e8f8ee;border:1px solid #a3d9b8' : 'color:#9a5c00;background:#fef3e2;border:1px solid #f0c97a');
    }
  }
  setTimeout(function() {
    ['bio-imc','bio-perc_gordura','bio-gordura_visceral','bio-massa_magra'].forEach(function(fid) {
      var el = document.getElementById(fid);
      if (el) el.addEventListener('input', calcDiagBio);
    });
    calcDiagBio();
  }, 100);
}

    responsavel: respParts[0] || '',
    responsavel_crm: respParts[1] || '',
    amg_peso: fnum('amg_peso'),
    amg_musculo: fnum('amg_musculo'),
    amg_gordura: fnum('amg_gordura'),
    peso: fnum('peso'),
    massa_magra: fnum('massa_magra'),
    gordura_corporal: fnum('gordura_corporal'),
    agua_corporal: fnum('agua_corporal'),
    proteina: fnum('proteina'),
    minerais: fnum('minerais'),
    imc: fnum('imc'),
    perc_gordura: fnum('perc_gordura'),
    tmb: fnum('tmb'),
    smi: fnum('smi'),
    gordura_visceral: fnum('gordura_visceral'),
    seg_braco_d: fnum('seg_braco_d'),
    seg_braco_e: fnum('seg_braco_e'),
    seg_abdome: fnum('seg_abdome'),
    seg_perna_d: fnum('seg_perna_d'),
    seg_perna_e: fnum('seg_perna_e'),
    gord_braco_d: fnum('gord_braco_d'),
    gord_braco_e: fnum('gord_braco_e'),
    gord_abdome: fnum('gord_abdome'),
    gord_perna_d: fnum('gord_perna_d'),
    gord_perna_e: fnum('gord_perna_e'),
    diag_imc: (function() {
      var v = fnum('imc'); if (!v) return null;
      return v < 18.5 ? 'Baixo peso' : v < 25 ? 'Normal' : v < 30 ? 'Sobrepeso' : v < 35 ? 'Obesidade I' : 'Obesidade II';
    })(),
    diag_gordura: (function() {
      var v = fnum('perc_gordura'); var sx = (p.gender || '').toLowerCase(); if (!v) return null;
      if (sx === 'masculino' || sx === 'male') return v < 8 ? 'Abaixo do ideal' : v <= 19 ? 'Normal' : 'Acima do ideal';
      return v < 15 ? 'Abaixo do ideal' : v <= 33 ? 'Normal' : 'Acima do ideal';
    })(),
    diag_visceral: (function() {
      var v = fnum('gordura_visceral'); if (!v) return null;
      return v <= 9 ? 'Normal' : v <= 14 ? 'Limite normal' : 'Alto';
    })(),
    ctrl_muscular: (function() {
      var mm = fnum('massa_magra'); var alt = parseFloat(p.altura || 0);
      var sx = (p.gender || '').toLowerCase();
      if (!mm || !alt) return null;
      var ideal = sx === 'masculino' || sx === 'male' ? (alt * alt * 8.0) : (alt * alt * 6.5);
      return parseFloat((mm - ideal).toFixed(1));
    })(),
    nota_medico: fv('nota'),
    altura: p.altura || null,
    sexo: p.gender || null,
    updated_by: currentUser.name,
    updated_at: new Date().toISOString()
  };
  let err;
  if (id) { const r = await sb.from('planos_bioimpedancia').update(payload).eq('id', id); err = r.error; }
  else { const r = await sb.from('planos_bioimpedancia').insert(payload); err = r.error; }
  if (err) { toast('Erro ao salvar: ' + err.message, 'error'); return; }
  closeModal('modal-generic');
  toast('Avaliação salva!', 'success');
  await renderBioimpedancia();
}

async function gerarLaudoBio(id) {
  const { data: todos } = await sb.from('planos_bioimpedancia').select('*').eq('patient_id', currentPatientId).order('data_exame', { ascending: true });
  const lista = todos || [];
  const atual = lista.find(function(r) { return r.id === id; });
  if (!atual) { toast('Registro não encontrado', 'error'); return; }
  const p = currentPatientData;
  const nome = p.name || '';
  const idade = p.birth_date ? (new Date().getFullYear() - parseInt(p.birth_date)) + ' anos' : '--';
  const sexo = p.gender || '--';
  const altura = atual.altura ? atual.altura + ' m' : (p.altura ? p.altura + ' m' : '--');
  const resp = atual.responsavel || 'Dra. Bruna';
  const crm = atual.responsavel_crm || 'CRM-SP 11111';
  const dataFmt = fmtDate(atual.data_exame);

  // SCORE calculado (0-100 baseado nos índices)
  let score = 50;
  if (atual.imc) { if (atual.imc < 25) score += 10; else if (atual.imc < 30) score += 5; }
  if (atual.perc_gordura) { if (atual.perc_gordura < 25) score += 10; else if (atual.perc_gordura < 33) score += 5; }
  if (atual.smi) { if (atual.smi >= 7) score += 10; else if (atual.smi >= 6) score += 5; }
  if (atual.gordura_visceral) { if (atual.gordura_visceral <= 9) score += 10; else if (atual.gordura_visceral <= 12) score += 5; }
  score = Math.min(100, Math.max(0, score));

  // Evolução (últimas 3 avaliações incluindo atual)
  const historico = lista.slice(-3);
  const primeiroAnterior = historico.length > 1 ? historico[0] : null;
  const deltaPeso = primeiroAnterior && atual.peso && primeiroAnterior.peso ? (atual.peso - primeiroAnterior.peso) : null;
  const deltaGord = primeiroAnterior && atual.gordura_corporal && primeiroAnterior.gordura_corporal ? (atual.gordura_corporal - primeiroAnterior.gordura_corporal) : null;

  // Referências para radar (% do ideal por segmento)
  const refMusc = { braco: 3.0, perna: 10.0 };
  const radarData = [
    atual.seg_braco_d ? Math.round((atual.seg_braco_d / refMusc.braco) * 100) : 0,

async function renderTRHE() {
  const { data: exames } = await sb.from('planos_trhe').select('*').eq('patient_id', currentPatientId).order('data_exame', { ascending: false });
  const lista = exames || [];
  const c = document.getElementById('clinica-sub-content');

  let html = '<div class="section-header"><div class="section-title">\ud83e\udeb2 Teste Respirat\u00f3rio do H\u00e2 (TRHE)</div>'
    + '<button class="btn btn-primary btn-sm" onclick="showFormTRHE(null)">+ Novo Exame</button></div>';

  if (!lista.length) {
    html += '<div class="empty"><div class="empty-icon">\ud83e\udeb2</div><div>Nenhum exame registrado</div><div style="font-size:12px;color:var(--text-muted);margin-top:8px">Clique em "+ Novo Exame" para registrar o primeiro TRHE deste paciente.</div></div>';
    c.innerHTML = html;
    return;
  }

  // Evolutivo list
  html += '<div style="margin-bottom:16px">';
  lista.forEach((ex, idx) => {
    const siboLabel = ex.sibo ? '\u2713 SIBO Positivo' : 'SIBO Negativo';
    const siboCor = ex.sibo ? '#991b1b' : '#166534';
    const siboBg = ex.sibo ? '#fee2e2' : '#dcfce7';
    const sgfCls = ex.sgf >= 61 ? '#dc2626' : ex.sgf >= 41 ? '#d97706' : ex.sgf >= 21 ? '#2563eb' : '#6b7280';
    const sgfBg = ex.sgf >= 61 ? '#fee2e2' : ex.sgf >= 41 ? '#fef3c7' : ex.sgf >= 21 ? '#dbeafe' : '#f3f4f6';
    html += '<div class="trhe-evolutivo-item" onclick="showLaudoTRHE(' + ex.id + ')">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">'
      + '<div>'
      + '<div style="font-weight:700;font-size:14px">\ud83d\udcc5 ' + isoToDisplay(ex.data_exame) + '</div>'
      + '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">'
      + 'Delta H\u2082: <strong>' + (ex.delta_h2 || 0) + ' ppm</strong>'
      + ' \u00b7 IFI: <strong>' + (ex.ifi || 0) + '</strong>'
      + ' \u00b7 AUC: <strong>' + (ex.auc || 0) + '</strong>'
      + (ex.preparo_adequado === false ? ' \u00b7 <span style="color:var(--warning)">Preparo inadequado</span>' : '')
      + '</div>'
      + '</div>'
      + '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
      + '<span style="font-size:11px;font-weight:700;color:' + siboCor + ';background:' + siboBg + ';padding:3px 10px;border-radius:99px">' + siboLabel + '</span>'
      + '<span style="font-size:11px;font-weight:700;color:' + sgfCls + ';background:' + sgfBg + ';padding:3px 10px;border-radius:99px">SGF: ' + (ex.sgf || 0) + '</span>'
      + '<span style="font-size:11px;color:var(--accent)">Ver laudo \u2192</span>'
      + '</div></div></div>';
  });
  html += '</div>';

  // Chart evolutivo SGF se tiver 2+ exames
  if (lista.length >= 2) {
    html += '<div class="card"><div class="card-title">Evolu\u00e7\u00e3o do SGF (Score Global de Fermenta\u00e7\u00e3o)</div>'
      + '<div style="position:relative;height:160px"><canvas id="chart-trhe-evolutivo"></canvas></div></div>';
  }

  c.innerHTML = html;

  if (lista.length >= 2) {
    setTimeout(() => {
      const canvas = document.getElementById('chart-trhe-evolutivo');
      if (!canvas) return;
      const labels = [...lista].reverse().map(e => isoToDisplay(e.data_exame));
      const sgfData = [...lista].reverse().map(e => e.sgf || 0);
      new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'SGF',
            data: sgfData,
            borderColor: '#1D2846',
            backgroundColor: 'rgba(29,40,70,.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 5,
            borderWidth: 2,
            pointBackgroundColor: sgfData.map(v => v >= 61 ? '#dc2626' : v >= 41 ? '#d97706' : '#1D2846')
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 10 } } },
            y: { min: 0, max: 100, grid: { color: 'rgba(0,0,0,.06)' }, ticks: { font: { size: 10 }, stepSize: 20 } }
          }
        }
      });
    }, 150);
  }
}

  const t120 = parseInt(document.getElementById('trhe-t120').value) || 0;

function calcularTRHE(vals, sintomas, intensidade, preparoAdequado) {
  const { t0, t15, t30, t45, t60, t90, t120, t150, t180 } = vals;
  const pontos90 = [t15, t30, t45, t60, t90];
  const pico90 = Math.max(...pontos90);
  const tempoPico90 = [15, 30, 45, 60, 90][pontos90.indexOf(pico90)];
  const deltaH2 = pico90 - t0;
  const sibo = deltaH2 >= 20;
  const todosValores = [t0, t15, t30, t45, t60, t90, t120, t150, t180];
  const picoAbsoluto = Math.max(...todosValores);
  const temposPicoAbs = [0, 15, 30, 45, 60, 90, 120, 150, 180];
  const tempoPicoAbsoluto = temposPicoAbs[todosValores.indexOf(picoAbsoluto)];
  const ifi = picoAbsoluto - t0;
  const basalElevado = t0 > 20;
  const fermentacaoColonica = t120 > t90 || t150 > t90 || t180 > t90;
  const baixaProducao = todosValores.every(v => v < 10);

  // AUC trapezoidal
  const tempos = [0, 15, 30, 45, 60, 90, 120, 150, 180];
  let auc = 0;
  for (let i = 1; i < tempos.length; i++) {
    auc += (tempos[i] - tempos[i-1]) * (todosValores[i-1] + todosValores[i]) / 2;
  }
  auc = Math.round(auc);

  // SGF
  let sgf = 0;
  sgf += ifi < 20 ? 10 : ifi <= 40 ? 20 : ifi <= 60 ? 30 : 40;
  sgf += picoAbsoluto < 20 ? 5 : picoAbsoluto <= 40 ? 10 : picoAbsoluto <= 60 ? 15 : 20;
  sgf += t0 < 10 ? 0 : t0 <= 20 ? 5 : 15;
  sgf += fermentacaoColonica ? 15 : 0;
  const isfMap = { 'sem': 0, 'leve': 3, 'moderado': 6, 'intenso': 10 };
  sgf += isfMap[intensidade] || 0;

  const isf = intensidade === 'intenso' ? 3 : intensidade === 'moderado' ? 2 : intensidade === 'leve' ? 1 : 0;

  const perfilIFI = ifi < 20 ? 'Baixa fermenta\u00e7\u00e3o' : ifi <= 40 ? 'Fermenta\u00e7\u00e3o habitual' : ifi <= 60 ? 'Fermenta\u00e7\u00e3o aumentada' : 'Hiperfermenta\u00e7\u00e3o intestinal';
  const classSGF = sgf <= 20 ? 'Fermenta\u00e7\u00e3o reduzida' : sgf <= 40 ? 'Fermenta\u00e7\u00e3o habitual' : sgf <= 60 ? 'Fermenta\u00e7\u00e3o aumentada' : sgf <= 80 ? 'Hiperfermenta\u00e7\u00e3o intestinal' : 'Hiperfermenta\u00e7\u00e3o intestinal intensa';

  return {
    t0, t15, t30, t45, t60, t90, t120, t150, t180,
    pico90, tempoPico90, deltaH2, sibo,
    picoAbsoluto, tempoPicoAbsoluto, ifi, basalElevado,
    fermentacaoColonica, baixaProducao, auc, sgf, isf,
    perfilIFI, classSGF, sintomas, intensidade, preparoAdequado
  };
}

function gerarLaudoTextos(r) {
  const nomeP = currentPatientData ? currentPatientData.name : 'Paciente';

  const analiseCurva = 'Valor basal de hidrog\u00eanio: ' + r.t0 + ' ppm. '
    + (r.basalElevado ? 'Observa-se valor basal elevado, sugerindo atividade fermentativa aumentada mesmo em jejum. ' : '')
    + 'Pico at\u00e9 90 minutos: ' + r.pico90 + ' ppm (aos ' + r.tempoPico90 + ' min). '
    + 'Delta H\u2082: ' + r.deltaH2 + ' ppm. '
    + 'Pico m\u00e1ximo absoluto: ' + r.picoAbsoluto + ' ppm (aos ' + r.tempoPicoAbsoluto + ' min). '
    + (r.fermentacaoColonica ? 'Observa-se eleva\u00e7\u00e3o significativa ap\u00f3s 90 minutos, compat\u00edvel com fermenta\u00e7\u00e3o col\u00f4nica.' : 'N\u00e3o h\u00e1 eleva\u00e7\u00e3o significativa ap\u00f3s 90 minutos.')
    + (r.baixaProducao ? ' Padr\u00e3o de baixa produ\u00e7\u00e3o de hidrog\u00eanio durante todo o exame.' : '');

  const perfilFermentativo = 'IFI = ' + r.ifi + ' \u2014 ' + r.perfilIFI + '.';

  const impressaoCl = r.sibo
    ? 'Achado compat\u00edvel com supercrescimento bacteriano do intestino delgado (SIBO) com base no crit\u00e9rio de delta H\u2082 \u2265 20 ppm at\u00e9 90 minutos. '
      + 'Perfil fermentativo: ' + r.perfilIFI + '. SGF: ' + r.sgf + ' (' + r.classSGF + ').'
    : 'N\u00e3o foram observados crit\u00e9rios para supercrescimento bacteriano do intestino delgado (delta H\u2082 < 20 ppm at\u00e9 90 minutos). '
      + 'Perfil fermentativo: ' + r.perfilIFI + '. SGF: ' + r.sgf + ' (' + r.classSGF + ').';

  const interpretacao = (r.basalElevado ? 'Basal elevado (' + r.t0 + ' ppm > 20 ppm): sugere atividade fermentativa em jejum. ' : '')
    + (r.fermentacaoColonica ? 'Observa-se fermenta\u00e7\u00e3o col\u00f4nica ap\u00f3s progress\u00e3o do substrato para o intestino grosso. ' : '')
    + (r.baixaProducao ? 'Padr\u00e3o de baixa produ\u00e7\u00e3o de hidrog\u00eanio: pode indicar microbiota com predomin\u00e2ncia metanogênica ou preparo inadequado. ' : '')
    + (r.isf > 0 ? 'A reprodu\u00e7\u00e3o de sintomas durante o exame sugere relev\u00e2ncia cl\u00ednica da fermenta\u00e7\u00e3o intestinal para o quadro apresentado.' : 'A interpreta\u00e7\u00e3o dos achados deve ser realizada em conjunto com a avalia\u00e7\u00e3o cl\u00ednica.');

  const conclusao = (r.sibo
    ? 'SIBO: Positivo (Delta H\u2082 = ' + r.deltaH2 + ' ppm, crit\u00e9rio \u2265 20 ppm at\u00e9 90 min). '
    : 'SIBO: Negativo (Delta H\u2082 = ' + r.deltaH2 + ' ppm, abaixo de 20 ppm). ')
    + 'Perfil fermentativo: ' + r.perfilIFI + '. '
    + 'SGF: ' + r.sgf + ' \u2014 ' + r.classSGF + '.'
    + (r.basalElevado ? ' Basal elevado.' : '')
    + (r.fermentacaoColonica ? ' Fermenta\u00e7\u00e3o col\u00f4nica presente.' : '');

  return { analiseCurva, perfilFermentativo, impressaoCl, interpretacao, conclusao };
}

async function salvarTRHE(exameId) {
  const vals = getTRHEInputValues();
  const sintomas = document.getElementById('trhe-sintomas').value.trim();
  const intensidade = document.getElementById('trhe-intensidade').value;
  const preparo = document.getElementById('trhe-preparo').value === 'sim';
  const dataExame = displayToISO(document.getElementById('trhe-data').value.trim());

  if (!dataExame) { toast('Informe a data do exame', 'error'); return; }

  const r = calcularTRHE(vals, sintomas, intensidade, preparo);
  const textos = gerarLaudoTextos(r);

  const payload = {
    patient_id: currentPatientId,
    data_exame: dataExame,
    preparo_adequado: preparo,
    sintomas: sintomas || null,
    isf: r.isf,
    valores_h2: vals,
    delta_h2: r.deltaH2,
    pico_h2_90: r.pico90,
    tempo_pico_90: r.tempoPico90,
    pico_h2_absoluto: r.picoAbsoluto,
    tempo_pico_absoluto: r.tempoPicoAbsoluto,
    ifi: r.ifi,
    sgf: r.sgf,
    auc: r.auc,
    sibo: r.sibo,
    basal_elevado: r.basalElevado,
    fermentacao_colonica: r.fermentacaoColonica,
    baixa_producao_h2: r.baixaProducao,
    perfil_fermentativo: r.perfilIFI,
    classificacao_sgf: r.classSGF,
    laudo_analise_curva: textos.analiseCurva,
    laudo_perfil: textos.perfilFermentativo,
    laudo_impressao: textos.impressaoCl,
    laudo_interpretacao: textos.interpretacao,
    laudo_conclusao: textos.conclusao,
    registrado_por: currentUser.name
  };

  let error;
  if (exameId) {
    payload.updated_by = currentUser.name;
    payload.updated_at = new Date().toISOString();
    const res = await sb.from('planos_trhe').update(payload).eq('id', exameId);
    error = res.error;
  } else {
    const res = await sb.from('planos_trhe').insert(payload);
    error = res.error;
  }

  if (error) { toast('Erro ao salvar: ' + error.message, 'error'); return; }
  closeModal('modal-generic');
  toast(exameId ? 'Exame atualizado!' : 'Exame registrado!', 'success');
  clinicaSubTab = 'trhe';
  renderClinica();
}

async function salvarEdicaoLaudo(id) {
  const updates = {
    laudo_analise_curva: document.getElementById('lte-analise')?.value || '',
    laudo_perfil: document.getElementById('lte-perfil')?.value || '',
    laudo_impressao: document.getElementById('lte-impressao')?.value || '',
    laudo_interpretacao: document.getElementById('lte-interp')?.value || '',
    laudo_conclusao: document.getElementById('lte-conclusao')?.value || '',
    updated_by: currentUser.name,
    updated_at: new Date().toISOString()
  };
  const { error } = await sb.from('planos_trhe').update(updates).eq('id', id);
  if (error) { toast('Erro ao salvar: ' + error.message, 'error'); return; }
  toast('Laudo salvo!', 'success');
  closeModal('modal-generic');
  clinicaSubTab = 'trhe';
  renderClinica();
}

async function deletarTRHE(id) {
  if (!confirm('Excluir este exame? Esta a\u00e7\u00e3o n\u00e3o pode ser desfeita.')) return;
  await sb.from('planos_trhe').delete().eq('id', id);
  toast('Exame exclu\u00eddo', 'success');
  closeModal('modal-generic');
  clinicaSubTab = 'trhe';
  renderClinica();
}

async function renderPatAgenda(){
  const[{data:appts},{data:histAppts}]=await Promise.all([
    sb.from('planos_appointments').select('*').eq('patient_id',currentPatientId).order('created_at'),
    sb.from('planos_appt_historico').select('*').eq('patient_id',currentPatientId)
  ]);
  const c=document.getElementById('patient-tab-content');
  const sorted=(appts||[]).sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));
  const hist=histAppts||[];
  const cancelCount=hist.filter(h=>h.tipo==='cancelamento').length;
  const remarcCount=hist.filter(h=>h.tipo==='remarcacao').length;
  const cancelFromStatus=(appts||[]).filter(a=>a.status==='Cancelou').length;
  const totalCanc=Math.max(cancelCount,cancelFromStatus);
  function apptHtml(a){
    const isAuto=!!a.origem_tabela;
    const statusOpts=['Agendado','Compareceu','Faltou','Cancelou'].map(s=>'<option '+(a.status===s?'selected':'')+'>'+s+'</option>').join('');
    const borderLeft=isAuto?'border-left:3px solid var(--success)':a.status==='Cancelou'?'border-left:3px solid var(--danger)':a.status==='Faltou'?'border-left:3px solid var(--warning)':'';
    return '<div class="appt-item" style="'+borderLeft+'">'
      +'<div class="appt-time">'+(a.time_str||'--:--')+'</div>'
      +'<div class="appt-info">'
      +'<div class="appt-name">'+fmtDate(a.date_str||'')+' \u00b7 '+(a.procedimento||'')+'</div>'
      +'<div class="appt-sub">'+(a.tipo||'')+(a.observacao?' \u00b7 '+a.observacao:'')+'</div>'
      +(isAuto?'<div class="appt-sub" style="color:var(--success);font-weight:600">\ud83d\udd17 '+(a.origem_tabela==='soro_sessoes'?'Soroterapia':'Implante')+'</div>':'')
      +(a.profissional_nome?'<div class="appt-sub" style="color:var(--navy);font-weight:600">\ud83d\udc64 '+a.profissional_nome+'</div>':'')
      +'<div style="margin-top:2px"><span class="user-badge">'+(a.registrado_por||'')+'</span></div>'
      +'</div>'
      +'<button onclick="editAppt('+a.id+')" title="Editar" style="padding:5px 9px;border-radius:7px;background:transparent;border:1.5px solid var(--border);color:var(--navy);cursor:pointer;font-size:14px">&#9999;&#65039;</button>'
      +'<select style="border:1.5px solid var(--border);border-radius:8px;padding:4px 8px;font-size:12px;font-family:var(--font)" onchange="handleApptStatusChange('+a.id+','+currentPatientId+',this.value,this)">'+statusOpts+'</select>'
      +'<button class="btn-icon" onclick="excluirAgendamentoPat('+a.id+')" title="Excluir cadastro errado">\ud83d\uddd1</button>'
      +'</div>';
  }
  let html='';
  if(totalCanc>0||remarcCount>0){
    html+='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">';
    if(totalCanc>0)html+='<span style="background:#fee2e2;color:#991b1b;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700">\u274c '+totalCanc+' cancelamento(s)</span>';
    if(remarcCount>0)html+='<span style="background:#dbeafe;color:#1e40af;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700">\ud83d\udd04 '+remarcCount+' remarca\u00e7\u00e3o(oes)</span>';
    html+='</div>';
  }
  html+='<div class="section-header"><div class="section-title">Agendamentos</div><button class="btn btn-primary btn-sm" onclick="showAddApptPatient()">+ Add</button></div>';
  html+=sorted.slice(0,5).map(a=>apptHtml(a)).join('');
  if(sorted.length>5){
    html+='<div id="more-appts" style="display:none">'+sorted.slice(5).map(a=>apptHtml(a)).join('')+'</div>';
    html+='<button class="btn btn-ghost btn-full" onclick="document.getElementById(\'more-appts\').style.display=\'block\';this.style.display=\'none\'">Ver todos ('+sorted.length+') \u2193</button>';
  }
  if(!sorted.length)html+='<div class="empty"><div class="empty-icon">\ud83d\udcc5</div>Sem agendamentos</div>';
  if(hist.length){
    html+='<div class="card" style="margin-top:12px"><div class="card-title">\ud83d\udcdd Hist\u00f3rico de Presen\u00e7as e Ocorr\u00eancias</div>';
    hist.slice().reverse().forEach(h=>{
      const cor=h.tipo==='cancelamento'?'var(--danger)':h.tipo==='falta'?'var(--warning)':'var(--accent)';
      const icon=h.tipo==='cancelamento'?'\u274c':h.tipo==='falta'?'\u26a0\ufe0f':'\ud83d\udd04';

  const safeName=file.name.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]/g,'_');
  const path='pat'+currentPatientId+'_'+Date.now()+'_'+safeName;

async function handleApptStatusChange(id,patientId,newStatus,selectEl){
  const oldStatus=selectEl.dataset.oldStatus||'Agendado';
  if(newStatus==='Cancelou'){
    const motivo=prompt('Motivo do cancelamento (opcional):');
    await sb.from('planos_appt_historico').insert({appointment_id:id,patient_id:patientId,tipo:'cancelamento',observacao:motivo||null,registrado_por:currentUser?currentUser.name:'Sistema',created_at:new Date().toISOString()});
    await sb.from('planos_appointments').update({status:newStatus,updated_by:currentUser?currentUser.name:'Sistema'}).eq('id',id);
    toast('Cancelamento registrado','success');
  } else if(newStatus==='Agendado'&&(oldStatus==='Cancelou'||oldStatus==='Faltou')){
    const motivo=prompt('Observa\u00e7\u00e3o sobre a remarca\u00e7\u00e3o (opcional):');
    await sb.from('planos_appt_historico').insert({appointment_id:id,patient_id:patientId,tipo:'remarcacao',observacao:motivo||null,registrado_por:currentUser?currentUser.name:'Sistema',created_at:new Date().toISOString()});
    await sb.from('planos_appointments').update({status:newStatus,updated_by:currentUser?currentUser.name:'Sistema'}).eq('id',id);
    toast('Remarca\u00e7\u00e3o registrada','success');
  } else {
    await sb.from('planos_appointments').update({status:newStatus,updated_by:currentUser?currentUser.name:'Sistema'}).eq('id',id);
    toast('Status atualizado','success');
  }
  selectEl.dataset.oldStatus=newStatus;
}

  const sorted=overdue.slice().sort((a,b)=>parseDateInt(b.date_str)-parseDateInt(a.date_str));

  sorted.forEach(a=>{
    const d=daysAgo(fmtDate(a.date_str));

async function renderAgenda(){
  const[{data:appts},{data:patients}]=await Promise.all([
    sb.from('planos_appointments').select('*').order('created_at'),
    sb.from('planos_patients').select('id,name')
  ]);
  const patMap={};(patients||[]).forEach(p=>patMap[p.id]=p.name);
  const patIdMap={};(patients||[]).forEach(p=>patIdMap[p.id]=p.id);
  const c=document.getElementById('main-content');
  if(!window._agView)window._agView='dia';
  if(!window._agDate)window._agDate=todayStr();
  function getWeekDates(dateStr){
    const p=dateStr.split('/');const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
    const day=d.getDay();const monday=new Date(d);monday.setDate(d.getDate()-day+(day===0?-6:1));
    const dates=[];for(let i=0;i<7;i++){const dd=new Date(monday);dd.setDate(monday.getDate()+i);dates.push(String(dd.getDate()).padStart(2,'0')+'/'+String(dd.getMonth()+1).padStart(2,'0')+'/'+dd.getFullYear());}return dates;
  }
  function getMonthDates(dateStr){
    const p=dateStr.split('/');const y=parseInt(p[2]),m=parseInt(p[1])-1;const last=new Date(y,m+1,0);
    const dates=[];for(let d=1;d<=last.getDate();d++){dates.push(String(d).padStart(2,'0')+'/'+String(m+1).padStart(2,'0')+'/'+y);}return dates;
  }
  function navigateDate(dir){
    const p=window._agDate.split('/');const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
    if(window._agView==='dia')d.setDate(d.getDate()+dir);
    else if(window._agView==='semana')d.setDate(d.getDate()+dir*7);
    else if(window._agView==='mes')d.setMonth(d.getMonth()+dir);
    window._agDate=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
    renderAgendaContent();
  }
  function renderAgendaContent(){
    const view=window._agView;const curDate=window._agDate;const todayStr_=todayStr();
    const cp=curDate.split('/');const cy=parseInt(cp[2]),cm=parseInt(cp[1])-1;
    const firstDay=new Date(cy,cm,1).getDay();const daysInMonth=new Date(cy,cm+1,0).getDate();
    const monthNames=['Janeiro','Fevereiro','Mar\u00e7o','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const dayNames=['D','S','T','Q','Q','S','S'];
    const apptDatesSet=new Set((appts||[]).map(a=>a.date_str));
    let calHtml='<div style="background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:14px">';
    calHtml+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
    calHtml+='<button class="btn-icon" onclick="navigateCalMonth(-1)">&#8249;</button>';
    calHtml+='<span style="font-weight:700;font-size:14px">'+monthNames[cm]+' '+cy+'</span>';
    calHtml+='<button class="btn-icon" onclick="navigateCalMonth(1)">&#8250;</button>';
    calHtml+='</div>';
    calHtml+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
    dayNames.forEach(d=>{calHtml+='<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text-muted);padding:2px">'+d+'</div>';});
    calHtml+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
    const startDay=firstDay===0?6:firstDay-1;
    for(let i=0;i<startDay;i++)calHtml+='<div></div>';
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=String(d).padStart(2,'0')+'/'+String(cm+1).padStart(2,'0')+'/'+cy;
      const isToday=dateStr===todayStr_;
      const isSelected=view==='dia'?dateStr===curDate:(view==='semana'?getWeekDates(curDate).includes(dateStr):(cp[1]===String(cm+1).padStart(2,'0')&&cp[2]===String(cy)));
      const hasAppt=apptDatesSet.has(dateStr);
      const bg=isToday?'var(--navy)':isSelected?'#dbeafe':'transparent';
      const col=isToday?'#fff':isSelected?'var(--navy)':'var(--text)';
      calHtml+='<div onclick="window._agDate=\''+dateStr+'\';window._agView=\'dia\';renderAgendaContent()" style="text-align:center;padding:4px 2px;border-radius:6px;cursor:pointer;background:'+bg+';color:'+col+';font-size:12px;font-weight:'+(isToday||isSelected?'700':'400')+';position:relative">'+d+(hasAppt?'<div style="width:4px;height:4px;border-radius:50%;background:'+(isToday?'#fff':'var(--accent)')+';margin:0 auto;margin-top:1px"></div>':'<div style="height:5px"></div>')+'</div>';
    }
    calHtml+='</div></div>';
    let viewLabel='';
    if(view==='dia')viewLabel=curDate===(todayStr_)?'Hoje \u2014 '+curDate:fmtDate(curDate);
    else if(view==='semana'){const w=getWeekDates(curDate);viewLabel='Semana: '+fmtDate(w[0])+' a '+fmtDate(w[6]);}
    else if(view==='mes'){const mp=curDate.split('/');viewLabel=monthNames[parseInt(mp[1])-1]+' '+mp[2];}
    let html2='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">';
    html2+='<button class="btn btn-primary btn-sm" onclick="window._agDate=\''+todayStr_+'\';window._agView=\'dia\';renderAgendaContent()">&#128197; Hoje</button>';
    html2+='<button class="btn-icon" onclick="navigateDate(-1)">&#8249;</button>';
    html2+='<button class="btn-icon" onclick="navigateDate(1)">&#8250;</button>';
    html2+='<span style="font-weight:700;font-size:14px;flex:1">'+viewLabel+'</span>';
    html2+='<div style="display:flex;gap:4px">';
    ['dia','semana','mes'].forEach(v=>{const label=v==='dia'?'Dia':v==='semana'?'Semana':'M\u00eas';html2+='<button class="btn btn-sm '+(view===v?'btn-primary':'btn-ghost')+'" onclick="window._agView=\''+v+'\';renderAgendaContent()">'+label+'</button>';});
    html2+='</div>';
    html2+='<button class="btn btn-primary btn-sm" onclick="showAddApptGlobal()">+ Add</button>';
    html2+='</div>';
    let datesToShow=[];
    if(view==='dia')datesToShow=[curDate];
    else if(view==='semana')datesToShow=getWeekDates(curDate);
    else if(view==='mes')datesToShow=getMonthDates(curDate);
    const todayIntLocal=parseDateInt(todayStr_);
    if(view!=='mes'){
      const overdue=(appts||[]).filter(a=>parseDateInt(a.date_str)<todayIntLocal&&(!a.status||a.status==='Agendado')&&!a.origem_tabela);
      if(overdue.length&&view==='dia'){
        window._overdueAppts=overdue;window._overduePatMap=patMap;
        html2+='<div onclick="showOverduePending()" style="background:#fff5f5;border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#991b1b;cursor:pointer;display:flex;align-items:center;justify-content:space-between">';
        html2+='<span>\u26a0\ufe0f <strong>'+overdue.length+' consulta(s) sem status</strong> em datas passadas.</span>';
        html2+='<span style="font-weight:700;font-size:12px;background:#fca5a5;color:#991b1b;padding:3px 10px;border-radius:99px">Ver pendentes \u2192</span>';
        html2+='</div>';
      }
    }
    let hasAny=false;
    datesToShow.forEach(date=>{
      const dayAppts=(appts||[]).filter(a=>a.date_str===date).sort((a,b)=>(a.time_str||'').localeCompare(b.time_str||''));
      if(!dayAppts.length&&view!=='semana')return;
      const isPast=parseDateInt(date)<todayIntLocal;const isToday=date===todayStr_;
      hasAny=true;
      if(view!=='dia'){
        html2+='<div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;padding:4px 0;border-bottom:1.5px solid var(--border-light)">';
        html2+=fmtDate(date)+(isToday?' \u2014 Hoje':'')+(dayAppts.length?' ('+dayAppts.length+')':'');
        html2+='</div>';
      }
      if(!dayAppts.length){if(view==='semana')html2+='<div style="font-size:12px;color:var(--text-muted);padding:6px 0;font-style:italic">Sem agendamentos</div>';return;}
      html2+='<div style="background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:'+(view==='dia'?'6':'10')+'px;overflow:hidden">';
      dayAppts.forEach(a=>{
        const isAuto=!!a.origem_tabela;const isOverdue=isPast&&(!a.status||a.status==='Agendado')&&!isAuto;
        const statusOpts=['Agendado','Compareceu','Faltou','Cancelou'].map(s=>'<option '+(a.status===s?'selected':'')+'>'+s+'</option>').join('');
        html2+='<div style="padding:12px 14px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px;'+(isAuto?'border-left:3px solid var(--success)':isOverdue?'border-left:3px solid var(--danger);background:#fff9f9':'')+'">';
        html2+='<div style="font-weight:700;font-size:13px;color:var(--navy);min-width:46px">'+(a.time_str||'--:--')+'</div>';
        html2+='<div style="flex:1;min-width:0">';
        html2+='<div style="font-weight:600;font-size:14px">'+(patMap[a.patient_id]||'#'+a.patient_id)+'</div>';
        html2+='<div style="font-size:12px;color:var(--text-muted)">'+(a.procedimento||'')+' \u00b7 '+(a.tipo||'')+(a.observacao?' \u00b7 '+a.observacao:'')+(isOverdue?' <span style="color:var(--danger);font-weight:700">'+daysAgo(a.date_str)+'d atr\u00e1s</span>':'')+'</div>';
        if(isAuto)html2+='<div style="font-size:11px;color:var(--success);font-weight:600">\ud83d\udd17 '+(a.origem_tabela==='soro_sessoes'?'Soroterapia':'Implante')+'</div>';
        if(a.profissional_nome)html2+='<div style="font-size:12px;color:var(--navy);font-weight:600">\ud83d\udc64 '+a.profissional_nome+'</div>';
        html2+='</div>';
        if(patIdMap[a.patient_id])html2+='<button class="btn btn-ghost btn-sm" onclick="openPatient('+a.patient_id+')" style="flex-shrink:0">\ud83d\udcc2</button>';
        html2+='<button onclick="editAppt('+a.id+')" title="Editar" style="padding:5px 9px;border-radius:7px;background:transparent;border:1.5px solid var(--border);color:var(--navy);cursor:pointer;font-size:14px;flex-shrink:0">&#9999;&#65039;</button>';
        html2+='<select style="border:1.5px solid var(--border);border-radius:8px;padding:4px 8px;font-size:12px;font-family:var(--font);flex-shrink:0" onchange="handleApptStatusChange('+a.id+','+a.patient_id+',this.value,this)">'+statusOpts+'</select>';
        html2+='<button onclick="excluirAgendamento('+a.id+')" style="padding:5px 9px;border-radius:7px;background:transparent;border:1.5px solid #fca5a5;color:#ef4444;cursor:pointer;font-size:14px;flex-shrink:0">\ud83d\uddd1</button>';
        html2+='</div>';
      });
      html2+='</div>';
    });
    if(!hasAny)html2+='<div class="empty"><div class="empty-icon">\ud83d\udcc5</div>Sem agendamentos neste per\u00edodo</div>';
    c.innerHTML='<div style="display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start">'
      +'<div style="position:sticky;top:70px">'+calHtml+'</div>'
      +'<div>'+html2+'</div>'
      +'</div>';
    window.navigateDate=navigateDate;
    window.navigateCalMonth=function(dir){
      const p2=window._agDate.split('/');const d2=new Date(parseInt(p2[2]),parseInt(p2[1])-1,parseInt(p2[0]));
      d2.setMonth(d2.getMonth()+dir);
      window._agDate=String(d2.getDate()).padStart(2,'0')+'/'+String(d2.getMonth()+1).padStart(2,'0')+'/'+d2.getFullYear();
      renderAgendaContent();
    };
    window.renderAgendaContent=renderAgendaContent;
  }
  window.navigateDate=navigateDate;
  window.renderAgendaContent=renderAgendaContent;
  renderAgendaContent();
}

async function editAppt(id){
  const {data:a}=await sb.from('planos_appointments').select('*').eq('id',id).single();
  if(!a){toast('Agendamento n\u00e3o encontrado','error');return;}
  const procs=['Consulta Avulsa','Consulta de Plano de Acompanhamento','Enfermeira','Nutricionista','Exame','Preparador F\u00edsico'];
  const tipos=['Consulta','Ijet\u00e1vel','Teste Respirat\u00f3rio','Bioimpedância'];
  const procOpts=procs.map(p=>'<option '+(a.procedimento===p?'selected':'')+'>'+p+'</option>').join('');
  const tipoOpts=tipos.map(t=>'<option '+(a.tipo===t?'selected':'')+'>'+t+'</option>').join('');
  showGenericModal(
    '<div class="grid-2"><div class="field"><label>Data</label><input id="ea-date" value="'+(a.date_str||todayStr())+'"/></div><div class="field"><label>Hora</label><input id="ea-time" type="time" value="'+(a.time_str||'09:00')+'"/></div></div>'
    +'<div class="field"><label>Procedimento</label><select id="ea-proc">'+procOpts+'</select></div>'
    +'<div class="field"><label>Tipo</label><select id="ea-tipo">'+tipoOpts+'</select></div>'
    +'<div class="field"><label>Profissional</label><select id="ea-prof"><option value="">— Selecionar —</option></select></div>'
    +'<div class="field"><label>Observa\u00e7\u00e3o</label><input type="text" id="ea-obs" value="'+(a.observacao||'').replace(/"/g,'&quot;')+'"/></div>'
    +'<button class="btn btn-primary btn-full" onclick="saveEditAppt('+id+')">Salvar altera\u00e7\u00f5es</button>',
    '\u270f\ufe0f Editar Agendamento'
  );
  loadProfsIntoSelect('ea-prof');
  setTimeout(function(){
    const sel=document.getElementById('ea-prof');
    if(sel&&a.profissional_nome){
      Array.from(sel.options).forEach(function(o){if(o.text===a.profissional_nome)o.selected=true;});

}
async function saveEditAppt(id){
  const updates={
    date_str:document.getElementById('ea-date').value,
    time_str:document.getElementById('ea-time').value,
    procedimento:document.getElementById('ea-proc').value,
    tipo:document.getElementById('ea-tipo').value,
    profissional_nome:document.getElementById('ea-prof')?.value||null,
    observacao:document.getElementById('ea-obs').value.trim(),
    updated_by:currentUser?currentUser.name:'Sistema'
  };
  const{error}=await sb.from('planos_appointments').update(updates).eq('id',id);
  if(error){toast('Erro ao salvar: '+error.message,'error');return;}
  closeModal('modal-generic');
  toast('Agendamento atualizado!','success');
  if(typeof window.renderAgendaContent==='function')window.renderAgendaContent();
  else if(typeof renderAgenda==='function')renderAgenda();
}

async function renderPrograma(){
  const[{data:patients},{data:appts},{data:sessoes},{data:implantes},{data:envios}]=await Promise.all([
    sb.from('planos_patients').select('*').order('name'),
    sb.from('planos_appointments').select('*'),
    sb.from('planos_soro_sessoes').select('*'),
    sb.from('planos_implantes').select('*'),
    sb.from('planos_soro_envios').select('*')
  ]);
  allPatients=patients||[];
  let progFilter='active';let phaseFilter=0;let progSort='alpha';
  const c=document.getElementById('main-content');
  function buildProg(){
    let filtered=allPatients.filter(p=>p.plan_type!=='Consulta Avulsa');
    if(progFilter==='active')filtered=filtered.filter(p=>p.active);
    else if(progFilter==='inactive')filtered=filtered.filter(p=>!p.active);
    if(phaseFilter>0)filtered=filtered.filter(p=>p.inicio_programa&&calcPhase(fmtDate(p.inicio_programa),p.duracao_programa||3)===phaseFilter);
    if(progSort==='alpha'){filtered=filtered.slice().sort((a,b)=>a.name.localeCompare(b.name));}
    else if(progSort==='fim_asc'){filtered=filtered.slice().sort((a,b)=>{const fa=a.inicio_programa?addMonthsToDisplay(fmtDate(a.inicio_programa),a.duracao_programa||3):'99/99/9999';const fb=b.inicio_programa?addMonthsToDisplay(fmtDate(b.inicio_programa),b.duracao_programa||3):'99/99/9999';return parseDateInt(fa)-parseDateInt(fb);});}
    else if(progSort==='fim_desc'){filtered=filtered.slice().sort((a,b)=>{const fa=a.inicio_programa?addMonthsToDisplay(fmtDate(a.inicio_programa),a.duracao_programa||3):'00/00/0000';const fb=b.inicio_programa?addMonthsToDisplay(fmtDate(b.inicio_programa),b.duracao_programa||3):'00/00/0000';return parseDateInt(fb)-parseDateInt(fa);});}
    else if(progSort==='inicio'){filtered=filtered.slice().sort((a,b)=>parseDateInt(fmtDate(a.inicio_programa||''))-parseDateInt(fmtDate(b.inicio_programa||'')));}
    let html='<div class="section-header"><div class="section-title">Programa</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
      +'<button class="btn btn-sm '+(progFilter==='active'?'btn-primary':'btn-ghost')+'" onclick="window._pf=\'active\';rebuildProg()">Ativos</button>'
      +'<button class="btn btn-sm '+(progFilter==='inactive'?'btn-primary':'btn-ghost')+'" onclick="window._pf=\'inactive\';rebuildProg()">Inativos</button>'
      +'<button class="btn btn-sm '+(progFilter==='all'?'btn-primary':'btn-ghost')+'" onclick="window._pf=\'all\';rebuildProg()">Todos</button>'
      +'<button class="btn btn-sm '+(phaseFilter===0?'btn-accent':'btn-ghost')+'" onclick="window._ph=0;rebuildProg()">F-Todos</button>'
      +'<button class="btn btn-sm '+(phaseFilter===1?'btn-accent':'btn-ghost')+'" onclick="window._ph=1;rebuildProg()">F1</button>'
      +'<button class="btn btn-sm '+(phaseFilter===2?'btn-accent':'btn-ghost')+'" onclick="window._ph=2;rebuildProg()">F2</button>'
      +'<button class="btn btn-sm '+(phaseFilter===3?'btn-accent':'btn-ghost')+'" onclick="window._ph=3;rebuildProg()">F3</button>'
      +'<select style="padding:5px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;background:var(--white)" onchange="window._sort=this.value;rebuildProg()">'

      +'</div>';
